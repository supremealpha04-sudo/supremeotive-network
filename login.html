<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <!-- Login Form -->
    <main class="container">
        <div class="card" style="max-width: 400px; margin: 60px auto;">
            <h1 class="text-center" style="color: var(--gold); margin-bottom: 32px;">
                Welcome Back
            </h1>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div id="error-message" class="error-message" style="color: var(--error); margin-bottom: 16px; display: none;"></div>
                <div id="loading-message" class="loading-message" style="color: var(--electric-blue); margin-bottom: 16px; display: none;">Processing...</div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="login-button">
                    Login
                </button>
            </form>
            
            <p class="text-center mt-20">
                Don't have an account? 
                <a href="register.html">Register here</a>
            </p>
            
            <p class="text-center mt-10">
                <a href="#" id="forgot-password">Forgot Password?</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0';

        // Initialize Supabase
        const SUPABASE_URL =     'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY =     'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Login function
        async function loginUser(email, password) {
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Check if user has a profile
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();

                if (profileError && profileError.code !== 'PGRST116') {
                    console.error('Profile fetch error:', profileError);
                }

                return { success: true, user: data.user, profile };
            } catch (error) {
                console.error('Login error:', error);
                return { success: false, error: error.message };
            }
        }

        // Handle form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            const loadingDiv = document.getElementById('loading-message');
            const loginButton = document.getElementById('login-button');
            
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            loginButton.disabled = true;
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validate inputs
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                loginButton.disabled = false;
                return;
            }
            
            const result = await loginUser(email, password);
            
            loadingDiv.style.display = 'none';
            loginButton.disabled = false;
            
            if (result.success) {
                // Store user info in session
                sessionStorage.setItem('user', JSON.stringify({
                    id: result.user.id,
                    email: result.user.email
                }));
                
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = result.error || 'Login failed. Please check your credentials.';
                errorDiv.style.display = 'block';
            }
        });

        // Forgot password handler
        document.getElementById('forgot-password').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Enter your email address:');
            
            if (email) {
                try {
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/reset-password.html',
                    });
                    
                    if (error) throw error;
                    
                    alert('Password reset email sent! Check your inbox.');
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        });

        // Check if already logged in
        async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        
        checkExistingSession();
    </script>
</body>
</html>
