<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Read Ebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        #logoutBtn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Ebook Header */
        .ebook-header {
            background: var(--dark-gray);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .ebook-cover {
            width: 100px;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--gold);
        }

        .ebook-info {
            flex: 1;
        }

        .ebook-title {
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .ebook-description {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .back-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--light-gray);
            transform: translateX(-5px);
        }

        /* PDF Viewer */
        .pdf-container {
            background: var(--dark-gray);
            border-radius: 15px;
            padding: 1rem;
            border: 1px solid var(--light-gray);
            height: 800px;
            position: relative;
            overflow: hidden;
        }

        #pdfViewer {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }

        /* Fallback Message */
        .fallback-message {
            text-align: center;
            padding: 3rem;
            background: var(--dark-gray);
            border-radius: 15px;
            border: 1px solid var(--light-gray);
        }

        .fallback-message h3 {
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .fallback-message p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .ebook-header {
                flex-direction: column;
                text-align: center;
            }

            .pdf-container {
                height: 600px;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
    <!-- PDF.js for better PDF rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            <button id="logoutBtn" style="display: none;">Logout</button>
            <a href="login.html" id="loginLink">Login</a>
        </div>
    </nav>

    <main class="container">
        <div id="alertContainer"></div>
        
        <div id="readerContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading ebook...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        let currentUser = null
        let currentEbook = null

        // Get ebook ID from URL
        const urlParams = new URLSearchParams(window.location.search)
        const ebookId = urlParams.get('id')

        if (!ebookId) {
            window.location.href = 'ebooks.html'
        }

        // DOM Elements
        const readerContainer = document.getElementById('readerContainer')
        const alertContainer = document.getElementById('alertContainer')
        const logoutBtn = document.getElementById('logoutBtn')
        const loginLink = document.getElementById('loginLink')
        const adminLink = document.getElementById('adminLink')

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i>${type === 'success' ? '✅' : '❌'}</i>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check auth status
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user

            if (user) {
                logoutBtn.style.display = 'block'
                loginLink.style.display = 'none'
                
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block'
                    adminLink.href = 'admin/admin-dashboard.html'
                }
            } else {
                logoutBtn.style.display = 'none'
                loginLink.style.display = 'block'
                adminLink.style.display = 'none'
            }
        }

        // Check if ebook is unlocked
        async function checkUnlock(ebookId, userId) {
            if (!userId) return false

            try {
                const { data, error } = await supabase
                    .from('unlocks')
                    .select('*')
                    .eq('ebook_id', ebookId)
                    .eq('user_id', userId)
                    .eq('status', 'approved')
                    .maybeSingle()

                if (error) throw error
                return !!data
            } catch (error) {
                console.error('Error checking unlock:', error)
                return false
            }
        }

        // Load ebook
        async function loadEbook() {
            try {
                readerContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading ebook...</p>
                    </div>
                `

                // Fetch ebook details
                const { data: ebook, error } = await supabase
                    .from('ebooks')
                    .select('*')
                    .eq('id', ebookId)
                    .single()

                if (error) throw error
                if (!ebook) throw new Error('Ebook not found')

                currentEbook = ebook

                // Check if user has access
                let hasAccess = !ebook.is_paid
                
                if (ebook.is_paid && currentUser) {
                    hasAccess = await checkUnlock(ebookId, currentUser.id)
                }

                if (!hasAccess) {
                    showAlert('This ebook is locked. Please unlock it first.', 'error')
                    setTimeout(() => {
                        window.location.href = 'ebooks.html'
                    }, 2000)
                    return
                }

                renderEbookReader(ebook)

            } catch (error) {
                readerContainer.innerHTML = `
                    <div class="alert alert-error">
                        <i>❌</i>
                        <span>Error loading ebook: ${error.message}</span>
                    </div>
                `
            }
        }

        // Render ebook reader
        function renderEbookReader(ebook) {
            // Check if PDF URL is valid
            const pdfUrl = ebook.pdf_url
            
            // Create a proxy URL if needed (for CORS issues)
            const proxyUrl = pdfUrl

            readerContainer.innerHTML = `
                <div class="ebook-header">
                    <img src="${ebook.cover_url}" alt="${escapeHtml(ebook.title)}" class="ebook-cover"
                         onerror="this.src='https://via.placeholder.com/100x140?text=No+Cover'">
                    
                    <div class="ebook-info">
                        <h1 class="ebook-title">${escapeHtml(ebook.title)}</h1>
                        <p class="ebook-description">${escapeHtml(ebook.description)}</p>
                    </div>

                    <a href="ebooks.html" class="back-btn">
                        <i>←</i>
                        Back to Library
                    </a>
                </div>

                <div class="pdf-container" id="pdfContainer">
                    <iframe id="pdfViewer" 
                            src="${proxyUrl}" 
                            frameborder="0"
                            allowfullscreen
                            webkitallowfullscreen>
                    </iframe>
                </div>

                <div id="fallbackContainer" class="hidden">
                    <div class="fallback-message">
                        <h3>PDF Viewer Not Available</h3>
                        <p>Your browser doesn't support embedded PDF viewing. You can download the PDF instead.</p>
                        <a href="${proxyUrl}" download class="download-btn" target="_blank">
                            <i>📥</i>
                            Download PDF
                        </a>
                    </div>
                </div>
            `

            // Check if iframe loaded successfully
            const iframe = document.getElementById('pdfViewer')
            
            // Fallback for browsers that can't display PDF
            setTimeout(() => {
                try {
                    // Check if iframe content is accessible
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document
                    if (!iframeDoc.body.innerHTML) {
                        showFallback()
                    }
                } catch (e) {
                    // Cross-origin error means PDF loaded successfully
                    console.log('PDF loaded successfully')
                }
            }, 3000)

            // Add error handler for iframe
            iframe.onerror = function() {
                showFallback()
            }
        }

        // Show fallback download option
        function showFallback() {
            document.getElementById('pdfContainer').classList.add('hidden')
            document.getElementById('fallbackContainer').classList.remove('hidden')
        }

        // Alternative PDF viewer using PDF.js
        function renderWithPDFjs(pdfUrl) {
            const container = document.getElementById('pdfContainer')
            container.innerHTML = '<div id="pdfCanvas" style="width: 100%; height: 100%; overflow: auto;"></div>'
            
            const canvas = document.createElement('canvas')
            canvas.id = 'pdfCanvas'
            canvas.style.width = '100%'
            canvas.style.height = 'auto'
            document.getElementById('pdfCanvas').appendChild(canvas)

            // Load PDF using PDF.js
            pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
                // Render first page
                pdf.getPage(1).then(page => {
                    const viewport = page.getViewport({ scale: 1.5 })
                    canvas.height = viewport.height
                    canvas.width = viewport.width

                    const renderContext = {
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    }
                    
                    page.render(renderContext)
                })

                // Add page navigation
                let currentPage = 1
                const totalPages = pdf.numPages

                const navDiv = document.createElement('div')
                navDiv.style.cssText = `
                    position: sticky;
                    top: 0;
                    background: var(--dark-gray);
                    padding: 1rem;
                    display: flex;
                    justify-content: center;
                    gap: 1rem;
                    border-bottom: 1px solid var(--light-gray);
                    z-index: 10;
                `
                
                navDiv.innerHTML = `
                    <button class="page-nav" id="prevPage" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>
                    <span>Page <span id="currentPage">${currentPage}</span> of ${totalPages}</span>
                    <button class="page-nav" id="nextPage" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
                `

                container.insertBefore(navDiv, canvas)

                // Add navigation functionality
                document.getElementById('prevPage').addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--
                        renderPage(currentPage)
                    }
                })

                document.getElementById('nextPage').addEventListener('click', () => {
                    if (currentPage < totalPages) {
                        currentPage++
                        renderPage(currentPage)
                    }
                })

                function renderPage(pageNum) {
                    pdf.getPage(pageNum).then(page => {
                        const viewport = page.getViewport({ scale: 1.5 })
                        canvas.height = viewport.height
                        canvas.width = viewport.width

                        const renderContext = {
                            canvasContext: canvas.getContext('2d'),
                            viewport: viewport
                        }
                        
                        page.render(renderContext)
                        document.getElementById('currentPage').textContent = pageNum
                        
                        // Update button states
                        document.getElementById('prevPage').disabled = pageNum === 1
                        document.getElementById('nextPage').disabled = pageNum === totalPages
                    })
                }
            }).catch(error => {
                console.error('PDF.js error:', error)
                showFallback()
            })
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut()
            window.location.reload()
        })

        // Initialize
        async function init() {
            await checkAuth()
            await loadEbook()
        }

        init()
    </script>
</body>
</html>
