<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Read Ebook</title>
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--primary-black);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        #logoutBtn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Ebook Header */
        .ebook-header {
            background: var(--dark-gray);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 2rem;
            position: relative;
        }

        .ebook-cover {
            width: 80px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--gold);
        }

        .ebook-info {
            flex: 1;
        }

        .ebook-title {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .ebook-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .back-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: var(--light-gray);
            transform: translateX(-3px);
        }

        /* PDF Viewer Container */
        .pdf-viewer-container {
            background: var(--dark-gray);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid var(--light-gray);
            min-height: 700px;
            display: flex;
            flex-direction: column;
        }

        /* PDF Toolbar */
        .pdf-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--medium-gray);
            border-radius: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .pdf-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .pdf-btn {
            background: var(--dark-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .pdf-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--primary-black);
            border-color: var(--gold);
        }

        .pdf-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .page-info span {
            color: var(--gold);
            font-weight: 600;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .zoom-level {
            color: var(--gold);
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        /* PDF Canvas */
        .pdf-canvas-wrapper {
            flex: 1;
            overflow: auto;
            background: var(--medium-gray);
            border-radius: 10px;
            padding: 1rem;
            min-height: 500px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        #pdfCanvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .ebook-header {
                flex-direction: column;
                text-align: center;
            }

            .pdf-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .pdf-controls {
                justify-content: center;
            }

            .zoom-controls {
                justify-content: center;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            <button id="logoutBtn" style="display: none;">Logout</button>
            <a href="login.html" id="loginLink">Login</a>
        </div>
    </nav>

    <main class="container">
        <div id="alertContainer"></div>
        
        <div id="readerContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading ebook...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js'

        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        let currentUser = null
        let currentEbook = null
        let pdfDoc = null
        let currentPage = 1
        let totalPages = 1
        let currentScale = 1.2
        let pageRendering = false

        // Get ebook ID from URL
        const urlParams = new URLSearchParams(window.location.search)
        const ebookId = urlParams.get('id')

        if (!ebookId) {
            window.location.href = 'ebooks.html'
        }

        // DOM Elements
        const readerContainer = document.getElementById('readerContainer')
        const alertContainer = document.getElementById('alertContainer')
        const logoutBtn = document.getElementById('logoutBtn')
        const loginLink = document.getElementById('loginLink')
        const adminLink = document.getElementById('adminLink')

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i>${type === 'success' ? '✅' : '❌'}</i>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check auth status
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user

            if (user) {
                logoutBtn.style.display = 'block'
                loginLink.style.display = 'none'
                
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block'
                    adminLink.href = 'admin/admin-dashboard.html'
                }
            } else {
                logoutBtn.style.display = 'none'
                loginLink.style.display = 'block'
                adminLink.style.display = 'none'
            }
        }

        // Check if ebook is unlocked
        async function checkUnlock(ebookId, userId) {
            if (!userId) return false

            try {
                const { data, error } = await supabase
                    .from('unlocks')
                    .select('*')
                    .eq('ebook_id', ebookId)
                    .eq('user_id', userId)
                    .eq('status', 'approved')
                    .maybeSingle()

                if (error) throw error
                return !!data
            } catch (error) {
                console.error('Error checking unlock:', error)
                return false
            }
        }

        // Load ebook
        async function loadEbook() {
            try {
                readerContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading ebook...</p>
                    </div>
                `

                // Fetch ebook details
                const { data: ebook, error } = await supabase
                    .from('ebooks')
                    .select('*')
                    .eq('id', ebookId)
                    .single()

                if (error) throw error
                if (!ebook) throw new Error('Ebook not found')

                currentEbook = ebook

                // Check if user has access
                let hasAccess = !ebook.is_paid
                
                if (ebook.is_paid && currentUser) {
                    hasAccess = await checkUnlock(ebookId, currentUser.id)
                }

                if (!hasAccess) {
                    showAlert('This ebook is locked. Please unlock it first.', 'error')
                    setTimeout(() => {
                        window.location.href = 'ebooks.html'
                    }, 2000)
                    return
                }

                renderReader(ebook)
                loadPDF(ebook.pdf_url)

            } catch (error) {
                readerContainer.innerHTML = `
                    <div class="alert alert-error">
                        <i>❌</i>
                        <span>Error loading ebook: ${error.message}</span>
                    </div>
                `
            }
        }

        // Render reader interface
        function renderReader(ebook) {
            readerContainer.innerHTML = `
                <div class="ebook-header">
                    <img src="${ebook.cover_url}" alt="${escapeHtml(ebook.title)}" class="ebook-cover"
                         onerror="this.src='https://via.placeholder.com/80x110?text=No+Cover'">
                    
                    <div class="ebook-info">
                        <h1 class="ebook-title">${escapeHtml(ebook.title)}</h1>
                        <p class="ebook-description">${escapeHtml(ebook.description)}</p>
                    </div>

                    <a href="ebooks.html" class="back-btn">
                        <i>←</i>
                        Back to Library
                    </a>
                </div>

                <div class="pdf-viewer-container">
                    <div class="pdf-toolbar">
                        <div class="pdf-controls">
                            <button class="pdf-btn" id="prevPageBtn" disabled>
                                <i>←</i>
                                Previous
                            </button>
                            <span class="page-info">
                                Page <span id="currentPageDisplay">1</span> of <span id="totalPagesDisplay">1</span>
                            </span>
                            <button class="pdf-btn" id="nextPageBtn" disabled>
                                Next
                                <i>→</i>
                            </button>
                        </div>
                        
                        <div class="zoom-controls">
                            <button class="pdf-btn" id="zoomOutBtn">
                                <i>−</i>
                            </button>
                            <span class="zoom-level" id="zoomLevel">120%</span>
                            <button class="pdf-btn" id="zoomInBtn">
                                <i>+</i>
                            </button>
                            <button class="pdf-btn" id="fitPageBtn">
                                <i>⤢</i>
                                Fit
                            </button>
                        </div>
                    </div>

                    <div class="pdf-canvas-wrapper" id="pdfCanvasWrapper">
                        <canvas id="pdfCanvas"></canvas>
                    </div>
                </div>

                <div id="downloadFallback" class="hidden" style="text-align: center; margin-top: 2rem;">
                    <a href="${ebook.pdf_url}" download class="back-btn" style="display: inline-flex;">
                        <i>📥</i>
                        Download PDF
                    </a>
                </div>
            `
        }

        // Load PDF using PDF.js
        async function loadPDF(pdfUrl) {
            try {
                // Add timestamp to bypass cache
                const urlWithTimestamp = `${pdfUrl}?t=${Date.now()}`
                
                // Load the PDF document
                pdfDoc = await pdfjsLib.getDocument(urlWithTimestamp).promise
                
                totalPages = pdfDoc.numPages
                document.getElementById('totalPagesDisplay').textContent = totalPages
                
                // Enable/disable buttons
                updateButtons()
                
                // Render first page
                renderPage(currentPage)

                // Add event listeners
                document.getElementById('prevPageBtn').addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--
                        renderPage(currentPage)
                    }
                })

                document.getElementById('nextPageBtn').addEventListener('click', () => {
                    if (currentPage < totalPages) {
                        currentPage++
                        renderPage(currentPage)
                    }
                })

                document.getElementById('zoomInBtn').addEventListener('click', () => {
                    currentScale += 0.2
                    if (currentScale > 3) currentScale = 3
                    document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
                    renderPage(currentPage)
                })

                document.getElementById('zoomOutBtn').addEventListener('click', () => {
                    currentScale -= 0.2
                    if (currentScale < 0.5) currentScale = 0.5
                    document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
                    renderPage(currentPage)
                })

                document.getElementById('fitPageBtn').addEventListener('click', () => {
                    const wrapper = document.getElementById('pdfCanvasWrapper')
                    const wrapperWidth = wrapper.clientWidth - 40
                    
                    // Calculate scale to fit width
                    if (pdfDoc) {
                        pdfDoc.getPage(currentPage).then(page => {
                            const viewport = page.getViewport({ scale: 1.0 })
                            currentScale = wrapperWidth / viewport.width
                            document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
                            renderPage(currentPage)
                        })
                    }
                })

            } catch (error) {
                console.error('Error loading PDF:', error)
                showAlert('Error loading PDF. You can download it instead.', 'error')
                
                // Show download fallback
                document.querySelector('.pdf-viewer-container').classList.add('hidden')
                document.getElementById('downloadFallback').classList.remove('hidden')
            }
        }

        // Render a specific page
        async function renderPage(pageNum) {
            if (pageRendering) return
            pageRendering = true

            try {
                const page = await pdfDoc.getPage(pageNum)
                
                // Set scale based on wrapper width for better display
                const wrapper = document.getElementById('pdfCanvasWrapper')
                const wrapperWidth = wrapper.clientWidth - 40
                
                const viewport = page.getViewport({ scale: currentScale })
                
                const canvas = document.getElementById('pdfCanvas')
                const context = canvas.getContext('2d')
                
                canvas.height = viewport.height
                canvas.width = viewport.width

                // Render the page
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                }

                await page.render(renderContext).promise
                
                // Update page display
                document.getElementById('currentPageDisplay').textContent = pageNum
                updateButtons()

            } catch (error) {
                console.error('Error rendering page:', error)
            } finally {
                pageRendering = false
            }
        }

        // Update button states
        function updateButtons() {
            const prevBtn = document.getElementById('prevPageBtn')
            const nextBtn = document.getElementById('nextPageBtn')
            
            if (prevBtn) {
                prevBtn.disabled = currentPage <= 1
            }
            if (nextBtn) {
                nextBtn.disabled = currentPage >= totalPages
            }
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut()
            window.location.reload()
        })

        // Handle window resize
        window.addEventListener('resize', () => {
            if (pdfDoc && currentPage) {
                renderPage(currentPage)
            }
        })

        // Initialize
        async function init() {
            await checkAuth()
            await loadEbook()
        }

        init()
    </script>
</body>
</html>
