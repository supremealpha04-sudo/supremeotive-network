<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Unlock Requests</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
            --info: #2196F3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--dark-gray);
            border-right: 1px solid var(--light-gray);
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--light-gray);
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .role-tag {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
            border: 1px solid var(--gold);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: var(--medium-gray);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            font-weight: 500;
        }

        .nav-link i {
            font-size: 1.2rem;
        }

        .logout-btn {
            position: absolute;
            bottom: 2rem;
            left: 1rem;
            right: 1rem;
            padding: 1rem;
            background: none;
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--error);
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stats-badge {
            background: var(--dark-gray);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stats-badge span {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--light-gray);
            padding-bottom: 1rem;
        }

        .tab {
            padding: 0.8rem 2rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab:hover {
            color: var(--gold);
            background: var(--medium-gray);
        }

        .tab.active {
            background: var(--gold);
            color: var(--primary-black);
        }

        .tab .count {
            background: var(--medium-gray);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .tab.active .count {
            background: var(--primary-black);
            color: var(--gold);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            position: relative;
            min-width: 250px;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            background: var(--dark-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .filter-select {
            padding: 0.8rem 2rem 0.8rem 1rem;
            background: var(--dark-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            min-width: 150px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--dark-gray);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--light-gray);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--gold);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Requests Grid */
        .requests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .request-card {
            background: var(--dark-gray);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid var(--light-gray);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .request-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .request-card.pending {
            border-left: 4px solid var(--warning);
        }

        .request-card.approved {
            border-left: 4px solid var(--success);
        }

        .request-card.rejected {
            border-left: 4px solid var(--error);
            opacity: 0.7;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary-black);
            font-weight: bold;
        }

        .user-details h3 {
            color: var(--gold);
            margin-bottom: 0.2rem;
        }

        .user-details p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.pending {
            background: rgba(255, 193, 7, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-badge.approved {
            background: rgba(76, 175, 80, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-badge.rejected {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .ebook-info {
            background: var(--medium-gray);
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .ebook-cover {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--gold);
        }

        .ebook-details h4 {
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .ebook-details p {
            color: var(--gold);
            font-weight: bold;
        }

        .request-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .request-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .action-buttons button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .approve-btn {
            background: var(--success);
            color: white;
        }

        .approve-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .reject-btn {
            background: var(--error);
            color: white;
        }

        .reject-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        .view-btn {
            background: var(--electric-blue);
            color: var(--primary-black);
        }

        .view-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--dark-gray);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--gold);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: var(--gold);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--error);
        }

        .modal-body {
            margin-bottom: 1.5rem;
        }

        .modal-body textarea {
            width: 100%;
            padding: 1rem;
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
        }

        .modal-body textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-actions button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
        }

        .confirm-btn {
            background: var(--success);
            color: white;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            grid-column: 1 / -1;
            background: var(--dark-gray);
            border-radius: 15px;
            border: 1px dashed var(--light-gray);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 1rem 0.5rem;
            }

            .sidebar-header {
                text-align: center;
            }

            .logo {
                font-size: 0;
            }

            .logo::first-letter {
                font-size: 1.5rem;
            }

            .role-tag {
                display: none;
            }

            .nav-link span {
                display: none;
            }

            .nav-link {
                justify-content: center;
                padding: 0.9rem;
            }

            .main {
                margin-left: 70px;
                padding: 1rem;
            }

            .requests-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .tabs {
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }

            .tab {
                white-space: nowrap;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">SupremeMotive</div>
                <span class="role-tag">Unlock Admin</span>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="admin-dashboard.html" class="nav-link">
                        <i>📊</i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="unlock-admin.html" class="nav-link active">
                        <i>🔓</i>
                        <span>Unlock Requests</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">
                        <i>🏠</i>
                        <span>View Site</span>
                    </a>
                </li>
            </ul>

            <button class="logout-btn" id="logoutBtn">
                <i>🚪</i>
                <span>Logout</span>
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="header">
                <h1>
                    <i>🔓</i>
                    Unlock Requests
                </h1>
                <div class="stats-badge" id="pendingCount">
                    <i>⏳</i>
                    <span>0</span> Pending
                </div>
            </div>

            <div id="alertContainer"></div>

            <!-- Stats Grid -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-header">
                        <i>📊</i>
                        <span>Total Requests</span>
                    </div>
                    <div class="stat-value" id="totalRequests">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <i>⏳</i>
                        <span>Pending</span>
                    </div>
                    <div class="stat-value" id="pendingRequests">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <i>✅</i>
                        <span>Approved</span>
                    </div>
                    <div class="stat-value" id="approvedRequests">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <i>❌</i>
                        <span>Rejected</span>
                    </div>
                    <div class="stat-value" id="rejectedRequests">0</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-status="all">
                    <i>📋</i>
                    All
                    <span class="count" id="allCount">0</span>
                </button>
                <button class="tab" data-status="pending">
                    <i>⏳</i>
                    Pending
                    <span class="count" id="pendingTabCount">0</span>
                </button>
                <button class="tab" data-status="approved">
                    <i>✅</i>
                    Approved
                    <span class="count" id="approvedTabCount">0</span>
                </button>
                <button class="tab" data-status="rejected">
                    <i>❌</i>
                    Rejected
                    <span class="count" id="rejectedTabCount">0</span>
                </button>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="search-box">
                    <i>🔍</i>
                    <input type="text" id="searchInput" placeholder="Search by user or ebook...">
                </div>
                <select class="filter-select" id="ebookFilter">
                    <option value="">All Ebooks</option>
                </select>
            </div>

            <!-- Requests Grid -->
            <div class="requests-grid" id="requestsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading unlock requests...</p>
                </div>
            </div>
        </main>

        <!-- Rejection Modal -->
        <div class="modal" id="rejectModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Reject Request</h2>
                    <button class="close-btn" id="closeModalBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Please provide a reason for rejection (optional):</p>
                    <textarea id="rejectReason" placeholder="Enter reason..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="confirm-btn" id="confirmRejectBtn">Confirm Rejection</button>
                    <button class="reject-btn" id="cancelModalBtn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize Supabase
        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        // State
        let currentUser = null
        let allRequests = []
        let filteredRequests = []
        let ebooks = []
        let currentStatus = 'all'
        let currentSearch = ''
        let currentEbookFilter = ''
        let selectedRequestId = null

        // DOM Elements
        const requestsGrid = document.getElementById('requestsGrid')
        const statsGrid = document.getElementById('statsGrid')
        const pendingCount = document.getElementById('pendingCount')
        const totalRequests = document.getElementById('totalRequests')
        const pendingRequests = document.getElementById('pendingRequests')
        const approvedRequests = document.getElementById('approvedRequests')
        const rejectedRequests = document.getElementById('rejectedRequests')
        const allCount = document.getElementById('allCount')
        const pendingTabCount = document.getElementById('pendingTabCount')
        const approvedTabCount = document.getElementById('approvedTabCount')
        const rejectedTabCount = document.getElementById('rejectedTabCount')
        const searchInput = document.getElementById('searchInput')
        const ebookFilter = document.getElementById('ebookFilter')
        const tabs = document.querySelectorAll('.tab')
        const alertContainer = document.getElementById('alertContainer')
        const logoutBtn = document.getElementById('logoutBtn')
        const rejectModal = document.getElementById('rejectModal')
        const closeModalBtn = document.getElementById('closeModalBtn')
        const cancelModalBtn = document.getElementById('cancelModalBtn')
        const confirmRejectBtn = document.getElementById('confirmRejectBtn')
        const rejectReason = document.getElementById('rejectReason')

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i>${type === 'success' ? '✅' : '❌'}</i>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check authentication
        async function checkAuth() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser()
                
                if (error) throw error
                if (!user) throw new Error('Not authenticated')

                currentUser = user

                // Check if user is unlock admin
                if (!ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = '../index.html'
                    return false
                }

                return true
            } catch (error) {
                console.error('Auth error:', error)
                window.location.href = '../login.html'
                return false
            }
        }

        // Load ebooks
        async function loadEbooks() {
            try {
                const { data, error } = await supabase
                    .from('ebooks')
                    .select('id, title')
                    .order('title')

                if (error) throw error
                ebooks = data || []

                // Populate ebook filter
                ebookFilter.innerHTML = '<option value="">All Ebooks</option>' +
                    ebooks.map(ebook => `<option value="${ebook.id}">${escapeHtml(ebook.title)}</option>`).join('')

            } catch (error) {
                console.error('Load ebooks error:', error)
            }
        }

        // Load unlock requests
        async function loadRequests() {
            try {
                requestsGrid.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading unlock requests...</p>
                    </div>
                `

                const { data, error } = await supabase
                    .from('unlocks')
                    .select(`
                        *,
                        profiles:user_id (id, name, email),
                        ebooks:ebook_id (id, title, price, cover_url)
                    `)
                    .order('created_at', { ascending: false })

                if (error) throw error

                allRequests = data || []
                applyFilters()

            } catch (error) {
                console.error('Load requests error:', error)
                requestsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <h3>Error Loading Requests</h3>
                        <p>${error.message}</p>
                    </div>
                `
            }
        }

        // Apply filters
        function applyFilters() {
            // Filter by status
            filteredRequests = currentStatus === 'all' 
                ? allRequests 
                : allRequests.filter(r => r.status === currentStatus)

            // Filter by search
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase()
                filteredRequests = filteredRequests.filter(r => 
                    r.profiles?.name?.toLowerCase().includes(searchLower) ||
                    r.profiles?.email?.toLowerCase().includes(searchLower) ||
                    r.ebooks?.title?.toLowerCase().includes(searchLower)
                )
            }

            // Filter by ebook
            if (currentEbookFilter) {
                filteredRequests = filteredRequests.filter(r => r.ebook_id === currentEbookFilter)
            }

            updateStats()
            renderRequests()
            updateTabCounts()
        }

        // Update statistics
        function updateStats() {
            const total = allRequests.length
            const pending = allRequests.filter(r => r.status === 'pending').length
            const approved = allRequests.filter(r => r.status === 'approved').length
            const rejected = allRequests.filter(r => r.status === 'rejected').length

            totalRequests.textContent = total
            pendingRequests.textContent = pending
            approvedRequests.textContent = approved
            rejectedRequests.textContent = rejected
            pendingCount.querySelector('span').textContent = pending

            allCount.textContent = total
            pendingTabCount.textContent = pending
            approvedTabCount.textContent = approved
            rejectedTabCount.textContent = rejected
        }

        // Update tab counts
        function updateTabCounts() {
            tabs.forEach(tab => {
                const status = tab.dataset.status
                const count = status === 'all' 
                    ? allRequests.length 
                    : allRequests.filter(r => r.status === status).length
                tab.querySelector('.count').textContent = count
            })
        }

        // Render requests
        function renderRequests() {
            if (filteredRequests.length === 0) {
                requestsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <h3>No Requests Found</h3>
                        <p>No unlock requests match your filters.</p>
                    </div>
                `
                return
            }

            requestsGrid.innerHTML = filteredRequests.map(request => {
                const user = request.profiles || { name: 'Unknown', email: 'unknown@email.com' }
                const ebook = request.ebooks || { title: 'Unknown Ebook', price: 0, cover_url: null }
                const date = new Date(request.created_at).toLocaleDateString()
                const time = new Date(request.created_at).toLocaleTimeString()
                
                return `
                    <div class="request-card ${request.status}" data-id="${request.id}">
                        <div class="request-header">
                            <div class="user-info">
                                <div class="user-avatar">
                                    ${user.name ? user.name.charAt(0).toUpperCase() : 'U'}
                                </div>
                                <div class="user-details">
                                    <h3>${escapeHtml(user.name)}</h3>
                                    <p>${escapeHtml(user.email)}</p>
                                </div>
                            </div>
                            <span class="status-badge ${request.status}">
                                ${request.status}
                            </span>
                        </div>

                        <div class="ebook-info">
                            ${ebook.cover_url 
                                ? `<img src="${ebook.cover_url}" alt="${escapeHtml(ebook.title)}" class="ebook-cover">`
                                : `<div class="ebook-cover" style="background: var(--medium-gray); display: flex; align-items: center; justify-content: center; color: var(--gold);">📚</div>`
                            }
                            <div class="ebook-details">
                                <h4>${escapeHtml(ebook.title)}</h4>
                                <p>$${ebook.price || 0}</p>
                            </div>
                        </div>

                        <div class="request-meta">
                            <span>
                                <i>📅</i>
                                ${date}
                            </span>
                            <span>
                                <i>⏰</i>
                                ${time}
                            </span>
                        </div>

                        ${request.admin_notes ? `
                            <div style="background: var(--medium-gray); padding: 0.8rem; border-radius: 8px; margin: 1rem 0; font-size: 0.9rem; color: var(--text-secondary);">
                                <strong>Notes:</strong> ${escapeHtml(request.admin_notes)}
                            </div>
                        ` : ''}

                        <div class="action-buttons">
                            ${request.status === 'pending' ? `
                                <button class="approve-btn" onclick="handleApprove('${request.id}')">
                                    <i>✅</i>
                                    Approve
                                </button>
                                <button class="reject-btn" onclick="handleReject('${request.id}')">
                                    <i>❌</i>
                                    Reject
                                </button>
                            ` : `
                                <button class="view-btn" onclick="viewUser('${user.id}')">
                                    <i>👤</i>
                                    View User
                                </button>
                                <button class="view-btn" onclick="viewEbook('${ebook.id}')">
                                    <i>📚</i>
                                    View Ebook
                                </button>
                            `}
                        </div>
                    </div>
                `
            }).join('')
        }

        // Handle approve
        window.handleApprove = async (requestId) => {
            if (!confirm('Are you sure you want to approve this unlock request?')) return

            try {
                const { error } = await supabase
                    .from('unlocks')
                    .update({ 
                        status: 'approved',
                        admin_notes: 'Approved by admin',
                        updated_at: new Date()
                    })
                    .eq('id', requestId)

                if (error) throw error

                showAlert('Request approved successfully! User can now access the ebook.', 'success')
                await loadRequests()

            } catch (error) {
                showAlert('Error approving request: ' + error.message, 'error')
            }
        }

        // Handle reject
        window.handleReject = (requestId) => {
            selectedRequestId = requestId
            rejectReason.value = ''
            rejectModal.classList.add('show')
        }

        // Confirm reject
        confirmRejectBtn.addEventListener('click', async () => {
            if (!selectedRequestId) return

            try {
                const { error } = await supabase
                    .from('unlocks')
                    .update({ 
                        status: 'rejected',
                        admin_notes: rejectReason.value || 'Rejected by admin',
                        updated_at: new Date()
                    })
                    .eq('id', selectedRequestId)

                if (error) throw error

                showAlert('Request rejected', 'success')
                rejectModal.classList.remove('show')
                selectedRequestId = null
                await loadRequests()

            } catch (error) {
                showAlert('Error rejecting request: ' + error.message, 'error')
            }
        })

        // View user
        window.viewUser = (userId) => {
            window.open(`../profile.html?id=${userId}`, '_blank')
        }

        // View ebook
        window.viewEbook = (ebookId) => {
            window.open(`../ebooks.html?id=${ebookId}`, '_blank')
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Tab click handlers
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'))
                tab.classList.add('active')
                currentStatus = tab.dataset.status
                applyFilters()
            })
        })

        // Search input
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value
            applyFilters()
        })

        // Ebook filter
        ebookFilter.addEventListener('change', (e) => {
            currentEbookFilter = e.target.value
            applyFilters()
        })

        // Modal close handlers
        closeModalBtn.addEventListener('click', () => {
            rejectModal.classList.remove('show')
            selectedRequestId = null
        })

        cancelModalBtn.addEventListener('click', () => {
            rejectModal.classList.remove('show')
            selectedRequestId = null
        })

        window.addEventListener('click', (e) => {
            if (e.target === rejectModal) {
                rejectModal.classList.remove('show')
                selectedRequestId = null
            }
        })

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await supabase.auth.signOut()
                window.location.href = '../index.html'
            } catch (error) {
                showAlert('Error logging out', 'error')
            }
        })

        // Initialize
        async function init() {
            const isAuthenticated = await checkAuth()
            if (isAuthenticated) {
                await loadEbooks()
                await loadRequests()
            }
        }

        init()
    </script>
</body>
</html>
