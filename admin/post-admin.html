<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Post Management</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <h2>SupremeMotive</h2>
            <h3>Admin Panel</h3>
            <ul class="admin-nav">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="post-admin.html" class="active">Post Management</a></li>
                <li><a href="ebook-admin.html">Ebook Management</a></li>
                <li><a href="unlock-admin.html">Unlock Requests</a></li>
                <li><a href="../index.html">View Site</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Post Management</h1>
                <button class="btn btn-primary" onclick="showCreatePost()">
                    Create New Post
                </button>
            </div>

            <!-- Create Post Form (Hidden by default) -->
            <div id="create-post-form" class="card hidden" style="margin-bottom: 32px;">
                <h2 style="color: var(--gold); margin-bottom: 16px;">Create New Post</h2>
                
                <form id="post-form">
                    <div class="form-group">
                        <label for="post-title">Title</label>
                        <input type="text" id="post-title" name="title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="post-content">Content</label>
                        <textarea id="post-content" name="content" rows="6" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="post-image">Image (Optional)</label>
                        <input type="file" id="post-image" name="image" accept="image/*">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Publish Post</button>
                        <button type="button" class="btn btn-secondary" onclick="hideCreatePost()">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Posts List -->
            <div id="posts-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Likes</th>
                            <th>Comments</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="posts-list">
                        <!-- Posts will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from '../config/supabase.js';
        import { getCurrentUser, isAdmin } from '../js/auth.js';
        import { createPost, uploadPostImage } from '../js/feed.js';

        // Global functions
        window.showCreatePost = () => {
            document.getElementById('create-post-form').classList.remove('hidden');
        };

        window.hideCreatePost = () => {
            document.getElementById('create-post-form').classList.add('hidden');
            document.getElementById('post-form').reset();
        };

        window.editPost = (postId) => {
            // Implement edit functionality
            alert('Edit functionality coming soon');
        };

        window.deletePost = async (postId) => {
            if (confirm('Are you sure you want to delete this post?')) {
                const { error } = await supabase
                    .from('posts')
                    .delete()
                    .eq('id', postId);

                if (!error) {
                    loadPosts();
                } else {
                    alert('Error deleting post: ' + error.message);
                }
            }
        };

        // Handle form submission
        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const imageFile = document.getElementById('post-image').files[0];
            
            let imageUrl = null;
            
            if (imageFile) {
                const uploadResult = await uploadPostImage(imageFile);
                if (uploadResult.success) {
                    imageUrl = uploadResult.url;
                }
            }
            
            const result = await createPost({ title, content, imageUrl });
            
            if (result.success) {
                alert('Post created successfully!');
                hideCreatePost();
                loadPosts();
            } else {
                alert('Error: ' + result.error);
            }
        });

        async function loadPosts() {
            // Check admin access
            const admin = await isAdmin('post_admin');
            if (!admin) {
                window.location.href = '../index.html';
                return;
            }

            const { data: posts, error } = await supabase
                .from('posts')
                .select(`
                    *,
                    post_likes (count),
                    comments (count)
                `)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading posts:', error);
                return;
            }

            const tbody = document.getElementById('posts-list');
            tbody.innerHTML = posts.map(post => `
                <tr>
                    <td>${post.title}</td>
                    <td>${new Date(post.created_at).toLocaleDateString()}</td>
                    <td>${post.post_likes?.length || 0}</td>
                    <td>${post.comments?.length || 0}</td>
                    <td>
                        <div class="admin-actions">
                            <button class="admin-btn admin-btn-edit" 
                                    onclick="editPost('${post.id}')">
                                Edit
                            </button>
                            <button class="admin-btn admin-btn-delete" 
                                    onclick="deletePost('${post.id}')">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Initialize
        loadPosts();
    </script>
</body>
</html>
