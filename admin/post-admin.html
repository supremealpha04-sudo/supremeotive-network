<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Manage Posts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--dark-gray);
            border-right: 1px solid var(--light-gray);
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--light-gray);
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .role-tag {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
            border: 1px solid var(--gold);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: var(--medium-gray);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            font-weight: 500;
        }

        .nav-link i {
            font-size: 1.2rem;
        }

        .logout-btn {
            position: absolute;
            bottom: 2rem;
            left: 1rem;
            right: 1rem;
            padding: 1rem;
            background: none;
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--error);
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-post-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .new-post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--dark-gray);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--gold);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: var(--gold);
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--error);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        /* File Upload */
        .file-upload {
            border: 2px dashed var(--light-gray);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .file-upload:hover {
            border-color: var(--gold);
            background: var(--medium-gray);
        }

        .file-upload input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .upload-text {
            color: var(--text-secondary);
        }

        .upload-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .file-preview {
            margin-top: 1rem;
            display: none;
        }

        .file-preview.show {
            display: block;
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--gold);
        }

        .file-name {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .remove-file {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--light-gray);
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .post-card {
            background: var(--dark-gray);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid var(--light-gray);
            transition: all 0.3s ease;
            position: relative;
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
            background: var(--medium-gray);
        }

        .post-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .post-excerpt {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--light-gray);
        }

        .post-actions button {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            transition: all 0.3s ease;
        }

        .view-post {
            background: var(--medium-gray);
            color: var(--text-primary);
        }

        .view-post:hover {
            background: var(--light-gray);
        }

        .edit-post {
            background: var(--electric-blue);
            color: var(--primary-black);
        }

        .edit-post:hover {
            filter: brightness(1.1);
        }

        .delete-post {
            background: var(--error);
            color: white;
        }

        .delete-post:hover {
            filter: brightness(1.1);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            grid-column: 1 / -1;
            background: var(--dark-gray);
            border-radius: 15px;
            border: 1px dashed var(--light-gray);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 1rem 0.5rem;
            }

            .sidebar-header {
                text-align: center;
            }

            .logo {
                font-size: 0;
            }

            .logo::first-letter {
                font-size: 1.5rem;
            }

            .role-tag {
                display: none;
            }

            .nav-link span {
                display: none;
            }

            .nav-link {
                justify-content: center;
                padding: 0.9rem;
            }

            .main {
                margin-left: 70px;
                padding: 1rem;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">SupremeMotive</div>
                <span class="role-tag">Post Admin</span>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="admin-dashboard.html" class="nav-link">
                        <i>📊</i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="post-admin.html" class="nav-link active">
                        <i>📝</i>
                        <span>Posts</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">
                        <i>🏠</i>
                        <span>View Site</span>
                    </a>
                </li>
            </ul>

            <button class="logout-btn" id="logoutBtn">
                <i>🚪</i>
                <span>Logout</span>
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="header">
                <h1>📝 Manage Posts</h1>
                <button class="new-post-btn" id="newPostBtn">
                    <i>➕</i>
                    <span>New Post</span>
                </button>
            </div>

            <div id="alertContainer"></div>

            <!-- Posts Grid -->
            <div class="posts-grid" id="postsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading posts...</p>
                </div>
            </div>
        </main>

        <!-- Post Modal -->
        <div class="modal" id="postModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Create New Post</h2>
                    <button class="close-btn" id="closeModalBtn">&times;</button>
                </div>

                <form id="postForm">
                    <input type="hidden" id="postId">

                    <div class="form-group">
                        <label for="title">Post Title</label>
                        <input type="text" id="title" class="form-control" placeholder="Enter an inspiring title..." required>
                    </div>

                    <div class="form-group">
                        <label for="content">Post Content</label>
                        <textarea id="content" class="form-control" placeholder="Write your motivational message..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Featured Image (Optional)</label>
                        <div class="file-upload" id="fileUploadArea">
                            <input type="file" id="image" accept="image/*">
                            <div class="upload-icon">📷</div>
                            <div class="upload-text">Click or drag image to upload</div>
                            <div class="upload-hint">Supports: JPG, PNG, GIF (max 5MB)</div>
                        </div>

                        <div class="file-preview" id="filePreview">
                            <img id="previewImage" class="preview-image" src="#" alt="Preview">
                            <div id="fileName" class="file-name"></div>
                            <button type="button" class="remove-file" id="removeFileBtn">Remove</button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submitBtn">Publish Post</button>
                        <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize Supabase
        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com'
        ]

        // State
        let currentUser = null
        let posts = []

        // DOM Elements
        const postsGrid = document.getElementById('postsGrid')
        const modal = document.getElementById('postModal')
        const modalTitle = document.getElementById('modalTitle')
        const postForm = document.getElementById('postForm')
        const postId = document.getElementById('postId')
        const titleInput = document.getElementById('title')
        const contentInput = document.getElementById('content')
        const imageInput = document.getElementById('image')
        const filePreview = document.getElementById('filePreview')
        const previewImage = document.getElementById('previewImage')
        const fileName = document.getElementById('fileName')
        const removeFileBtn = document.getElementById('removeFileBtn')
        const submitBtn = document.getElementById('submitBtn')
        const alertContainer = document.getElementById('alertContainer')
        const logoutBtn = document.getElementById('logoutBtn')
        const newPostBtn = document.getElementById('newPostBtn')
        const closeModalBtn = document.getElementById('closeModalBtn')
        const cancelBtn = document.getElementById('cancelBtn')
        const fileUploadArea = document.getElementById('fileUploadArea')

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i>${type === 'success' ? '✅' : '❌'}</i>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check authentication
        async function checkAuth() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser()
                
                if (error) throw error
                if (!user) throw new Error('Not authenticated')

                currentUser = user

                // Check if user is post admin
                if (!ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = '../index.html'
                    return false
                }

                return true
            } catch (error) {
                console.error('Auth error:', error)
                window.location.href = '../login.html'
                return false
            }
        }

        // Load posts
        async function loadPosts() {
            try {
                postsGrid.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading posts...</p>
                    </div>
                `

                const { data, error } = await supabase
                    .from('posts')
                    .select(`
                        *,
                        post_likes(count),
                        comments(count)
                    `)
                    .order('created_at', { ascending: false })

                if (error) throw error

                posts = data || []

                if (posts.length === 0) {
                    postsGrid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📝</div>
                            <h3>No Posts Yet</h3>
                            <p>Create your first motivational post to inspire others!</p>
                        </div>
                    `
                    return
                }

                renderPosts(posts)

            } catch (error) {
                console.error('Load posts error:', error)
                postsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <h3>Error Loading Posts</h3>
                        <p>${error.message}</p>
                    </div>
                `
            }
        }

        // Render posts
        function renderPosts(posts) {
            postsGrid.innerHTML = posts.map(post => `
                <div class="post-card" data-id="${post.id}">
                    ${post.image_url ? 
                        `<img src="${post.image_url}" alt="${escapeHtml(post.title)}" class="post-image">` : 
                        `<div class="post-image" style="background: linear-gradient(135deg, var(--gold), var(--electric-blue)); display: flex; align-items: center; justify-content: center; color: var(--primary-black); font-size: 3rem;">📝</div>`
                    }
                    
                    <h3 class="post-title">${escapeHtml(post.title)}</h3>
                    
                    <div class="post-excerpt">
                        ${escapeHtml(post.content.substring(0, 100))}${post.content.length > 100 ? '...' : ''}
                    </div>

                    <div class="post-meta">
                        <span>❤️ ${post.post_likes?.[0]?.count || 0}</span>
                        <span>💬 ${post.comments?.[0]?.count || 0}</span>
                        <span>📅 ${new Date(post.created_at).toLocaleDateString()}</span>
                    </div>

                    <div class="post-actions">
                        <button class="view-post" onclick="viewPost('${post.id}')">
                            <span>👁️</span> View
                        </button>
                        <button class="edit-post" onclick="editPost('${post.id}')">
                            <span>✏️</span> Edit
                        </button>
                        <button class="delete-post" onclick="deletePost('${post.id}', '${post.image_url || ''}')">
                            <span>🗑️</span> Delete
                        </button>
                    </div>
                </div>
            `).join('')
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // View post
        window.viewPost = (postId) => {
            window.open(`../post.html?id=${postId}`, '_blank')
        }

        // Edit post
        window.editPost = async (postId) => {
            try {
                const post = posts.find(p => p.id === postId)
                if (!post) return

                // Populate form
                postId.value = post.id
                titleInput.value = post.title
                contentInput.value = post.content

                if (post.image_url) {
                    previewImage.src = post.image_url
                    filePreview.classList.add('show')
                    fileName.textContent = 'Current image'
                }

                modalTitle.textContent = 'Edit Post'
                submitBtn.textContent = 'Update Post'
                modal.classList.add('show')

            } catch (error) {
                showAlert('Error loading post: ' + error.message, 'error')
            }
        }

        // Delete post
        window.deletePost = async (postId, imageUrl) => {
            if (!confirm('Are you sure you want to delete this post? This action cannot be undone.')) {
                return
            }

            try {
                // Delete image if exists
                if (imageUrl) {
                    const path = imageUrl.split('/').slice(-2).join('/')
                    await supabase.storage
                        .from('suprememotive-assets')
                        .remove([path])
                }

                // Delete post
                const { error } = await supabase
                    .from('posts')
                    .delete()
                    .eq('id', postId)

                if (error) throw error

                showAlert('Post deleted successfully!', 'success')
                await loadPosts()

            } catch (error) {
                showAlert('Error deleting post: ' + error.message, 'error')
            }
        }

        // Upload image
        async function uploadImage(file) {
            if (!file) return null

            const fileName = `${currentUser.id}-${Date.now()}-${file.name}`
            const filePath = `post-images/${fileName}`

            const { error: uploadError } = await supabase.storage
                .from('suprememotive-assets')
                .upload(filePath, file)

            if (uploadError) throw uploadError

            const { data: { publicUrl } } = supabase.storage
                .from('suprememotive-assets')
                .getPublicUrl(filePath)

            return publicUrl
        }

        // Handle form submission
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault()

            try {
                const title = titleInput.value.trim()
                const content = contentInput.value.trim()
                const id = postId.value
                const imageFile = imageInput.files[0]

                if (!title || !content) {
                    showAlert('Please fill in all required fields', 'error')
                    return
                }

                submitBtn.disabled = true
                submitBtn.textContent = 'Saving...'

                let imageUrl = null
                if (imageFile) {
                    imageUrl = await uploadImage(imageFile)
                }

                if (id) {
                    // Update existing post
                    const updates = { title, content }
                    if (imageUrl) updates.image_url = imageUrl

                    const { error } = await supabase
                        .from('posts')
                        .update(updates)
                        .eq('id', id)

                    if (error) throw error
                    showAlert('Post updated successfully!', 'success')
                } else {
                    // Create new post
                    const { error } = await supabase
                        .from('posts')
                        .insert([{
                            title,
                            content,
                            image_url: imageUrl,
                            created_by: currentUser.id
                        }])

                    if (error) throw error
                    showAlert('Post created successfully!', 'success')
                }

                // Reset and close modal
                resetForm()
                modal.classList.remove('show')
                await loadPosts()

            } catch (error) {
                showAlert('Error: ' + error.message, 'error')
            } finally {
                submitBtn.disabled = false
                submitBtn.textContent = id ? 'Update Post' : 'Publish Post'
            }
        })

        // Reset form
        function resetForm() {
            postForm.reset()
            postId.value = ''
            filePreview.classList.remove('show')
            previewImage.src = '#'
            fileName.textContent = ''
            modalTitle.textContent = 'Create New Post'
            submitBtn.textContent = 'Publish Post'
        }

        // File upload handling
        imageInput.addEventListener('change', () => {
            const file = imageInput.files[0]
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showAlert('File too large. Maximum size is 5MB', 'error')
                    imageInput.value = ''
                    return
                }

                const reader = new FileReader()
                reader.onload = (e) => {
                    previewImage.src = e.target.result
                    filePreview.classList.add('show')
                    fileName.textContent = file.name
                }
                reader.readAsDataURL(file)
            }
        })

        removeFileBtn.addEventListener('click', () => {
            imageInput.value = ''
            filePreview.classList.remove('show')
            previewImage.src = '#'
            fileName.textContent = ''
        })

        fileUploadArea.addEventListener('click', () => {
            imageInput.click()
        })

        fileUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault()
            fileUploadArea.style.borderColor = 'var(--gold)'
            fileUploadArea.style.background = 'var(--medium-gray)'
        })

        fileUploadArea.addEventListener('dragleave', () => {
            fileUploadArea.style.borderColor = 'var(--light-gray)'
            fileUploadArea.style.background = 'none'
        })

        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault()
            fileUploadArea.style.borderColor = 'var(--light-gray)'
            fileUploadArea.style.background = 'none'
            
            const file = e.dataTransfer.files[0]
            if (file && file.type.startsWith('image/')) {
                imageInput.files = e.dataTransfer.files
                const event = new Event('change')
                imageInput.dispatchEvent(event)
            }
        })

        // Modal controls
        newPostBtn.addEventListener('click', () => {
            resetForm()
            modal.classList.add('show')
        })

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('show')
            resetForm()
        })

        cancelBtn.addEventListener('click', () => {
            modal.classList.remove('show')
            resetForm()
        })

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show')
                resetForm()
            }
        })

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await supabase.auth.signOut()
                window.location.href = '../index.html'
            } catch (error) {
                showAlert('Error logging out', 'error')
            }
        })

        // Initialize
        async function init() {
            const isAuthenticated = await checkAuth()
            if (isAuthenticated) {
                await loadPosts()
            }
        }

        init()
    </script>
</body>
</html>
