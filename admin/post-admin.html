<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Post Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Admin Layout */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark-gray);
            border-right: 2px solid var(--gold);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--light-gray);
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .role-badge {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .sidebar-nav {
            list-style: none;
            margin-top: 2rem;
        }

        .sidebar-nav li {
            margin-bottom: 0.5rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .sidebar-nav a:hover {
            background: var(--medium-gray);
            transform: translateX(5px);
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            font-weight: 600;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 2rem;
            left: 1.5rem;
            right: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--light-gray);
        }

        .logout-btn {
            width: 100%;
            padding: 1rem;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--error);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--light-gray);
        }

        .content-header h1 {
            color: var(--gold);
            font-size: 2rem;
        }

        .create-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        /* Create Post Form */
        .create-post-form {
            background: var(--dark-gray);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--gold);
            display: none;
        }

        .create-post-form.visible {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-title {
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .file-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--medium-gray);
            border: 2px dashed var(--light-gray);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-label:hover {
            border-color: var(--gold);
            background: var(--dark-gray);
        }

        .file-name {
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .image-preview {
            margin-top: 1rem;
            max-width: 200px;
            border-radius: 8px;
            display: none;
        }

        .image-preview.visible {
            display: block;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .save-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .cancel-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        /* Posts Table */
        .posts-table-container {
            background: var(--dark-gray);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--light-gray);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .table-header h2 {
            color: var(--gold);
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            padding: 0.75rem;
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            width: 250px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .posts-table {
            width: 100%;
            border-collapse: collapse;
        }

        .posts-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 2px solid var(--light-gray);
        }

        .posts-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--light-gray);
            color: var(--text-primary);
        }

        .posts-table tr:hover td {
            background: var(--medium-gray);
        }

        .post-thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--light-gray);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .edit-btn {
            background: var(--electric-blue);
            color: var(--primary-black);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .delete-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .view-btn {
            background: var(--gold);
            color: var(--primary-black);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .view-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alerts */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
                padding: 1rem;
            }

            .sidebar-logo {
                font-size: 0;
            }

            .sidebar-logo::before {
                content: 'SM';
                font-size: 1.5rem;
                background: linear-gradient(135deg, var(--gold), var(--electric-blue));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .role-badge,
            .sidebar-nav a span {
                display: none;
            }

            .sidebar-nav a {
                justify-content: center;
                padding: 1rem;
            }

            .main-content {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .posts-table {
                display: block;
                overflow-x: auto;
            }

            .table-header {
                flex-direction: column;
                gap: 1rem;
            }

            .search-box {
                width: 100%;
            }

            .search-input {
                width: 100%;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SupremeMotive</div>
                <div id="role-badge" class="role-badge">Post Admin</div>
            </div>

            <ul class="sidebar-nav">
                <li>
                    <a href="admin-dashboard.html">
                        <span>📊</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="post-admin.html" class="active">
                        <span>📝</span>
                        <span>Post Management</span>
                    </a>
                </li>
                <li>
                    <a href="../index.html">
                        <span>🏠</span>
                        <span>View Site</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <button id="logout-btn" class="logout-btn">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1>Post Management</h1>
                <button id="show-form-btn" class="create-btn">
                    <span>➕</span>
                    <span>Create New Post</span>
                </button>
            </div>

            <div id="alert-container"></div>

            <!-- Create/Edit Post Form -->
            <div id="post-form" class="create-post-form">
                <h2 class="form-title">
                    <span id="form-title">📝 Create New Post</span>
                </h2>
                
                <form id="post-form-element">
                    <input type="hidden" id="post-id" value="">
                    
                    <div class="form-group">
                        <label for="post-title">Post Title</label>
                        <input type="text" id="post-title" class="form-control" placeholder="Enter post title" required>
                    </div>

                    <div class="form-group">
                        <label for="post-content">Post Content</label>
                        <textarea id="post-content" class="form-control" placeholder="Write your motivational post here..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="post-image">Post Image (Optional)</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="post-image" class="file-input" accept="image/*">
                            <div class="file-label">
                                <span>📷</span>
                                <span>Choose an image</span>
                            </div>
                        </div>
                        <div id="file-name" class="file-name">No file chosen</div>
                        <img id="image-preview" class="image-preview" alt="Preview">
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="save-btn" class="save-btn">💾 Save Post</button>
                        <button type="button" id="cancel-btn" class="cancel-btn">✖️ Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Posts List -->
            <div class="posts-table-container">
                <div class="table-header">
                    <h2>📋 All Posts</h2>
                    <div class="search-box">
                        <input type="text" id="search-input" class="search-input" placeholder="Search posts...">
                        <button id="search-btn" class="view-btn">🔍 Search</button>
                    </div>
                </div>

                <table class="posts-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Content</th>
                            <th>Date</th>
                            <th>Likes</th>
                            <th>Comments</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="posts-table-body">
                        <tr>
                            <td colspan="7" class="loading">
                                <div class="loading-spinner"></div>
                                <p>Loading posts...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'
        import { uploadPostImage, deleteFile } from '../js/upload.js'

        // Initialize Supabase
        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com'
        ]

        let currentUser = null
        let editingPostId = null

        // DOM Elements
        const postForm = document.getElementById('post-form')
        const showFormBtn = document.getElementById('show-form-btn')
        const cancelBtn = document.getElementById('cancel-btn')
        const logoutBtn = document.getElementById('logout-btn')
        const alertContainer = document.getElementById('alert-container')
        const formTitle = document.getElementById('form-title')
        const saveBtn = document.getElementById('save-btn')
        const postIdInput = document.getElementById('post-id')
        const titleInput = document.getElementById('post-title')
        const contentInput = document.getElementById('post-content')
        const imageInput = document.getElementById('post-image')
        const fileNameSpan = document.getElementById('file-name')
        const imagePreview = document.getElementById('image-preview')
        const searchInput = document.getElementById('search-input')
        const searchBtn = document.getElementById('search-btn')
        const postsTableBody = document.getElementById('posts-table-body')

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${type === 'success' ? '✅' : '❌'} ${message}</div>`
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check authentication and admin status
        async function checkAuth() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser()
                
                if (error) throw error

                if (!user) {
                    window.location.href = '../login.html'
                    return false
                }

                currentUser = user

                // Check if user is post admin
                if (!ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = '../index.html'
                    return false
                }

                return true
            } catch (error) {
                console.error('Auth error:', error)
                window.location.href = '../login.html'
                return false
            }
        }

        // Load posts
        async function loadPosts(searchTerm = '') {
            try {
                postsTableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="loading">
                            <div class="loading-spinner"></div>
                            <p>Loading posts...</p>
                        </td>
                    </tr>
                `

                let query = supabase
                    .from('posts')
                    .select(`
                        *,
                        post_likes(count),
                        comments(count)
                    `)
                    .order('created_at', { ascending: false })

                if (searchTerm) {
                    query = query.ilike('title', `%${searchTerm}%`)
                }

                const { data: posts, error } = await query

                if (error) throw error

                if (!posts || posts.length === 0) {
                    postsTableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No posts found</td></tr>'
                    return
                }

                postsTableBody.innerHTML = posts.map(post => `
                    <tr>
                        <td>
                            ${post.image_url ? 
                                `<img src="${post.image_url}" alt="Post image" class="post-thumbnail">` : 
                                '<span style="color: var(--text-secondary);">No image</span>'}
                        </td>
                        <td><strong>${escapeHtml(post.title)}</strong></td>
                        <td>${escapeHtml(post.content.substring(0, 50))}${post.content.length > 50 ? '...' : ''}</td>
                        <td>${new Date(post.created_at).toLocaleDateString()}</td>
                        <td>${post.post_likes?.[0]?.count || 0}</td>
                        <td>${post.comments?.[0]?.count || 0}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="view-btn" onclick="viewPost('${post.id}')">👁️ View</button>
                                <button class="edit-btn" onclick="editPost('${post.id}')">✏️ Edit</button>
                                <button class="delete-btn" onclick="deletePost('${post.id}', '${post.image_url || ''}')">🗑️ Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('')

            } catch (error) {
                console.error('Load posts error:', error)
                postsTableBody.innerHTML = `<tr><td colspan="7" style="color: var(--error); text-align: center;">Error loading posts: ${error.message}</td></tr>`
            }
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // View post
        window.viewPost = (postId) => {
            window.open(`../post.html?id=${postId}`, '_blank')
        }

        // Edit post
        window.editPost = async (postId) => {
            try {
                const { data: post, error } = await supabase
                    .from('posts')
                    .select('*')
                    .eq('id', postId)
                    .single()

                if (error) throw error

                // Populate form
                postIdInput.value = post.id
                titleInput.value = post.title
                contentInput.value = post.content
                
                if (post.image_url) {
                    imagePreview.src = post.image_url
                    imagePreview.classList.add('visible')
                }

                formTitle.textContent = '✏️ Edit Post'
                saveBtn.textContent = '📝 Update Post'
                editingPostId = postId

                // Show form
                postForm.classList.add('visible')
                postForm.scrollIntoView({ behavior: 'smooth' })

            } catch (error) {
                showAlert('Error loading post: ' + error.message, 'error')
            }
        }

        // Delete post
        window.deletePost = async (postId, imageUrl) => {
            if (!confirm('Are you sure you want to delete this post? This action cannot be undone.')) {
                return
            }

            try {
                // Delete image if exists
                if (imageUrl) {
                    const path = imageUrl.split('/').slice(-2).join('/')
                    await deleteFile(path)
                }

                // Delete post
                const { error } = await supabase
                    .from('posts')
                    .delete()
                    .eq('id', postId)

                if (error) throw error

                showAlert('Post deleted successfully!', 'success')
                await loadPosts(searchInput.value)

            } catch (error) {
                showAlert('Error deleting post: ' + error.message, 'error')
            }
        }

        // Handle image input change
        imageInput.addEventListener('change', () => {
            const file = imageInput.files[0]
            if (file) {
                fileNameSpan.textContent = file.name
                
                // Preview image
                const reader = new FileReader()
                reader.onload = (e) => {
                    imagePreview.src = e.target.result
                    imagePreview.classList.add('visible')
                }
                reader.readAsDataURL(file)
            } else {
                fileNameSpan.textContent = 'No file chosen'
                imagePreview.classList.remove('visible')
            }
        })

        // Handle form submission
        document.getElementById('post-form-element').addEventListener('submit', async (e) => {
            e.preventDefault()

            try {
                const title = titleInput.value.trim()
                const content = contentInput.value.trim()
                const imageFile = imageInput.files[0]
                const postId = postIdInput.value

                if (!title || !content) {
                    showAlert('Please fill in all required fields', 'error')
                    return
                }

                let imageUrl = null

                // Upload new image if provided
                if (imageFile) {
                    const uploadResult = await uploadPostImage(imageFile, currentUser.id)
                    if (uploadResult.success) {
                        imageUrl = uploadResult.url
                    } else {
                        showAlert('Image upload failed: ' + uploadResult.error, 'error')
                        return
                    }
                }

                if (postId) {
                    // Update existing post
                    const updates = { title, content }
                    if (imageUrl) updates.image_url = imageUrl

                    const { error } = await supabase
                        .from('posts')
                        .update(updates)
                        .eq('id', postId)

                    if (error) throw error
                    showAlert('Post updated successfully!', 'success')
                } else {
                    // Create new post
                    const { error } = await supabase
                        .from('posts')
                        .insert([{
                            title,
                            content,
                            image_url: imageUrl,
                            created_by: currentUser.id
                        }])

                    if (error) throw error
                    showAlert('Post created successfully!', 'success')
                }

                // Reset form and reload posts
                resetForm()
                await loadPosts(searchInput.value)

            } catch (error) {
                console.error('Save post error:', error)
                showAlert('Error saving post: ' + error.message, 'error')
            }
        })

        // Reset form
        function resetForm() {
            postForm.classList.remove('visible')
            document.getElementById('post-form-element').reset()
            postIdInput.value = ''
            titleInput.value = ''
            contentInput.value = ''
            fileNameSpan.textContent = 'No file chosen'
            imagePreview.classList.remove('visible')
            formTitle.textContent = '📝 Create New Post'
            saveBtn.textContent = '💾 Save Post'
            editingPostId = null
        }

        // Show form
        showFormBtn.addEventListener('click', () => {
            resetForm()
            postForm.classList.add('visible')
        })

        // Cancel form
        cancelBtn.addEventListener('click', resetForm)

        // Search
        searchBtn.addEventListener('click', () => {
            loadPosts(searchInput.value)
        })

        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                loadPosts(searchInput.value)
            }
        })

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                window.location.href = '../index.html'
            } catch (error) {
                showAlert('Error logging out: ' + error.message, 'error')
            }
        })

        // Initialize
        async function init() {
            const isAuthenticated = await checkAuth()
            if (isAuthenticated) {
                await loadPosts()
            }
        }

        init()
    </script>
</body>
</html>
