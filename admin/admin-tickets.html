<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Support Tickets</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 2px solid var(--gold);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role-badge {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .sidebar-nav {
            list-style: none;
            margin-top: 2rem;
        }

        .sidebar-nav li {
            margin-bottom: 0.5rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .sidebar-nav a:hover {
            background: var(--border-color);
            transform: translateX(5px);
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
        }

        .sidebar-footer {
            position: absolute;
            bottom: 2rem;
            left: 1.5rem;
            right: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .logout-btn {
            width: 100%;
            padding: 1rem;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 12px;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .content-header h1 {
            color: var(--gold);
            font-size: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--gold);
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .tickets-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .ticket-item {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--gold);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .ticket-subject {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold);
        }

        .ticket-status {
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status-pending { background: rgba(255, 193, 7, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .status-in_progress { background: rgba(0, 240, 255, 0.1); color: var(--electric-blue); border: 1px solid var(--electric-blue); }
        .status-resolved { background: rgba(76, 175, 80, 0.1); color: var(--success); border: 1px solid var(--success); }

        .ticket-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .ticket-message {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .response-form {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .response-textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            resize: vertical;
        }

        .response-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .response-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--error); color: white; }
        .btn-resolve { background: var(--electric-blue); color: var(--bg-color); }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 1rem; }
            .sidebar-logo { font-size: 0; }
            .sidebar-logo::before { content: 'SM'; font-size: 1.5rem; }
            .role-badge, .sidebar-nav a span { display: none; }
            .sidebar-nav a { justify-content: center; }
            .main-content { margin-left: 70px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SupremeMotive</div>
                <div class="role-badge">Support Admin</div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="admin-dashboard.html"><i>📊</i><span>Dashboard</span></a></li>
                <li><a href="admin-tickets.html" class="active"><i>🎫</i><span>Support Tickets</span></a></li>
                <li><a href="../index.html"><i>🏠</i><span>View Site</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn"><i>🚪</i><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1>Support Tickets</h1>
            </div>

            <div id="alertContainer"></div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="totalTickets">0</div>
                    <div>Total Tickets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingTickets">0</div>
                    <div>Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="inProgressTickets">0</div>
                    <div>In Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="resolvedTickets">0</div>
                    <div>Resolved</div>
                </div>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="in_progress">In Progress</button>
                <button class="filter-btn" data-filter="resolved">Resolved</button>
            </div>

            <div class="tickets-container" id="ticketsContainer">
                <div class="loading">Loading tickets...</div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_EMAILS = ['supremealpha04@gmail.com', 'suprememotive43@gmail.com', 'sandrakukk055@gmail.com', 'emmanuelamer6@gmail.com'];

        let allTickets = [];
        let currentFilter = 'all';

        const ticketsContainer = document.getElementById('ticketsContainer');
        const alertContainer = document.getElementById('alertContainer');
        const totalTickets = document.getElementById('totalTickets');
        const pendingTickets = document.getElementById('pendingTickets');
        const inProgressTickets = document.getElementById('inProgressTickets');
        const resolvedTickets = document.getElementById('resolvedTickets');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const logoutBtn = document.getElementById('logoutBtn');

        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                window.location.href = '../index.html';
                return false;
            }
            return true;
        }

        async function loadTickets() {
            try {
                const { data, error } = await supabaseClient
                    .from('support_tickets')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allTickets = data || [];
                updateStats();
                renderTickets();
            } catch (error) {
                showAlert('Error loading tickets: ' + error.message);
            }
        }

        function updateStats() {
            totalTickets.textContent = allTickets.length;
            pendingTickets.textContent = allTickets.filter(t => t.status === 'pending').length;
            inProgressTickets.textContent = allTickets.filter(t => t.status === 'in_progress').length;
            resolvedTickets.textContent = allTickets.filter(t => t.status === 'resolved').length;
        }

        function renderTickets() {
            let filtered = [...allTickets];
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => t.status === currentFilter);
            }

            if (filtered.length === 0) {
                ticketsContainer.innerHTML = '<div class="empty-state">No tickets found</div>';
                return;
            }

            ticketsContainer.innerHTML = filtered.map(ticket => `
                <div class="ticket-item" data-id="${ticket.id}">
                    <div class="ticket-header">
                        <span class="ticket-subject">${escapeHtml(ticket.subject)}</span>
                        <span class="ticket-status status-${ticket.status}">${ticket.status.replace('_', ' ')}</span>
                    </div>
                    <div class="ticket-meta">
                        <span><i class="fas fa-user"></i> ${escapeHtml(ticket.user_email)}</span>
                        <span><i class="fas fa-flag"></i> ${ticket.priority.toUpperCase()}</span>
                        <span><i class="far fa-calendar"></i> ${new Date(ticket.created_at).toLocaleString()}</span>
                    </div>
                    <div class="ticket-message">${escapeHtml(ticket.message)}</div>
                    ${ticket.admin_response ? `
                        <div style="background: rgba(0, 240, 255, 0.05); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                            <strong style="color: var(--electric-blue);">Admin Response:</strong><br>
                            ${escapeHtml(ticket.admin_response)}
                        </div>
                    ` : ''}
                    <div class="response-form">
                        <textarea id="response-${ticket.id}" class="response-textarea" placeholder="Write your response..." rows="3"></textarea>
                        <div class="response-buttons">
                            <button class="response-btn btn-approve" onclick="updateTicket('${ticket.id}', 'in_progress', 'response-${ticket.id}')">Start Working</button>
                            <button class="response-btn btn-resolve" onclick="updateTicket('${ticket.id}', 'resolved', 'response-${ticket.id}')">Resolve & Respond</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.updateTicket = async (ticketId, newStatus, responseId) => {
            const response = document.getElementById(responseId).value.trim();
            
            try {
                const updates = { status: newStatus };
                if (response) updates.admin_response = response;
                if (newStatus === 'resolved') updates.resolved_at = new Date();

                const { error } = await supabaseClient
                    .from('support_tickets')
                    .update(updates)
                    .eq('id', ticketId);

                if (error) throw error;
                showAlert(`Ticket ${newStatus === 'resolved' ? 'resolved' : 'updated'} successfully!`);
                await loadTickets();
            } catch (error) {
                showAlert('Error updating ticket: ' + error.message);
            }
        };

        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => alertContainer.innerHTML = '', 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTickets();
            });
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = '../index.html';
        });

        async function init() {
            const authed = await checkAuth();
            if (authed) await loadTickets();
        }
        init();
    </script>
</body>
</html>
