<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Video Admin</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #0A0A0A; --card-bg: #1A1A1A; --text-color: #FFFFFF;
            --text-secondary: #B0B0B0; --gold: #FFD700; --border-color: #333333;
            --electric-blue: #00F0FF; --success: #4CAF50; --error: #F44336;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
        }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px; background: var(--card-bg); border-right: 2px solid var(--gold);
            padding: 2rem 1.5rem; position: fixed; height: 100vh; overflow-y: auto;
        }
        .sidebar-header { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .sidebar-logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--gold), var(--electric-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .role-badge { background: linear-gradient(135deg, var(--gold), var(--electric-blue)); color: var(--bg-color); padding: 0.5rem 1rem; border-radius: 30px; font-size: 0.9rem; font-weight: 600; display: inline-block; }
        .sidebar-nav { list-style: none; margin-top: 2rem; }
        .sidebar-nav li { margin-bottom: 0.5rem; }
        .sidebar-nav a { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; color: var(--text-color); text-decoration: none; border-radius: 12px; transition: all 0.3s ease; }
        .sidebar-nav a:hover { background: var(--border-color); transform: translateX(5px); }
        .sidebar-nav a.active { background: linear-gradient(135deg, var(--gold), var(--electric-blue)); color: var(--bg-color); font-weight: 600; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .content-header h1 { color: var(--gold); font-size: 2rem; }
        .create-btn { background: linear-gradient(135deg, var(--gold), var(--electric-blue)); color: var(--bg-color); border: none; padding: 1rem 2rem; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .alert { padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.8rem; }
        .alert-success { background: rgba(76, 175, 80, 0.1); border: 1px solid var(--success); color: var(--success); }
        .alert-error { background: rgba(244, 67, 54, 0.1); border: 1px solid var(--error); color: var(--error); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border-color); }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--gold); margin-bottom: 0.3rem; }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .video-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); }
        .video-thumbnail { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .video-info { padding: 1rem; }
        .video-title { font-size: 1.1rem; color: var(--gold); margin-bottom: 0.5rem; }
        .video-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .btn { flex: 1; padding: 0.5rem; border: none; border-radius: 6px; cursor: pointer; }
        .edit-btn { background: var(--electric-blue); color: var(--bg-color); }
        .delete-btn { background: var(--error); color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card-bg); border-radius: 20px; padding: 2rem; width: 90%; max-width: 600px; border: 1px solid var(--gold); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
        .form-control { width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color); }
        .form-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 1rem; }
            .sidebar-logo { font-size: 0; }
            .sidebar-logo::first-letter { font-size: 1.5rem; }
            .role-badge, .sidebar-nav a span { display: none; }
            .main-content { margin-left: 70px; }
            .videos-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SupremeMotive</div>
                <div class="role-badge" id="roleBadge">Video Admin</div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="admin-dashboard.html"><i>📊</i><span>Dashboard</span></a></li>
                <li><a href="post-admin.html"><i>📝</i><span>Posts</span></a></li>
                <li><a href="admin-quotes.html"><i>💬</i><span>Quotes</span></a></li>
                <li><a href="admin-videos.html" class="active"><i>🎬</i><span>Videos</span></a></li>
                <li><a href="ebook-admin.html"><i>📚</i><span>Ebooks</span></a></li>
                <li><a href="unlock-admin.html"><i>🔓</i><span>Unlocks</span></a></li>
                <li><a href="../index.html"><i>🏠</i><span>View Site</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn" style="width:100%; padding:1rem; background:rgba(244,67,54,0.1); border:1px solid var(--error); color:var(--error); border-radius:12px; cursor:pointer;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1><i class="fas fa-video"></i> Manage Videos</h1>
                <button class="create-btn" id="createVideoBtn"><i class="fas fa-plus"></i> Upload Video</button>
            </div>
            <div id="alertContainer"></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalVideos">0</div><div>Total Videos</div></div>
                <div class="stat-card"><div class="stat-value" id="totalViews">0</div><div>Total Views</div></div>
                <div class="stat-card"><div class="stat-value" id="totalLikes">0</div><div>Total Likes</div></div>
            </div>
            <div class="videos-grid" id="videosGrid"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
        </main>
    </div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <h2 id="modalTitle">Upload Video</h2>
            <form id="videoForm">
                <input type="hidden" id="videoId">
                <div class="form-group"><label>Title *</label><input type="text" id="title" class="form-control" required></div>
                <div class="form-group"><label>Description</label><textarea id="description" class="form-control" rows="3"></textarea></div>
                <div class="form-group"><label>Category</label><select id="category" class="form-control"><option value="motivation">Motivation</option><option value="success">Success</option><option value="life">Life</option><option value="wisdom">Wisdom</option></select></div>
                <div class="form-group"><label>Video URL *</label><input type="url" id="videoUrl" class="form-control" placeholder="https://..." required></div>
                <div class="form-group"><label>Thumbnail URL</label><input type="url" id="thumbnailUrl" class="form-control" placeholder="https://..."></div>
                <div class="form-group"><label>Duration (seconds)</label><input type="number" id="duration" class="form-control" placeholder="0"></div>
                <div class="form-actions"><button type="submit" class="btn" style="background:var(--gold); color:var(--bg-color);">Save Video</button><button type="button" class="btn" id="cancelBtn" style="background:var(--error); color:white;">Cancel</button></div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const VIDEO_ADMIN_EMAILS = ['supremealpha04@gmail.com', 'suprememotive43@gmail.com'];

        let currentUser = null, videos = [];

        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user || !VIDEO_ADMIN_EMAILS.includes(user.email)) { window.location.href = '../index.html'; return; }
            currentUser = user;
            document.getElementById('roleBadge').textContent = 'Video Admin';
            await loadVideos();
        }

        async function loadVideos() {
            const { data, error } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            videos = data || [];
            document.getElementById('totalVideos').textContent = videos.length;
            const { count: views } = await supabaseClient.from('video_views').select('*', { count: 'exact', head: true });
            const { count: likes } = await supabaseClient.from('video_likes').select('*', { count: 'exact', head: true });
            document.getElementById('totalViews').textContent = views || 0;
            document.getElementById('totalLikes').textContent = likes || 0;
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            if (videos.length === 0) { grid.innerHTML = '<div class="empty-state">No videos</div>'; return; }
            grid.innerHTML = videos.map(v => `
                <div class="video-card">
                    <img src="${v.thumbnail_url || 'https://via.placeholder.com/300x200?text=No+Thumbnail'}" class="video-thumbnail" onerror="this.src='https://via.placeholder.com/300x200?text=Video'">
                    <div class="video-info">
                        <h3 class="video-title">${escapeHtml(v.title)}</h3>
                        <div class="video-actions">
                            <button class="btn edit-btn" onclick="editVideo('${v.id}')">Edit</button>
                            <button class="btn delete-btn" onclick="deleteVideo('${v.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.editVideo = (id) => {
            const v = videos.find(v => v.id === id);
            document.getElementById('videoId').value = v.id;
            document.getElementById('title').value = v.title;
            document.getElementById('description').value = v.description || '';
            document.getElementById('category').value = v.category;
            document.getElementById('videoUrl').value = v.video_url;
            document.getElementById('thumbnailUrl').value = v.thumbnail_url || '';
            document.getElementById('duration').value = v.duration || 0;
            document.getElementById('modalTitle').textContent = 'Edit Video';
            document.getElementById('videoModal').classList.add('show');
        };

        window.deleteVideo = async (id) => {
            if (!confirm('Delete this video?')) return;
            const { error } = await supabaseClient.from('videos').delete().eq('id', id);
            if (error) throw error;
            showAlert('Video deleted', 'success');
            loadVideos();
        };

        document.getElementById('videoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('videoId').value;
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                video_url: document.getElementById('videoUrl').value,
                thumbnail_url: document.getElementById('thumbnailUrl').value || null,
                duration: parseInt(document.getElementById('duration').value) || 0,
                user_id: currentUser.id
            };
            let error;
            if (id) error = (await supabaseClient.from('videos').update(data).eq('id', id)).error;
            else error = (await supabaseClient.from('videos').insert([data])).error;
            if (error) throw error;
            showAlert(id ? 'Video updated' : 'Video uploaded', 'success');
            document.getElementById('videoModal').classList.remove('show');
            document.getElementById('videoForm').reset();
            document.getElementById('videoId').value = '';
            loadVideos();
        });

        function showAlert(msg, type) {
            const c = document.getElementById('alertContainer');
            c.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => c.innerHTML = '', 3000);
        }
        function escapeHtml(s) { return s?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }) || ''; }

        document.getElementById('createVideoBtn').onclick = () => { document.getElementById('videoForm').reset(); document.getElementById('videoId').value = ''; document.getElementById('modalTitle').textContent = 'Upload Video'; document.getElementById('videoModal').classList.add('show'); };
        document.getElementById('cancelBtn').onclick = () => document.getElementById('videoModal').classList.remove('show');
        document.getElementById('logoutBtn').onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = '../index.html'; };
        checkAuth();
    </script>
</body>
</html>
