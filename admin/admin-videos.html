<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Video Admin</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 2px solid var(--gold);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .role-badge {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
        }

        .sidebar-nav {
            list-style: none;
            margin-top: 2rem;
        }

        .sidebar-nav li {
            margin-bottom: 0.5rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .sidebar-nav a:hover {
            background: var(--border-color);
            transform: translateX(5px);
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .content-header h1 {
            color: var(--gold);
            font-size: 2rem;
        }

        .create-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .video-preview {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        .video-preview video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 1rem;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .video-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: var(--electric-blue);
            color: var(--bg-color);
        }

        .delete-btn {
            background: var(--error);
            color: white;
        }

        .preview-btn {
            background: var(--gold);
            color: var(--bg-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .video-preview-modal {
            width: 100%;
            max-height: 300px;
            margin-bottom: 1rem;
        }

        .video-preview-modal video {
            width: 100%;
            max-height: 300px;
            background: #000;
        }

        .hidden {
            display: none !important;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 1rem;
            }
            .sidebar-logo {
                font-size: 0;
            }
            .sidebar-logo::first-letter {
                font-size: 1.5rem;
            }
            .role-badge, .sidebar-nav a span {
                display: none;
            }
            .main-content {
                margin-left: 70px;
                padding: 1rem;
            }
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SupremeMotive</div>
                <div class="role-badge" id="roleBadge">Video Admin</div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="admin-dashboard.html"><i>📊</i><span>Dashboard</span></a></li>
                <li><a href="post-admin.html"><i>📝</i><span>Posts</span></a></li>
                <li><a href="admin-quotes.html"><i>💬</i><span>Quotes</span></a></li>
                <li><a href="admin-videos.html" class="active"><i>🎬</i><span>Videos</span></a></li>
                <li><a href="ebook-admin.html"><i>📚</i><span>Ebooks</span></a></li>
                <li><a href="unlock-admin.html"><i>🔓</i><span>Unlocks</span></a></li>
                <li><a href="../index.html"><i>🏠</i><span>View Site</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn" style="width:100%; padding:1rem; background:rgba(244,67,54,0.1); border:1px solid var(--error); color:var(--error); border-radius:12px; cursor:pointer;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1><i class="fas fa-video"></i> Manage Videos</h1>
                <button class="create-btn" id="createVideoBtn"><i class="fas fa-plus"></i> Add Video</button>
            </div>
            <div id="alertContainer"></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalVideos">0</div><div>Total Videos</div></div>
                <div class="stat-card"><div class="stat-value" id="totalViews">0</div><div>Total Views</div></div>
                <div class="stat-card"><div class="stat-value" id="totalLikes">0</div><div>Total Likes</div></div>
            </div>
            <div class="videos-grid" id="videosGrid">
                <div class="loading"><div class="spinner"></div><p>Loading videos...</p></div>
            </div>
        </main>
    </div>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Video</h2>
            <form id="videoForm">
                <input type="hidden" id="videoId">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" class="form-control">
                        <option value="motivation">Motivation</option>
                        <option value="success">Success</option>
                        <option value="life">Life</option>
                        <option value="wisdom">Wisdom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Video URL *</label>
                    <input type="url" id="videoUrl" class="form-control" placeholder="https://example.com/video.mp4" required>
                    <small style="color: var(--text-secondary);">Enter a direct URL to an MP4 video file</small>
                </div>
                <div class="form-group">
                    <label>Thumbnail URL (Optional)</label>
                    <input type="url" id="thumbnailUrl" class="form-control" placeholder="https://example.com/thumbnail.jpg">
                </div>
                <div class="form-group">
                    <label>Duration (seconds)</label>
                    <input type="number" id="duration" class="form-control" placeholder="0" value="0">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn" style="background:var(--gold); color:var(--bg-color);"><i class="fas fa-save"></i> Save Video</button>
                    <button type="button" class="btn" id="cancelBtn" style="background:var(--error); color:white;"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const VIDEO_ADMIN_EMAILS = ['supremealpha04@gmail.com', 'suprememotive43@gmail.com'];

        let currentUser = null;
        let allVideos = [];

        // DOM Elements
        const videosGrid = document.getElementById('videosGrid');
        const alertContainer = document.getElementById('alertContainer');
        const totalVideosSpan = document.getElementById('totalVideos');
        const totalViewsSpan = document.getElementById('totalViews');
        const totalLikesSpan = document.getElementById('totalLikes');
        const logoutBtn = document.getElementById('logoutBtn');
        const createVideoBtn = document.getElementById('createVideoBtn');
        const videoModal = document.getElementById('videoModal');
        const videoForm = document.getElementById('videoForm');
        const cancelBtn = document.getElementById('cancelBtn');

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    window.location.href = '../login.html';
                    return;
                }
                if (!VIDEO_ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = '../index.html';
                    return;
                }
                currentUser = user;
                document.getElementById('roleBadge').textContent = 'Video Admin';
                await loadVideos();
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = '../login.html';
            }
        }

        // ============================================
        // LOAD VIDEOS
        // ============================================
        async function loadVideos() {
            try {
                videosGrid.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading videos...</p></div>`;

                const { data: videos, error } = await supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allVideos = videos || [];

                // Get stats
                totalVideosSpan.textContent = allVideos.length;
                
                const { count: views } = await supabase.from('video_views').select('*', { count: 'exact', head: true });
                const { count: likes } = await supabase.from('video_likes').select('*', { count: 'exact', head: true });
                totalViewsSpan.textContent = views || 0;
                totalLikesSpan.textContent = likes || 0;

                renderVideos();

            } catch (error) {
                console.error('Error loading videos:', error);
                videosGrid.innerHTML = `<div class="empty-state">Error loading videos: ${error.message}</div>`;
            }
        }

        // ============================================
        // RENDER VIDEOS
        // ============================================
        function renderVideos() {
            if (allVideos.length === 0) {
                videosGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-video" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>No videos yet. Click "Add Video" to upload your first video.</p>
                    </div>
                `;
                return;
            }

            videosGrid.innerHTML = allVideos.map(video => {
                const date = new Date(video.created_at).toLocaleDateString();
                const duration = video.duration ? formatDuration(video.duration) : '';
                
                return `
                    <div class="video-card" data-video-id="${video.id}">
                        <div class="video-preview">
                            ${video.thumbnail_url ? 
                                `<img src="${video.thumbnail_url}" class="video-thumbnail" onerror="this.src='https://via.placeholder.com/400x225?text=No+Thumbnail'">` :
                                `<video src="${video.video_url}" preload="metadata"></video>`
                            }
                        </div>
                        <div class="video-info">
                            <h3 class="video-title">${escapeHtml(video.title)}</h3>
                            <div class="video-meta">
                                <span><i class="fas fa-eye"></i> ${video.views_count || 0}</span>
                                <span><i class="fas fa-heart"></i> ${video.likes_count || 0}</span>
                                <span><i class="fas fa-calendar"></i> ${date}</span>
                                ${duration ? `<span><i class="fas fa-clock"></i> ${duration}</span>` : ''}
                            </div>
                            <div class="video-actions">
                                <button class="btn preview-btn" onclick="previewVideo('${video.id}')"><i class="fas fa-play"></i> Preview</button>
                                <button class="btn edit-btn" onclick="editVideo('${video.id}')"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn delete-btn" onclick="deleteVideo('${video.id}')"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ============================================
        // PREVIEW VIDEO
        // ============================================
        window.previewVideo = (videoId) => {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            
            // Create modal for preview
            const previewModal = document.createElement('div');
            previewModal.className = 'modal';
            previewModal.style.display = 'flex';
            previewModal.innerHTML = `
                <div class="modal-content" style="max-width: 800px;">
                    <h2 style="color: var(--gold); margin-bottom: 1rem;">${escapeHtml(video.title)}</h2>
                    <div class="video-preview-modal">
                        <video src="${video.video_url}" controls autoplay style="width: 100%; max-height: 400px; background: #000; border-radius: 8px;"></video>
                    </div>
                    <p style="color: var(--text-secondary); margin-top: 1rem;">${escapeHtml(video.description || 'No description')}</p>
                    <div class="form-actions" style="margin-top: 1rem;">
                        <button class="btn" onclick="this.closest('.modal').remove()" style="background: var(--gold); color: var(--bg-color);">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(previewModal);
            
            previewModal.addEventListener('click', (e) => {
                if (e.target === previewModal) previewModal.remove();
            });
        };

        // ============================================
        // EDIT VIDEO
        // ============================================
        window.editVideo = (videoId) => {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;

            document.getElementById('videoId').value = video.id;
            document.getElementById('title').value = video.title;
            document.getElementById('description').value = video.description || '';
            document.getElementById('category').value = video.category;
            document.getElementById('videoUrl').value = video.video_url;
            document.getElementById('thumbnailUrl').value = video.thumbnail_url || '';
            document.getElementById('duration').value = video.duration || 0;
            document.getElementById('modalTitle').textContent = 'Edit Video';
            videoModal.classList.add('show');
        };

        // ============================================
        // DELETE VIDEO
        // ============================================
        window.deleteVideo = async (videoId) => {
            if (!confirm('Are you sure you want to delete this video? This action cannot be undone.')) return;

            try {
                const { error } = await supabase.from('videos').delete().eq('id', videoId);
                if (error) throw error;
                showAlert('Video deleted successfully!', 'success');
                await loadVideos();
            } catch (error) {
                showAlert('Error deleting video: ' + error.message, 'error');
            }
        };

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message, type = 'success') {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${type === 'success' ? '✅' : '❌'} ${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 3000);
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // FORM SUBMIT
        // ============================================
        videoForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('videoId').value;
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const category = document.getElementById('category').value;
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const thumbnailUrl = document.getElementById('thumbnailUrl').value.trim() || null;
            const duration = parseInt(document.getElementById('duration').value) || 0;

            if (!title || !videoUrl) {
                showAlert('Please fill in all required fields', 'error');
                return;
            }

            try {
                const videoData = {
                    title,
                    description,
                    category,
                    video_url: videoUrl,
                    thumbnail_url: thumbnailUrl,
                    duration,
                    user_id: currentUser.id,
                    updated_at: new Date()
                };

                let error;
                if (id) {
                    // Update existing
                    const { error: updateError } = await supabase
                        .from('videos')
                        .update(videoData)
                        .eq('id', id);
                    error = updateError;
                    if (!error) showAlert('Video updated successfully!', 'success');
                } else {
                    // Create new
                    const { error: insertError } = await supabase
                        .from('videos')
                        .insert([videoData]);
                    error = insertError;
                    if (!error) showAlert('Video added successfully!', 'success');
                }

                if (error) throw error;

                videoModal.classList.remove('show');
                videoForm.reset();
                document.getElementById('videoId').value = '';
                await loadVideos();

            } catch (error) {
                console.error('Error saving video:', error);
                showAlert('Error saving video: ' + error.message, 'error');
            }
        });

        // ============================================
        // MODAL CONTROLS
        // ============================================
        createVideoBtn.addEventListener('click', () => {
            videoForm.reset();
            document.getElementById('videoId').value = '';
            document.getElementById('modalTitle').textContent = 'Add New Video';
            videoModal.classList.add('show');
        });

        cancelBtn.addEventListener('click', () => {
            videoModal.classList.remove('show');
            videoForm.reset();
        });

        window.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                videoModal.classList.remove('show');
            }
        });

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '../index.html';
        });

        // ============================================
        // INITIALIZE
        // ============================================
        checkAuth();
    </script>
</body>
</html>
