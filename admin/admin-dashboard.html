<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="logo">
                <img src="../assets/images/logo.svg" alt="SupremeMotive" onerror="this.style.display='none'">
                <span class="logo-text">SupremeMotive</span>
            </div>
            <h3>Admin Panel</h3>
            <div id="admin-role-badge" class="role-badge">Loading role...</div>
            <ul class="admin-nav" id="admin-nav">
                <li><a href="admin-dashboard.html" class="active">Dashboard</a></li>
                <li id="post-admin-link" style="display: none;"><a href="post-admin.html">📝 Post Management</a></li>
                <li id="ebook-admin-link" style="display: none;"><a href="ebook-admin.html">📚 Ebook Management</a></li>
                <li id="unlock-admin-link" style="display: none;"><a href="unlock-admin.html">🔓 Unlock Requests</a></li>
                <li class="divider"></li>
                <li><a href="../index.html">🏠 View Site</a></li>
                <li><a href="#" id="logout-link">🚪 Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Dashboard</h1>
                <div id="admin-info" class="admin-info"></div>
            </div>

            <div id="message-container"></div>

            <div id="dashboard-container">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading dashboard...</p>
                </div>
            </div>
            
            <div id="users-container" style="margin-top: 32px;">
                <h2 style="color: var(--gold); margin-bottom: 16px;">🌍 Users by Country</h2>
                <div id="country-stats" class="country-stats"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from '../config/supabase.js';
        import { getCurrentUser, logoutUser, isAdmin, getUserRole } from '../js/auth.js';

        // Get dashboard stats
        async function getDashboardStats() {
            try {
                // Total users
                const { count: totalUsers } = await supabase
                    .from('profiles')
                    .select('*', { count: 'exact', head: true });

                // Total posts
                const { count: totalPosts } = await supabase
                    .from('posts')
                    .select('*', { count: 'exact', head: true });

                // Total ebooks
                const { count: totalEbooks } = await supabase
                    .from('ebooks')
                    .select('*', { count: 'exact', head: true });

                // Pending unlocks
                const { count: pendingUnlocks } = await supabase
                    .from('unlocks')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'pending');

                // Users by country
                const { data: profiles } = await supabase
                    .from('profiles')
                    .select('country');
                
                const countryCounts = {};
                profiles?.forEach(profile => {
                    const country = profile.country || 'Not specified';
                    countryCounts[country] = (countryCounts[country] || 0) + 1;
                });

                return {
                    success: true,
                    stats: {
                        totalUsers: totalUsers || 0,
                        totalPosts: totalPosts || 0,
                        totalEbooks: totalEbooks || 0,
                        pendingUnlocks: pendingUnlocks || 0,
                        usersByCountry: countryCounts || {}
                    }
                };
            } catch (error) {
                console.error('Get dashboard stats error:', error);
                return { success: false, error: error.message };
            }
        }

        // Render dashboard
        function renderDashboard(stats) {
            const container = document.getElementById('dashboard-container');
            
            container.innerHTML = `
                <div class="admin-stats">
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalUsers}</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalPosts}</div>
                        <div class="stat-label">Total Posts</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalEbooks}</div>
                        <div class="stat-label">Total Ebooks</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-value">${stats.pendingUnlocks}</div>
                        <div class="stat-label">Pending Unlocks</div>
                    </div>
                </div>
            `;

            // Render country stats
            const countryContainer = document.getElementById('country-stats');
            if (!countryContainer) return;
            
            const sortedCountries = Object.entries(stats.usersByCountry)
                .sort((a, b) => b[1] - a[1]);
            
            if (sortedCountries.length === 0) {
                countryContainer.innerHTML = '<p class="no-data">No user data available</p>';
                return;
            }

            countryContainer.innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Country</th>
                            <th>Users</th>
                            <th>Percentage</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sortedCountries.map(([country, count]) => `
                            <tr>
                                <td>${country}</td>
                                <td>${count}</td>
                                <td>${((count / stats.totalUsers) * 100).toFixed(1)}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Show role-specific menu items
        async function showRoleSpecificMenu() {
            const { user } = await getCurrentUser();
            const roleBadge = document.getElementById('admin-role-badge');
            
            if (roleBadge && user) {
                const roleDisplay = user.role.replace('_', ' ').toUpperCase();
                roleBadge.textContent = `👑 ${roleDisplay}`;
                
                // Add role-specific color
                if (user.role === 'super_admin') {
                    roleBadge.style.background = 'linear-gradient(135deg, #FFD700, #FF4500)';
                } else if (user.role === 'post_admin') {
                    roleBadge.style.background = 'linear-gradient(135deg, #4CAF50, #8BC34A)';
                } else if (user.role === 'ebook_admin') {
                    roleBadge.style.background = 'linear-gradient(135deg, #2196F3, #03A9F4)';
                } else if (user.role === 'unlock_admin') {
                    roleBadge.style.background = 'linear-gradient(135deg, #9C27B0, #E1BEE7)';
                }
            }
            
            // Show/hide menu items based on role
            const postLink = document.getElementById('post-admin-link');
            const ebookLink = document.getElementById('ebook-admin-link');
            const unlockLink = document.getElementById('unlock-admin-link');
            
            if (user) {
                if (user.role === 'super_admin') {
                    if (postLink) postLink.style.display = 'block';
                    if (ebookLink) ebookLink.style.display = 'block';
                    if (unlockLink) unlockLink.style.display = 'block';
                } else {
                    if (postLink) postLink.style.display = user.role === 'post_admin' ? 'block' : 'none';
                    if (ebookLink) ebookLink.style.display = user.role === 'ebook_admin' ? 'block' : 'none';
                    if (unlockLink) unlockLink.style.display = user.role === 'unlock_admin' ? 'block' : 'none';
                }
            }
        }

        // Show message
        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            if (!container) return;
            
            container.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Check admin access and load dashboard
        async function init() {
            try {
                // Check if user is admin
                const admin = await isAdmin();
                if (!admin) {
                    window.location.href = '../index.html';
                    return;
                }

                // Get user info
                const { user, profile } = await getCurrentUser();
                const adminInfo = document.getElementById('admin-info');
                if (adminInfo) {
                    adminInfo.innerHTML = `
                        <span>Welcome, <strong>${profile?.name || user?.email}</strong></span>
                    `;
                }

                // Show role-specific menu
                await showRoleSpecificMenu();

                // Load dashboard stats
                const result = await getDashboardStats();
                if (result.success) {
                    renderDashboard(result.stats);
                } else {
                    showMessage('Error loading dashboard: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Init error:', error);
                showMessage('Error initializing dashboard', 'error');
            }
        }

        // Logout handler
        document.getElementById('logout-link')?.addEventListener('click', async (e) => {
            e.preventDefault();
            const result = await logoutUser();
            if (result.success) {
                window.location.href = '../index.html';
            } else {
                showMessage('Error logging out: ' + result.error, 'error');
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
