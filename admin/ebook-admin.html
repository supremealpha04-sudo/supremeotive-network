<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Ebook Management</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <h2>SupremeMotive</h2>
            <h3>Admin Panel</h3>
            <ul class="admin-nav">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="post-admin.html">Post Management</a></li>
                <li><a href="ebook-admin.html" class="active">Ebook Management</a></li>
                <li><a href="unlock-admin.html">Unlock Requests</a></li>
                <li><a href="../index.html">View Site</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Ebook Management</h1>
                <button class="btn btn-primary" onclick="showCreateEbook()">
                    Upload New Ebook
                </button>
            </div>

            <!-- Create Ebook Form (Hidden by default) -->
            <div id="create-ebook-form" class="card hidden" style="margin-bottom: 32px;">
                <h2 style="color: var(--gold); margin-bottom: 16px;">Upload New Ebook</h2>
                
                <form id="ebook-form">
                    <div class="form-group">
                        <label for="ebook-title">Title</label>
                        <input type="text" id="ebook-title" name="title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-description">Description</label>
                        <textarea id="ebook-description" name="description" rows="4" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-price">Price ($)</label>
                        <input type="number" id="ebook-price" name="price" step="0.01" min="0" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-currency">Currency</label>
                        <select id="ebook-currency" name="currency">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-is-paid">
                            <input type="checkbox" id="ebook-is-paid" name="is_paid">
                            Paid Ebook
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-cover">Cover Image</label>
                        <input type="file" id="ebook-cover" name="cover" accept="image/*" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-pdf">PDF File</label>
                        <input type="file" id="ebook-pdf" name="pdf" accept=".pdf" required>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Upload Ebook</button>
                        <button type="button" class="btn btn-secondary" onclick="hideCreateEbook()">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Ebooks List -->
            <div id="ebooks-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Cover</th>
                            <th>Title</th>
                            <th>Price</th>
                            <th>Type</th>
                            <th>Uploaded</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ebooks-list">
                        <!-- Ebooks will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from '../config/supabase.js';
        import { getCurrentUser, isAdmin } from '../js/auth.js';
        import { uploadEbook } from '../js/ebooks.js';

        // Global functions
        window.showCreateEbook = () => {
            document.getElementById('create-ebook-form').classList.remove('hidden');
        };

        window.hideCreateEbook = () => {
            document.getElementById('create-ebook-form').classList.add('hidden');
            document.getElementById('ebook-form').reset();
        };

        window.editEbook = (ebookId) => {
            alert('Edit functionality coming soon');
        };

        window.deleteEbook = async (ebookId) => {
            if (confirm('Are you sure you want to delete this ebook?')) {
                const { error } = await supabase
                    .from('ebooks')
                    .delete()
                    .eq('id', ebookId);

                if (!error) {
                    loadEbooks();
                } else {
                    alert('Error deleting ebook: ' + error.message);
                }
            }
        };

        // Handle form submission
        document.getElementById('ebook-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ebookData = {
                title: document.getElementById('ebook-title').value,
                description: document.getElementById('ebook-description').value,
                price: parseFloat(document.getElementById('ebook-price').value),
                currency: document.getElementById('ebook-currency').value,
                is_paid: document.getElementById('ebook-is-paid').checked
            };
            
            const coverFile = document.getElementById('ebook-cover').files[0];
            const pdfFile = document.getElementById('ebook-pdf').files[0];
            
            if (!coverFile || !pdfFile) {
                alert('Please select both cover image and PDF file');
                return;
            }
            
            const result = await uploadEbook(ebookData, coverFile, pdfFile);
            
            if (result.success) {
                alert('Ebook uploaded successfully!');
                hideCreateEbook();
                loadEbooks();
            } else {
                alert('Error: ' + result.error);
            }
        });

        async function loadEbooks() {
            // Check admin access
            const admin = await isAdmin('ebook_admin');
            if (!admin) {
                window.location.href = '../index.html';
                return;
            }

            const { data: ebooks, error } = await supabase
                .from('ebooks')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading ebooks:', error);
                return;
            }

            const tbody = document.getElementById('ebooks-list');
            tbody.innerHTML = ebooks.map(ebook => `
                <tr>
                    <td>
                        <img src="${ebook.cover_url}" alt="${ebook.title}" 
                             style="width: 50px; height: 70px; object-fit: cover; border-radius: 4px;">
                    </td>
                    <td>${ebook.title}</td>
                    <td>${ebook.is_paid ? `$${ebook.price}` : 'FREE'}</td>
                    <td>
                        <span class="status-badge status-${ebook.is_paid ? 'approved' : 'pending'}">
                            ${ebook.is_paid ? 'Paid' : 'Free'}
                        </span>
                    </td>
                    <td>${new Date(ebook.created_at).toLocaleDateString()}</td>
                    <td>
                        <div class="admin-actions">
                            <button class="admin-btn admin-btn-edit" 
                                    onclick="editEbook('${ebook.id}')">
                                Edit
                            </button>
                            <button class="admin-btn admin-btn-delete" 
                                    onclick="deleteEbook('${ebook.id}')">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Initialize
        loadEbooks();
    </script>
</body>
</html>
