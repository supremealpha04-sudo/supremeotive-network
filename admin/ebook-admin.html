<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Ebook Management</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <h2>SupremeMotive</h2>
            <h3>Admin Panel</h3>
            <ul class="admin-nav">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="post-admin.html">Post Management</a></li>
                <li><a href="ebook-admin.html" class="active">Ebook Management</a></li>
                <li><a href="unlock-admin.html">Unlock Requests</a></li>
                <li><a href="../index.html">View Site</a></li>
                <li><a href="#" id="logout-link">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Ebook Management</h1>
                <button class="btn btn-primary" onclick="showCreateEbook()">
                    Upload New Ebook
                </button>
            </div>

            <div id="message-container"></div>

            <!-- Create/Edit Ebook Form -->
            <div id="ebook-form-container" class="card hidden" style="margin-bottom: 32px;">
                <h2 id="form-title" style="color: var(--gold); margin-bottom: 16px;">Upload New Ebook</h2>
                
                <form id="ebook-form">
                    <input type="hidden" id="ebook-id" name="ebook-id">
                    
                    <div class="form-group">
                        <label for="ebook-title">Title *</label>
                        <input type="text" id="ebook-title" name="title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-description">Description *</label>
                        <textarea id="ebook-description" name="description" rows="4" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-price">Price ($)</label>
                        <input type="number" id="ebook-price" name="price" step="0.01" min="0" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-currency">Currency</label>
                        <select id="ebook-currency" name="currency">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="ebook-is-paid" name="is_paid">
                            Paid Ebook
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-cover">Cover Image</label>
                        <input type="file" id="ebook-cover" name="cover" accept="image/*">
                        <div id="current-cover-container" class="hidden">
                            <p>Current cover:</p>
                            <img id="current-cover" src="" alt="Current cover" style="max-width: 100px; margin-top: 10px;">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="ebook-pdf">PDF File</label>
                        <input type="file" id="ebook-pdf" name="pdf" accept=".pdf">
                        <div id="current-pdf-container" class="hidden">
                            <p>Current PDF: <a id="current-pdf-link" href="#" target="_blank">View PDF</a></p>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="form-submit-btn">Upload Ebook</button>
                        <button type="button" class="btn btn-secondary" onclick="hideEbookForm()">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Ebooks List -->
            <div id="ebooks-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Cover</th>
                            <th>Title</th>
                            <th>Price</th>
                            <th>Type</th>
                            <th>Uploaded</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ebooks-list">
                        <tr>
                            <td colspan="6" class="text-center">Loading ebooks...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from '../config/supabase.js';
        import { getCurrentUser, logoutUser, isAdmin } from '../js/auth.js';
        import { uploadEbookCover, uploadEbookPDF } from '../js/upload.js';

        // Global functions
        window.showCreateEbook = () => {
            document.getElementById('ebook-form').reset();
            document.getElementById('ebook-id').value = '';
            document.getElementById('form-title').textContent = 'Upload New Ebook';
            document.getElementById('form-submit-btn').textContent = 'Upload Ebook';
            document.getElementById('current-cover-container').classList.add('hidden');
            document.getElementById('current-pdf-container').classList.add('hidden');
            document.getElementById('ebook-form-container').classList.remove('hidden');
        };

        window.hideEbookForm = () => {
            document.getElementById('ebook-form-container').classList.add('hidden');
            document.getElementById('message-container').innerHTML = '';
        };

        window.editEbook = async (ebookId) => {
            try {
                const { data: ebook, error } = await supabase
                    .from('ebooks')
                    .select('*')
                    .eq('id', ebookId)
                    .single();

                if (error) throw error;

                document.getElementById('ebook-id').value = ebook.id;
                document.getElementById('ebook-title').value = ebook.title;
                document.getElementById('ebook-description').value = ebook.description;
                document.getElementById('ebook-price').value = ebook.price;
                document.getElementById('ebook-currency').value = ebook.currency;
                document.getElementById('ebook-is-paid').checked = ebook.is_paid;
                
                if (ebook.cover_url) {
                    document.getElementById('current-cover').src = ebook.cover_url;
                    document.getElementById('current-cover-container').classList.remove('hidden');
                }
                
                if (ebook.pdf_url) {
                    document.getElementById('current-pdf-link').href = ebook.pdf_url;
                    document.getElementById('current-pdf-container').classList.remove('hidden');
                }

                document.getElementById('form-title').textContent = 'Edit Ebook';
                document.getElementById('form-submit-btn').textContent = 'Update Ebook';
                document.getElementById('ebook-form-container').classList.remove('hidden');
            } catch (error) {
                showMessage('Error loading ebook: ' + error.message, 'error');
            }
        };

        window.deleteEbook = async (ebookId) => {
            if (!confirm('Are you sure you want to delete this ebook? This action cannot be undone.')) {
                return;
            }

            try {
                const { error } = await supabase
                    .from('ebooks')
                    .delete()
                    .eq('id', ebookId);

                if (error) throw error;

                showMessage('Ebook deleted successfully!', 'success');
                loadEbooks();
            } catch (error) {
                showMessage('Error deleting ebook: ' + error.message, 'error');
            }
        };

        // Handle form submission
        document.getElementById('ebook-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('form-submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Processing...';
            submitBtn.disabled = true;

            try {
                const ebookId = document.getElementById('ebook-id').value;
                const title = document.getElementById('ebook-title').value;
                const description = document.getElementById('ebook-description').value;
                const price = parseFloat(document.getElementById('ebook-price').value);
                const currency = document.getElementById('ebook-currency').value;
                const isPaid = document.getElementById('ebook-is-paid').checked;
                
                const coverFile = document.getElementById('ebook-cover').files[0];
                const pdfFile = document.getElementById('ebook-pdf').files[0];
                
                const { user } = await getCurrentUser();
                
                let coverUrl = null;
                let pdfUrl = null;

                // Upload new cover if provided
                if (coverFile) {
                    const uploadResult = await uploadEbookCover(coverFile, user.id);
                    if (uploadResult.success) {
                        coverUrl = uploadResult.url;
                    } else {
                        throw new Error(uploadResult.error);
                    }
                }

                // Upload new PDF if provided
                if (pdfFile) {
                    const uploadResult = await uploadEbookPDF(pdfFile, user.id);
                    if (uploadResult.success) {
                        pdfUrl = uploadResult.url;
                    } else {
                        throw new Error(uploadResult.error);
                    }
                }

                if (ebookId) {
                    // Update existing ebook
                    const updates = { 
                        title, 
                        description, 
                        price, 
                        currency, 
                        is_paid: isPaid,
                        category: isPaid ? 'paid' : 'free'
                    };
                    
                    if (coverUrl) updates.cover_url = coverUrl;
                    if (pdfUrl) updates.pdf_url = pdfUrl;

                    const { error } = await supabase
                        .from('ebooks')
                        .update(updates)
                        .eq('id', ebookId);

                    if (error) throw error;
                    showMessage('Ebook updated successfully!', 'success');
                } else {
                    // Create new ebook
                    if (!coverFile || !pdfFile) {
                        throw new Error('Please select both cover image and PDF file for new ebook');
                    }

                    const { error } = await supabase
                        .from('ebooks')
                        .insert([
                            {
                                title,
                                description,
                                cover_url: coverUrl,
                                pdf_url: pdfUrl,
                                price,
                                currency,
                                is_paid: isPaid,
                                category: isPaid ? 'paid' : 'free',
                                created_by: user.id
                            }
                        ]);

                    if (error) throw error;
                    showMessage('Ebook uploaded successfully!', 'success');
                }

                hideEbookForm();
                loadEbooks();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // Load ebooks
        async function loadEbooks() {
            try {
                const { data: ebooks, error } = await supabase
                    .from('ebooks')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('ebooks-list');
                
                if (ebooks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No ebooks yet</td></tr>';
                    return;
                }

                tbody.innerHTML = ebooks.map(ebook => `
                    <tr>
                        <td>
                            <img src="${ebook.cover_url}" alt="${ebook.title}" 
                                 style="width: 50px; height: 70px; object-fit: cover; border-radius: 4px;"
                                 onerror="this.src='../assets/images/default-avatar.png'">
                        </td>
                        <td><strong>${ebook.title}</strong></td>
                        <td>${ebook.is_paid ? `$${ebook.price}` : 'FREE'}</td>
                        <td>
                            <span class="status-badge ${ebook.is_paid ? 'status-approved' : 'status-pending'}">
                                ${ebook.is_paid ? 'Paid' : 'Free'}
                            </span>
                        </td>
                        <td>${new Date(ebook.created_at).toLocaleDateString()}</td>
                        <td>
                            <div class="admin-actions">
                                <button class="admin-btn admin-btn-edit" 
                                        onclick="editEbook('${ebook.id}')">
                                    Edit
                                </button>
                                <button class="admin-btn admin-btn-delete" 
                                        onclick="deleteEbook('${ebook.id}')">
                                    Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showMessage('Error loading ebooks: ' + error.message, 'error');
            }
        }

        // Show message
        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Check admin access
        async function init() {
            const admin = await isAdmin('ebook_admin');
            if (!admin) {
                window.location.href = '../index.html';
                return;
            }

            await loadEbooks();
        }

        // Logout handler
        document.getElementById('logout-link').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
            window.location.href = '../index.html';
        });

        init();
    </script>
</body>
</html>
