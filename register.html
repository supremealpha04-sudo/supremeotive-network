<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <!-- Registration Form -->
    <main class="container">
        <div class="card" style="max-width: 500px; margin: 40px auto;">
            <h1 class="text-center" style="color: var(--gold); margin-bottom: 32px;">
                Join SupremeMotive
            </h1>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" 
                           minlength="6" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password *</label>
                    <input type="password" id="confirm-password" 
                           name="confirm-password" required>
                </div>
                
                <div class="form-group">
                    <label for="country">Country *</label>
                    <select id="country" name="country" required>
                        <option value="">Select your country</option>
                        <option value="United States">United States</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Germany">Germany</option>
                        <option value="France">France</option>
                        <option value="Spain">Spain</option>
                        <option value="Italy">Italy</option>
                        <option value="Japan">Japan</option>
                        <option value="China">China</option>
                        <option value="India">India</option>
                        <option value="Brazil">Brazil</option>
                        <option value="Mexico">Mexico</option>
                        <option value="South Africa">South Africa</option>
                        <option value="Nigeria">Nigeria</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Saudi Arabia">Saudi Arabia</option>
                        <option value="UAE">UAE</option>
                        <option value="Singapore">Singapore</option>
                        <option value="Malaysia">Malaysia</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="age">Age *</label>
                    <input type="number" id="age" name="age" 
                           min="13" max="120" required>
                </div>
                
                <div class="form-group">
                    <label for="bio">Bio (Optional)</label>
                    <textarea id="bio" name="bio" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="profile-image">Profile Image (Optional)</label>
                    <input type="file" id="profile-image" name="profile-image" 
                           accept="image/*">
                </div>
                
                <div id="error-message" class="error-message" style="color: var(--error); margin-bottom: 16px;"></div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Create Account
                </button>
            </form>
            
            <p class="text-center mt-20">
                Already have an account? 
                <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { registerUser, uploadProfileImage } from './js/auth.js';

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = '';
            
            // Validate passwords match
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                return;
            }
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: password,
                country: document.getElementById('country').value,
                age: parseInt(document.getElementById('age').value),
                bio: document.getElementById('bio').value
            };
            
            // Handle profile image if provided
            const imageFile = document.getElementById('profile-image').files[0];
            if (imageFile) {
                // We'll upload after registration since we need user ID
                // Store temporarily
                sessionStorage.setItem('tempProfileImage', JSON.stringify({
                    name: imageFile.name,
                    type: imageFile.type,
                    size: imageFile.size
                }));
            }
            
            // Register user
            const result = await registerUser(formData);
            
            if (result.success) {
                // Upload profile image if exists
                if (imageFile) {
                    await uploadProfileImage(imageFile, result.user.id);
                    sessionStorage.removeItem('tempProfileImage');
                }
                
                alert('Registration successful! Please check your email for confirmation.');
                window.location.href = 'login.html';
            } else {
                errorDiv.textContent = result.error;
            }
        });
    </script>
</body>
</html>
