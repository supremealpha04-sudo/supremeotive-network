<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Verify Email</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #0B1A33 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-card {
            background: #1A1A1A;
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
            border: 1px solid #333;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .verify-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #FFD700;
            margin-bottom: 1rem;
            font-size: 2rem;
            position: relative;
            z-index: 1;
        }

        p {
            color: #B0B0B0;
            margin-bottom: 2rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .email-highlight {
            background: #0A0A0A;
            padding: 1rem;
            border-radius: 12px;
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 2rem;
            border: 1px solid #333;
            word-break: break-all;
            position: relative;
            z-index: 1;
        }

        .btn {
            background: linear-gradient(135deg, #FFD700, #00F0FF);
            color: #0A0A0A;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        .resend-btn {
            background: transparent;
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .resend-btn:hover {
            background: #FFD700;
            color: #0A0A0A;
        }

        .timer {
            color: #B0B0B0;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .hidden {
            display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="verify-card">
        <div class="icon">📧</div>
        <h1>Verify Your Email</h1>
        <p>We've sent a verification link to:</p>
        <div class="email-highlight" id="userEmail">your-email@example.com</div>
        <p>Please check your inbox and click the verification link to activate your account.</p>
        
        <button class="btn" onclick="checkVerification()">I've Verified My Email</button>
        
        <div>
            <button class="resend-btn" id="resendBtn" onclick="resendVerification()">Resend Verification Email</button>
        </div>
        
        <div class="timer" id="timer"></div>
        <div id="message" style="margin-top: 1rem; color: #4CAF50;"></div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        );

        // Get email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        if (email) {
            document.getElementById('userEmail').textContent = decodeURIComponent(email);
        }

        let resendTimer = 60;
        let timerInterval;

        function startTimer() {
            const resendBtn = document.getElementById('resendBtn');
            const timer = document.getElementById('timer');
            
            resendBtn.disabled = true;
            timerInterval = setInterval(() => {
                resendTimer--;
                timer.textContent = `Resend available in ${resendTimer}s`;
                
                if (resendTimer <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timer.textContent = '';
                    resendTimer = 60;
                }
            }, 1000);
        }

        async function resendVerification() {
            const email = document.getElementById('userEmail').textContent;
            
            try {
                const { error } = await supabase.auth.resend({
                    type: 'signup',
                    email: email
                });
                
                if (error) throw error;
                
                document.getElementById('message').textContent = '✅ Verification email sent!';
                startTimer();
                
            } catch (error) {
                document.getElementById('message').style.color = '#F44336';
                document.getElementById('message').textContent = '❌ ' + error.message;
            }
        }

        async function checkVerification() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user?.email_confirmed_at) {
                    window.location.href = 'login.html?verified=true';
                } else {
                    document.getElementById('message').style.color = '#FFC107';
                    document.getElementById('message').textContent = '⏳ Email not verified yet. Please check your inbox and click the link.';
                }
            } catch (error) {
                document.getElementById('message').style.color = '#F44336';
                document.getElementById('message').textContent = '❌ Error checking verification';
            }
        }

        // Auto-check every 5 seconds
        setInterval(checkVerification, 5000);
    </script>
</body>
</html>
