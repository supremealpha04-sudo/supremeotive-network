<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <!-- Registration Form -->
    <main class="container">
        <div class="card" style="max-width: 500px; margin: 40px auto;">
            <h1 class="text-center" style="color: var(--gold); margin-bottom: 32px;">
                Join SupremeMotive
            </h1>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" 
                           minlength="6" required>
                    <small>Minimum 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password *</label>
                    <input type="password" id="confirm-password" 
                           name="confirm-password" required>
                </div>
                
                <div class="form-group">
                    <label for="country">Country *</label>
                    <select id="country" name="country" required>
                        <option value="">Select your country</option>
                        <option value="United States">United States</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Germany">Germany</option>
                        <option value="France">France</option>
                        <option value="Spain">Spain</option>
                        <option value="Italy">Italy</option>
                        <option value="Japan">Japan</option>
                        <option value="China">China</option>
                        <option value="India">India</option>
                        <option value="Brazil">Brazil</option>
                        <option value="Mexico">Mexico</option>
                        <option value="South Africa">South Africa</option>
                        <option value="Nigeria">Nigeria</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Saudi Arabia">Saudi Arabia</option>
                        <option value="UAE">UAE</option>
                        <option value="Singapore">Singapore</option>
                        <option value="Malaysia">Malaysia</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="age">Age *</label>
                    <input type="number" id="age" name="age" 
                           min="13" max="120" required>
                </div>
                
                <div class="form-group">
                    <label for="bio">Bio (Optional)</label>
                    <textarea id="bio" name="bio" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="profile-image">Profile Image (Optional)</label>
                    <input type="file" id="profile-image" name="profile-image" 
                           accept="image/*">
                </div>
                
                <div id="error-message" class="error-message" style="color: var(--error); margin-bottom: 16px; display: none;"></div>
                <div id="loading-message" class="loading-message" style="color: var(--electric-blue); margin-bottom: 16px; display: none;">Creating your account...</div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="register-button">
                    Create Account
                </button>
            </form>
            
            <p class="text-center mt-20">
                Already have an account? 
                <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0';

        // Initialize Supabase
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Image compression function
        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', 0.8);
                    };
                };
                reader.onerror = reject;
            });
        }

        // Upload profile image
        async function uploadProfileImage(file, userId) {
            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${userId}-${Date.now()}.${fileExt}`;
                const filePath = `${fileName}`;

                // Compress image before upload
                const compressedFile = await compressImage(file);

                const { error: uploadError } = await supabase.storage
                    .from('profile-images')
                    .upload(filePath, compressedFile);

                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabase.storage
                    .from('profile-images')
                    .getPublicUrl(filePath);

                return { success: true, url: publicUrl };
            } catch (error) {
                console.error('Upload image error:', error);
                return { success: false, error: error.message };
            }
        }

        // Registration function
        async function registerUser(userData) {
            try {
                // Create auth user
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: userData.email,
                    password: userData.password,
                });

                if (authError) throw authError;

                if (!authData.user) {
                    throw new Error('User creation failed');
                }

                // Create profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([
                        {
                            id: authData.user.id,
                            name: userData.name,
                            email: userData.email,
                            country: userData.country,
                            age: userData.age,
                            bio: userData.bio || '',
                            profile_image_url: userData.profileImageUrl || null,
                            role: 'user'
                        }
                    ]);

                if (profileError) throw profileError;

                return { success: true, user: authData.user };
            } catch (error) {
                console.error('Registration error:', error);
                return { success: false, error: error.message };
            }
        }

        // Handle form submission
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            const loadingDiv = document.getElementById('loading-message');
            const registerButton = document.getElementById('register-button');
            
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            registerButton.disabled = true;
            
            // Validate passwords match
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                registerButton.disabled = false;
                return;
            }
            
            // Validate password length
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                registerButton.disabled = false;
                return;
            }
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: password,
                country: document.getElementById('country').value,
                age: parseInt(document.getElementById('age').value),
                bio: document.getElementById('bio').value
            };
            
            // Validate all required fields
            if (!formData.name || !formData.email || !formData.country || !formData.age) {
                errorDiv.textContent = 'Please fill in all required fields';
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                registerButton.disabled = false;
                return;
            }
            
            // Register user
            const result = await registerUser(formData);
            
            if (result.success) {
                // Handle profile image if provided
                const imageFile = document.getElementById('profile-image').files[0];
                if (imageFile) {
                    await uploadProfileImage(imageFile, result.user.id);
                }
                
                alert('Registration successful! Please check your email for confirmation.');
                window.location.href = 'login.html';
            } else {
                errorDiv.textContent = result.error || 'Registration failed. Please try again.';
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                registerButton.disabled = false;
            }
        });

        // Check if already logged in
        async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        
        checkExistingSession();
    </script>
</body>
</html>
