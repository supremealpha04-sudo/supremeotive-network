    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Categories/Filters */
        .categories {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        /* Search Bar */
        .search-container {
            max-width: 500px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-color);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item span {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Ebooks Grid - Exactly like home quotes grid */
        .ebooks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Ebook Card - Matching quote card style */
        .ebook-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .ebook-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        /* Watermark */
        .ebook-card::after {
            content: 'SUPREME MOTIVE';
            position: absolute;
            bottom: 60px;
            right: 10px;
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.15);
            transform: rotate(-5deg);
            pointer-events: none;
            z-index: 1;
        }

        /* Ebook Cover */
        .ebook-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
        }

        .ebook-info {
            padding: 1.5rem;
            position: relative;
            z-index: 2;
        }

        /* Category/Tag - Like quote tag */
        .ebook-tag {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .ebook-tag span {
            color: var(--gold);
            margin-right: 0.3rem;
        }

        /* Title */
        .ebook-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        /* Description - truncated like quote text */
        .ebook-description {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Price */
        .ebook-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .ebook-price.free {
            color: var(--success);
        }

        /* Action Buttons - Like quote actions */
        .ebook-actions {
            display: flex;
            gap: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.6rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .action-btn.saved {
            background: var(--electric-blue);
            color: var(--bg-color);
            border-color: var(--electric-blue);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--gold);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            color: var(--gold);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .whatsapp-info {
            background: rgba(37, 211, 102, 0.1);
            border: 1px solid #25D366;
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .whatsapp-icon {
            font-size: 2rem;
            color: #25D366;
        }

        .admin-number {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            flex: 1;
            padding: 0.8rem;
            background: #25D366;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-secondary {
            flex: 1;
            padding: 0.8rem;
            background: var(--border-color);
            border: none;
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 600;
            cursor: pointer;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .ebooks-grid {
                grid-template-columns: 1fr;
            }

            .stats-row {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>

                    adminLink.href = 'admin/admin-dashboard.html';
                }
            } catch (error) {
                console.error('Auth error:', error);
            }
        }

        // Load user unlocks - FIXED to use supabaseClient
        async function loadUserUnlocks() {
            if (!currentUser) return;

            try {
                const { data: unlocks } = await supabaseClient
                    .from('unlocks')
                    .select('ebook_id')
                    .eq('user_id', currentUser.id)
                    .eq('status', 'approved');

                if (unlocks) {
                    userUnlocks = new Set(unlocks.map(u => u.ebook_id));
                }
            } catch (error) {
                console.error('Error loading unlocks:', error);
            }
        }

        // Load ebooks - FIXED to use supabaseClient
        async function loadEbooks() {
            try {
                const { data, error } = await supabaseClient
                    .from('ebooks')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    ebooks = data;
                } else {
                    // Use sample ebooks if database is empty
                    ebooks = sampleEbooks;
                }

                // Update stats
                updateStats();
                renderEbooks();

            } catch (error) {
                console.error('Error loading ebooks:', error);
                ebooks = sampleEbooks;
                updateStats();
                renderEbooks();
            }
        }

        // Update stats
        function updateStats() {
            totalEbooks.textContent = ebooks.length;
            freeEbooks.textContent = ebooks.filter(e => !e.is_paid).length;
            paidEbooks.textContent = ebooks.filter(e => e.is_paid).length;
        }

        // Render ebooks
        function renderEbooks() {
            let filteredEbooks = [...ebooks];

            // Filter by category
            if (currentCategory === 'free') {
                filteredEbooks = filteredEbooks.filter(e => !e.is_paid);
            } else if (currentCategory === 'paid') {
                filteredEbooks = filteredEbooks.filter(e => e.is_paid);
            } else if (currentCategory !== 'all') {
                filteredEbooks = filteredEbooks.filter(e => e.category === currentCategory);
            }

            // Filter by search
            if (searchTerm) {
                filteredEbooks = filteredEbooks.filter(e => 
                    e.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    e.description.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            if (filteredEbooks.length === 0) {
                ebooksGrid.innerHTML = `
                    <div class="loading">
                        <p>No ebooks found</p>
                    </div>
                `;
                return;
            }

            ebooksGrid.innerHTML = filteredEbooks.map(ebook => {
                const isUnlocked = !ebook.is_paid || userUnlocks.has(ebook.id);
                const priceDisplay = ebook.is_paid ? `$${ebook.price}` : 'FREE';
                const priceClass = ebook.is_paid ? '' : 'free';
                
                return `
                    <div class="ebook-card">
                        <img src="${ebook.cover_url}" alt="${ebook.title}" class="ebook-cover"
                             onerror="this.src='https://via.placeholder.com/300x200?text=No+Cover'">
                        
                        <div class="ebook-info">
                            <div class="ebook-tag">
                                <span>${ebook.tag || 'Eb'}</span> ${ebook.category.charAt(0).toUpperCase() + ebook.category.slice(1)}
                            </div>
                            
                            <h3 class="ebook-title">${ebook.title}</h3>
                            <p class="ebook-description">${ebook.description}</p>
                            
                            <div class="ebook-price ${priceClass}">
                                ${priceDisplay}
                            </div>

                            <div class="ebook-actions">
                                ${isUnlocked ? `
                                    <button class="action-btn primary" onclick="readEbook('${ebook.id}')">
                                        <span>📖</span>
                                        Read Now
                                    </button>
                                ` : `
                                    <button class="action-btn primary" onclick="showUnlockModal('${ebook.id}')">
                                        <span>🔓</span>
                                        Unlock
                                    </button>
                                `}
                                <button class="action-btn" onclick="saveEbook('${ebook.id}')">
                                    <span>🔖</span>
                                    Save
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Show unlock modal
        window.showUnlockModal = (ebookId) => {
            if (!currentUser) {
                if (confirm('Please login to unlock ebooks')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            const ebook = ebooks.find(e => e.id === ebookId);
            if (!ebook) return;

            selectedEbook = ebook;

            modalEbookInfo.innerHTML = `
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <img src="${ebook.cover_url}" alt="${ebook.title}" 
                         style="width: 60px; height: 80px; object-fit: cover; border-radius: 8px;">
                    <div>
                        <h4 style="color: var(--gold);">${ebook.title}</h4>
                        <p style="color: var(--text-secondary);">$${ebook.price}</p>
                    </div>
                </div>
            `;

            const message = `*Unlock Request - SupremeMotive*\n\n` +
                `*User:* ${currentUser.email}\n` +
                `*User ID:* ${currentUser.id}\n` +
                `*Ebook:* ${ebook.title}\n` +
                `*Ebook ID:* ${ebook.id}\n` +
                `*Price:* $${ebook.price}`;

            whatsappMessage.textContent = message;

            unlockModal.classList.add('show');
        };

        // Send WhatsApp
        sendWhatsAppBtn.addEventListener('click', () => {
            if (!selectedEbook || !currentUser) return;

            const message = encodeURIComponent(
                `*Unlock Request - SupremeMotive*\n\n` +
                `*User:* ${currentUser.email}\n` +
                `*User ID:* ${currentUser.id}\n` +
                `*Ebook:* ${selectedEbook.title}\n` +
                `*Ebook ID:* ${selectedEbook.id}\n` +
                `*Price:* $${selectedEbook.price}`
            );

            window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${message}`, '_blank');
            showAlert('Request sent! Admin will approve after payment.');
            
            setTimeout(() => {
                unlockModal.classList.remove('show');
            }, 2000);
        });

        // Close modal
        closeModalBtn.addEventListener('click', () => {
            unlockModal.classList.remove('show');
        });

        cancelModalBtn.addEventListener('click', () => {
            unlockModal.classList.remove('show');
        });

        window.addEventListener('click', (e) => {
            if (e.target === unlockModal) {
                unlockModal.classList.remove('show');
            }
        });

        // Read ebook
        window.readEbook = (ebookId) => {
            window.open(`ebook-reader.html?id=${ebookId}`, '_blank');
        };

        // Save ebook - FIXED to use supabaseClient
        window.saveEbook = async (ebookId) => {
            if (!currentUser) {
                if (confirm('Please login to save ebooks')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                // Check if already saved
                const { data: existing } = await supabaseClient
                    .from('saved_ebooks')
                    .select('*')
                    .eq('ebook_id', ebookId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle();

                if (existing) {
                    // Unsave
                    await supabaseClient
                        .from('saved_ebooks')
                        .delete()
                        .eq('ebook_id', ebookId)
                        .eq('user_id', currentUser.id);

                    showAlert('Ebook removed from your library');
                } else {
                    // Save
                    await supabaseClient
                        .from('saved_ebooks')
                        .insert([{
                            ebook_id: ebookId,
                            user_id: currentUser.id
                        }]);

                    showAlert('Ebook saved to your library!');
                }
            } catch (error) {
                console.error('Error saving ebook:', error);
                showAlert('Error saving ebook');
            }
        };

        // Category filtering
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderEbooks();
            });
        });

        // Search
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderEbooks();
        });

        // Initialize
        async function init() {
            initTheme();
            await checkAuth();
            await loadEbooks();
            await loadUserUnlocks();
        }

        init();
    </script>
</body>
</html>
