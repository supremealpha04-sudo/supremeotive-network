<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - All Articles</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 2rem;
            text-align: center;
        }

        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1rem;
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-title {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: var(--gold);
            text-decoration: none;
        }

        .post-title a:hover {
            text-decoration: underline;
        }

        .post-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .post-excerpt {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .post-meta {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .read-more-link {
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .read-more-link:hover {
            color: var(--gold);
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 3rem;
            color: #F44336;
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .post-title {
                font-size: 1.2rem;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <img src="logo.png" alt="SupremeMotive" onerror="this.style.display='none'">
            <span>SupremeMotive</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            
            <div class="auth-buttons">
                <span id="userGreeting" class="user-greeting hidden"></span>
                <a href="login.html" class="login-btn" id="loginBtn">Login</a>
                <button class="logout-btn hidden" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>

    <main class="container">
        <h1 class="page-title">📰 All Articles</h1>

        <div id="alertContainer"></div>
        <div id="postsContainer"></div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        let currentUser = null;

        // DOM Elements
        const postsContainer = document.getElementById('postsContainer');
        const alertContainer = document.getElementById('alertContainer');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-dashboard.html';
                    }
                }
                
                await loadPosts();
                
            } catch (error) {
                console.error('Auth error:', error);
                await loadPosts();
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // LOAD ALL POSTS
        // ============================================
        async function loadPosts() {
            try {
                postsContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading articles...</p>
                    </div>
                `;

                // Fetch ALL posts
                const { data: posts, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (name)
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                console.log('Posts found:', posts?.length || 0);
                
                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = `
                        <div class="empty">
                            <p>No articles yet. Check back soon!</p>
                        </div>
                    `;
                    return;
                }

                renderPosts(posts);

            } catch (error) {
                console.error('Error loading posts:', error);
                postsContainer.innerHTML = `
                    <div class="error">
                        ❌ Error loading articles: ${error.message}
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER ALL POSTS
        // ============================================
        function renderPosts(posts) {
            postsContainer.innerHTML = `
                <div class="posts-grid">
                    ${posts.map(post => {
                        const date = new Date(post.created_at).toLocaleDateString();
                        const authorName = post.profiles?.name || 'Admin';
                        const authorInitial = authorName.charAt(0).toUpperCase();
                        const excerpt = post.content.substring(0, 200) + (post.content.length > 200 ? '...' : '');

                        return `
                            <div class="post-card">
                                <div class="post-header">
                                    <div class="post-avatar">${authorInitial}</div>
                                    <div class="post-info">
                                        <div class="post-author">${authorName}</div>
                                        <div class="post-date">${date}</div>
                                    </div>
                                </div>

                                <h2 class="post-title">
                                    <a href="single-post.html?id=${post.id}">${escapeHtml(post.title)}</a>
                                </h2>

                                ${post.image_url ? `
                                    <img src="${post.image_url}" class="post-image" onerror="this.style.display='none'">
                                ` : ''}

                                <div class="post-excerpt">
                                    ${escapeHtml(excerpt).replace(/\n/g, '<br>')}
                                </div>

                                <div class="post-meta">
                                    <a href="single-post.html?id=${post.id}" class="read-more-link">
                                        Read Full Article →
                                    </a>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            await checkAuth();
        }

        init();
    </script>
</body>
</html>
