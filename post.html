<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Article</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .back-btn:hover {
            color: var(--gold);
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .post-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
        }

        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--gold);
            font-weight: bold;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .action-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 2rem;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .comments-header h3 {
            color: var(--gold);
            font-size: 1.2rem;
        }

        .comment-count {
            background: rgba(255, 215, 0, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: var(--gold);
            font-size: 0.9rem;
        }

        .comment-form {
            margin-bottom: 2rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form button {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .comments-list {
            margin-top: 1rem;
        }

        .comment {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            margin-left: 2.8rem;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .no-comments {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 3rem;
            color: #F44336;
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .post-actions {
                flex-direction: column;
            }
            
            .comment-form button {
                width: 100%;
            }
            
            .comment-content {
                margin-left: 0;
                margin-top: 0.5rem;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <img src="logo.png" alt="SupremeMotive" onerror="this.style.display='none'">
            <span>SupremeMotive</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            
            <div class="auth-buttons">
                <span id="userGreeting" class="user-greeting hidden"></span>
                <a href="login.html" class="login-btn" id="loginBtn">Login</a>
                <button class="logout-btn hidden" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>

    <main class="container">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <span>←</span> Back to Home
        </button>

        <div id="alertContainer"></div>
        <div id="postContainer"></div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // State
        let currentUser = null;
        let currentPost = null;
        let userLiked = false;

        // DOM Elements
        const postContainer = document.getElementById('postContainer');
        const alertContainer = document.getElementById('alertContainer');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        // Get post ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            postContainer.innerHTML = '<div class="error">❌ No post ID provided</div>';
        } else {
            checkAuth();
        }

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-dashboard.html';
                    }
                }
                
                await loadPost();
                
            } catch (error) {
                console.error('Auth error:', error);
                await loadPost();
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // LOAD POST
        // ============================================
        async function loadPost() {
            try {
                postContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading article...</p>
                    </div>
                `;

                // Fetch post with author info
                const { data: post, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (name)
                    `)
                    .eq('id', postId)
                    .single();

                if (error) throw error;
                if (!post) throw new Error('Post not found');

                currentPost = post;

                // Get like count
                const { count: likesCount } = await supabaseClient
                    .from('post_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Get comment count
                const { count: commentsCount } = await supabaseClient
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Check if user liked
                if (currentUser) {
                    const { data: like } = await supabaseClient
                        .from('post_likes')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    userLiked = !!like;
                }

                renderPost(post, likesCount || 0, commentsCount || 0);
                await loadComments();

            } catch (error) {
                postContainer.innerHTML = `
                    <div class="error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER POST
        // ============================================
        function renderPost(post, likesCount, commentsCount) {
            const date = new Date(post.created_at).toLocaleDateString();
            const authorName = post.profiles?.name || 'Admin';
            const authorInitial = authorName.charAt(0).toUpperCase();

            postContainer.innerHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${authorInitial}</div>
                        <div class="post-info">
                            <div class="post-author">${authorName}</div>
                            <div class="post-date">${date}</div>
                        </div>
                    </div>

                    <h1 class="post-title">${escapeHtml(post.title)}</h1>
                    
                    ${post.image_url ? `
                        <img src="${post.image_url}" class="post-image">
                    ` : ''}
                    
                    <div class="post-content">${escapeHtml(post.content)}</div>

                    <div class="post-stats">
                        <div class="stat-item">
                            <span>❤️</span>
                            <span class="stat-value" id="likesCount">${likesCount}</span>
                        </div>
                        <div class="stat-item">
                            <span>💬</span>
                            <span class="stat-value" id="commentsCount">${commentsCount}</span>
                        </div>
                    </div>

                    <div class="post-actions">
                        <button class="action-btn ${userLiked ? 'liked' : ''}" id="likeBtn">
                            <span>❤️</span>
                            <span>${userLiked ? 'Liked' : 'Like'}</span>
                        </button>
                    </div>

                    <div class="comments-section">
                        <div class="comments-header">
                            <h3>Comments</h3>
                            <span class="comment-count" id="commentCount">${commentsCount}</span>
                        </div>

                        ${currentUser ? `
                            <div class="comment-form">
                                <textarea id="commentInput" placeholder="Write a comment..."></textarea>
                                <button onclick="submitComment()">Post Comment</button>
                            </div>
                        ` : `
                            <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">
                                <a href="login.html" style="color: var(--gold);">Login</a> to join the discussion
                            </p>
                        `}

                        <div id="commentsList" class="comments-list">
                            <div class="loading">
                                <div class="spinner"></div>
                                <p>Loading comments...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('likeBtn').addEventListener('click', handleLike);
        }

        // ============================================
        // HANDLE LIKE
        // ============================================
        async function handleLike() {
            if (!currentUser) {
                if (confirm('Please login to like posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (userLiked) {
                    await supabaseClient
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);
                    userLiked = false;
                } else {
                    await supabaseClient
                        .from('post_likes')
                        .insert([{
                            post_id: postId,
                            user_id: currentUser.id
                        }]);
                    userLiked = true;
                }

                // Update like count
                const { count } = await supabaseClient
                    .from('post_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                document.getElementById('likesCount').textContent = count;
                
                const btn = document.getElementById('likeBtn');
                btn.classList.toggle('liked');
                btn.innerHTML = userLiked ? 
                    '<span>❤️</span><span>Liked</span>' : 
                    '<span>❤️</span><span>Like</span>';

            } catch (error) {
                showAlert('Error updating like');
            }
        }

        // ============================================
        // LOAD COMMENTS - FIXED
        // ============================================
        async function loadComments() {
            try {
                console.log('Loading comments for post:', postId);
                
                const { data: comments, error } = await supabaseClient
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (name)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) {
                    console.error('Error loading comments:', error);
                    throw error;
                }

                console.log('Comments loaded:', comments);
                renderComments(comments || []);

            } catch (error) {
                console.error('Error loading comments:', error);
                const commentsList = document.getElementById('commentsList');
                if (commentsList) {
                    commentsList.innerHTML = '<p class="no-comments">Error loading comments. Please refresh.</p>';
                }
            }
        }

        // ============================================
        // RENDER COMMENTS - FIXED
        // ============================================
        function renderComments(comments) {
            const commentsList = document.getElementById('commentsList');
            if (!commentsList) return;

            if (comments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">No comments yet. Be the first to comment!</p>';
                return;
            }

            commentsList.innerHTML = comments.map(comment => {
                const commentDate = new Date(comment.created_at).toLocaleString();
                const authorName = comment.profiles?.name || 'User';
                const authorInitial = authorName.charAt(0).toUpperCase();

                return `
                    <div class="comment" data-comment-id="${comment.id}">
                        <div class="comment-header">
                            <div class="comment-avatar">${authorInitial}</div>
                            <span class="comment-author">${escapeHtml(authorName)}</span>
                            <span class="comment-date">${commentDate}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // SUBMIT COMMENT - FIXED
        // ============================================
        window.submitComment = async () => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }

            const input = document.getElementById('commentInput');
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a comment');
                return;
            }

            try {
                console.log('Submitting comment for post:', postId);
                
                const { data, error } = await supabaseClient
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }])
                    .select();

                if (error) {
                    console.error('Error inserting comment:', error);
                    throw error;
                }

                console.log('Comment inserted:', data);

                input.value = '';
                
                // Reload comments
                await loadComments();
                
                // Update comment count
                const { count } = await supabaseClient
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);
                
                document.getElementById('commentsCount').textContent = count;
                document.getElementById('commentCount').textContent = count;
                
                showAlert('Comment posted successfully!');

            } catch (error) {
                console.error('Error posting comment:', error);
                showAlert('Error posting comment: ' + error.message);
            }
        };
    </script>
</body>
</html>
