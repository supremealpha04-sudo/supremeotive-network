<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - All Articles</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <style>
        /* ============================================ */
        /* RESET & BASE STYLES */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
            cursor: pointer;
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Search & Filters */
        .search-container {
            margin-bottom: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .category-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        /* Posts Grid */
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Post Card */
        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .post-title {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: var(--gold);
            text-decoration: none;
        }

        .post-title a:hover {
            text-decoration: underline;
        }

        .post-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .post-excerpt {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .post-stats {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0;
            padding: 0.8rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .stat-btn:hover {
            color: var(--gold);
        }

        .stat-btn.liked {
            color: var(--gold);
        }

        .read-more-link {
            display: inline-block;
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .read-more-link:hover {
            color: var(--gold);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 1.5rem;
        }

        .comment-form {
            margin-top: 1rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            resize: vertical;
            min-height: 80px;
            margin-bottom: 0.5rem;
        }

        .comment-form button {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            float: right;
        }

        .comments-list {
            margin-top: 1rem;
        }

        .comment {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 0.8rem;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            margin-left: 2rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .no-comments {
            color: var(--text-secondary);
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .auth-buttons {
                flex-direction: column;
                width: 100%;
            }

            .post-stats {
                flex-wrap: wrap;
            }

            .comment-form button {
                width: 100%;
                float: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // State
        let currentUser = null;
        let allPosts = [];
        let currentCategory = 'all';
        let searchTerm = '';
        let userLikes = new Set();

        // DOM Elements
        const postsContainer = document.getElementById('postsContainer');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');
        const searchInput = document.getElementById('searchInput');
        const totalArticlesSpan = document.getElementById('totalArticles');
        const totalLikesSpan = document.getElementById('totalLikes');
        const totalCommentsSpan = document.getElementById('totalComments');
        const categoryBtns = document.querySelectorAll('.category-btn');

        // ============================================
        // THEME TOGGLE
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // ============================================
        // MOBILE MENU
        // ============================================
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-dashboard.html';
                    }
                    
                    // Load user likes
                    await loadUserLikes();
                } else {
                    loginBtn.classList.remove('hidden');
                    logoutBtn.classList.add('hidden');
                    userGreeting.classList.add('hidden');
                    adminLink.style.display = 'none';
                }
            } catch (error) {
                console.error('Auth error:', error);
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // LOAD USER LIKES
        // ============================================
        async function loadUserLikes() {
            if (!currentUser) return;

            try {
                const { data: likes } = await supabaseClient
                    .from('post_likes')
                    .select('post_id')
                    .eq('user_id', currentUser.id);

                if (likes) {
                    userLikes = new Set(likes.map(l => l.post_id));
                }
            } catch (error) {
                console.error('Error loading likes:', error);
            }
        }

        // ============================================
        // LOAD POSTS
        // ============================================
        async function loadPosts() {
            try {
                postsContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading articles...</p>
                    </div>
                `;

                // Fetch all posts
                const { data: posts, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (name)
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = `
                        <div class="empty-state">
                            <p>No articles yet. Check back soon!</p>
                        </div>
                    `;
                    return;
                }

                // Get stats for each post
                const postsWithStats = await Promise.all(posts.map(async (post) => {
                    const { count: likesCount } = await supabaseClient
                        .from('post_likes')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    const { count: commentsCount } = await supabaseClient
                        .from('comments')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    return {
                        ...post,
                        likes_count: likesCount || 0,
                        comments_count: commentsCount || 0
                    };
                }));

                allPosts = postsWithStats;
                updateStats();
                renderPosts();

            } catch (error) {
                console.error('Error loading posts:', error);
                postsContainer.innerHTML = `
                    <div class="error-container">
                        ❌ Error loading articles: ${error.message}
                    </div>
                `;
            }
        }

        // ============================================
        // UPDATE STATISTICS
        // ============================================
        function updateStats() {
            const total = allPosts.length;
            const totalLikes = allPosts.reduce((sum, p) => sum + p.likes_count, 0);
            const totalComments = allPosts.reduce((sum, p) => sum + p.comments_count, 0);

            totalArticlesSpan.textContent = total;
            totalLikesSpan.textContent = totalLikes;
            totalCommentsSpan.textContent = totalComments;
        }

        // ============================================
        // RENDER POSTS
        // ============================================
        function renderPosts() {
            let filteredPosts = [...allPosts];

            if (currentCategory !== 'all') {
                filteredPosts = filteredPosts.filter(p => p.category === currentCategory);
            }

            if (searchTerm) {
                filteredPosts = filteredPosts.filter(p => 
                    p.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.content.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            if (filteredPosts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="empty-state">
                        <p>No articles match your filters.</p>
                    </div>
                `;
                return;
            }

            postsContainer.innerHTML = filteredPosts.map(post => {
                const date = new Date(post.created_at).toLocaleDateString();
                const authorName = post.profiles?.name || 'Admin';
                const authorInitial = authorName.charAt(0).toUpperCase();
                const isLiked = userLikes.has(post.id);
                const excerpt = post.content.substring(0, 200) + (post.content.length > 200 ? '...' : '');

                return `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${authorInitial}</div>
                            <div class="post-info">
                                <div class="post-author">${authorName}</div>
                                <div class="post-date">${date}</div>
                            </div>
                        </div>

                        <h2 class="post-title">
                            <a href="single-post.html?id=${post.id}">${escapeHtml(post.title)}</a>
                        </h2>

                        ${post.image_url ? `
                            <img src="${post.image_url}" class="post-image" onerror="this.style.display='none'">
                        ` : ''}

                        <div class="post-excerpt">${escapeHtml(excerpt).replace(/\n/g, '<br>')}</div>

                        <div class="post-stats">
                            <button class="stat-btn like-btn ${isLiked ? 'liked' : ''}" onclick="handleLike('${post.id}')">
                                <span>❤️</span>
                                <span>${post.likes_count + (isLiked ? 1 : 0)}</span>
                            </button>
                            <button class="stat-btn" onclick="toggleComments('${post.id}')">
                                <span>💬</span>
                                <span>${post.comments_count}</span>
                            </button>
                        </div>

                        <a href="single-post.html?id=${post.id}" class="read-more-link">
                            Read Full Article →
                        </a>

                        <div id="comments-${post.id}" class="comments-section hidden">
                            <div class="comment-form">
                                ${currentUser ? `
                                    <textarea id="comment-input-${post.id}" placeholder="Write a comment..."></textarea>
                                    <button onclick="addComment('${post.id}')">Post Comment</button>
                                ` : `
                                    <p style="color: var(--text-secondary); text-align: center;">
                                        <a href="login.html" style="color: var(--gold);">Login</a> to comment
                                    </p>
                                `}
                            </div>
                            <div id="comments-list-${post.id}" class="comments-list"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Load comments for each post
            filteredPosts.forEach(post => loadComments(post.id));
        }

        // ============================================
        // HANDLE LIKE - WORKING
        // ============================================
        window.handleLike = async (postId) => {
            if (!currentUser) {
                if (confirm('Please login to like posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                const post = allPosts.find(p => p.id === postId);
                const isLiked = userLikes.has(postId);

                if (isLiked) {
                    // Unlike
                    await supabaseClient
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);

                    userLikes.delete(postId);
                    post.likes_count--;
                } else {
                    // Like
                    await supabaseClient
                        .from('post_likes')
                        .insert([{
                            post_id: postId,
                            user_id: currentUser.id
                        }]);

                    userLikes.add(postId);
                    post.likes_count++;
                }

                // Update UI
                const likeBtn = document.querySelector(`.post-card[data-post-id="${postId}"] .like-btn`);
                if (likeBtn) {
                    likeBtn.classList.toggle('liked');
                    likeBtn.innerHTML = `<span>❤️</span><span>${post.likes_count}</span>`;
                }

                // Update total likes
                const totalLikes = allPosts.reduce((sum, p) => sum + p.likes_count, 0);
                totalLikesSpan.textContent = totalLikes;

            } catch (error) {
                console.error('Error liking post:', error);
                showAlert('Error updating like');
            }
        };

        // ============================================
        // TOGGLE COMMENTS - WORKING
        // ============================================
        window.toggleComments = (postId) => {
            const commentsDiv = document.getElementById(`comments-${postId}`);
            if (commentsDiv.classList.contains('hidden')) {
                commentsDiv.classList.remove('hidden');
            } else {
                commentsDiv.classList.add('hidden');
            }
        };

        // ============================================
        // LOAD COMMENTS - WORKING
        // ============================================
        async function loadComments(postId) {
            try {
                const { data: comments, error } = await supabaseClient
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (name)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                renderComments(comments || [], postId);

            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        // ============================================
        // RENDER COMMENTS - WORKING
        // ============================================
        function renderComments(comments, postId) {
            const container = document.getElementById(`comments-list-${postId}`);
            if (!container) return;

            if (comments.length === 0) {
                container.innerHTML = '<p class="no-comments">No comments yet</p>';
                return;
            }

            container.innerHTML = comments.map(comment => {
                const date = new Date(comment.created_at).toLocaleString();
                const authorName = comment.profiles?.name || 'User';
                const authorInitial = authorName.charAt(0).toUpperCase();

                return `
                    <div class="comment">
                        <div class="comment-header">
                            <div class="comment-avatar">${authorInitial}</div>
                            <span class="comment-author">${escapeHtml(authorName)}</span>
                            <span class="comment-date">${date}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // ADD COMMENT - WORKING
        // ============================================
        window.addComment = async (postId) => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }

            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a comment');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }]);

                if (error) throw error;

                input.value = '';
                await loadComments(postId);
                
                // Update comment count
                const post = allPosts.find(p => p.id === postId);
                if (post) {
                    post.comments_count++;
                    const commentBtn = document.querySelector(`.post-card[data-post-id="${postId}"] .stat-btn:last-child`);
                    if (commentBtn) {
                        commentBtn.innerHTML = `<span>💬</span><span>${post.comments_count}</span>`;
                    }
                    totalCommentsSpan.textContent = allPosts.reduce((sum, p) => sum + p.comments_count, 0);
                }
                
                showAlert('Comment posted!');

            } catch (error) {
                console.error('Error posting comment:', error);
                showAlert('Error posting comment');
            }
        };

        // ============================================
        // FILTERS
        // ============================================
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderPosts();
            });
        });

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderPosts();
        });

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            initTheme();
            await checkAuth();
            await loadPosts();
        }

        init();
    </script>
</body>
</html>
