<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Articles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .categories {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            position: relative;
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .post-card::after {
            content: 'SUPREME MOTIVE';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.15);
            transform: rotate(-5deg);
            pointer-events: none;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 1rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-title {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1rem 0;
            border: 1px solid var(--border-color);
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .post-content.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.3rem 0;
        }

        .read-more-btn:hover {
            color: var(--gold);
        }

        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 1rem 0;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-item span {
            color: var(--gold);
            font-weight: bold;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }

        .action-btn {
            flex: 1;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.saved {
            background: var(--electric-blue);
            color: var(--bg-color);
            border-color: var(--electric-blue);
        }

        .comments-section {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .comment-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .comment-form input {
            flex: 1;
            padding: 0.7rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
        }

        .comment-form input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form button {
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            border: none;
            border-radius: 8px;
            color: var(--bg-color);
            font-weight: 600;
            cursor: pointer;
        }

        .comment {
            padding: 0.8rem;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-left: 2.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .post-actions {
                flex-wrap: wrap;
            }

            .action-btn {
                min-width: calc(50% - 0.5rem);
            }

            .post-stats {
                justify-content: space-around;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">SupremeMotive</div>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>

            <a href="#" id="adminLink" style="display: none;">Admin</a>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>

        <a href="profile.html" class="nav-item">

            <span class="nav-icon">📰</span>
            <span>Articles</span>
        </a>
    </nav>

    <main class="container">
        <div class="header">
            <h1>Daily Articles</h1>
            <p>Inspirational posts from our team</p>
        </div>

        <div class="categories" id="categories">
            <button class="category-btn active" data-category="all">All Posts</button>
            <button class="category-btn" data-category="motivation">Motivation</button>
            <button class="category-btn" data-category="success">Success</button>
            <button class="category-btn" data-category="life">Life</button>
            <button class="category-btn" data-category="wisdom">Wisdom</button>
        </div>

        <div id="alertContainer"></div>

        <div class="posts-container" id="postsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading articles...</p>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // State
        let currentUser = null;
        let currentCategory = 'all';
        let posts = [];
        let userLikes = new Set();
        let userSaves = new Set();

        // DOM Elements
        const postsContainer = document.getElementById('postsContainer');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const categoryBtns = document.querySelectorAll('.category-btn');

        // Theme toggle
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // Mobile menu
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // Show alert
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // Check auth
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;

                if (user && ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block';
                    adminLink.href = 'admin/admin-dashboard.html';
                }
            } catch (error) {
                console.error('Auth error:', error);
            }
        }

        // Load posts from database
        async function loadPosts() {
            try {
                const { data, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (id, name, profile_image_url),
                        post_likes(count),
                        comments(count)
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                posts = data || [];

                // Load user interactions if logged in
                if (currentUser) {
                    await loadUserInteractions();
                }

                renderPosts();

            } catch (error) {
                console.error('Error loading posts:', error);
                postsContainer.innerHTML = `
                    <div class="loading">
                        <p style="color: var(--error);">Error loading posts. Please refresh.</p>
                    </div>
                `;
            }
        }

        // Load user interactions (likes and saves)
        async function loadUserInteractions() {
            try {
                // Load likes
                const { data: likes } = await supabaseClient
                    .from('post_likes')
                    .select('post_id')
                    .eq('user_id', currentUser.id);

                if (likes) {
                    userLikes = new Set(likes.map(l => l.post_id));
                }

                // Load saves
                const { data: saves } = await supabaseClient
                    .from('saved_posts')
                    .select('post_id')
                    .eq('user_id', currentUser.id);

                if (saves) {
                    userSaves = new Set(saves.map(s => s.post_id));
                }
            } catch (error) {
                console.error('Error loading interactions:', error);
            }
        }

        // Render posts
        function renderPosts() {
            let filteredPosts = [...posts];

            // Filter by category (you can add a category field to posts table)
            if (currentCategory !== 'all') {
                // This assumes you have a category field in posts
                // filteredPosts = filteredPosts.filter(p => p.category === currentCategory);
            }

            if (filteredPosts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="loading">
                        <p>No articles yet. Check back soon!</p>
                    </div>
                `;
                return;
            }

            postsContainer.innerHTML = filteredPosts.map(post => {
                const isLiked = userLikes.has(post.id);
                const isSaved = userSaves.has(post.id);
                const likesCount = post.post_likes?.[0]?.count || 0;
                const commentsCount = post.comments?.[0]?.count || 0;
                const authorName = post.profiles?.name || 'SupremeMotive Admin';
                const authorAvatar = post.profiles?.profile_image_url || 
                    `https://ui-avatars.com/api/?name=${encodeURIComponent(authorName)}&background=FFD700&color=000&size=50`;

                return `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <img src="${authorAvatar}" alt="${authorName}" class="post-avatar">
                            <div class="post-info">
                                <div class="post-author">${authorName}</div>
                                <div class="post-date">${new Date(post.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>

                        <h2 class="post-title">${escapeHtml(post.title)}</h2>

                        ${post.image_url ? `
                            <img src="${post.image_url}" alt="${escapeHtml(post.title)}" class="post-image">
                        ` : ''}

                        <div class="post-content collapsed" id="content-${post.id}">
                            ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                        </div>

                        <button class="read-more-btn" onclick="toggleReadMore('${post.id}')">
                            <span>Read More</span>
                            <span>▼</span>
                        </button>

                        <div class="post-stats">
                            <div class="stat-item">
                                <span>❤️</span>
                                <span id="likes-${post.id}">${likesCount}</span>
                            </div>
                            <div class="stat-item">
                                <span>💬</span>
                                <span>${commentsCount}</span>
                            </div>
                        </div>

                        <div class="post-actions">
                            <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" 
                                    onclick="handleLike('${post.id}')">
                                <span>❤️</span>
                                <span>${isLiked ? 'Liked' : 'Like'}</span>
                            </button>
                            <button class="action-btn save-btn ${isSaved ? 'saved' : ''}" 
                                    onclick="handleSave('${post.id}')">
                                <span>🔖</span>
                                <span>${isSaved ? 'Saved' : 'Save'}</span>
                            </button>
                            <button class="action-btn" onclick="sharePost('${post.id}')">
                                <span>📤</span>
                                <span>Share</span>
                            </button>
                        </div>

                        <div class="comments-section" id="comments-${post.id}" style="display: none;">
                            ${currentUser ? `
                                <div class="comment-form">
                                    <input type="text" id="comment-${post.id}" placeholder="Write a comment...">
                                    <button onclick="addComment('${post.id}')">Post</button>
                                </div>
                            ` : `
                                <p style="color: var(--text-secondary); text-align: center; margin-bottom: 1rem;">
                                    <a href="login.html" style="color: var(--gold);">Login</a> to comment
                                </p>
                            `}
                            <div id="comments-list-${post.id}"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Load comments for each post
            posts.forEach(post => loadComments(post.id));
        }

        // Toggle read more
        window.toggleReadMore = (postId) => {
            const content = document.getElementById(`content-${postId}`);
            const btn = document.querySelector(`[onclick="toggleReadMore('${postId}')"]`);
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                btn.innerHTML = '<span>Show Less</span> <span>▲</span>';
            } else {
                content.classList.add('collapsed');
                btn.innerHTML = '<span>Read More</span> <span>▼</span>';
            }
        };

        // Handle like
        window.handleLike = async (postId) => {
            if (!currentUser) {
                if (confirm('Please login to like posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (userLikes.has(postId)) {
                    // Unlike
                    await supabaseClient
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);

                    userLikes.delete(postId);
                    
                    // Update count
                    const countEl = document.getElementById(`likes-${postId}`);
                    countEl.textContent = parseInt(countEl.textContent) - 1;
                } else {
                    // Like
                    await supabaseClient
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: currentUser.id }]);

                    userLikes.add(postId);
                    
                    // Update count
                    const countEl = document.getElementById(`likes-${postId}`);
                    countEl.textContent = parseInt(countEl.textContent) + 1;
                }

                // Update button state
                const btn = document.querySelector(`[onclick="handleLike('${postId}')"]`);
                if (userLikes.has(postId)) {
                    btn.classList.add('liked');
                    btn.innerHTML = '<span>❤️</span><span>Liked</span>';
                } else {
                    btn.classList.remove('liked');
                    btn.innerHTML = '<span>❤️</span><span>Like</span>';
                }

            } catch (error) {
                console.error('Error liking post:', error);
                showAlert('Error updating like');
            }
        };

        // Handle save
        window.handleSave = async (postId) => {
            if (!currentUser) {
                if (confirm('Please login to save posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (userSaves.has(postId)) {
                    // Unsave
                    await supabaseClient
                        .from('saved_posts')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);

                    userSaves.delete(postId);
                    showAlert('Post removed from saved');
                } else {
                    // Save
                    await supabaseClient
                        .from('saved_posts')
                        .insert([{ post_id: postId, user_id: currentUser.id }]);

                    userSaves.add(postId);
                    showAlert('Post saved!');
                }

                // Update button state
                const btn = document.querySelector(`[onclick="handleSave('${postId}')"]`);
                if (userSaves.has(postId)) {
                    btn.classList.add('saved');
                    btn.innerHTML = '<span>🔖</span><span>Saved</span>';
                } else {
                    btn.classList.remove('saved');
                    btn.innerHTML = '<span>🔖</span><span>Save</span>';
                }

            } catch (error) {
                console.error('Error saving post:', error);
                showAlert('Error saving post');
            }
        };

        // Share post
        window.sharePost = (postId) => {
            const post = posts.find(p => p.id === postId);
            const url = `${window.location.origin}/post.html?id=${postId}`;
            
            if (navigator.share) {
                navigator.share({
                    title: post.title,
                    text: post.content.substring(0, 100) + '...',
                    url: url
                }).catch(() => {
                    copyToClipboard(url);
                });
            } else {
                copyToClipboard(url);
            }
        };

        // Copy to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert('Link copied to clipboard!');
            }).catch(() => {
                showAlert('Could not copy link');
            });
        }

        // Load comments for a post
        async function loadComments(postId) {
            try {
                const { data: comments, error } = await supabaseClient
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (id, name, profile_image_url)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                renderComments(comments, postId);

            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        // Render comments
        function renderComments(comments, postId) {
            const container = document.getElementById(`comments-list-${postId}`);
            if (!container) return;

            if (comments.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No comments yet</p>';
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment">
                    <div class="comment-header">
                        <img src="${comment.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(comment.profiles?.name || 'User')}&background=FFD700&color=000&size=30`}" 
                             class="comment-avatar">
                        <span class="comment-author">${comment.profiles?.name || 'User'}</span>
                        <span class="comment-date">${new Date(comment.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                </div>
            `).join('');
        }

        // Add comment
        window.addComment = async (postId) => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }

            const input = document.getElementById(`comment-${postId}`);
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a comment');
                return;
            }

            try {
                await supabaseClient
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }]);

                input.value = '';
                await loadComments(postId);
                showAlert('Comment posted!');

            } catch (error) {
                console.error('Error posting comment:', error);
                showAlert('Error posting comment');
            }
        };

        // Toggle comments section
        window.toggleComments = (postId) => {
            const section = document.getElementById(`comments-${postId}`);
            if (section.style.display === 'none') {
                section.style.display = 'block';
                loadComments(postId);
            } else {
                section.style.display = 'none';
            }
        };

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Category filtering
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderPosts();
            });
        });

        // Initialize
        async function init() {
            initTheme();
            await checkAuth();
            await loadPosts();
        }

        init();
    </script>
</body>
</html>
