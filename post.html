<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Articles</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            position: relative;
        }

        .post-card::after {
            content: 'SUPREME MOTIVE';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.15);
            transform: rotate(-5deg);
            pointer-events: none;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .post-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1.5rem 0;
            border: 1px solid var(--border-color);
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item span {
            color: var(--gold);
            font-weight: bold;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 100px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.saved {
            background: var(--electric-blue);
            color: var(--bg-color);
            border-color: var(--electric-blue);
        }

        .comments-section {
            margin-top: 2rem;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .comments-header h3 {
            color: var(--gold);
            font-size: 1.3rem;
        }

        .comment-form {
            margin-bottom: 2rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form button {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            float: right;
        }

        .comment {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-left: 3rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .post-actions {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }

            .comment-form button {
                width: 100%;
                float: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <img src="logo.png" alt="SupremeMotive" onerror="this.style.display='none'">
            <span>SupremeMotive</span>
        </div>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="support.html">Support</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            
            <div class="auth-buttons" id="authButtons">
                <span id="userGreeting" class="user-greeting hidden"></span>
                <a href="login.html" class="login-btn" id="loginBtn">Login</a>
                <button class="logout-btn hidden" id="logoutBtn">Logout</button>
            </div>
            
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
        <a href="post.html" class="nav-item active">
            <span class="nav-icon">📰</span>
            <span>Articles</span>
        </a>
    </nav>

    <main class="container">
        <div id="alertContainer"></div>
        <div id="postContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading article...</p>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // State
        let currentUser = null;
        let currentPost = null;
        let comments = [];

        // DOM Elements
        const postContainer = document.getElementById('postContainer');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        // Get post ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            window.location.href = 'index.html';
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // ============================================
        // MOBILE MENU
        // ============================================
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // UPDATE AUTH UI
        // ============================================
        function updateAuthUI(user) {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userGreeting.classList.remove('hidden');
                userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block';
                    adminLink.href = 'admin/admin-dashboard.html';
                } else {
                    adminLink.style.display = 'none';
                }
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userGreeting.classList.add('hidden');
                adminLink.style.display = 'none';
            }
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                currentUser = user;
                updateAuthUI(user);
            } catch (error) {
                console.error('Auth error:', error);
                updateAuthUI(null);
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // LOAD POST
        // ============================================
        async function loadPost() {
            try {
                // Fetch post with author info
                const { data: post, error } = await supabase
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (id, name, profile_image_url)
                    `)
                    .eq('id', postId)
                    .single();

                if (error) throw error;

                // Get like count
                const { count: likesCount } = await supabase
                    .from('post_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Get comment count
                const { count: commentsCount } = await supabase
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Check if user liked this post
                let userLiked = false;
                if (currentUser) {
                    const { data: like } = await supabase
                        .from('post_likes')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    userLiked = !!like;
                }

                currentPost = {
                    ...post,
                    likes_count: likesCount || 0,
                    comments_count: commentsCount || 0,
                    user_liked: userLiked
                };

                renderPost();
                await loadComments();

            } catch (error) {
                console.error('Error loading post:', error);
                postContainer.innerHTML = `
                    <div class="alert" style="color: var(--error);">
                        ❌ Error loading post: ${error.message}
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER POST
        // ============================================
        function renderPost() {
            const post = currentPost;
            const authorName = post.profiles?.name || 'SupremeMotive Admin';
            const authorAvatar = post.profiles?.profile_image_url || 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(authorName)}&background=FFD700&color=000&size=50`;

            postContainer.innerHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${authorAvatar}" alt="${authorName}" class="post-avatar">
                        <div class="post-info">
                            <div class="post-author">${authorName}</div>
                            <div class="post-date">${new Date(post.created_at).toLocaleDateString()}</div>
                        </div>
                    </div>

                    <h1 class="post-title">${escapeHtml(post.title)}</h1>

                    ${post.image_url ? `
                        <img src="${post.image_url}" alt="${escapeHtml(post.title)}" class="post-image">
                    ` : ''}

                    <div class="post-content">
                        ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                    </div>

                    <div class="post-stats">
                        <div class="stat-item">
                            <span>❤️</span>
                            <span id="likesCount">${post.likes_count}</span> likes
                        </div>
                        <div class="stat-item">
                            <span>💬</span>
                            <span id="commentsCount">${post.comments_count}</span> comments
                        </div>
                    </div>

                    <div class="post-actions">
                        <button class="action-btn like-btn ${post.user_liked ? 'liked' : ''}" id="likeBtn">
                            <span>❤️</span>
                            <span>${post.user_liked ? 'Liked' : 'Like'}</span>
                        </button>
                        <button class="action-btn" onclick="sharePost()">
                            <span>📤</span>
                            <span>Share</span>
                        </button>
                    </div>

                    <div class="comments-section">
                        <div class="comments-header">
                            <h3>Comments</h3>
                        </div>

                        ${currentUser ? `
                            <div class="comment-form">
                                <textarea id="commentInput" placeholder="Write a comment..."></textarea>
                                <button onclick="addComment()">Post Comment</button>
                            </div>
                        ` : `
                            <p style="color: var(--text-secondary); text-align: center; margin: 2rem;">
                                <a href="login.html" style="color: var(--gold);">Login</a> to comment
                            </p>
                        `}

                        <div id="commentsContainer"></div>
                    </div>
                </div>
            `;

            document.getElementById('likeBtn').addEventListener('click', handleLike);
        }

        // ============================================
        // HANDLE LIKE
        // ============================================
        async function handleLike() {
            if (!currentUser) {
                if (confirm('Please login to like posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (currentPost.user_liked) {
                    await supabase
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);

                    currentPost.likes_count--;
                    currentPost.user_liked = false;
                } else {
                    await supabase
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: currentUser.id }]);

                    currentPost.likes_count++;
                    currentPost.user_liked = true;
                }

                document.getElementById('likesCount').textContent = currentPost.likes_count;
                const likeBtn = document.getElementById('likeBtn');
                
                if (currentPost.user_liked) {
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = '<span>❤️</span><span>Liked</span>';
                } else {
                    likeBtn.classList.remove('liked');
                    likeBtn.innerHTML = '<span>❤️</span><span>Like</span>';
                }

            } catch (error) {
                console.error('Error liking post:', error);
                showAlert('Error updating like');
            }
        }

        // ============================================
        // SHARE POST
        // ============================================
        window.sharePost = () => {
            const url = window.location.href;
            const title = currentPost.title;

            if (navigator.share) {
                navigator.share({
                    title: 'SupremeMotive',
                    text: title,
                    url: url
                }).catch(() => {
                    copyToClipboard(url);
                });
            } else {
                copyToClipboard(url);
            }
        };

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert('Link copied to clipboard!');
            });
        }

        // ============================================
        // LOAD COMMENTS
        // ============================================
        async function loadComments() {
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (id, name, profile_image_url)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                comments = data || [];
                renderComments();

            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        // ============================================
        // RENDER COMMENTS
        // ============================================
        function renderComments() {
            const container = document.getElementById('commentsContainer');
            if (!container) return;

            if (comments.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No comments yet</p>';
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment">
                    <div class="comment-header">
                        <img src="${comment.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(comment.profiles?.name || 'User')}&background=FFD700&color=000&size=35`}" 
                             class="comment-avatar">
                        <span class="comment-author">${comment.profiles?.name || 'User'}</span>
                        <span class="comment-date">${new Date(comment.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                </div>
            `).join('');
        }

        // ============================================
        // ADD COMMENT
        // ============================================
        window.addComment = async () => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }

            const input = document.getElementById('commentInput');
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a comment');
                return;
            }

            try {
                await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }]);

                input.value = '';
                await loadComments();
                
                // Update comment count
                const commentsCountEl = document.getElementById('commentsCount');
                commentsCountEl.textContent = parseInt(commentsCountEl.textContent) + 1;
                
                showAlert('Comment posted!');

            } catch (error) {
                console.error('Error posting comment:', error);
                showAlert('Error posting comment');
            }
        };

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            initTheme();
            await checkAuth();
            await loadPost();
        }

        init();
    </script>
</body>
</html>
