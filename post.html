<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        #logoutBtn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Post Card */
        .post-card {
            background: var(--dark-gray);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--light-gray);
            margin-bottom: 2rem;
            position: relative;
        }

        /* Watermark */
        .post-card::after {
            content: "SUPREME-MOTIVE";
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255, 215, 0, 0.1);
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 1;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Post Image */
        .post-image-container {
            width: 100%;
            max-height: 500px;
            overflow: hidden;
            position: relative;
            background: var(--medium-gray);
        }

        .post-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }

        /* Image Watermark */
        .post-image-container::after {
            content: "SUPREME-MOTIVE";
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: rgba(255, 215, 0, 0.3);
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 2;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .post-content-wrapper {
            padding: 2rem;
            position: relative;
            z-index: 3;
            background: var(--dark-gray);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--light-gray);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .post-author-info h3 {
            color: var(--gold);
            margin-bottom: 0.2rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        /* Post Content with Read More */
        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .post-content.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem 0;
            padding: 0.5rem 0;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .read-more-btn:hover {
            color: var(--gold);
        }

        /* Post Stats */
        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--light-gray);
            border-bottom: 1px solid var(--light-gray);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item i {
            font-size: 1.2rem;
        }

        .stat-value {
            color: var(--gold);
            font-weight: 600;
        }

        /* Post Actions */
        .post-actions {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .action-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .like-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
        }

        .like-btn.liked {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            border-color: var(--gold);
        }

        .save-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
        }

        .save-btn.saved {
            background: rgba(0, 240, 255, 0.1);
            color: var(--electric-blue);
            border-color: var(--electric-blue);
        }

        .share-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 2rem;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .comments-header h3 {
            color: var(--gold);
            font-size: 1.3rem;
        }

        .comment-count {
            background: var(--medium-gray);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: var(--text-secondary);
        }

        /* Comment Form */
        .comment-form {
            background: var(--medium-gray);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--light-gray);
        }

        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--dark-gray);
            border: 1px solid var(--light-gray);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form-actions {
            display: flex;
            justify-content: flex-end;
        }

        .submit-comment {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .submit-comment:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .submit-comment:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Comments List */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .comment {
            background: var(--medium-gray);
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid var(--light-gray);
        }

        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .comment-info {
            flex: 1;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .comment-content {
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 1rem;
            padding-left: 3.5rem;
        }

        .comment-actions {
            display: flex;
            gap: 1rem;
            padding-left: 3.5rem;
        }

        .comment-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.3s ease;
        }

        .comment-action:hover {
            color: var(--gold);
        }

        /* Replies */
        .replies {
            margin-left: 3rem;
            margin-top: 1rem;
            padding-left: 1rem;
            border-left: 2px solid var(--gold);
        }

        .reply {
            background: var(--dark-gray);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .reply-form {
            margin-top: 1rem;
            padding-left: 3.5rem;
        }

        .reply-form input {
            width: 100%;
            padding: 0.8rem;
            background: var(--dark-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .reply-form input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .reply-form-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .reply-submit {
            background: var(--electric-blue);
            color: var(--primary-black);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }

        .reply-cancel {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .post-title {
                font-size: 1.5rem;
            }

            .post-stats {
                flex-wrap: wrap;
            }

            .post-actions {
                flex-direction: column;
            }

            .comment-content {
                padding-left: 0;
            }

            .replies {
                margin-left: 1rem;
            }

            .post-card::after {
                font-size: 2rem;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            <button id="logoutBtn" style="display: none;">Logout</button>
            <a href="login.html" id="loginLink">Login</a>
        </div>
    </nav>

    <main class="container">
        <div id="alertContainer"></div>
        
        <div id="postContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading post...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        const supabase = createClient(
            'YOUR_SUPABASE_URL',
            'YOUR_SUPABASE_ANON_KEY'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        let currentUser = null
        let currentPost = null
        let comments = []
        let replyingTo = null

        // DOM Elements
        const postContainer = document.getElementById('postContainer')
        const alertContainer = document.getElementById('alertContainer')
        const logoutBtn = document.getElementById('logoutBtn')
        const loginLink = document.getElementById('loginLink')
        const adminLink = document.getElementById('adminLink')

        // Get post ID from URL
        const urlParams = new URLSearchParams(window.location.search)
        const postId = urlParams.get('id')

        if (!postId) {
            window.location.href = 'index.html'
        }

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i>${type === 'success' ? '✅' : '❌'}</i>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check auth status
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user

            if (user) {
                logoutBtn.style.display = 'block'
                loginLink.style.display = 'none'
                
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block'
                    adminLink.href = 'admin/admin-dashboard.html'
                }
            } else {
                logoutBtn.style.display = 'none'
                loginLink.style.display = 'block'
                adminLink.style.display = 'none'
            }
        }

        // Load post
        async function loadPost() {
            try {
                const { data: post, error } = await supabase
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (id, name, profile_image_url),
                        post_likes(count),
                        comments(count)
                    `)
                    .eq('id', postId)
                    .single()

                if (error) throw error

                // Check if user liked this post
                let userLiked = false
                let userSaved = false
                
                if (currentUser) {
                    const { data: like } = await supabase
                        .from('post_likes')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle()
                    userLiked = !!like

                    const { data: save } = await supabase
                        .from('saved_posts')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle()
                    userSaved = !!save
                }

                currentPost = {
                    ...post,
                    likes_count: post.post_likes?.[0]?.count || 0,
                    comments_count: post.comments?.[0]?.count || 0,
                    user_liked: userLiked,
                    user_saved: userSaved
                }

                renderPost()
                await loadComments()

            } catch (error) {
                postContainer.innerHTML = `
                    <div class="alert alert-error">
                        <i>❌</i>
                        <span>Error loading post: ${error.message}</span>
                    </div>
                `
            }
        }

        // Render post
        function renderPost() {
            const post = currentPost
            const authorName = post.profiles?.name || 'SupremeMotive Admin'
            const authorAvatar = post.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(authorName)}&background=FFD700&color=000&size=50`

            postContainer.innerHTML = `
                <div class="post-card">
                    ${post.image_url ? `
                        <div class="post-image-container">
                            <img src="${post.image_url}" alt="${escapeHtml(post.title)}" class="post-image">
                        </div>
                    ` : ''}
                    
                    <div class="post-content-wrapper">
                        <div class="post-header">
                            <img src="${authorAvatar}" alt="${escapeHtml(authorName)}" class="post-avatar">
                            <div class="post-author-info">
                                <h3>${escapeHtml(authorName)}</h3>
                                <div class="post-date">${new Date(post.created_at).toLocaleDateString()} • ${new Date(post.created_at).toLocaleTimeString()}</div>
                            </div>
                        </div>

                        <h1 class="post-title">${escapeHtml(post.title)}</h1>
                        
                        <div id="postContent" class="post-content collapsed">
                            ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                        </div>
                        
                        <button id="readMoreBtn" class="read-more-btn">
                            <span>Read More</span>
                            <i>▼</i>
                        </button>

                        <div class="post-stats">
                            <div class="stat-item">
                                <i>❤️</i>
                                <span class="stat-value" id="likesCount">${post.likes_count}</span>
                                <span>likes</span>
                            </div>
                            <div class="stat-item">
                                <i>💬</i>
                                <span class="stat-value" id="commentsCount">${post.comments_count}</span>
                                <span>comments</span>
                            </div>
                        </div>

                        <div class="post-actions">
                            <button class="action-btn like-btn ${post.user_liked ? 'liked' : ''}" id="likeBtn">
                                <i>${post.user_liked ? '❤️' : '🤍'}</i>
                                <span>${post.user_liked ? 'Liked' : 'Like'}</span>
                            </button>
                            <button class="action-btn save-btn ${post.user_saved ? 'saved' : ''}" id="saveBtn">
                                <i>${post.user_saved ? '🔖' : '📑'}</i>
                                <span>${post.user_saved ? 'Saved' : 'Save'}</span>
                            </button>
                            <button class="action-btn share-btn" id="shareBtn">
                                <i>📤</i>
                                <span>Share</span>
                            </button>
                        </div>

                        <!-- Comments Section -->
                        <div class="comments-section">
                            <div class="comments-header">
                                <h3>Comments</h3>
                                <span class="comment-count" id="commentCount">${post.comments_count}</span>
                            </div>

                            ${currentUser ? `
                                <div class="comment-form">
                                    <textarea id="commentInput" placeholder="Write a comment..." rows="3"></textarea>
                                    <div class="comment-form-actions">
                                        <button class="submit-comment" id="submitCommentBtn">
                                            <i>📝</i>
                                            Post Comment
                                        </button>
                                    </div>
                                </div>
                            ` : `
                                <div class="comment-form" style="text-align: center;">
                                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Please login to comment</p>
                                    <a href="login.html" class="submit-comment" style="display: inline-block; text-decoration: none;">Login</a>
                                </div>
                            `}

                            <div id="commentsList" class="comments-list">
                                <div class="loading">
                                    <div class="spinner"></div>
                                    <p>Loading comments...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `

            // Add event listeners
            document.getElementById('readMoreBtn').addEventListener('click', toggleReadMore)
            document.getElementById('likeBtn').addEventListener('click', handleLike)
            document.getElementById('saveBtn').addEventListener('click', handleSave)
            document.getElementById('shareBtn').addEventListener('click', handleShare)
            
            if (currentUser) {
                document.getElementById('submitCommentBtn').addEventListener('click', handleComment)
            }
        }

        // Toggle read more
        function toggleReadMore() {
            const content = document.getElementById('postContent')
            const btn = document.getElementById('readMoreBtn')
            const icon = btn.querySelector('i')
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed')
                btn.innerHTML = '<span>Show Less</span> <i>▲</i>'
            } else {
                content.classList.add('collapsed')
                btn.innerHTML = '<span>Read More</span> <i>▼</i>'
            }
        }

        // Handle like
        async function handleLike() {
            if (!currentUser) {
                if (confirm('Please login to like posts. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            try {
                if (currentPost.user_liked) {
                    await supabase
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                    
                    currentPost.likes_count--
                    currentPost.user_liked = false
                } else {
                    await supabase
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: currentUser.id }])
                    
                    currentPost.likes_count++
                    currentPost.user_liked = true
                }

                // Update UI
                document.getElementById('likesCount').textContent = currentPost.likes_count
                const likeBtn = document.getElementById('likeBtn')
                if (currentPost.user_liked) {
                    likeBtn.classList.add('liked')
                    likeBtn.innerHTML = '<i>❤️</i><span>Liked</span>'
                } else {
                    likeBtn.classList.remove('liked')
                    likeBtn.innerHTML = '<i>🤍</i><span>Like</span>'
                }

            } catch (error) {
                showAlert('Error updating like', 'error')
            }
        }

        // Handle save
        async function handleSave() {
            if (!currentUser) {
                if (confirm('Please login to save posts. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            try {
                if (currentPost.user_saved) {
                    await supabase
                        .from('saved_posts')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                    
                    currentPost.user_saved = false
                } else {
                    await supabase
                        .from('saved_posts')
                        .insert([{ post_id: postId, user_id: currentUser.id }])
                    
                    currentPost.user_saved = true
                }

                // Update UI
                const saveBtn = document.getElementById('saveBtn')
                if (currentPost.user_saved) {
                    saveBtn.classList.add('saved')
                    saveBtn.innerHTML = '<i>🔖</i><span>Saved</span>'
                } else {
                    saveBtn.classList.remove('saved')
                    saveBtn.innerHTML = '<i>📑</i><span>Save</span>'
                }

                showAlert(currentPost.user_saved ? 'Post saved!' : 'Post removed from saved', 'success')

            } catch (error) {
                showAlert('Error saving post', 'error')
            }
        }

        // Handle share
        async function handleShare() {
            const url = window.location.href
            const title = currentPost.title

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'SupremeMotive',
                        text: title,
                        url: url
                    })
                } catch (err) {
                    console.log('Share cancelled')
                }
            } else {
                try {
                    await navigator.clipboard.writeText(url)
                    showAlert('Link copied to clipboard!', 'success')
                } catch (err) {
                    showAlert('Could not copy link', 'error')
                }
            }
        }

        // Load comments
        async function loadComments() {
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (id, name, profile_image_url),
                        replies:comments!parent_comment_id (
                            *,
                            profiles:user_id (id, name, profile_image_url)
                        )
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true })

                if (error) throw error

                comments = data || []
                renderComments()

            } catch (error) {
                console.error('Error loading comments:', error)
            }
        }

        // Render comments
        function renderComments() {
            const commentsList = document.getElementById('commentsList')
            
            if (comments.length === 0) {
                commentsList.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No comments yet. Be the first to comment!</p>'
                return
            }

            commentsList.innerHTML = comments.map(comment => `
                <div class="comment" data-id="${comment.id}">
                    <div class="comment-header">
                        <img src="${comment.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(comment.profiles?.name || 'User')}&background=FFD700&color=000&size=40`}" 
                             alt="${escapeHtml(comment.profiles?.name || 'User')}" 
                             class="comment-avatar">
                        <div class="comment-info">
                            <div class="comment-author">${escapeHtml(comment.profiles?.name || 'User')}</div>
                            <div class="comment-date">${new Date(comment.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    
                    ${currentUser ? `
                        <div class="comment-actions">
                            <button class="comment-action" onclick="showReplyForm('${comment.id}')">
                                <i>💬</i> Reply
                            </button>
                        </div>
                    ` : ''}

                    <div id="replyForm-${comment.id}" class="reply-form hidden">
                        <input type="text" id="replyInput-${comment.id}" placeholder="Write a reply...">
                        <div class="reply-form-actions">
                            <button class="reply-submit" onclick="submitReply('${comment.id}')">Reply</button>
                            <button class="reply-cancel" onclick="hideReplyForm('${comment.id}')">Cancel</button>
                        </div>
                    </div>

                    ${comment.replies?.length > 0 ? `
                        <div class="replies">
                            ${comment.replies.map(reply => `
                                <div class="reply">
                                    <div class="comment-header">
                                        <img src="${reply.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(reply.profiles?.name || 'User')}&background=00F0FF&color=000&size=30`}" 
                                             alt="${escapeHtml(reply.profiles?.name || 'User')}" 
                                             class="comment-avatar" style="width: 30px; height: 30px;">
                                        <div class="comment-info">
                                            <div class="comment-author">${escapeHtml(reply.profiles?.name || 'User')}</div>
                                            <div class="comment-date">${new Date(reply.created_at).toLocaleString()}</div>
                                        </div>
                                    </div>
                                    <div class="comment-content">${escapeHtml(reply.content)}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('')
        }

        // Handle comment
        async function handleComment() {
            const input = document.getElementById('commentInput')
            const content = input.value.trim()

            if (!content) {
                showAlert('Please enter a comment', 'error')
                return
            }

            try {
                const submitBtn = document.getElementById('submitCommentBtn')
                submitBtn.disabled = true
                submitBtn.innerHTML = '<i>⏳</i> Posting...'

                const { error } = await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }])

                if (error) throw error

                input.value = ''
                showAlert('Comment posted!', 'success')
                
                // Update comment count
                currentPost.comments_count++
                document.getElementById('commentCount').textContent = currentPost.comments_count
                
                await loadComments()

            } catch (error) {
                showAlert('Error posting comment: ' + error.message, 'error')
            } finally {
                const submitBtn = document.getElementById('submitCommentBtn')
                submitBtn.disabled = false
                submitBtn.innerHTML = '<i>📝</i> Post Comment'
            }
        }

        // Show reply form
        window.showReplyForm = (commentId) => {
            // Hide any other open reply forms
            document.querySelectorAll('.reply-form').forEach(form => form.classList.add('hidden'))
            
            const form = document.getElementById(`replyForm-${commentId}`)
            if (form) {
                form.classList.remove('hidden')
                document.getElementById(`replyInput-${commentId}`).focus()
            }
        }

        // Hide reply form
        window.hideReplyForm = (commentId) => {
            const form = document.getElementById(`replyForm-${commentId}`)
            if (form) {
                form.classList.add('hidden')
                document.getElementById(`replyInput-${commentId}`).value = ''
            }
        }

        // Submit reply
        window.submitReply = async (commentId) => {
            if (!currentUser) {
                showAlert('Please login to reply', 'error')
                return
            }

            const input = document.getElementById(`replyInput-${commentId}`)
            const content = input.value.trim()

            if (!content) {
                showAlert('Please enter a reply', 'error')
                return
            }

            try {
                const { error } = await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content,
                        parent_comment_id: commentId
                    }])

                if (error) throw error

                showAlert('Reply posted!', 'success')
                hideReplyForm(commentId)
                
                // Update comment count
                currentPost.comments_count++
                document.getElementById('commentCount').textContent = currentPost.comments_count
                
                await loadComments()

            } catch (error) {
                showAlert('Error posting reply: ' + error.message, 'error')
            }
        }

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut()
            window.location.reload()
        })

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Initialize
        async function init() {
            await checkAuth()
            await loadPost()
        }

        init()
    </script>
</body>
</html>
