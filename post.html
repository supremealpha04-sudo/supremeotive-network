<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Article</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
            transform: translateY(-3px);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .back-btn:hover {
            color: var(--gold);
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .post-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1.5rem;
            border: 2px solid var(--gold);
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 600;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-title {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            line-height: 1.3;
            position: relative;
            z-index: 1;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 16px;
            margin: 1.5rem 0;
            border: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
            white-space: pre-wrap;
        }

        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 2rem 0;
            padding: 1.5rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .action-btn {
            flex: 1;
            min-width: 120px;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .action-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-2px);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.saved {
            background: var(--electric-blue);
            color: var(--bg-color);
            border-color: var(--electric-blue);
        }

        .comments-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border-color);
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .comments-header h3 {
            color: var(--gold);
            font-size: 1.5rem;
        }

        .comment-count {
            color: var(--text-secondary);
            background: rgba(255, 215, 0, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--gold);
        }

        .comment-form {
            margin-bottom: 2rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form button {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            float: right;
            transition: all 0.3s ease;
        }

        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .comments-list {
            margin-top: 2rem;
        }

        .comment {
            background: var(--bg-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            line-height: 1.6;
            margin-left: 3rem;
        }

        .no-comments {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }

        .loading {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-container {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .error-icon {
            font-size: 4rem;
            color: var(--error);
            margin-bottom: 1rem;
        }

        .error-title {
            color: var(--error);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .post-title {
                font-size: 1.8rem;
            }

            .post-actions {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }

            .comment-form button {
                width: 100%;
                float: none;
            }

            .comment-content {
                margin-left: 0;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <img src="logo.png" alt="SupremeMotive" onerror="this.style.display='none'">
            <span>SupremeMotive</span>
        </div>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="support.html">Support</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            
            <div class="auth-buttons" id="authButtons">
                <span id="userGreeting" class="user-greeting hidden"></span>
                <a href="login.html" class="login-btn" id="loginBtn">Login</a>
                <button class="logout-btn hidden" id="logoutBtn">Logout</button>
            </div>
            
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
        <a href="post.html" class="nav-item active">
            <span class="nav-icon">📰</span>
            <span>Articles</span>
        </a>
    </nav>

    <main class="container">
        <button class="back-btn" onclick="goBack()">
            <span>←</span> Back to Articles
        </button>

        <div id="alertContainer"></div>
        <div id="postContainer"></div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        // USING supabaseClient AS REQUESTED
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // State
        let currentUser = null;
        let currentPost = null;
        let userLiked = false;
        let userSaved = false;

        // DOM Elements
        const postContainer = document.getElementById('postContainer');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        // Get post ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            postContainer.innerHTML = `
                <div class="error-container">
                    <div class="error-icon">❌</div>
                    <h2 class="error-title">No Post Selected</h2>
                    <p class="error-message">Please select an article to read.</p>
                    <button class="back-btn" onclick="window.location.href='post.html'" style="margin:0 auto; display:inline-block;">Browse Articles</button>
                </div>
            `;
        } else {
            // Initialize everything
            initTheme();
            checkAuth();
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // ============================================
        // MOBILE MENU
        // ============================================
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-dashboard.html';
                    }
                }
                
                // Load post after auth check
                await loadPost();
                
            } catch (error) {
                console.error('Auth error:', error);
                await loadPost();
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // GO BACK
        // ============================================
        window.goBack = () => {
            window.location.href = 'post.html';
        };

        // ============================================
        // LOAD POST
        // ============================================
        async function loadPost() {
            try {
                postContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading article...</p>
                    </div>
                `;

                // Fetch post with author info
                const { data: post, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (
                            id,
                            name,
                            email,
                            profile_image_url
                        )
                    `)
                    .eq('id', postId)
                    .single();

                if (error) throw error;
                if (!post) throw new Error('Post not found');

                currentPost = post;

                // Get like count
                const { count: likesCount } = await supabaseClient
                    .from('post_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Get comment count
                const { count: commentsCount } = await supabaseClient
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Check if user liked this post
                if (currentUser) {
                    const { data: like } = await supabaseClient
                        .from('post_likes')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    userLiked = !!like;

                    // Check if user saved this post
                    const { data: save } = await supabaseClient
                        .from('saved_posts')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    userSaved = !!save;
                }

                // Add counts to post object
                currentPost.likes_count = likesCount || 0;
                currentPost.comments_count = commentsCount || 0;
                currentPost.user_liked = userLiked;
                currentPost.user_saved = userSaved;

                renderPost();
                await loadComments();

            } catch (error) {
                console.error('Error loading post:', error);
                postContainer.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon">❌</div>
                        <h2 class="error-title">Error Loading Article</h2>
                        <p class="error-message">${error.message}</p>
                        <button class="back-btn" onclick="window.location.href='post.html'" style="margin:0 auto; display:inline-block;">Browse Articles</button>
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER POST
        // ============================================
        function renderPost() {
            const post = currentPost;
            const authorName = post.profiles?.name || 'SupremeMotive Admin';
            const authorInitial = authorName.charAt(0).toUpperCase();
            
            // Format date
            const postDate = new Date(post.created_at).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            postContainer.innerHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${authorInitial}</div>
                        <div class="post-info">
                            <div class="post-author">${authorName}</div>
                            <div class="post-date">${postDate}</div>
                        </div>
                    </div>

                    <h1 class="post-title">${escapeHtml(post.title)}</h1>

                    ${post.image_url ? `
                        <img src="${post.image_url}" alt="${escapeHtml(post.title)}" class="post-image">
                    ` : ''}

                    <div class="post-content">
                        ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                    </div>

                    <div class="post-stats">
                        <div class="stat-item">
                            <span>❤️</span>
                            <span class="stat-value" id="likesCount">${post.likes_count}</span>
                            <span>likes</span>
                        </div>
                        <div class="stat-item">
                            <span>💬</span>
                            <span class="stat-value" id="commentsCount">${post.comments_count}</span>
                            <span>comments</span>
                        </div>
                    </div>

                    <div class="post-actions">
                        <button class="action-btn ${post.user_liked ? 'liked' : ''}" id="likeBtn">
                            <span>❤️</span>
                            <span>${post.user_liked ? 'Liked' : 'Like'}</span>
                        </button>
                        <button class="action-btn ${post.user_saved ? 'saved' : ''}" id="saveBtn">
                            <span>🔖</span>
                            <span>${post.user_saved ? 'Saved' : 'Save'}</span>
                        </button>
                        <button class="action-btn" id="shareBtn">
                            <span>📤</span>
                            <span>Share</span>
                        </button>
                    </div>

                    <div class="comments-section">
                        <div class="comments-header">
                            <h3>Comments</h3>
                            <span class="comment-count" id="commentCount">${post.comments_count}</span>
                        </div>

                        ${currentUser ? `
                            <div class="comment-form">
                                <textarea id="commentInput" placeholder="Write a comment..."></textarea>
                                <button onclick="addComment()">Post Comment</button>
                            </div>
                        ` : `
                            <p style="color: var(--text-secondary); text-align: center; margin: 2rem;">
                                <a href="login.html" style="color: var(--gold);">Login</a> to join the discussion
                            </p>
                        `}

                        <div id="commentsList" class="comments-list">
                            <div class="loading">
                                <div class="spinner"></div>
                                <p>Loading comments...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Add event listeners
            document.getElementById('likeBtn').addEventListener('click', handleLike);
            document.getElementById('saveBtn').addEventListener('click', handleSave);
            document.getElementById('shareBtn').addEventListener('click', handleShare);
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // HANDLE LIKE
        // ============================================
        async function handleLike() {
            if (!currentUser) {
                if (confirm('Please login to like posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (userLiked) {
                    // Unlike
                    await supabaseClient
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);

                    userLiked = false;
                    currentPost.likes_count--;
                } else {
                    // Like
                    await supabaseClient
                        .from('post_likes')
                        .insert([{
                            post_id: postId,
                            user_id: currentUser.id
                        }]);

                    userLiked = true;
                    currentPost.likes_count++;
                }

                // Update UI
                document.getElementById('likesCount').textContent = currentPost.likes_count;
                const likeBtn = document.getElementById('likeBtn');
                
                if (userLiked) {
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = '<span>❤️</span><span>Liked</span>';
                } else {
                    likeBtn.classList.remove('liked');
                    likeBtn.innerHTML = '<span>❤️</span><span>Like</span>';
                }

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error updating like');
            }
        }

        // ============================================
        // HANDLE SAVE
        // ============================================
        async function handleSave() {
            if (!currentUser) {
                if (confirm('Please login to save posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (userSaved) {
                    // Unsave
                    await supabaseClient
                        .from('saved_posts')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);

                    userSaved = false;
                    showAlert('Post removed from saved');
                } else {
                    // Save
                    await supabaseClient
                        .from('saved_posts')
                        .insert([{
                            post_id: postId,
                            user_id: currentUser.id
                        }]);

                    userSaved = true;
                    showAlert('Post saved!');
                }

                // Update UI
                const saveBtn = document.getElementById('saveBtn');
                
                if (userSaved) {
                    saveBtn.classList.add('saved');
                    saveBtn.innerHTML = '<span>🔖</span><span>Saved</span>';
                } else {
                    saveBtn.classList.remove('saved');
                    saveBtn.innerHTML = '<span>🔖</span><span>Save</span>';
                }

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error saving post');
            }
        }

        // ============================================
        // HANDLE SHARE
        // ============================================
        async function handleShare() {
            const url = window.location.href;
            const title = currentPost.title;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'SupremeMotive',
                        text: title,
                        url: url
                    });
                } catch (err) {
                    copyToClipboard(url);
                }
            } else {
                copyToClipboard(url);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert('Link copied to clipboard!');
            }).catch(() => {
                showAlert('Could not copy link');
            });
        }

        // ============================================
        // LOAD COMMENTS
        // ============================================
        async function loadComments() {
            try {
                const { data: comments, error } = await supabaseClient
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (
                            id,
                            name,
                            profile_image_url
                        )
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                renderComments(comments || []);

            } catch (error) {
                console.error('Error loading comments:', error);
                const commentsList = document.getElementById('commentsList');
                if (commentsList) {
                    commentsList.innerHTML = '<p class="no-comments">Error loading comments</p>';
                }
            }
        }

        // ============================================
        // RENDER COMMENTS
        // ============================================
        function renderComments(comments) {
            const commentsList = document.getElementById('commentsList');
            if (!commentsList) return;

            if (comments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">No comments yet. Be the first to comment!</p>';
                return;
            }

            commentsList.innerHTML = comments.map(comment => {
                const commentDate = new Date(comment.created_at).toLocaleDateString();
                const authorName = comment.profiles?.name || 'User';
                const authorInitial = authorName.charAt(0).toUpperCase();

                return `
                    <div class="comment">
                        <div class="comment-header">
                            <div class="comment-avatar">${authorInitial}</div>
                            <span class="comment-author">${authorName}</span>
                            <span class="comment-date">${commentDate}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // ADD COMMENT
        // ============================================
        window.addComment = async () => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }

            const input = document.getElementById('commentInput');
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a comment');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }]);

                if (error) throw error;

                input.value = '';
                await loadComments();
                
                // Update comment count
                currentPost.comments_count++;
                document.getElementById('commentsCount').textContent = currentPost.comments_count;
                document.getElementById('commentCount').textContent = currentPost.comments_count;
                
                showAlert('Comment posted!');

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error posting comment');
            }
        };
    </script>
</body>
</html>
