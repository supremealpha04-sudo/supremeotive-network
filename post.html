<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Ebook Reader</title>
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --overlay: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary-black);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Modern Navbar */
        .navbar {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--light-gray);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        #logoutBtn {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #logoutBtn:hover {
            background: var(--error);
            color: white;
        }

        /* Main Container */
        .reader-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Ebook Header - Magazine Style */
        .ebook-header {
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--medium-gray) 100%);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .ebook-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ebook-cover-wrapper {
            position: relative;
            z-index: 1;
        }

        .ebook-cover {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid var(--gold);
            box-shadow: 0 20px 30px rgba(255, 215, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .ebook-cover:hover {
            transform: scale(1.05);
        }

        .ebook-info {
            flex: 1;
            z-index: 1;
        }

        .ebook-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .ebook-description {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            max-width: 600px;
        }

        .ebook-meta {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .meta-item i {
            color: var(--gold);
        }

        .back-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            white-space: nowrap;
            z-index: 1;
        }

        .back-btn:hover {
            background: var(--light-gray);
            transform: translateX(-5px);
        }

        /* PDF Viewer - Modern Design */
        .pdf-viewer {
            background: var(--dark-gray);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--light-gray);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* PDF Toolbar - Glass Effect */
        .pdf-toolbar {
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid var(--light-gray);
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--dark-gray);
            padding: 0.3rem;
            border-radius: 40px;
            border: 1px solid var(--light-gray);
        }

        .toolbar-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .toolbar-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--primary-black);
        }

        .toolbar-btn.active {
            background: var(--gold);
            color: var(--primary-black);
        }

        .toolbar-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-indicator {
            background: var(--medium-gray);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            border: 1px solid var(--light-gray);
        }

        .page-indicator span {
            color: var(--gold);
            font-weight: 600;
            margin: 0 0.2rem;
        }

        .zoom-level {
            background: var(--medium-gray);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: var(--gold);
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid var(--light-gray);
            min-width: 70px;
            text-align: center;
        }

        /* PDF Canvas Area - Clean Design */
        .pdf-canvas-container {
            background: var(--medium-gray);
            border-radius: 20px;
            padding: 2rem;
            min-height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: auto;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        #pdfCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s ease;
        }

        #pdfCanvas:hover {
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.2);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 10;
        }

        .loading-content {
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        /* Page Navigation Arrows */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: var(--dark-gray);
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .nav-arrow:hover {
            background: var(--gold);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-arrow.left {
            left: 20px;
        }

        .nav-arrow.right {
            right: 20px;
        }

        .nav-arrow i {
            font-size: 1.5rem;
            color: var(--gold);
            transition: color 0.3s ease;
        }

        .nav-arrow:hover i {
            color: var(--primary-black);
        }

        /* Thumbnail Strip */
        .thumbnail-strip {
            margin-top: 2rem;
            padding: 1rem;
            background: var(--dark-gray);
            border-radius: 20px;
            border: 1px solid var(--light-gray);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--dark-gray);
        }

        .thumbnail-strip::-webkit-scrollbar {
            height: 8px;
        }

        .thumbnail-strip::-webkit-scrollbar-track {
            background: var(--dark-gray);
            border-radius: 10px;
        }

        .thumbnail-strip::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .thumbnail-container {
            display: inline-flex;
            gap: 1rem;
            padding: 0.5rem;
        }

        .thumbnail {
            width: 80px;
            height: 110px;
            background: var(--medium-gray);
            border-radius: 8px;
            border: 2px solid var(--light-gray);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .thumbnail:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .thumbnail.active {
            border-color: var(--gold);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .thumbnail canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-number {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--gold);
            color: var(--primary-black);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Download Fallback */
        .download-fallback {
            text-align: center;
            padding: 3rem;
            background: var(--dark-gray);
            border-radius: 20px;
            border: 1px solid var(--light-gray);
        }

        .download-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .ebook-header {
                flex-direction: column;
                text-align: center;
            }

            .ebook-meta {
                justify-content: center;
            }

            .nav-arrow {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .reader-container {
                padding: 0 1rem;
            }

            .pdf-toolbar {
                flex-direction: column;
                border-radius: 20px;
            }

            .toolbar-group {
                width: 100%;
                justify-content: center;
            }

            .thumbnail-strip {
                display: none;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            <button id="logoutBtn" style="display: none;">Logout</button>
            <a href="login.html" id="loginLink">Login</a>
        </div>
    </nav>

    <main class="reader-container">
        <div id="alertContainer"></div>
        
        <div id="readerContent">
            <div class="loading-overlay">
                <div class="loading-content">
                    <div class="spinner"></div>
                    <p>Loading your ebook...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js'

        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        let currentUser = null
        let currentEbook = null
        let pdfDoc = null
        let currentPage = 1
        let totalPages = 1
        let currentScale = 1.2
        let pageRendering = false
        let thumbnails = []

        // Get ebook ID from URL
        const urlParams = new URLSearchParams(window.location.search)
        const ebookId = urlParams.get('id')

        if (!ebookId) {
            window.location.href = 'ebooks.html'
        }

        // DOM Elements
        const readerContent = document.getElementById('readerContent')
        const alertContainer = document.getElementById('alertContainer')
        const logoutBtn = document.getElementById('logoutBtn')
        const loginLink = document.getElementById('loginLink')
        const adminLink = document.getElementById('adminLink')

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i>${type === 'success' ? '✅' : '❌'}</i>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check auth status
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user

            if (user) {
                logoutBtn.style.display = 'block'
                loginLink.style.display = 'none'
                
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block'
                    adminLink.href = 'admin/admin-dashboard.html'
                }
            } else {
                logoutBtn.style.display = 'none'
                loginLink.style.display = 'block'
                adminLink.style.display = 'none'
            }
        }

        // Check if ebook is unlocked
        async function checkUnlock(ebookId, userId) {
            if (!userId) return false

            try {
                const { data, error } = await supabase
                    .from('unlocks')
                    .select('*')
                    .eq('ebook_id', ebookId)
                    .eq('user_id', userId)
                    .eq('status', 'approved')
                    .maybeSingle()

                if (error) throw error
                return !!data
            } catch (error) {
                console.error('Error checking unlock:', error)
                return false
            }
        }

        // Load ebook
        async function loadEbook() {
            try {
                // Fetch ebook details
                const { data: ebook, error } = await supabase
                    .from('ebooks')
                    .select('*')
                    .eq('id', ebookId)
                    .single()

                if (error) throw error
                if (!ebook) throw new Error('Ebook not found')

                currentEbook = ebook

                // Check if user has access
                let hasAccess = !ebook.is_paid
                
                if (ebook.is_paid && currentUser) {
                    hasAccess = await checkUnlock(ebookId, currentUser.id)
                }

                if (!hasAccess) {
                    showAlert('This ebook is locked. Please unlock it first.', 'error')
                    setTimeout(() => {
                        window.location.href = 'ebooks.html'
                    }, 2000)
                    return
                }

                renderReader(ebook)
                loadPDF(ebook.pdf_url)

            } catch (error) {
                readerContent.innerHTML = `
                    <div class="alert alert-error">
                        <i>❌</i>
                        <span>Error loading ebook: ${error.message}</span>
                    </div>
                `
            }
        }

        // Render reader interface
        function renderReader(ebook) {
            const date = new Date().toLocaleDateString()
            
            readerContent.innerHTML = `
                <!-- Ebook Header -->
                <div class="ebook-header">
                    <div class="ebook-cover-wrapper">
                        <img src="${ebook.cover_url}" alt="${escapeHtml(ebook.title)}" class="ebook-cover"
                             onerror="this.src='https://via.placeholder.com/120x160?text=No+Cover'">
                    </div>
                    
                    <div class="ebook-info">
                        <h1 class="ebook-title">${escapeHtml(ebook.title)}</h1>
                        <p class="ebook-description">${escapeHtml(ebook.description)}</p>
                        
                        <div class="ebook-meta">
                            <div class="meta-item">
                                <i>📅</i>
                                <span>Added ${new Date(ebook.created_at).toLocaleDateString()}</span>
                            </div>
                            <div class="meta-item">
                                <i>📄</i>
                                <span>PDF Ebook</span>
                            </div>
                            <div class="meta-item">
                                <i>🔖</i>
                                <span>${ebook.is_paid ? 'Paid' : 'Free'}</span>
                            </div>
                        </div>
                    </div>

                    <a href="ebooks.html" class="back-btn">
                        <i>←</i>
                        Back to Library
                    </a>
                </div>

                <!-- PDF Viewer -->
                <div class="pdf-viewer">
                    <!-- Toolbar -->
                    <div class="pdf-toolbar">
                        <div class="toolbar-group">
                            <button class="toolbar-btn" id="prevPageBtn" disabled>
                                <i>←</i>
                                Prev
                            </button>
                            <span class="page-indicator">
                                Page <span id="currentPageDisplay">1</span> / <span id="totalPagesDisplay">1</span>
                            </span>
                            <button class="toolbar-btn" id="nextPageBtn" disabled>
                                Next
                                <i>→</i>
                            </button>
                        </div>
                        
                        <div class="toolbar-group">
                            <button class="toolbar-btn" id="zoomOutBtn">
                                <i>−</i>
                                Zoom Out
                            </button>
                            <span class="zoom-level" id="zoomLevel">120%</span>
                            <button class="toolbar-btn" id="zoomInBtn">
                                Zoom In
                                <i>+</i>
                            </button>
                        </div>
                        
                        <div class="toolbar-group">
                            <button class="toolbar-btn" id="fitWidthBtn">
                                <i>⤢</i>
                                Fit Width
                            </button>
                            <button class="toolbar-btn" id="fitPageBtn">
                                <i>📄</i>
                                Fit Page
                            </button>
                        </div>
                    </div>

                    <!-- PDF Canvas -->
                    <div class="pdf-canvas-container" id="pdfCanvasContainer">
                        <div class="loading-overlay" id="pageLoadingOverlay">
                            <div class="loading-content">
                                <div class="spinner"></div>
                                <p>Loading page...</p>
                            </div>
                        </div>
                        <canvas id="pdfCanvas"></canvas>
                    </div>

                    <!-- Navigation Arrows -->
                    <div class="nav-arrow left" id="leftArrow">
                        <i>←</i>
                    </div>
                    <div class="nav-arrow right" id="rightArrow">
                        <i>→</i>
                    </div>

                    <!-- Thumbnail Strip -->
                    <div class="thumbnail-strip" id="thumbnailStrip">
                        <div class="thumbnail-container" id="thumbnailContainer">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- Download Fallback -->
                <div id="downloadFallback" class="hidden">
                    <div class="download-fallback">
                        <h3 style="color: var(--gold); margin-bottom: 1rem;">PDF Viewer Unavailable</h3>
                        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Your browser may not support embedded PDF viewing. You can download the PDF instead.</p>
                        <a href="${ebook.pdf_url}" download class="download-btn">
                            <i>📥</i>
                            Download PDF
                        </a>
                    </div>
                </div>
            `

            // Hide loading overlay initially
            document.getElementById('pageLoadingOverlay').classList.add('hidden')
        }

        // Load PDF using PDF.js
        async function loadPDF(pdfUrl) {
            try {
                // Add timestamp to bypass cache
                const urlWithTimestamp = `${pdfUrl}?t=${Date.now()}`
                
                // Load the PDF document
                pdfDoc = await pdfjsLib.getDocument(urlWithTimestamp).promise
                
                totalPages = pdfDoc.numPages
                document.getElementById('totalPagesDisplay').textContent = totalPages
                
                // Enable buttons
                updateButtons()
                
                // Render first page
                await renderPage(currentPage)
                
                // Generate thumbnails
                await generateThumbnails()

                // Add event listeners
                document.getElementById('prevPageBtn').addEventListener('click', () => navigatePage(-1))
                document.getElementById('nextPageBtn').addEventListener('click', () => navigatePage(1))
                document.getElementById('leftArrow').addEventListener('click', () => navigatePage(-1))
                document.getElementById('rightArrow').addEventListener('click', () => navigatePage(1))

                document.getElementById('zoomInBtn').addEventListener('click', () => {
                    currentScale += 0.2
                    if (currentScale > 3) currentScale = 3
                    document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
                    renderPage(currentPage)
                })

                document.getElementById('zoomOutBtn').addEventListener('click', () => {
                    currentScale -= 0.2
                    if (currentScale < 0.5) currentScale = 0.5
                    document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
                    renderPage(currentPage)
                })

                document.getElementById('fitWidthBtn').addEventListener('click', fitToWidth)
                document.getElementById('fitPageBtn').addEventListener('click', fitToPage)

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') navigatePage(-1)
                    if (e.key === 'ArrowRight') navigatePage(1)
                })

            } catch (error) {
                console.error('Error loading PDF:', error)
                showAlert('Error loading PDF. You can download it instead.', 'error')
                
                // Show download fallback
                document.querySelector('.pdf-viewer').classList.add('hidden')
                document.getElementById('downloadFallback').classList.remove('hidden')
            }
        }

        // Navigate pages
        function navigatePage(direction) {
            const newPage = currentPage + direction
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage
                renderPage(currentPage)
            }
        }

        // Render a specific page
        async function renderPage(pageNum) {
            if (pageRendering) return
            pageRendering = true

            const loadingOverlay = document.getElementById('pageLoadingOverlay')
            loadingOverlay.classList.remove('hidden')

            try {
                const page = await pdfDoc.getPage(pageNum)
                
                const viewport = page.getViewport({ scale: currentScale })
                
                const canvas = document.getElementById('pdfCanvas')
                const context = canvas.getContext('2d')
                
                canvas.height = viewport.height
                canvas.width = viewport.width

                // Render the page
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                }

                await page.render(renderContext).promise
                
                // Update page display
                document.getElementById('currentPageDisplay').textContent = pageNum
                
                // Update active thumbnail
                document.querySelectorAll('.thumbnail').forEach((thumb, index) => {
                    if (index + 1 === pageNum) {
                        thumb.classList.add('active')
                        thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' })
                    } else {
                        thumb.classList.remove('active')
                    }
                })

                updateButtons()

            } catch (error) {
                console.error('Error rendering page:', error)
            } finally {
                pageRendering = false
                loadingOverlay.classList.add('hidden')
            }
        }

        // Generate thumbnails
        async function generateThumbnails() {
            const container = document.getElementById('thumbnailContainer')
            container.innerHTML = ''

            for (let i = 1; i <= totalPages; i++) {
                const page = await pdfDoc.getPage(i)
                const viewport = page.getViewport({ scale: 0.2 })
                
                const canvas = document.createElement('canvas')
                canvas.width = viewport.width
                canvas.height = viewport.height
                
                const context = canvas.getContext('2d')
                
                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise

                const thumbnail = document.createElement('div')
                thumbnail.className = `thumbnail ${i === currentPage ? 'active' : ''}`
                thumbnail.onclick = () => {
                    currentPage = i
                    renderPage(currentPage)
                }
                
                thumbnail.appendChild(canvas)
                
                const numberSpan = document.createElement('span')
                numberSpan.className = 'thumbnail-number'
                numberSpan.textContent = i
                thumbnail.appendChild(numberSpan)
                
                container.appendChild(thumbnail)
            }
        }

        // Fit to width
        async function fitToWidth() {
            const container = document.getElementById('pdfCanvasContainer')
            const containerWidth = container.clientWidth - 40
            
            const page = await pdfDoc.getPage(currentPage)
            const viewport = page.getViewport({ scale: 1.0 })
            
            currentScale = containerWidth / viewport.width
            document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
            renderPage(currentPage)
        }

        // Fit to page
        async function fitToPage() {
            const container = document.getElementById('pdfCanvasContainer')
            const containerWidth = container.clientWidth - 40
            const containerHeight = container.clientHeight - 40
            
            const page = await pdfDoc.getPage(currentPage)
            const viewport = page.getViewport({ scale: 1.0 })
            
            const scaleWidth = containerWidth / viewport.width
            const scaleHeight = containerHeight / viewport.height
            currentScale = Math.min(scaleWidth, scaleHeight)
            
            document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%'
            renderPage(currentPage)
        }

        // Update button states
        function updateButtons() {
            const prevBtn = document.getElementById('prevPageBtn')
            const nextBtn = document.getElementById('nextPageBtn')
            const leftArrow = document.getElementById('leftArrow')
            const rightArrow = document.getElementById('rightArrow')
            
            const isFirst = currentPage <= 1
            const isLast = currentPage >= totalPages
            
            prevBtn.disabled = isFirst
            nextBtn.disabled = isLast
            leftArrow.style.opacity = isFirst ? '0.3' : '1'
            rightArrow.style.opacity = isLast ? '0.3' : '1'
            leftArrow.style.pointerEvents = isFirst ? 'none' : 'auto'
            rightArrow.style.pointerEvents = isLast ? 'none' : 'auto'
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut()
            window.location.reload()
        })

        // Handle window resize
        window.addEventListener('resize', () => {
            if (pdfDoc && currentPage) {
                renderPage(currentPage)
            }
        })

        // Initialize
        async function init() {
            await checkAuth()
            await loadEbook()
        }

        init()
    </script>
</body>
</html>
