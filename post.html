<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Articles</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .back-btn:hover {
            color: var(--gold);
        }

        /* Post Card */
        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .post-title {
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1rem 0;
        }

        /* Content with Read More */
        .post-content-wrapper {
            position: relative;
            margin: 1rem 0;
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            transition: max-height 0.3s ease;
        }

        .post-content.collapsed {
            max-height: 200px;
            overflow: hidden;
            position: relative;
        }

        .post-content.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, var(--card-bg));
            pointer-events: none;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 0.5rem;
            padding: 0.3rem 0;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .read-more-btn:hover {
            color: var(--gold);
        }

        /* Post Stats */
        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .stat-btn:hover {
            color: var(--gold);
        }

        .stat-btn.liked {
            color: var(--gold);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 1.5rem;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .comments-header h3 {
            color: var(--gold);
            font-size: 1.1rem;
        }

        .comment-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .comment-form {
            margin-bottom: 1.5rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            resize: vertical;
            min-height: 80px;
            margin-bottom: 0.8rem;
            font-family: inherit;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form button {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .comments-list {
            margin-top: 1rem;
        }

        /* Main Comment */
        .comment {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            margin-left: 2.8rem;
            line-height: 1.5;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .comment-actions {
            margin-left: 2.8rem;
            display: flex;
            gap: 1rem;
        }

        .reply-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .reply-btn:hover {
            color: var(--gold);
        }

        /* Reply Form */
        .reply-form {
            margin-top: 0.8rem;
            margin-left: 2.8rem;
            display: flex;
            gap: 0.5rem;
        }

        .reply-form input {
            flex: 1;
            padding: 0.6rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 0.85rem;
        }

        .reply-form button {
            background: var(--electric-blue);
            color: var(--bg-color);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .reply-form button:hover {
            background: var(--gold);
        }

        /* Reply Comment */
        .reply {
            margin-left: 3rem;
            margin-top: 0.8rem;
            padding-left: 1rem;
            border-left: 2px solid var(--gold);
        }

        .reply .comment-header {
            margin-bottom: 0.3rem;
        }

        .reply .comment-avatar {
            width: 28px;
            height: 28px;
            font-size: 0.8rem;
        }

        .reply .comment-content {
            margin-left: 2.5rem;
            font-size: 0.85rem;
        }

        .no-comments {
            text-align: center;
            color: var(--text-secondary);
            padding: 1.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .post-title {
                font-size: 1.4rem;
            }

            .post-stats {
                justify-content: space-around;
            }

            .reply {
                margin-left: 1rem;
            }

            .reply-form {
                margin-left: 1rem;
                flex-direction: column;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">

            <span></span>
            <span></span>
            <span></span>
        </div>

            <a href="index.html">Home</a>

        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>

    <main class="container">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <span>←</span> Back to Home
        </button>

        <div id="alertContainer"></div>
        <div id="postContainer"></div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // State
        let currentUser = null;
        let currentPost = null;
        let userLiked = false;
        let userSaved = false;

        // DOM Elements
        const postContainer = document.getElementById('postContainer');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        // Get post ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            postContainer.innerHTML = `
                <div class="loading">
                    <p>No post selected. <a href="index.html" style="color: var(--gold);">Go back home</a></p>
                </div>
            `;
        } else {
            checkAuth();
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // ============================================
        // MOBILE MENU
        // ============================================
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-dashboard.html';
                    }
                }
                
                await loadPost();
                
            } catch (error) {
                console.error('Auth error:', error);
                await loadPost();
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // LOAD POST
        // ============================================
        async function loadPost() {
            try {
                postContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading article...</p>
                    </div>
                `;

                // Fetch post with author info
                const { data: post, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (name)
                    `)
                    .eq('id', postId)
                    .single();

                if (error) throw error;
                if (!post) throw new Error('Post not found');

                currentPost = post;

                // Get like count
                const { count: likesCount } = await supabaseClient
                    .from('post_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Get comment count
                const { count: commentsCount } = await supabaseClient
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId);

                // Check if user liked
                if (currentUser) {
                    const { data: like } = await supabaseClient
                        .from('post_likes')
                        .select('*')
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    userLiked = !!like;
                }

                renderPost(post, likesCount || 0, commentsCount || 0);
                await loadComments();

            } catch (error) {
                console.error('Error:', error);
                postContainer.innerHTML = `
                    <div class="loading">
                        <p>Error: ${error.message}</p>
                        <button class="back-btn" onclick="window.location.href='index.html'" style="margin-top: 1rem;">Go Home</button>
                    </div>
                `;
            }
        }

        // ============================================
        // TOGGLE READ MORE
        // ============================================
        window.toggleReadMore = () => {
            const contentDiv = document.getElementById('postContent');
            const btn = document.getElementById('readMoreBtn');
            
            if (contentDiv.classList.contains('collapsed')) {
                contentDiv.classList.remove('collapsed');
                btn.innerHTML = '<span>Show Less</span> <span>▲</span>';
                // Scroll to content
                contentDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                contentDiv.classList.add('collapsed');
                btn.innerHTML = '<span>Read More</span> <span>▼</span>';
                // Scroll to top of post
                document.querySelector('.post-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ============================================
        // RENDER POST
        // ============================================
        function renderPost(post, likesCount, commentsCount) {
            const date = new Date(post.created_at).toLocaleDateString();
            const authorName = post.profiles?.name || 'Admin';
            const authorInitial = authorName.charAt(0).toUpperCase();
            
            // Check if content needs read more (if content has more than 500 characters)
            const needsReadMore = post.content.length > 500;
            const collapsedClass = needsReadMore ? 'collapsed' : '';

            postContainer.innerHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${authorInitial}</div>
                        <div class="post-info">
                            <div class="post-author">${authorName}</div>
                            <div class="post-date">${date}</div>
                        </div>
                    </div>

                    <h1 class="post-title">${escapeHtml(post.title)}</h1>
                    
                    ${post.image_url ? `
                        <img src="${post.image_url}" class="post-image" onerror="this.style.display='none'">
                    ` : ''}
                    
                    <div class="post-content-wrapper">
                        <div id="postContent" class="post-content ${collapsedClass}">
                            ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                        </div>
                        ${needsReadMore ? `
                            <button class="read-more-btn" id="readMoreBtn" onclick="toggleReadMore()">
                                <span>Read More</span> <span>▼</span>
                            </button>
                        ` : ''}
                    </div>

                    <div class="post-stats">
                        <button class="stat-btn ${userLiked ? 'liked' : ''}" id="likeBtn">
                            <span>❤️</span>
                            <span>${likesCount}</span>
                        </button>
                        <button class="stat-btn" id="commentToggleBtn">
                            <span>💬</span>
                            <span>${commentsCount}</span>
                        </button>
                    </div>

                    <div class="comments-section" id="commentsSection">
                        <div class="comments-header">
                            <h3>Comments</h3>
                            <span class="comment-count" id="commentCount">${commentsCount}</span>
                        </div>

                        ${currentUser ? `
                            <div class="comment-form">
                                <textarea id="commentInput" placeholder="Write a comment..."></textarea>
                                <button onclick="addComment()">Post Comment</button>
                            </div>
                        ` : `
                            <p style="color: var(--text-secondary); text-align: center; padding: 1rem;">
                                <a href="login.html" style="color: var(--gold);">Login</a> to join the discussion
                            </p>
                        `}

                        <div id="commentsList" class="comments-list">
                            <div class="loading">
                                <div class="spinner"></div>
                                <p>Loading comments...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('likeBtn').addEventListener('click', handleLike);
            document.getElementById('commentToggleBtn').addEventListener('click', () => {
                const section = document.getElementById('commentsSection');
                section.classList.toggle('hidden');
            });
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // HANDLE LIKE - WORKING
        // ============================================
        async function handleLike() {
            if (!currentUser) {
                if (confirm('Please login to like posts')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                if (userLiked) {
                    // Unlike
                    await supabaseClient
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);
                    userLiked = false;
                    currentPost.likes_count--;
                } else {
                    // Like
                    await supabaseClient
                        .from('post_likes')
                        .insert([{
                            post_id: postId,
                            user_id: currentUser.id
                        }]);
                    userLiked = true;
                    currentPost.likes_count++;
                }

                // Update UI
                document.getElementById('likeBtn').innerHTML = `<span>❤️</span><span>${currentPost.likes_count}</span>`;
                document.getElementById('likeBtn').classList.toggle('liked', userLiked);

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error updating like');
            }
        }

        // ============================================
        // LOAD COMMENTS
        // ============================================
        async function loadComments() {
            try {
                const { data: comments, error } = await supabaseClient
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (name)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                // Get replies for each comment
                const commentsWithReplies = await Promise.all((comments || []).map(async (comment) => {
                    const { data: replies } = await supabaseClient
                        .from('comments')
                        .select(`
                            *,
                            profiles:user_id (name)
                        `)
                        .eq('parent_comment_id', comment.id)
                        .order('created_at', { ascending: true });

                    return {
                        ...comment,
                        replies: replies || []
                    };
                }));

                renderComments(commentsWithReplies);

            } catch (error) {
                console.error('Error loading comments:', error);
                const commentsList = document.getElementById('commentsList');
                if (commentsList) {
                    commentsList.innerHTML = '<p class="no-comments">Error loading comments</p>';
                }
            }
        }

        // ============================================
        // RENDER COMMENTS
        // ============================================
        function renderComments(comments) {
            const commentsList = document.getElementById('commentsList');
            if (!commentsList) return;

            if (comments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">No comments yet. Be the first to comment!</p>';
                return;
            }

            commentsList.innerHTML = comments.map(comment => {
                const commentDate = new Date(comment.created_at).toLocaleString();
                const authorName = comment.profiles?.name || 'User';
                const authorInitial = authorName.charAt(0).toUpperCase();

                return `
                    <div class="comment" data-comment-id="${comment.id}">
                        <div class="comment-header">
                            <div class="comment-avatar">${authorInitial}</div>
                            <span class="comment-author">${escapeHtml(authorName)}</span>
                            <span class="comment-date">${commentDate}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                        
                        ${currentUser ? `
                            <div class="comment-actions">
                                <button class="reply-btn" onclick="showReplyForm('${comment.id}')">💬 Reply</button>
                            </div>
                            <div id="replyForm-${comment.id}" class="reply-form hidden">
                                <input type="text" id="replyInput-${comment.id}" placeholder="Write a reply...">
                                <button onclick="submitReply('${comment.id}')">Reply</button>
                            </div>
                        ` : ''}
                        
                        ${comment.replies && comment.replies.length > 0 ? `
                            <div class="replies">
                                ${comment.replies.map(reply => {
                                    const replyDate = new Date(reply.created_at).toLocaleString();
                                    const replyAuthor = reply.profiles?.name || 'User';
                                    const replyInitial = replyAuthor.charAt(0).toUpperCase();
                                    return `
                                        <div class="reply">
                                            <div class="comment-header">
                                                <div class="comment-avatar" style="width: 28px; height: 28px; font-size: 0.8rem;">${replyInitial}</div>
                                                <span class="comment-author" style="font-size: 0.85rem;">${escapeHtml(replyAuthor)}</span>
                                                <span class="comment-date">${replyDate}</span>
                                            </div>
                                            <div class="comment-content">${escapeHtml(reply.content)}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // ADD COMMENT
        // ============================================
        window.addComment = async () => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }

            const input = document.getElementById('commentInput');
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a comment');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }]);

                if (error) throw error;

                input.value = '';
                await loadComments();
                
                // Update comment count
                currentPost.comments_count++;
                document.getElementById('commentCount').textContent = currentPost.comments_count;
                document.getElementById('commentToggleBtn').innerHTML = `<span>💬</span><span>${currentPost.comments_count}</span>`;
                
                showAlert('Comment posted!');

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error posting comment');
            }
        };

        // ============================================
        // SHOW REPLY FORM
        // ============================================
        window.showReplyForm = (commentId) => {
            const form = document.getElementById(`replyForm-${commentId}`);
            if (form) {
                form.classList.toggle('hidden');
                if (!form.classList.contains('hidden')) {
                    document.getElementById(`replyInput-${commentId}`).focus();
                }
            }
        };

        // ============================================
        // SUBMIT REPLY
        // ============================================
        window.submitReply = async (commentId) => {
            if (!currentUser) {
                showAlert('Please login to reply');
                return;
            }

            const input = document.getElementById(`replyInput-${commentId}`);
            const content = input.value.trim();

            if (!content) {
                showAlert('Please enter a reply');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content,
                        parent_comment_id: commentId
                    }]);

                if (error) throw error;

                input.value = '';
                document.getElementById(`replyForm-${commentId}`).classList.add('hidden');
                await loadComments();
                
                // Update comment count
                currentPost.comments_count++;
                document.getElementById('commentCount').textContent = currentPost.comments_count;
                document.getElementById('commentToggleBtn').innerHTML = `<span>💬</span><span>${currentPost.comments_count}</span>`;
                
                showAlert('Reply posted!');

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error posting reply');
            }
        };
    </script>
</body>
</html>
