<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Articles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Search */
        .search-container {
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Posts Grid */
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Post Card */
        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .post-card::after {
            content: 'SUPREME MOTIVE';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.15);
            transform: rotate(-5deg);
            pointer-events: none;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1rem;
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .post-image {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .post-excerpt {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .post-stats {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0;
            padding: 0.8rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .stat-btn:hover {
            color: var(--gold);
        }

        .read-more-link {
            display: inline-block;
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 600;
            margin-top: 0.5rem;
            transition: color 0.3s ease;
        }

        .read-more-link:hover {
            color: var(--gold);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 3rem;
            color: #F44336;
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .post-title {
                font-size: 1.1rem;
            }

            .post-stats {
                justify-content: space-around;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">SupremeMotive</div>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="support.html">Support</a>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
        <a href="post.html" class="nav-item active">
            <span class="nav-icon">📰</span>
            <span>Articles</span>
        </a>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">📰 All Articles</h1>
            <p class="page-subtitle">Discover inspiring stories and motivational content</p>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <span>📊</span>
                <span>Total: <span id="totalArticles" class="stat-value">0</span></span>
            </div>
            <div class="stat-item">
                <span>❤️</span>
                <span>Likes: <span id="totalLikes" class="stat-value">0</span></span>
            </div>
            <div class="stat-item">
                <span>💬</span>
                <span>Comments: <span id="totalComments" class="stat-value">0</span></span>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search articles...">
        </div>

        <div id="postsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading articles...</p>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State
        let allPosts = [];
        let searchTerm = '';
        let userLikes = new Set();

        // DOM Elements
        const postsContainer = document.getElementById('postsContainer');
        const searchInput = document.getElementById('searchInput');
        const totalArticlesSpan = document.getElementById('totalArticles');
        const totalLikesSpan = document.getElementById('totalLikes');
        const totalCommentsSpan = document.getElementById('totalComments');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        // Mobile menu
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // LOAD POSTS
        // ============================================
        async function loadPosts() {
            try {
                postsContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading articles...</p>
                    </div>
                `;

                // Fetch all posts with author info
                const { data: posts, error } = await supabaseClient
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (name)
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = `
                        <div class="empty">
                            <p>No articles yet. Check back soon!</p>
                        </div>
                    `;
                    return;
                }

                // Get stats for each post
                const postsWithStats = await Promise.all(posts.map(async (post) => {
                    const { count: likesCount } = await supabaseClient
                        .from('post_likes')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    const { count: commentsCount } = await supabaseClient
                        .from('comments')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    return {
                        ...post,
                        likes_count: likesCount || 0,
                        comments_count: commentsCount || 0
                    };
                }));

                allPosts = postsWithStats;
                updateStats();
                renderPosts();

            } catch (error) {
                console.error('Error loading posts:', error);
                postsContainer.innerHTML = `
                    <div class="error">
                        ❌ Error loading articles: ${error.message}
                    </div>
                `;
            }
        }

        // ============================================
        // UPDATE STATISTICS
        // ============================================
        function updateStats() {
            const total = allPosts.length;
            const totalLikes = allPosts.reduce((sum, p) => sum + p.likes_count, 0);
            const totalComments = allPosts.reduce((sum, p) => sum + p.comments_count, 0);

            totalArticlesSpan.textContent = total;
            totalLikesSpan.textContent = totalLikes;
            totalCommentsSpan.textContent = totalComments;
        }

        // ============================================
        // RENDER POSTS
        // ============================================
        function renderPosts() {
            let filteredPosts = [...allPosts];

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredPosts = filteredPosts.filter(p => 
                    p.title.toLowerCase().includes(term) ||
                    p.content.toLowerCase().includes(term)
                );
            }

            if (filteredPosts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="empty">
                        <p>No articles match your search.</p>
                    </div>
                `;
                return;
            }

            postsContainer.innerHTML = `
                <div class="posts-grid">
                    ${filteredPosts.map(post => {
                        const date = new Date(post.created_at).toLocaleDateString();
                        const authorName = post.profiles?.name || 'Admin';
                        const authorInitial = authorName.charAt(0).toUpperCase();
                        const excerpt = post.content.substring(0, 200) + (post.content.length > 200 ? '...' : '');

                        return `
                            <div class="post-card" data-post-id="${post.id}">
                                <div class="post-header">
                                    <div class="post-avatar">${authorInitial}</div>
                                    <div class="post-info">
                                        <div class="post-author">${escapeHtml(authorName)}</div>
                                        <div class="post-date">${date}</div>
                                    </div>
                                </div>

                                <h2 class="post-title">${escapeHtml(post.title)}</h2>

                                ${post.image_url ? `
                                    <img src="${post.image_url}" class="post-image" onerror="this.style.display='none'">
                                ` : ''}

                                <div class="post-excerpt">
                                    ${escapeHtml(excerpt).replace(/\n/g, '<br>')}
                                </div>

                                <div class="post-stats">
                                    <button class="stat-btn like-btn" onclick="viewPost('${post.id}')">
                                        <span>❤️</span>
                                        <span>${post.likes_count}</span>
                                    </button>
                                    <button class="stat-btn" onclick="viewPost('${post.id}')">
                                        <span>💬</span>
                                        <span>${post.comments_count}</span>
                                    </button>
                                </div>

                                <a href="javascript:void(0)" onclick="viewPost('${post.id}')" class="read-more-link">
                                    Read Full Article →
                                </a>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // ============================================
        // VIEW POST
        // ============================================
        window.viewPost = (postId) => {
            window.location.href = `single-post.html?id=${postId}`;
        };

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // SEARCH
        // ============================================
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderPosts();
        });

        // ============================================
        // INITIALIZE
        // ============================================
        loadPosts();
    </script>
</body>
</html>
