<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Verify Email</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* Main Content */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Verification Card */
        .verify-card {
            background: var(--dark-gray);
            border-radius: 30px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--light-gray);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .verify-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Status Icons */
        .status-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            z-index: 1;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            80% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .icon-pending {
            background: rgba(255, 193, 7, 0.2);
            border: 3px solid var(--warning);
            color: var(--warning);
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.3);
        }

        .icon-success {
            background: rgba(76, 175, 80, 0.2);
            border: 3px solid var(--success);
            color: var(--success);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }

        .icon-error {
            background: rgba(244, 67, 54, 0.2);
            border: 3px solid var(--error);
            color: var(--error);
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.3);
        }

        .icon-email {
            background: rgba(0, 240, 255, 0.2);
            border: 3px solid var(--electric-blue);
            color: var(--electric-blue);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        /* Content */
        .verify-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .verify-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .verify-message {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .user-email {
            background: var(--medium-gray);
            padding: 1rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            border: 1px solid var(--light-gray);
            font-size: 1.2rem;
            color: var(--gold);
            word-break: break-all;
        }

        /* Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin: 2rem 0;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--light-gray);
            transform: translateY(-50%);
            z-index: 0;
        }

        .step {
            background: var(--dark-gray);
            border: 2px solid var(--light-gray);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .step.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .step.active {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .step-label {
            position: absolute;
            top: 45px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            margin: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
        }

        .btn-secondary:hover {
            background: var(--light-gray);
            transform: translateY(-3px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        /* Resend Section */
        .resend-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--light-gray);
        }

        .resend-timer {
            color: var(--electric-blue);
            font-weight: 600;
            font-size: 1.2rem;
            margin: 1rem 0;
        }

        .resend-btn {
            background: none;
            border: 2px solid var(--electric-blue);
            color: var(--electric-blue);
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .resend-btn:hover:not(:disabled) {
            background: var(--electric-blue);
            color: var(--primary-black);
        }

        .resend-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .verify-card {
                padding: 2rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }

            .step-label {
                font-size: 0.7rem;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="verify-card" id="verifyCard">
            <div class="verify-content" id="verifyContent">
                <!-- Content will be dynamically populated -->
                <div class="spinner"></div>
                <p style="color: var(--text-secondary); margin-top: 1rem;">Verifying your email...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize Supabase
        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        // State
        let verificationStatus = 'pending'
        let userEmail = null
        let resendTimer = 60
        let timerInterval = null

        // DOM Elements
        const verifyContent = document.getElementById('verifyContent')

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search)
        const token = urlParams.get('token')
        const type = urlParams.get('type')
        const email = urlParams.get('email')

        // Initialize based on URL parameters
        async function init() {
            // Check if this is an email verification link from Supabase
            if (token && type === 'signup') {
                await handleEmailVerification(token)
            } 
            // Check if this is just a general verification page
            else if (email) {
                userEmail = decodeURIComponent(email)
                showPendingVerification()
            }
            // No parameters - show general verification info
            else {
                showGeneralInfo()
            }
        }

        // Handle email verification with token
        async function handleEmailVerification(token) {
            try {
                showLoading('Verifying your email...')

                const { error } = await supabase.auth.verifyOtp({
                    token_hash: token,
                    type: 'signup'
                })

                if (error) throw error

                showSuccess()
                
                // Start redirect countdown
                startRedirectCountdown()

            } catch (error) {
                console.error('Verification error:', error)
                showError(error.message)
            }
        }

        // Show pending verification
        function showPendingVerification() {
            verificationStatus = 'pending'
            
            verifyContent.innerHTML = `
                <div class="status-icon icon-email">
                    <span>✉️</span>
                </div>
                
                <h1 class="verify-title">Verify Your Email</h1>
                
                <p class="verify-message">
                    We've sent a verification link to:
                </p>
                
                <div class="user-email">
                    ${escapeHtml(userEmail)}
                </div>

                <div class="progress-steps">
                    <div class="step active">
                        <span>1</span>
                        <span class="step-label">Sign Up</span>
                    </div>
                    <div class="step">
                        <span>2</span>
                        <span class="step-label">Verify Email</span>
                    </div>
                    <div class="step">
                        <span>3</span>
                        <span class="step-label">Welcome!</span>
                    </div>
                </div>

                <p class="verify-message" style="font-size: 0.95rem;">
                    Click the link in the email to verify your account.<br>
                    Didn't receive it? Check your spam folder or request a new one.
                </p>

                <div class="resend-section">
                    <button class="resend-btn" id="resendBtn" onclick="resendVerification()">
                        Resend Verification Email
                    </button>
                    <div class="resend-timer" id="timer"></div>
                </div>

                <div class="btn-group">
                    <a href="login.html" class="btn btn-secondary">Back to Login</a>
                    <a href="index.html" class="btn btn-primary">Go to Home</a>
                </div>
            `

            // Start resend timer
            startResendTimer()
        }

        // Show success
        function showSuccess() {
            verificationStatus = 'success'
            
            verifyContent.innerHTML = `
                <div class="status-icon icon-success">
                    <span>✓</span>
                </div>
                
                <h1 class="verify-title">Email Verified!</h1>
                
                <p class="verify-message">
                    Your email has been successfully verified.<br>
                    You can now log in to your account and start your journey!
                </p>

                <div class="progress-steps">
                    <div class="step completed">
                        <span>✓</span>
                        <span class="step-label">Sign Up</span>
                    </div>
                    <div class="step completed">
                        <span>✓</span>
                        <span class="step-label">Verify Email</span>
                    </div>
                    <div class="step active">
                        <span>3</span>
                        <span class="step-label">Welcome!</span>
                    </div>
                </div>

                <div class="alert alert-success" style="margin: 2rem 0;">
                    <span>✨</span>
                    <span>Redirecting to login in <span id="countdown">5</span> seconds...</span>
                </div>

                <div class="btn-group">
                    <a href="login.html" class="btn btn-success">Login Now</a>
                    <a href="index.html" class="btn btn-secondary">Browse as Guest</a>
                </div>
            `
        }

        // Show error
        function showError(errorMessage) {
            verificationStatus = 'error'
            
            verifyContent.innerHTML = `
                <div class="status-icon icon-error">
                    <span>✗</span>
                </div>
                
                <h1 class="verify-title">Verification Failed</h1>
                
                <div class="alert alert-error" style="margin: 2rem 0;">
                    <span>⚠️</span>
                    <span>${escapeHtml(errorMessage) || 'The verification link is invalid or has expired.'}</span>
                </div>

                <p class="verify-message">
                    Don't worry! You can request a new verification email or try signing up again.
                </p>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="requestNewVerification()">
                        Request New Link
                    </button>
                    <a href="register.html" class="btn btn-secondary">Sign Up Again</a>
                </div>
            `
        }

        // Show general info
        function showGeneralInfo() {
            verifyContent.innerHTML = `
                <div class="status-icon icon-email">
                    <span>✉️</span>
                </div>
                
                <h1 class="verify-title">Check Your Email</h1>
                
                <p class="verify-message">
                    To complete your registration, please verify your email address.<br>
                    Click the link we sent to your inbox to activate your account.
                </p>

                <div class="alert alert-warning" style="margin: 2rem 0;">
                    <span>💡</span>
                    <span>If you don't see the email, check your spam folder.</span>
                </div>

                <div class="btn-group">
                    <a href="login.html" class="btn btn-secondary">Back to Login</a>
                    <a href="index.html" class="btn btn-primary">Go to Home</a>
                </div>
            `
        }

        // Show loading
        function showLoading(message) {
            verifyContent.innerHTML = `
                <div class="spinner"></div>
                <p style="color: var(--text-secondary); margin-top: 1rem;">${message}</p>
            `
        }

        // Resend verification email
        window.resendVerification = async function() {
            if (!userEmail) return

            try {
                const resendBtn = document.getElementById('resendBtn')
                resendBtn.disabled = true
                resendBtn.textContent = 'Sending...'

                const { error } = await supabase.auth.resend({
                    type: 'signup',
                    email: userEmail
                })

                if (error) throw error

                showAlert('Verification email sent! Check your inbox.', 'success')
                
                // Restart timer
                resendTimer = 60
                startResendTimer()

            } catch (error) {
                showAlert(error.message, 'error')
                document.getElementById('resendBtn').disabled = false
                document.getElementById('resendBtn').textContent = 'Resend Verification Email'
            }
        }

        // Request new verification (from error state)
        window.requestNewVerification = function() {
            window.location.href = 'login.html'
        }

        // Start resend timer
        function startResendTimer() {
            const timerDisplay = document.getElementById('timer')
            const resendBtn = document.getElementById('resendBtn')
            
            if (!timerDisplay || !resendBtn) return

            if (timerInterval) clearInterval(timerInterval)

            resendBtn.disabled = true
            timerDisplay.textContent = `Wait ${resendTimer}s to resend`

            timerInterval = setInterval(() => {
                resendTimer--
                
                if (resendTimer <= 0) {
                    clearInterval(timerInterval)
                    resendBtn.disabled = false
                    timerDisplay.textContent = ''
                } else {
                    timerDisplay.textContent = `Wait ${resendTimer}s to resend`
                }
            }, 1000)
        }

        // Start redirect countdown
        function startRedirectCountdown() {
            let countdown = 5
            const countdownEl = document.getElementById('countdown')
            
            if (!countdownEl) return

            const interval = setInterval(() => {
                countdown--
                
                if (countdownEl) {
                    countdownEl.textContent = countdown
                }
                
                if (countdown <= 0) {
                    clearInterval(interval)
                    window.location.href = 'login.html'
                }
            }, 1000)
        }

        // Show alert message
        function showAlert(message, type) {
            const alertDiv = document.createElement('div')
            alertDiv.className = `alert alert-${type}`
            alertDiv.innerHTML = `
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <span>${message}</span>
            `
            
            const card = document.querySelector('.verify-card')
            card.insertBefore(alertDiv, card.firstChild)
            
            setTimeout(() => {
                alertDiv.remove()
            }, 5000)
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Initialize
        init()

        // Cleanup timer on page unload
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval)
        })
    </script>
</body>
</html>
