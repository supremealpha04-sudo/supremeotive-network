<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate SupremeMotive Icons</title>
    <style>
        body {
            background: #0A0A0A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1A1A1A;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #333;
        }
        h1 {
            color: #FFD700;
            margin-bottom: 1rem;
        }
        input[type="file"] {
            background: #0A0A0A;
            border: 2px solid #333;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
            margin: 1rem 0;
            cursor: pointer;
        }
        button {
            background: #FFD700;
            color: #0A0A0A;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .preview {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        .icon-item {
            text-align: center;
        }
        .icon-item img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            border: 2px solid #FFD700;
            background: white;
        }
        .icon-item span {
            display: block;
            color: #B0B0B0;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SupremeMotive Icon Generator</h1>
        <p>Select your logo.png file to generate all PWA icons</p>
        
        <input type="file" id="logoInput" accept="image/png">
        <button onclick="generateIcons()">Generate Icons</button>
        
        <div id="preview" class="preview"></div>
    </div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function generateIcons() {
            const file = document.getElementById('logoInput').files[0];
            if (!file) {
                alert('Please select your logo.png file');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const preview = document.getElementById('preview');
                    preview.innerHTML = '';
                    
                    sizes.forEach(size => {
                        // Create canvas
                        const canvas = document.createElement('canvas');
                        canvas.width = size;
                        canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        
                        // Draw logo scaled to fit
                        ctx.drawImage(img, 0, 0, size, size);
                        
                        // Download
                        const link = document.createElement('a');
                        link.download = `icon-${size}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        
                        // Preview
                        const div = document.createElement('div');
                        div.className = 'icon-item';
                        const previewCanvas = document.createElement('canvas');
                        previewCanvas.width = 64;
                        previewCanvas.height = 64;
                        const previewCtx = previewCanvas.getContext('2d');
                        previewCtx.drawImage(img, 0, 0, 64, 64);
                        div.appendChild(previewCanvas);
                        
                        const span = document.createElement('span');
                        span.textContent = `${size}x${size}`;
                        div.appendChild(span);
                        
                        preview.appendChild(div);
                    });
                    
                    alert('✅ Icons generated successfully! Check your downloads folder.');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
