<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Unlock Requests</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <h2>SupremeMotive</h2>
            <h3>Admin Panel</h3>
            <ul class="admin-nav">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="post-admin.html">Post Management</a></li>
                <li><a href="ebook-admin.html">Ebook Management</a></li>
                <li><a href="unlock-admin.html" class="active">Unlock Requests</a></li>
                <li><a href="../index.html">View Site</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Unlock Requests</h1>
            </div>

            <div id="unlocks-container">
                <!-- Unlock requests will be loaded here -->
            </div>
        </main>
    </div>

    <script type="module">
        import { 
            getPendingUnlocks, 
            approveUnlock, 
            rejectUnlock,
            renderUnlockRequests 
        } from '../js/admin.js';
        import { isAdmin } from '../js/auth.js';

        window.handleApproveUnlock = async (unlockId) => {
            if (confirm('Approve this unlock request?')) {
                const result = await approveUnlock(unlockId);
                if (result.success) {
                    loadUnlocks();
                } else {
                    alert('Error: ' + result.error);
                }
            }
        };

        window.handleRejectUnlock = async (unlockId) => {
            const reason = prompt('Enter rejection reason (optional):');
            if (reason !== null) {
                const result = await rejectUnlock(unlockId, reason);
                if (result.success) {
                    loadUnlocks();
                } else {
                    alert('Error: ' + result.error);
                }
            }
        };

        async function loadUnlocks() {
            // Check admin access
            const admin = await isAdmin('unlock_admin');
            if (!admin) {
                window.location.href = '../index.html';
                return;
            }

            const result = await getPendingUnlocks();
            if (result.success) {
                renderUnlockRequests(result.unlocks, 'unlocks-container');
            }
        }

        loadUnlocks();
    </script>
</body>
</html>
