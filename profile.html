<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a.active {
            color: var(--gold);
        }

        #admin-link {
            color: var(--electric-blue);
            font-weight: 600;
        }

        #logout-btn {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #logout-btn:hover {
            background: var(--error);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Profile Header */
        .profile-header {
            background: linear-gradient(135deg, var(--dark-gray), var(--medium-gray));
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--light-gray);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-header-content {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 2.5rem;
            align-items: flex-start;
        }

        /* Avatar Section */
        .avatar-section {
            position: relative;
        }

        .avatar-wrapper {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--gold);
            color: var(--primary-black);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid var(--primary-black);
            transition: all 0.3s ease;
        }

        .avatar-upload:hover {
            transform: scale(1.1);
            background: var(--electric-blue);
        }

        /* Profile Info */
        .profile-info {
            flex: 1;
        }

        .profile-name-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .profile-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .role-badge {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        .profile-email {
            color: var(--electric-blue);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .profile-email i {
            font-size: 1.2rem;
        }

        /* Profile Meta */
        .profile-meta {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--light-gray);
        }

        .meta-icon {
            font-size: 1.2rem;
        }

        .meta-text {
            color: var(--text-secondary);
        }

        .meta-value {
            color: var(--gold);
            font-weight: 600;
            margin-left: 0.25rem;
        }

        /* Bio */
        .profile-bio {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--gold);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        /* Join Date */
        .profile-joined {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Edit Button */
        .edit-profile-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .edit-profile-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--dark-gray);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--light-gray);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--electric-blue);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        /* Edit Form */
        .edit-form {
            background: var(--dark-gray);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .edit-form h2 {
            color: var(--gold);
            margin-bottom: 2rem;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--medium-gray);
            border: 2px solid var(--light-gray);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        select.form-control {
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .save-btn {
            background: linear-gradient(135deg, var(--success), #45a049);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .cancel-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 4rem;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alerts */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-header-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-name-section {
                justify-content: center;
            }

            .profile-meta {
                justify-content: center;
            }

            .edit-profile-btn {
                width: 100%;
                justify-content: center;
            }

            .form-actions {
                flex-direction: column;
            }

            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="#" id="admin-link" class="hidden">Admin Dashboard</a>
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div id="alert-container"></div>
        
        <!-- Profile View -->
        <div id="profile-view">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading your profile...</p>
            </div>
        </div>

        <!-- Edit Form -->
        <div id="profile-edit" class="edit-form hidden">
            <h2>✏️ Edit Profile</h2>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" class="form-control" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country" class="form-control" required>
                        <option value="">Select your country</option>
                        <option value="United States">🇺🇸 United States</option>
                        <option value="United Kingdom">🇬🇧 United Kingdom</option>
                        <option value="Canada">🇨🇦 Canada</option>
                        <option value="Australia">🇦🇺 Australia</option>
                        <option value="Germany">🇩🇪 Germany</option>
                        <option value="France">🇫🇷 France</option>
                        <option value="Spain">🇪🇸 Spain</option>
                        <option value="Italy">🇮🇹 Italy</option>
                        <option value="Japan">🇯🇵 Japan</option>
                        <option value="India">🇮🇳 India</option>
                        <option value="Brazil">🇧🇷 Brazil</option>
                        <option value="Mexico">🇲🇽 Mexico</option>
                        <option value="Nigeria">🇳🇬 Nigeria</option>
                        <option value="South Africa">🇿🇦 South Africa</option>
                        <option value="Egypt">🇪🇬 Egypt</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" class="form-control" min="13" max="120" required>
                </div>

                <div class="form-group">
                    <label for="avatar">Profile Image URL</label>
                    <input type="url" id="avatar" name="avatar" class="form-control" placeholder="https://example.com/image.jpg">
                    <small style="color: var(--text-secondary); display: block; margin-top: 0.5rem;">Leave empty to use default avatar</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="save-btn">💾 Save Changes</button>
                    <button type="button" class="cancel-btn" onclick="cancelEdit()">✖️ Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize Supabase
        const supabase = createClient(
            'YOUR_SUPABASE_URL',
            'YOUR_SUPABASE_ANON_KEY'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        // State
        let currentUser = null
        let currentProfile = null

        // DOM Elements
        const profileView = document.getElementById('profile-view')
        const profileEdit = document.getElementById('profile-edit')
        const logoutBtn = document.getElementById('logout-btn')
        const adminLink = document.getElementById('admin-link')
        const alertContainer = document.getElementById('alert-container')
        const editForm = document.getElementById('edit-profile-form')

        // Check authentication
        async function checkAuth() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser()
                
                if (error) throw error

                if (!user) {
                    window.location.href = 'login.html'
                    return false
                }

                currentUser = user
                
                // Check if admin
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.classList.remove('hidden')
                    adminLink.href = 'admin/admin-dashboard.html'
                }

                return true
            } catch (error) {
                console.error('Auth check error:', error)
                window.location.href = 'login.html'
                return false
            }
        }

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${type === 'success' ? '✅' : '❌'} ${message}</div>`
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Load profile
        async function loadProfile() {
            try {
                profileView.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading your profile...</p>
                    </div>
                `

                // Get profile from database
                let { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single()

                if (error) {
                    // If profile doesn't exist, create one
                    if (error.code === 'PGRST116') {
                        const { data: newProfile, error: insertError } = await supabase
                            .from('profiles')
                            .insert([{
                                id: currentUser.id,
                                name: currentUser.email.split('@')[0],
                                email: currentUser.email,
                                country: 'Not specified',
                                age: 18
                            }])
                            .select()
                            .single()

                        if (insertError) throw insertError
                        profile = newProfile
                    } else {
                        throw error
                    }
                }

                currentProfile = profile
                renderProfile(profile)
            } catch (error) {
                console.error('Load profile error:', error)
                profileView.innerHTML = `<div class="error-message">Error loading profile: ${error.message}</div>`
            }
        }

        // Render profile
        function renderProfile(profile) {
            const joinDate = profile.created_at 
                ? new Date(profile.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                  })
                : 'Recently joined'

            const avatarUrl = profile.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=FFD700&color=000&size=200&bold=true&length=2`
            
            const roleDisplay = profile.role !== 'user' 
                ? `<span class="role-badge">${profile.role.replace('_', ' ').toUpperCase()}</span>`
                : ''

            profileView.innerHTML = `
                <div class="profile-header">
                    <div class="profile-header-content">
                        <div class="avatar-section">
                            <div class="avatar-wrapper">
                                <img src="${avatarUrl}" 
                                     alt="${profile.name}" 
                                     class="profile-avatar"
                                     onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=FFD700&color=000&size=200&bold=true&length=2'">
                            </div>
                            <div class="avatar-upload" onclick="document.getElementById('avatar').focus()" title="Add profile image URL">
                                📷
                            </div>
                        </div>

                        <div class="profile-info">
                            <div class="profile-name-section">
                                <h1 class="profile-name">${profile.name}</h1>
                                ${roleDisplay}
                            </div>
                            
                            <div class="profile-email">
                                <span>📧</span>
                                ${profile.email}
                            </div>

                            <div class="profile-meta">
                                <div class="meta-item">
                                    <span class="meta-icon">📍</span>
                                    <span class="meta-text">Country: <span class="meta-value">${profile.country || 'Not specified'}</span></span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-icon">🎂</span>
                                    <span class="meta-text">Age: <span class="meta-value">${profile.age || 'Not specified'}</span></span>
                                </div>
                            </div>

                            ${profile.bio ? `
                                <div class="profile-bio">
                                    <span style="color: var(--gold); font-weight: 600; display: block; margin-bottom: 0.5rem;">📝 Bio</span>
                                    ${profile.bio}
                                </div>
                            ` : ''}

                            <div class="profile-joined">
                                <span>📅</span>
                                Member since ${joinDate}
                            </div>

                            <button class="edit-profile-btn" onclick="showEditForm()">
                                <span>✏️</span>
                                Edit Profile
                            </button>
                        </div>
                    </div>
                </div>

                <div class="stats-grid" id="profile-stats">
                    <div class="stat-card">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            `

            loadUserStats(profile.id)
        }

        // Load user stats
        async function loadUserStats(userId) {
            try {
                // Get posts count
                const { count: postsCount } = await supabase
                    .from('posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('created_by', userId)

                // Get comments count
                const { count: commentsCount } = await supabase
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId)

                // Get unlocks count
                const { count: unlocksCount } = await supabase
                    .from('unlocks')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId)
                    .eq('status', 'approved')

                // Get saved posts count
                const { count: savedPostsCount } = await supabase
                    .from('saved_posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId)

                // Get saved ebooks count
                const { count: savedEbooksCount } = await supabase
                    .from('saved_ebooks')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId)

                const statsContainer = document.getElementById('profile-stats')
                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${postsCount || 0}</div>
                        <div class="stat-label">Posts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${commentsCount || 0}</div>
                        <div class="stat-label">Comments</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${unlocksCount || 0}</div>
                        <div class="stat-label">Ebooks Unlocked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${savedPostsCount || 0}</div>
                        <div class="stat-label">Saved Posts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${savedEbooksCount || 0}</div>
                        <div class="stat-label">Saved Ebooks</div>
                    </div>
                `
            } catch (error) {
                console.error('Load stats error:', error)
            }
        }

        // Show edit form
        window.showEditForm = () => {
            // Populate form with current profile data
            document.getElementById('name').value = currentProfile.name || ''
            document.getElementById('bio').value = currentProfile.bio || ''
            document.getElementById('country').value = currentProfile.country || ''
            document.getElementById('age').value = currentProfile.age || 18
            document.getElementById('avatar').value = currentProfile.profile_image_url || ''

            profileView.classList.add('hidden')
            profileEdit.classList.remove('hidden')
            
            // Scroll to form
            profileEdit.scrollIntoView({ behavior: 'smooth' })
        }

        // Cancel edit
        window.cancelEdit = () => {
            profileEdit.classList.add('hidden')
            profileView.classList.remove('hidden')
        }

        // Handle form submission
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault()

            const updates = {
                name: document.getElementById('name').value,
                bio: document.getElementById('bio').value,
                country: document.getElementById('country').value,
                age: parseInt(document.getElementById('age').value),
                profile_image_url: document.getElementById('avatar').value || null,
                updated_at: new Date()
            }

            try {
                const { error } = await supabase
                    .from('profiles')
                    .update(updates)
                    .eq('id', currentUser.id)

                if (error) throw error

                showAlert('Profile updated successfully!', 'success')
                
                // Reload profile
                await loadProfile()
                cancelEdit()
            } catch (error) {
                console.error('Update error:', error)
                showAlert('Error updating profile: ' + error.message, 'error')
            }
        })

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                window.location.href = 'index.html'
            } catch (error) {
                console.error('Logout error:', error)
                showAlert('Error logging out', 'error')
            }
        })

        // Initialize
        async function init() {
            const isAuthenticated = await checkAuth()
            if (isAuthenticated) {
                await loadProfile()
            }
        }

        init()
    </script>
</body>
</html>
