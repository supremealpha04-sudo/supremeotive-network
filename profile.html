<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a.active {
            color: var(--gold);
        }

        #logout-btn {
            background: none;
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        #logout-btn:hover {
            background: var(--error);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Profile Card */
        .profile-card {
            background: var(--dark-gray);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--light-gray);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--light-gray);
        }

        .profile-avatar-container {
            position: relative;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .profile-email {
            color: var(--electric-blue);
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .profile-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .profile-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .profile-bio {
            background: var(--medium-gray);
            padding: 1rem;
            border-radius: 8px;
            color: var(--text-secondary);
            line-height: 1.6;
            border-left: 4px solid var(--gold);
        }

        .profile-joined {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            padding: 0.25rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 1rem;
        }

        /* Stats */
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--medium-gray);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--light-gray);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--electric-blue);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Edit Button */
        .edit-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-top: 1rem;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
        }

        /* Edit Form */
        .edit-form {
            margin-top: 2rem;
            padding: 2rem;
            background: var(--medium-gray);
            border-radius: 12px;
        }

        .edit-form h2 {
            color: var(--gold);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--dark-gray);
            border: 1px solid var(--light-gray);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .form-group small {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .save-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .cancel-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .profile-meta {
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .role-badge {
                margin: 0.5rem 0 0 0;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="#" id="admin-link" class="hidden">Admin</a>
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div id="alert-container"></div>
        
        <div id="profile-view">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>

        <div id="profile-edit" class="edit-form hidden">
            <h2>Edit Profile</h2>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country" required>
                        <option value="">Select country</option>
                        <option value="United States">United States</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Germany">Germany</option>
                        <option value="France">France</option>
                        <option value="Spain">Spain</option>
                        <option value="Italy">Italy</option>
                        <option value="Japan">Japan</option>
                        <option value="India">India</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="13" max="120" required>
                </div>

                <div class="form-group">
                    <label for="avatar">Profile Image URL</label>
                    <input type="url" id="avatar" name="avatar" placeholder="https://example.com/image.jpg">
                    <small>Enter a URL for your profile image (optional)</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="save-btn">Save Changes</button>
                    <button type="button" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize Supabase
        const supabase = createClient(
            'YOUR_SUPABASE_URL',
            'YOUR_SUPABASE_ANON_KEY'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        // State
        let currentUser = null
        let currentProfile = null

        // DOM Elements
        const profileView = document.getElementById('profile-view')
        const profileEdit = document.getElementById('profile-edit')
        const logoutBtn = document.getElementById('logout-btn')
        const adminLink = document.getElementById('admin-link')
        const alertContainer = document.getElementById('alert-container')
        const editForm = document.getElementById('edit-profile-form')

        // Check authentication
        async function checkAuth() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser()
                
                if (error) throw error

                if (!user) {
                    window.location.href = 'login.html'
                    return false
                }

                currentUser = user
                
                // Check if admin
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.classList.remove('hidden')
                    adminLink.href = 'admin/admin-dashboard.html'
                }

                return true
            } catch (error) {
                console.error('Auth check error:', error)
                window.location.href = 'login.html'
                return false
            }
        }

        // Load profile
        async function loadProfile() {
            try {
                profileView.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading profile...</p>
                    </div>
                `

                // Get profile from database
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single()

                if (error) {
                    // If profile doesn't exist, create one
                    if (error.code === 'PGRST116') {
                        const { data: newProfile, error: insertError } = await supabase
                            .from('profiles')
                            .insert([{
                                id: currentUser.id,
                                name: currentUser.email.split('@')[0],
                                email: currentUser.email,
                                country: 'Not specified',
                                age: 18
                            }])
                            .select()
                            .single()

                        if (insertError) throw insertError
                        currentProfile = newProfile
                    } else {
                        throw error
                    }
                } else {
                    currentProfile = profile
                }

                renderProfile(currentProfile)
            } catch (error) {
                console.error('Load profile error:', error)
                profileView.innerHTML = `<div class="error-message">Error loading profile: ${error.message}</div>`
            }
        }

        // Render profile
        function renderProfile(profile) {
            const joinDate = profile.created_at 
                ? new Date(profile.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                  })
                : 'Recently joined'

            const roleDisplay = profile.role !== 'user' 
                ? `<span class="role-badge">${profile.role.replace('_', ' ').toUpperCase()}</span>`
                : ''

            profileView.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar-container">
                            <img src="${profile.profile_image_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profile.name) + '&background=FFD700&color=000&size=120'}" 
                                 alt="${profile.name}" 
                                 class="profile-avatar"
                                 onerror="this.src='https://ui-avatars.com/api/?name=' + encodeURIComponent('${profile.name}') + '&background=FFD700&color=000&size=120'">
                        </div>
                        
                        <div class="profile-info">
                            <h1 class="profile-name">
                                ${profile.name}
                                ${roleDisplay}
                            </h1>
                            <div class="profile-email">${profile.email}</div>
                            
                            <div class="profile-meta">
                                <span>📍 ${profile.country || 'Not specified'}</span>
                                <span>🎂 ${profile.age || 'Not specified'} years</span>
                            </div>
                            
                            ${profile.bio ? `
                                <div class="profile-bio">${profile.bio}</div>
                            ` : ''}
                            
                            <div class="profile-joined">Joined ${joinDate}</div>
                            
                            <button class="edit-btn" onclick="showEditForm()">Edit Profile</button>
                        </div>
                    </div>

                    <div class="profile-stats" id="profile-stats">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            `

            loadUserStats(profile.id)
        }

        // Load user stats
        async function loadUserStats(userId) {
            try {
                const statsContainer = document.getElementById('profile-stats')
                
                const { data: stats, error } = await supabase
                    .rpc('get_user_stats', { user_id: userId })

                if (error) throw error

                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats?.posts || 0}</div>
                        <div class="stat-label">Posts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats?.comments || 0}</div>
                        <div class="stat-label">Comments</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats?.unlocks || 0}</div>
                        <div class="stat-label">Ebooks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats?.saved_posts || 0}</div>
                        <div class="stat-label">Saved Posts</div>
                    </div>
                `
            } catch (error) {
                console.error('Load stats error:', error)
            }
        }

        // Show edit form
        window.showEditForm = () => {
            // Populate form with current profile data
            document.getElementById('name').value = currentProfile.name || ''
            document.getElementById('bio').value = currentProfile.bio || ''
            document.getElementById('country').value = currentProfile.country || ''
            document.getElementById('age').value = currentProfile.age || 18
            document.getElementById('avatar').value = currentProfile.profile_image_url || ''

            profileView.classList.add('hidden')
            profileEdit.classList.remove('hidden')
        }

        // Cancel edit
        window.cancelEdit = () => {
            profileEdit.classList.add('hidden')
            profileView.classList.remove('hidden')
        }

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Handle form submission
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault()

            const updates = {
                name: document.getElementById('name').value,
                bio: document.getElementById('bio').value,
                country: document.getElementById('country').value,
                age: parseInt(document.getElementById('age').value),
                profile_image_url: document.getElementById('avatar').value || null,
                updated_at: new Date()
            }

            try {
                const { error } = await supabase
                    .from('profiles')
                    .update(updates)
                    .eq('id', currentUser.id)

                if (error) throw error

                showAlert('Profile updated successfully!', 'success')
                
                // Reload profile
                await loadProfile()
                cancelEdit()
            } catch (error) {
                console.error('Update error:', error)
                showAlert('Error updating profile: ' + error.message, 'error')
            }
        })

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                window.location.href = 'index.html'
            } catch (error) {
                console.error('Logout error:', error)
                showAlert('Error logging out', 'error')
            }
        })

        // Initialize
        async function init() {
            const isAuthenticated = await checkAuth()
            if (isAuthenticated) {
                await loadProfile()
            }
        }

        init()
    </script>
</body>
</html>
