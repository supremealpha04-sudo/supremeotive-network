<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --bg-hover: #222222;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-gold: #ffd700;
            --accent-blue: #00f0ff;
            --accent-purple: #9d4edd;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
            --border: #2a2a2a;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 15px 40px rgba(255, 215, 0, 0.15);
            --gradient-gold: linear-gradient(135deg, #ffd700, #ffb347);
            --gradient-blue: linear-gradient(135deg, #00f0ff, #0099ff);
            --gradient-purple: linear-gradient(135deg, #9d4edd, #7b2cbf);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.05) 0%, transparent 30%);
            pointer-events: none;
            z-index: -1;
        }

        /* Navigation */
        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, var(--accent-gold), var(--accent-blue)) 1;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            animation: logoSpin 10s linear infinite;
        }

        .logo-icon span {
            transform: rotate(-45deg);
            font-size: 1.5rem;
        }

        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-text {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            transition: color 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue));
            transition: width 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.active {
            color: var(--accent-gold);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Profile Card */
        .profile-card {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 3rem;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            animation: slideInDown 0.5s ease;
            margin-bottom: 2rem;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue), var(--accent-purple));
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        /* Profile Avatar */
        .profile-avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-blue), var(--accent-purple)) border-box;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            padding: 4px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
        }

        .profile-avatar-edit {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 50%;
            color: var(--bg-primary);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0);
        }

        .profile-avatar-container:hover .profile-avatar-edit {
            opacity: 1;
            transform: scale(1);
        }

        .profile-avatar-edit:hover {
            transform: scale(1.1) rotate(360deg);
        }

        /* Profile Info */
        .profile-info {
            flex: 1;
        }

        .profile-name-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .profile-name {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-role-badge {
            background: var(--gradient-purple);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .profile-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .profile-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .profile-meta-item i {
            color: var(--accent-gold);
            font-size: 1.2rem;
        }

        .profile-bio {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 20px;
            margin: 1.5rem 0;
            border-left: 4px solid var(--accent-gold);
            position: relative;
            overflow: hidden;
        }

        .profile-bio::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: -10px;
            font-size: 8rem;
            color: rgba(255, 215, 0, 0.1);
            font-family: serif;
        }

        .profile-bio p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
        }

        .profile-joined {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .profile-joined i {
            color: var(--accent-blue);
        }

        .profile-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--gradient-gold);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
        }

        .btn-secondary:hover {
            background: var(--accent-gold);
            color: var(--bg-primary);
            transform: translateY(-3px);
        }

        /* Profile Stats */
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .stat-card {
            text-align: center;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 15px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: var(--shadow-hover);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Tabs */
        .profile-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            overflow-x: auto;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.8rem 2rem;
            cursor: pointer;
            font-weight: 600;
            position: relative;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue));
            transition: width 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--accent-gold);
        }

        .tab-btn.active {
            color: var(--accent-gold);
        }

        .tab-btn.active::after {
            width: 100%;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .content-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: var(--shadow-hover);
        }

        .content-card h4 {
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }

        .content-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .content-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Edit Profile Form */
        .edit-profile-form {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 3rem;
            border: 1px solid var(--border);
            animation: slideInUp 0.5s ease;
        }

        .edit-profile-form h2 {
            color: var(--accent-gold);
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .form-group input[type="file"] {
            padding: 0.5rem;
            background: var(--bg-secondary);
        }

        .form-group small {
            display: block;
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 4rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-gold);
            border-right-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 2000;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-name-wrapper {
                justify-content: center;
            }

            .profile-meta {
                justify-content: center;
            }

            .profile-actions {
                justify-content: center;
            }

            .profile-tabs {
                justify-content: flex-start;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .edit-profile-form {
                padding: 2rem;
            }
        }

        /* Hidden Class */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">
                <span>⚡</span>
            </div>
            <span class="logo-text">SupremeMotive</span>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="ebooks.html" class="nav-link">Ebooks</a>
            <a href="profile.html" class="nav-link active">Profile</a>
            <a href="#" class="nav-link" id="admin-link" style="display: none;">Admin</a>
            <a href="#" class="nav-link" id="logout-link">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div id="notification"></div>
        
        <!-- Profile View -->
        <div id="profile-view">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>

        <!-- Edit Profile View -->
        <div id="edit-profile-view" class="hidden">
            <!-- Edit form will be loaded here -->
        </div>
    </main>

    <script type="module">
        import { supabase } from './config/supabase.js'
        import { getCurrentUser, logoutUser, isAdmin, updateProfile, uploadProfileImage } from './js/auth.js'
        import { formatDate, showNotification } from './js/utils.js'

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentUser = null
        let profileUser = null
        let isOwnProfile = false

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            await checkAuth()
            await loadProfile()
        }

        // ============================================
        // CHECK AUTHENTICATION
        // ============================================
        async function checkAuth() {
            const { user } = await getCurrentUser()
            currentUser = user

            // Check if viewing another user's profile
            const urlParams = new URLSearchParams(window.location.search)
            const userId = urlParams.get('id')

            if (userId && userId !== currentUser?.id) {
                // Viewing another user's profile
                const { data } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single()
                
                profileUser = data
                isOwnProfile = false
            } else {
                profileUser = currentUser
                isOwnProfile = true
            }

            // Update navigation
            const logoutLink = document.getElementById('logout-link')
            const adminLink = document.getElementById('admin-link')

            if (currentUser) {
                logoutLink.onclick = async (e) => {
                    e.preventDefault()
                    await logoutUser()
                    window.location.href = 'index.html'
                }

                const admin = await isAdmin()
                if (admin) {
                    adminLink.style.display = 'inline'
                    adminLink.href = 'admin/admin-dashboard.html'
                }
            } else {
                window.location.href = 'login.html'
            }
        }

        // ============================================
        // LOAD PROFILE
        // ============================================
        async function loadProfile() {
            if (!profileUser) return

            await renderProfile()
            await loadUserStats()
            await loadUserContent()
        }

        // ============================================
        // RENDER PROFILE
        // ============================================
        async function renderProfile() {
            const container = document.getElementById('profile-view')
            
            const roleDisplay = profileUser.role?.replace('_', ' ').toUpperCase() || 'USER'
            const joinedDate = profileUser.created_at ? formatDate(profileUser.created_at) : 'Recently joined'

            container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar-container">
                            <img src="${profileUser.profile_image || 'assets/images/default-avatar.png'}" 
                                 alt="${profileUser.name}" 
                                 class="profile-avatar"
                                 id="profile-avatar-img"
                                 onerror="this.src='assets/images/default-avatar.png'">
                            ${isOwnProfile ? `
                                <button class="profile-avatar-edit" onclick="document.getElementById('avatar-upload').click()">
                                    ✎
                                </button>
                                <input type="file" 
                                       id="avatar-upload" 
                                       style="display: none;" 
                                       accept="image/*"
                                       onchange="handleAvatarUpload(event)">
                            ` : ''}
                        </div>

                        <div class="profile-info">
                            <div class="profile-name-wrapper">
                                <h1 class="profile-name">${profileUser.name}</h1>
                                ${profileUser.role !== 'user' ? `
                                    <span class="profile-role-badge">${roleDisplay}</span>
                                ` : ''}
                            </div>

                            <div class="profile-meta">
                                <div class="profile-meta-item">
                                    <i>📍</i>
                                    <span>${profileUser.country || 'Not specified'}</span>
                                </div>
                                <div class="profile-meta-item">
                                    <i>🎂</i>
                                    <span>${profileUser.age || 'Not specified'} years</span>
                                </div>
                                <div class="profile-meta-item">
                                    <i>📧</i>
                                    <span>${profileUser.email}</span>
                                </div>
                            </div>

                            ${profileUser.bio ? `
                                <div class="profile-bio">
                                    <p>${escapeHtml(profileUser.bio)}</p>
                                </div>
                            ` : isOwnProfile ? `
                                <div class="profile-bio">
                                    <p style="color: var(--text-secondary); font-style: italic;">
                                        No bio yet. Click edit to add one!
                                    </p>
                                </div>
                            ` : ''}

                            <div class="profile-joined">
                                <i>📅</i>
                                <span>Joined ${joinedDate}</span>
                            </div>

                            ${isOwnProfile ? `
                                <div class="profile-actions">
                                    <button class="btn btn-primary" onclick="showEditProfile()">
                                        <i>✎</i> Edit Profile
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <div class="profile-stats" id="profile-stats">
                        <!-- Stats will be loaded here -->
                    </div>
                </div>

                ${isOwnProfile ? `
                    <div class="profile-tabs">
                        <button class="tab-btn active" onclick="switchTab('posts')">My Posts</button>
                        <button class="tab-btn" onclick="switchTab('saved')">Saved Posts</button>
                        <button class="tab-btn" onclick="switchTab('ebooks')">My Ebooks</button>
                    </div>

                    <div id="tab-content" class="content-grid">
                        <!-- Tab content will be loaded here -->
                    </div>
                ` : ''}
            `
        }

        // ============================================
        // LOAD USER STATS
        // ============================================
        async function loadUserStats() {
            try {
                const { data: stats } = await supabase
                    .rpc('get_user_stats', { user_id: profileUser.id })

                if (stats) {
                    document.getElementById('profile-stats').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value">${stats.posts || 0}</div>
                            <div class="stat-label">Posts</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.comments || 0}</div>
                            <div class="stat-label">Comments</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.unlocks || 0}</div>
                            <div class="stat-label">Ebooks</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.saved_posts || 0}</div>
                            <div class="stat-label">Saved</div>
                        </div>
                    `
                }
            } catch (error) {
                console.error('Error loading stats:', error)
            }
        }

        // ============================================
        // LOAD USER CONTENT
        // ============================================
        async function loadUserContent() {
            if (!isOwnProfile) return

            await loadUserPosts()
        }

        async function loadUserPosts() {
            try {
                const { data: posts, error } = await supabase
                    .from('posts')
                    .select('*')
                    .eq('created_by', profileUser.id)
                    .order('created_at', { ascending: false })

                if (error) throw error

                renderUserPosts(posts)
            } catch (error) {
                console.error('Error loading posts:', error)
            }
        }

        function renderUserPosts(posts) {
            const container = document.getElementById('tab-content')
            
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-secondary);">
                        <i style="font-size: 3rem; margin-bottom: 1rem; display: block;">📝</i>
                        <h3>No Posts Yet</h3>
                        <p>Your motivational posts will appear here</p>
                    </div>
                `
                return
            }

            container.innerHTML = posts.map(post => `
                <div class="content-card" onclick="window.location.href='post.html?id=${post.id}'">
                    <h4>${escapeHtml(post.title)}</h4>
                    <p>${escapeHtml(post.content.substring(0, 100))}...</p>
                    <div class="content-card-footer">
                        <span><i>📅</i> ${formatDate(post.created_at)}</span>
                    </div>
                </div>
            `).join('')
        }

        // ============================================
        // TAB SWITCHING
        // ============================================
        window.switchTab = async (tab) => {
            // Update active tab
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active')
            })
            event.target.classList.add('active')

            // Load tab content
            switch(tab) {
                case 'posts':
                    await loadUserPosts()
                    break
                case 'saved':
                    await loadSavedPosts()
                    break
                case 'ebooks':
                    await loadUserEbooks()
                    break
            }
        }

        async function loadSavedPosts() {
            const container = document.getElementById('tab-content')
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>'

            try {
                const { data: saved, error } = await supabase
                    .from('saved_posts')
                    .select(`
                        post_id,
                        posts (*)
                    `)
                    .eq('user_id', profileUser.id)

                if (error) throw error

                const posts = saved.map(s => s.posts).filter(p => p)

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-secondary);">
                            <i style="font-size: 3rem; margin-bottom: 1rem; display: block;">🔖</i>
                            <h3>No Saved Posts</h3>
                            <p>Save posts you love to read them later</p>
                        </div>
                    `
                    return
                }

                container.innerHTML = posts.map(post => `
                    <div class="content-card" onclick="window.location.href='post.html?id=${post.id}'">
                        <h4>${escapeHtml(post.title)}</h4>
                        <p>${escapeHtml(post.content.substring(0, 100))}...</p>
                        <div class="content-card-footer">
                            <span><i>📅</i> ${formatDate(post.created_at)}</span>
                        </div>
                    </div>
                `).join('')
            } catch (error) {
                console.error('Error loading saved posts:', error)
            }
        }

        async function loadUserEbooks() {
            const container = document.getElementById('tab-content')
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>'

            try {
                const { data: unlocks, error } = await supabase
                    .from('unlocks')
                    .select(`
                        ebook_id,
                        ebooks (*)
                    `)
                    .eq('user_id', profileUser.id)
                    .eq('status', 'approved')

                if (error) throw error

                const ebooks = unlocks.map(u => u.ebooks).filter(e => e)

                if (ebooks.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-secondary);">
                            <i style="font-size: 3rem; margin-bottom: 1rem; display: block;">📚</i>
                            <h3>No Ebooks Yet</h3>
                            <p>Visit the ebook library to unlock motivational ebooks</p>
                        </div>
                    `
                    return
                }

                container.innerHTML = ebooks.map(ebook => `
                    <div class="content-card" onclick="window.location.href='ebook-reader.html?id=${ebook.id}'">
                        <h4>${escapeHtml(ebook.title)}</h4>
                        <p>${escapeHtml(ebook.description.substring(0, 100))}...</p>
                        <div class="content-card-footer">
                            <span><i>💰</i> ${ebook.is_paid ? `$${ebook.price}` : 'FREE'}</span>
                        </div>
                    </div>
                `).join('')
            } catch (error) {
                console.error('Error loading ebooks:', error)
            }
        }

        // ============================================
        // AVATAR UPLOAD
        // ============================================
        window.handleAvatarUpload = async (event) => {
            const file = event.target.files[0]
            if (!file) return

            try {
                const result = await uploadProfileImage(file, currentUser.id)
                
                if (result.success) {
                    document.getElementById('profile-avatar-img').src = result.url
                    showNotification('Profile image updated!', 'success')
                    
                    // Update stored user
                    const storedUser = JSON.parse(localStorage.getItem('suprememotive_user') || '{}')
                    storedUser.profile_image = result.url
                    localStorage.setItem('suprememotive_user', JSON.stringify(storedUser))
                } else {
                    throw new Error(result.error)
                }
            } catch (error) {
                showNotification('Error uploading image: ' + error.message, 'error')
            }
        }

        // ============================================
        // EDIT PROFILE
        // ============================================
        window.showEditProfile = () => {
            document.getElementById('profile-view').classList.add('hidden')
            document.getElementById('edit-profile-view').classList.remove('hidden')
            renderEditForm()
        }

        window.cancelEdit = () => {
            document.getElementById('profile-view').classList.remove('hidden')
            document.getElementById('edit-profile-view').classList.add('hidden')
        }

        function renderEditForm() {
            const container = document.getElementById('edit-profile-view')
            
            const countries = [
                'United States', 'United Kingdom', 'Canada', 'Australia',
                'Germany', 'France', 'Spain', 'Italy', 'Japan', 'China',
                'India', 'Brazil', 'Mexico', 'South Africa', 'Nigeria',
                'Egypt', 'Saudi Arabia', 'UAE', 'Singapore', 'Malaysia'
            ]

            const countryOptions = countries.map(country => 
                `<option value="${country}" ${country === profileUser.country ? 'selected' : ''}>${country}</option>`
            ).join('')

            container.innerHTML = `
                <div class="edit-profile-form">
                    <h2>Edit Profile</h2>
                    
                    <form onsubmit="handleProfileUpdate(event)">
                        <div class="form-group">
                            <label for="edit-name">Full Name</label>
                            <input type="text" id="edit-name" value="${escapeHtml(profileUser.name || '')}" required>
                        </div>

                        <div class="form-group">
                            <label for="edit-bio">Bio</label>
                            <textarea id="edit-bio" rows="4">${escapeHtml(profileUser.bio || '')}</textarea>
                        </div>

                        <div class="form-group">
                            <label for="edit-country">Country</label>
                            <select id="edit-country" required>
                                <option value="">Select your country</option>
                                ${countryOptions}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="edit-age">Age</label>
                            <input type="number" id="edit-age" min="13" max="120" value="${profileUser.age || 18}" required>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
                        </div>
                    </form>
                </div>
            `
        }

        window.handleProfileUpdate = async (event) => {
            event.preventDefault()

            const updates = {
                name: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value,
                country: document.getElementById('edit-country').value,
                age: parseInt(document.getElementById('edit-age').value)
            }

            const result = await updateProfile(currentUser.id, updates)

            if (result.success) {
                showNotification('Profile updated successfully!', 'success')
                setTimeout(() => {
                    window.location.reload()
                }, 1500)
            } else {
                showNotification('Error: ' + result.error, 'error')
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        window.showNotification = (message, type = 'success') => {
            const notification = document.createElement('div')
            notification.className = `notification ${type}`
            notification.innerHTML = `
                <i>${type === 'success' ? '✅' : '❌'}</i>
                <span>${message}</span>
            `
            document.body.appendChild(notification)
            setTimeout(() => notification.remove(), 3000)
        }

        // ============================================
        // START APPLICATION
        // ============================================
        init()
    </script>
</body>
</html>
