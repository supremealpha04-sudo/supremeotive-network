<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="#" id="logout-link">Logout</a>
        </div>
    </nav>

    <!-- Profile Content -->
    <main class="container">
        <div id="profile-container">
            <!-- Profile will be loaded here -->
        </div>
        
        <div id="edit-profile-container" class="hidden">
            <!-- Edit profile form will be loaded here -->
        </div>
    </main>

    <script type="module">
        import { getCurrentUser, logoutUser } from './js/auth.js';
        import { getUserProfile, renderProfile, renderEditProfile, editProfile } from './js/profile.js';

        // Global functions
        window.showEditProfile = () => {
            document.getElementById('profile-container').classList.add('hidden');
            document.getElementById('edit-profile-container').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('profile-container').classList.remove('hidden');
            document.getElementById('edit-profile-container').classList.add('hidden');
            loadProfile();
        };

        window.handleProfileUpdate = async (event) => {
            event.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                bio: document.getElementById('bio').value,
                country: document.getElementById('country').value,
                age: parseInt(document.getElementById('age').value)
            };
            
            const imageFile = document.getElementById('profile-image').files[0];
            
            const result = await editProfile(formData, imageFile);
            
            if (result.success) {
                alert('Profile updated successfully!');
                cancelEdit();
            } else {
                alert('Error: ' + result.error);
            }
        };

        async function loadProfile() {
            const { user, profile } = await getCurrentUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Check if viewing another user's profile
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id') || user.id;
            
            const result = await getUserProfile(userId);
            
            if (result.success) {
                const isOwnProfile = userId === user.id;
                renderProfile(result.profile, 'profile-container', isOwnProfile);
                
                if (isOwnProfile) {
                    renderEditProfile(result.profile, 'edit-profile-container');
                }
            }
        }

        // Logout handler
        document.getElementById('logout-link').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
            window.location.href = 'index.html';
        });

        // Initialize
        loadProfile();
    </script>
</body>
</html>
