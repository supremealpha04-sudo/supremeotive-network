<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Profile Card - Matching Home Design */
        .profile-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            position: relative;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        /* Watermark */
        .profile-card::after {
            content: 'SUPREME MOTIVE';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.15);
            transform: rotate(-5deg);
            pointer-events: none;
            z-index: 1;
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            position: relative;
            z-index: 2;
        }

        /* Avatar Section */
        .avatar-section {
            position: relative;
        }

        .avatar-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 35px;
            height: 35px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid var(--bg-color);
            transition: all 0.3s ease;
        }

        .avatar-upload:hover {
            transform: scale(1.1);
            background: var(--electric-blue);
        }

        .avatar-upload span {
            font-size: 1rem;
            color: var(--bg-color);
        }

        /* Profile Info */
        .profile-info {
            flex: 1;
        }

        .name-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .profile-name {
            font-size: 1.8rem;
            color: var(--gold);
        }

        .role-badge {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .profile-email {
            color: var(--electric-blue);
            margin-bottom: 1rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Profile Meta - Like quote tag */
        .profile-meta {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .meta-item span:first-child {
            color: var(--gold);
        }

        .meta-item strong {
            color: var(--text-color);
            margin-left: 0.3rem;
        }

        /* Bio - Like quote text */
        .profile-bio {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--gold);
            padding: 1.2rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Join Date */
        .profile-joined {
            color: var(--text-secondary);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Edit Button */
        .edit-btn {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .edit-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        /* Stats Grid - Like home grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Edit Form - Matching Home Style */
        .edit-form {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--gold);
            position: relative;
        }

        .edit-form::after {
            content: 'SUPREME MOTIVE';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: rgba(255, 215, 0, 0.15);
            transform: rotate(-5deg);
            pointer-events: none;
        }

        .edit-form h2 {
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        select.form-control {
            cursor: pointer;
        }

        .file-input {
            margin-top: 0.5rem;
        }

        .file-input label {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input label:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .file-input input {
            display: none;
        }

        .file-name {
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .image-preview {
            margin-top: 1rem;
            max-width: 100px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .save-btn {
            flex: 1;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            border: none;
            border-radius: 8px;
            color: var(--bg-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .cancel-btn {
            flex: 1;
            padding: 0.8rem;
            background: var(--error);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .name-section {
                justify-content: center;
            }

            .profile-meta {
                justify-content: center;
            }

            .form-actions {
                flex-direction: column;
            }

            .avatar-wrapper {
                width: 100px;
                height: 100px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';
        
        const supabase = window.supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',

        // State

        // DOM Elements
        const profileView = document.getElementById('profileView');

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');

        const avatarUpload = document.getElementById('avatarUpload');
        const fileName = document.getElementById('fileName');
        const imagePreview = document.getElementById('imagePreview');

        // Theme toggle
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // Mobile menu
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // Show alert
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {

        // Check auth
        async function checkAuth() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                currentUser = user;
                
                if (!user) {
                    window.location.href = 'login.html';
                    return false;
                }

                if (user && ADMIN_EMAILS.includes(user.email)) {

                return true;
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = 'login.html';
                return false;
            }
        }

        // Load profile
        async function loadProfile() {
            try {
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (error && error.code === 'PGRST116') {
                    // Profile doesn't exist, create one
                    const { data: newProfile, error: insertError } = await supabase
                        .from('profiles')
                        .insert([{
                            id: currentUser.id,
                            name: currentUser.email.split('@')[0],
                            email: currentUser.email,
                            country: 'Not specified',
                            age: 18,
                            bio: '',
                            role: ADMIN_EMAILS.includes(currentUser.email) ? 
                                (currentUser.email === 'supremealpha04@gmail.com' ? 'super_admin' :
                                 currentUser.email === 'suprememotive43@gmail.com' ? 'post_admin' :
                                 currentUser.email === 'sandrakukk055@gmail.com' ? 'ebook_admin' :
                                 'unlock_admin') : 'user'
                        }])
                        .select()
                        .single();

                    if (insertError) throw insertError;
                    currentProfile = newProfile;
                } else if (error) {
                    throw error;
                } else {
                    currentProfile = profile;
                }

                renderProfile();

            } catch (error) {
                console.error('Error loading profile:', error);
                profileView.innerHTML = `
                    <div class="profile-card">
                        <p style="color: var(--error);">Error loading profile. Please refresh.</p>
                    </div>
                `;
            }
        }

        // Load user stats
        async function loadUserStats() {
            try {
                const { count: postsCount } = await supabase
                    .from('posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('created_by', currentUser.id);

                const { count: commentsCount } = await supabase
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id);

                const { count: unlocksCount } = await supabase
                    .from('unlocks')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id)
                    .eq('status', 'approved');

                const { count: savedCount } = await supabase
                    .from('saved_posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id);

                return {
                    posts: postsCount || 0,
                    comments: commentsCount || 0,
                    unlocks: unlocksCount || 0,
                    saves: savedCount || 0
                };

            } catch (error) {
                console.error('Error loading stats:', error);
                return { posts: 0, comments: 0, unlocks: 0, saves: 0 };
            }
        }

        // Render profile
        async function renderProfile() {
            const stats = await loadUserStats();
            const joinDate = currentProfile.created_at 
                ? new Date(currentProfile.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                  })
                : 'Recently joined';

            const avatarUrl = currentProfile.profile_image_url || 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(currentProfile.name)}&background=FFD700&color=000&size=120&bold=true`;

            const roleDisplay = currentProfile.role !== 'user' 
                ? `<span class="role-badge">${currentProfile.role.replace('_', ' ').toUpperCase()}</span>`
                : '';

            profileView.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar-section">
                            <div class="avatar-wrapper">
                                <img src="${avatarUrl}" 
                                     alt="${currentProfile.name}" 
                                     class="profile-avatar"
                                     onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(currentProfile.name)}&background=FFD700&color=000&size=120&bold=true'">
                            </div>
                            <div class="avatar-upload" onclick="showEditForm()" title="Edit profile picture">
                                <span>✏️</span>
                            </div>
                        </div>

                        <div class="profile-info">
                            <div class="name-section">
                                <h1 class="profile-name">${currentProfile.name}</h1>
                                ${roleDisplay}
                            </div>
                            
                            <div class="profile-email">
                                <span>📧</span>
                                ${currentProfile.email}
                            </div>

                            <div class="profile-meta">
                                <div class="meta-item">
                                    <span>📍</span>
                                    Country: <strong>${currentProfile.country || 'Not specified'}</strong>
                                </div>
                                <div class="meta-item">
                                    <span>🎂</span>
                                    Age: <strong>${currentProfile.age || 'Not specified'}</strong>
                                </div>
                            </div>

                            ${currentProfile.bio ? `
                                <div class="profile-bio">
                                    ${currentProfile.bio}
                                </div>
                            ` : ''}

                            <div class="profile-joined">
                                <span>📅</span>
                                Joined ${joinDate}
                            </div>

                            <button class="edit-btn" onclick="showEditForm()">
                                <span>✏️</span>
                                Edit Profile
                            </button>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${stats.posts}</div>
                            <div class="stat-label">Posts</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.comments}</div>
                            <div class="stat-label">Comments</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.unlocks}</div>
                            <div class="stat-label">Ebooks</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.saves}</div>
                            <div class="stat-label">Saved</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show edit form
        window.showEditForm = () => {
            document.getElementById('name').value = currentProfile.name || '';
            document.getElementById('bio').value = currentProfile.bio || '';
            document.getElementById('country').value = currentProfile.country || '';
            document.getElementById('age').value = currentProfile.age || 18;

            profileView.classList.add('hidden');
            editForm.classList.remove('hidden');
        };

        // Cancel edit
        window.cancelEdit = () => {
            editForm.classList.add('hidden');
            profileView.classList.remove('hidden');
        };

        // Handle file upload
        avatarUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = file.name;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                fileName.textContent = 'No file chosen';
                imagePreview.classList.add('hidden');
            }
        });

        // Handle form submission
        document.getElementById('profileEditForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const country = document.getElementById('country').value;
            const age = parseInt(document.getElementById('age').value);
            const avatarFile = avatarUpload.files[0];

            try {
                let profileImageUrl = currentProfile.profile_image_url;

                // Upload new avatar if selected
                if (avatarFile) {
                    const fileExt = avatarFile.name.split('.').pop();
                    const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
                    const filePath = `profile-images/${fileName}`;

                    const { error: uploadError } = await supabase.storage
                        .from('suprememotive-assets')
                        .upload(filePath, avatarFile);

                    if (uploadError) throw uploadError;

                    const { data: { publicUrl } } = supabase.storage
                        .from('suprememotive-assets')
                        .getPublicUrl(filePath);

                    profileImageUrl = publicUrl;
                }

                // Update profile
                const { error } = await supabase
                    .from('profiles')
                    .update({
                        name,
                        bio,
                        country,
                        age,
                        profile_image_url: profileImageUrl,
                        updated_at: new Date()
                    })
                    .eq('id', currentUser.id);

                if (error) throw error;

                showAlert('Profile updated successfully!');
                cancelEdit();
                await loadProfile();

            } catch (error) {
                console.error('Error updating profile:', error);
                showAlert('Error updating profile: ' + error.message);
            }
        });

        // Initialize
        async function init() {
            initTheme();
            const authed = await checkAuth();
            if (authed) {
                await loadProfile();
            }
        }

        init();
    </script>
</body>
</html>
