<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - My Profile</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        body.light-mode {
            --bg-color: #F5F5F5;
            --card-bg: #FFFFFF;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #DDDDDD;
        }

        /* Navigation */
        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Profile Header */
        .profile-header {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--bg-color);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--bg-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 3rem;
            border: 3px solid white;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .profile-email {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--gold);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Sections */
        .section {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
        }

        textarea.form-control {
            min-height: 80px;
            resize: vertical;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* Ebooks Grid */
        .ebooks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .ebook-item {
            background: var(--bg-color);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .ebook-item:hover {
            border-color: var(--gold);
            transform: translateX(4px);
        }

        .ebook-cover-small {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }

        .ebook-info-small {
            flex: 1;
        }

        .ebook-title-small {
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .ebook-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .read-btn {
            background: var(--gold);
            color: var(--bg-color);
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                z-index: 99;
                border-bottom: 2px solid var(--gold);
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .ebooks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <img src="logo.png" alt="SupremeMotive" onerror="this.style.display='none'">
            <span>SupremeMotive</span>
        </div>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="support.html">Support</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            
            <div class="auth-buttons">
                <span id="userGreeting" class="user-greeting hidden"></span>
                <a href="login.html" class="login-btn" id="loginBtn">Login</a>
                <button class="logout-btn hidden" id="logoutBtn">Logout</button>
            </div>
            
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>

    <main class="container">
        <div id="alertContainer"></div>
        <div id="profileContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        let currentUser = null;
        let userProfile = null;
        let userUnlocks = [];
        let userSavedEbooks = [];
        let paymentHistory = [];

        const profileContent = document.getElementById('profileContent');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.textContent = '☀️';
            } else {
                document.body.classList.remove('light-mode');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
        });

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        function showAlert(message, isError = false) {
            alertContainer.innerHTML = `<div class="alert" style="border-color: ${isError ? '#F44336' : 'var(--gold)'}">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 3000);
        }

        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-dashboard.html';
                    }
                    
                    await loadProfile();
                    await loadUserData();
                } else {
                    loginBtn.classList.remove('hidden');
                    logoutBtn.classList.add('hidden');
                    userGreeting.classList.add('hidden');
                    adminLink.style.display = 'none';
                    profileContent.innerHTML = `
                        <div class="section" style="text-align: center;">
                            <h3>Please Login</h3>
                            <p style="margin: 1rem 0;">You need to be logged in to view your profile.</p>
                            <a href="login.html" class="btn-save" style="display: inline-block; text-decoration: none;">Login Now</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Auth error:', error);
            }
        }

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        async function loadProfile() {
            try {
                let { data: profile, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .maybeSingle();

                if (error && error.code !== 'PGRST116') {
                    console.error('Profile error:', error);
                }

                if (!profile) {
                    const newProfileData = {
                        user_id: currentUser.id,
                        email: currentUser.email,
                        name: currentUser.email.split('@')[0],
                        full_name: currentUser.email.split('@')[0],
                        total_purchases: 0,
                        total_spent_stars: 0,
                        created_at: new Date(),
                        updated_at: new Date()
                    };
                    
                    const { data: newProfile, error: insertError } = await supabaseClient
                        .from('profiles')
                        .insert([newProfileData])
                        .select()
                        .single();

                    if (insertError) {
                        console.error('Error creating profile:', insertError);
                        userProfile = { user_id: currentUser.id, email: currentUser.email, name: currentUser.email.split('@')[0] };
                    } else {
                        userProfile = newProfile;
                    }
                } else {
                    userProfile = profile;
                }
                
                return userProfile;
            } catch (error) {
                console.error('Error loading profile:', error);
                userProfile = { user_id: currentUser?.id, email: currentUser?.email, name: currentUser?.email?.split('@')[0] };
                return userProfile;
            }
        }

        async function loadUserData() {
            try {
                const { data: unlocks } = await supabaseClient
                    .from('unlocks')
                    .select(`*, ebook:ebooks(*)`)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'approved')
                    .order('created_at', { ascending: false });

                userUnlocks = unlocks || [];

                const { data: saved } = await supabaseClient
                    .from('saved_ebooks')
                    .select(`*, ebook:ebooks(*)`)
                    .eq('user_id', currentUser.id);

                userSavedEbooks = saved || [];

                const { data: payments } = await supabaseClient
                    .from('stars_payments')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .eq('status', 'completed')
                    .order('created_at', { ascending: false })
                    .limit(10);

                paymentHistory = payments || [];

                renderProfile();

            } catch (error) {
                console.error('Error loading user data:', error);
                renderProfile();
            }
        }

        async function updateProfile(updates) {
            try {
                const { error } = await supabaseClient
                    .from('profiles')
                    .update({ ...updates, updated_at: new Date() })
                    .eq('user_id', currentUser.id);

                if (error) throw error;
                
                showAlert('Profile updated successfully!');
                await loadProfile();
                renderProfile();
            } catch (error) {
                console.error('Update error:', error);
                showAlert('Error updating profile: ' + error.message, true);
            }
        }

        function renderProfile() {
            if (!userProfile && !currentUser) {
                profileContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
                return;
            }

            const displayName = userProfile?.name || userProfile?.full_name || currentUser?.email?.split('@')[0] || 'User';
            const telegramUsername = userProfile?.telegram_username || '';
            const bio = userProfile?.bio || '';
            const totalStarsSpent = userProfile?.total_spent_stars || 0;
            const totalPurchases = userProfile?.total_purchases || 0;
            const totalUnlocked = userUnlocks.length;
            const totalSaved = userSavedEbooks.length;

            profileContent.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-name">${escapeHtml(displayName)}</div>
                    <div class="profile-email">${escapeHtml(currentUser?.email || '')}</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📚</div>
                        <div class="stat-value">${totalUnlocked}</div>
                        <div class="stat-label">Ebooks Unlocked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-value">${totalStarsSpent}</div>
                        <div class="stat-label">Stars Spent</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-value">${totalPurchases}</div>
                        <div class="stat-label">Total Purchases</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔖</div>
                        <div class="stat-value">${totalSaved}</div>
                        <div class="stat-label">Saved Ebooks</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title"><span>✏️</span> Edit Profile</div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullNameInput" class="form-control" value="${escapeHtml(displayName)}" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Telegram Username</label>
                        <input type="text" id="telegramInput" class="form-control" value="${escapeHtml(telegramUsername)}" placeholder="@username">
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="bioInput" class="form-control" placeholder="Tell us about yourself...">${escapeHtml(bio)}</textarea>
                    </div>
                    <button class="btn-save" onclick="window.saveProfileChanges()">Save Changes</button>
                </div>

                <div class="section">
                    <div class="section-title"><span>📖</span> My Unlocked Ebooks</div>
                    ${userUnlocks.length === 0 ? `
                        <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">You haven't unlocked any ebooks yet. <a href="ebooks.html" style="color: var(--gold);">Browse the library</a> to get started!</p>
                    ` : `
                        <div class="ebooks-grid">
                            ${userUnlocks.map(unlock => `
                                <div class="ebook-item">
                                    <img src="${unlock.ebook?.cover_url || 'https://via.placeholder.com/50x70'}" class="ebook-cover-small" onerror="this.src='https://via.placeholder.com/50x70'">
                                    <div class="ebook-info-small">
                                        <div class="ebook-title-small">${escapeHtml(unlock.ebook?.title || 'Unknown')}</div>
                                        <div class="ebook-date">Unlocked: ${new Date(unlock.created_at).toLocaleDateString()}</div>
                                    </div>
                                    <button class="read-btn" onclick="window.readEbook('${unlock.ebook_id}')">Read</button>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>

                <div class="section">
                    <div class="section-title"><span>🔖</span> Saved for Later</div>
                    ${userSavedEbooks.length === 0 ? `
                        <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No saved ebooks. Click the save button on any ebook to add it here!</p>
                    ` : `
                        <div class="ebooks-grid">
                            ${userSavedEbooks.map(saved => `
                                <div class="ebook-item">
                                    <img src="${saved.ebook?.cover_url || 'https://via.placeholder.com/50x70'}" class="ebook-cover-small" onerror="this.src='https://via.placeholder.com/50x70'">
                                    <div class="ebook-info-small">
                                        <div class="ebook-title-small">${escapeHtml(saved.ebook?.title || 'Unknown')}</div>
                                        <div class="ebook-date">Saved: ${new Date(saved.saved_at).toLocaleDateString()}</div>
                                    </div>
                                    <button class="read-btn" onclick="window.readEbook('${saved.ebook_id}')">Read</button>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>

                <div class="section">
                    <div class="section-title"><span>💳</span> Recent Payments</div>
                    ${paymentHistory.length === 0 ? `
                        <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No payment history yet.</p>
                    ` : `
                        <div style="overflow-x: auto;">
                            <table style="width: 100%; border-collapse: collapse;">
                                <thead>
                                    <tr style="border-bottom: 1px solid var(--border-color);">
                                        <th style="padding: 0.8rem; text-align: left;">Ebook</th>
                                        <th style="padding: 0.8rem; text-align: left;">Stars</th>
                                        <th style="padding: 0.8rem; text-align: left;">Date</th>
                                        <th style="padding: 0.8rem; text-align: left;">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${paymentHistory.map(payment => `
                                        <tr style="border-bottom: 1px solid var(--border-color);">
                                            <td style="padding: 0.8rem;">${escapeHtml(payment.ebook_title || 'Unknown')}</td>
                                            <td style="padding: 0.8rem;">⭐ ${payment.stars_amount}</td>
                                            <td style="padding: 0.8rem;">${new Date(payment.created_at).toLocaleDateString()}</td>
                                            <td style="padding: 0.8rem; color: var(--success);">✅ Completed</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `}
                </div>
            `;
        }

        window.saveProfileChanges = async () => {
            const fullName = document.getElementById('fullNameInput')?.value;
            const telegramUsername = document.getElementById('telegramInput')?.value;
            const bio = document.getElementById('bioInput')?.value;

            const updates = {
                name: fullName,
                full_name: fullName,
                telegram_username: telegramUsername,
                bio: bio,
                updated_at: new Date()
            };

            await updateProfile(updates);
        };

        window.readEbook = (ebookId) => {
            window.open(`ebook-reader.html?id=${ebookId}`, '_blank');
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function init() {
            initTheme();
            await checkAuth();
        }

        init();
    </script>
</body>
</html>
