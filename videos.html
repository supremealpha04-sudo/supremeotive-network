<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Video Hub</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0B1A33 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
            transform: translateY(-3px);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
        }

        /* Filters */
        .filters-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            flex: 1;
            position: relative;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .category-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 0.5rem 1.2rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .sort-select {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-color);
            cursor: pointer;
        }

        /* Videos Grid */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Video Card */
        .video-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .video-thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            overflow: hidden;
        }

        .video-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--bg-color);
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: white;
        }

        .video-info {
            padding: 1rem;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .video-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        .stat-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .stat-btn:hover {
            color: var(--gold);
        }

        .stat-btn.liked {
            color: var(--gold);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            width: 1000px;
            max-height: 90vh;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--gold);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            color: var(--gold);
            font-size: 1.2rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--error);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* Video Player */
        .video-player-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .video-player {
            width: 100%;
            max-height: 500px;
            outline: none;
        }

        /* Video Info */
        .video-info-section {
            margin-bottom: 1rem;
        }

        .video-info-section h3 {
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .video-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Video Actions */
        .video-actions {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            padding: 0.6rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 1rem;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .comments-header h4 {
            color: var(--gold);
        }

        .comment-form {
            margin-bottom: 1rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            resize: vertical;
            min-height: 80px;
            margin-bottom: 0.5rem;
            font-family: inherit;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-form button {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            font-weight: 600;
        }

        .comments-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Comment Thread - Supports Infinite Replies */
        .comment-thread {
            margin-bottom: 1rem;
        }

        .comment {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 1rem;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-color);
            font-weight: bold;
            font-size: 0.8rem;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-color);
            margin-left: 2.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }

        .comment-actions {
            margin-left: 2.5rem;
            display: flex;
            gap: 1rem;
        }

        .reply-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .reply-btn:hover {
            color: var(--gold);
        }

        .reply-form {
            margin-top: 0.8rem;
            margin-left: 2.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .reply-form input {
            flex: 1;
            padding: 0.6rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 0.85rem;
        }

        .reply-form button {
            background: var(--electric-blue);
            color: var(--bg-color);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Nested Replies - Supports Infinite Depth */
        .replies {
            margin-left: 2.5rem;
            margin-top: 0.8rem;
            padding-left: 0.8rem;
            border-left: 2px solid var(--gold);
        }

        .reply {
            margin-bottom: 0.8rem;
        }

        .reply:last-child {
            margin-bottom: 0;
        }

        .reply .comment {
            background: var(--card-bg);
            border-left: 2px solid var(--electric-blue);
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }

            .videos-grid {
                grid-template-columns: 1fr;
            }

            .replies {
                margin-left: 0.8rem;
            }

            .reply-form {
                flex-direction: column;
            }
        }
    </style>

</head>

        let currentUser = null;
        let allVideos = [];
        let currentVideo = null;
        let currentCategory = 'all';
        let searchTerm = '';
        let sortBy = 'latest';
        let userLikes = new Set();
        let commentsCache = {};

        // DOM Elements
        const videosGrid = document.getElementById('videosGrid');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const videoModal = document.getElementById('videoModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const videoPlayer = document.getElementById('videoPlayer');
        const modalTitle = document.getElementById('modalTitle');
        const modalVideoTitle = document.getElementById('modalVideoTitle');
        const modalVideoDescription = document.getElementById('modalVideoDescription');
        const likeBtn = document.getElementById('likeBtn');
        const shareBtn = document.getElementById('shareBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const likeCountSpan = document.getElementById('likeCount');
        const commentCountSpan = document.getElementById('commentCount');

        // ============================================
        // THEME TOGGLE
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // ============================================
        // MOBILE MENU
        // ============================================
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message, type = 'success') {
            alertContainer.innerHTML = `<div class="alert">${type === 'success' ? '✅' : '❌'} ${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 3000);
        }

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                currentUser = user;
                
                if (user) {
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    userGreeting.classList.remove('hidden');
                    userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                    
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.style.display = 'block';
                        adminLink.href = 'admin/admin-videos.html';
                    }
                    
                    await loadUserLikes();
                } else {
                    loginBtn.classList.remove('hidden');
                    logoutBtn.classList.add('hidden');
                    userGreeting.classList.add('hidden');
                    adminLink.style.display = 'none';
                }
            } catch (error) {
                console.error('Auth error:', error);
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.reload();
        });

        // ============================================
        // LOAD USER LIKES
        // ============================================
        async function loadUserLikes() {
            if (!currentUser) return;
            try {
                const { data: likes } = await supabase
                    .from('video_likes')
                    .select('video_id')
                    .eq('user_id', currentUser.id);
                if (likes) userLikes = new Set(likes.map(l => l.video_id));
            } catch (error) {
                console.error('Error loading likes:', error);
            }
        }

        // ============================================
        // LOAD VIDEOS
        // ============================================
        async function loadVideos() {
            try {
                videosGrid.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading videos...</p></div>`;
                
                let query = supabase.from('videos').select('*').order('created_at', { ascending: false });
                const { data: videos, error } = await query;
                if (error) throw error;
                if (!videos || videos.length === 0) {
                    videosGrid.innerHTML = `<div class="loading"><p>No videos yet. Check back soon!</p></div>`;
                    return;
                }

                const videosWithStats = await Promise.all(videos.map(async (video) => {
                    const { count: likesCount } = await supabase.from('video_likes').select('*', { count: 'exact', head: true }).eq('video_id', video.id);
                    const { count: commentsCount } = await supabase.from('video_comments').select('*', { count: 'exact', head: true }).eq('video_id', video.id);
                    const { count: viewsCount } = await supabase.from('video_views').select('*', { count: 'exact', head: true }).eq('video_id', video.id);
                    return { ...video, likes_count: likesCount || 0, comments_count: commentsCount || 0, views_count: viewsCount || 0 };
                }));

                allVideos = videosWithStats;
                filterAndRenderVideos();

            } catch (error) {
                console.error('Error loading videos:', error);
                videosGrid.innerHTML = `<div class="loading"><p>Error loading videos: ${error.message}</p></div>`;
            }
        }

        // ============================================
        // FILTER AND RENDER VIDEOS
        // ============================================
        function filterAndRenderVideos() {
            let filtered = [...allVideos];
            if (currentCategory !== 'all') filtered = filtered.filter(v => v.category === currentCategory);
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(v => v.title.toLowerCase().includes(term) || (v.description && v.description.toLowerCase().includes(term)));
            }
            switch(sortBy) {
                case 'popular': filtered.sort((a, b) => (b.views_count || 0) - (a.views_count || 0)); break;
                case 'most_liked': filtered.sort((a, b) => (b.likes_count || 0) - (a.likes_count || 0)); break;
                default: filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }
            renderVideos(filtered);
        }

        // ============================================
        // RENDER VIDEOS
        // ============================================
        function renderVideos(videos) {
            if (videos.length === 0) {
                videosGrid.innerHTML = `<div class="loading"><p>No videos match your filters.</p></div>`;
                return;
            }

            videosGrid.innerHTML = videos.map(video => {
                const isLiked = userLikes.has(video.id);
                const date = new Date(video.created_at).toLocaleDateString();
                const duration = video.duration ? formatDuration(video.duration) : '';

                return `
                    <div class="video-card" onclick="openVideo('${video.id}')">
                        <div class="video-thumbnail-container">
                            <img src="${video.thumbnail_url || 'https://via.placeholder.com/400x225?text=No+Thumbnail'}" class="video-thumbnail" onerror="this.src='https://via.placeholder.com/400x225?text=Video'">
                            <div class="play-overlay">
                                <div class="play-icon"><i class="fas fa-play"></i></div>
                            </div>
                            ${duration ? `<span class="video-duration">${duration}</span>` : ''}
                        </div>
                        <div class="video-info">
                            <h3 class="video-title">${escapeHtml(video.title)}</h3>
                            <div class="video-meta">
                                <span><i class="fas fa-eye"></i> ${video.views_count || 0}</span>
                                <span><i class="fas fa-calendar"></i> ${date}</span>
                            </div>
                            <div class="video-stats">
                                <button class="stat-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${video.id}')">
                                    <i class="fas fa-heart"></i> ${video.likes_count}
                                </button>
                                <button class="stat-btn" onclick="event.stopPropagation(); openVideo('${video.id}')">
                                    <i class="fas fa-comment"></i> ${video.comments_count}
                                </button>
                                <button class="stat-btn" onclick="event.stopPropagation(); shareVideo('${video.id}')">
                                    <i class="fas fa-share-alt"></i> Share
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ============================================
        // OPEN VIDEO
        // ============================================
        window.openVideo = async (videoId) => {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            currentVideo = video;

            // Record view
            if (currentUser) {
                await supabase.from('video_views').upsert([{ video_id: videoId, user_id: currentUser.id }], { onConflict: 'video_id,user_id' });
            }
            video.views_count = (video.views_count || 0) + 1;

            modalTitle.textContent = video.title;
            modalVideoTitle.textContent = video.title;
            modalVideoDescription.textContent = video.description || 'No description available.';
            videoPlayer.src = video.video_url;
            
            likeCountSpan.textContent = video.likes_count;
            const isLiked = userLikes.has(video.id);
            likeBtn.classList.toggle('liked', isLiked);
            
            await loadComments(videoId);
            filterAndRenderVideos();
            videoModal.classList.add('show');
        };

        // ============================================
        // TOGGLE LIKE
        // ============================================
        window.toggleLike = async (videoId) => {
            if (!currentUser) {
                if (confirm('Please login to like videos')) window.location.href = 'login.html';
                return;
            }
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;

            try {
                if (userLikes.has(videoId)) {
                    await supabase.from('video_likes').delete().eq('video_id', videoId).eq('user_id', currentUser.id);
                    userLikes.delete(videoId);
                    video.likes_count--;
                } else {
                    await supabase.from('video_likes').insert([{ video_id: videoId, user_id: currentUser.id }]);
                    userLikes.add(videoId);
                    video.likes_count++;
                }
                filterAndRenderVideos();
                if (currentVideo && currentVideo.id === videoId) {
                    likeCountSpan.textContent = video.likes_count;
                    likeBtn.classList.toggle('liked', userLikes.has(videoId));
                }
            } catch (error) {
                showAlert('Error updating like', 'error');
            }
        };

        // ============================================
        // SHARE VIDEO
        // ============================================
        window.shareVideo = (videoId) => {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            const url = `${window.location.origin}/videos.html?id=${videoId}`;
            if (navigator.share) {
                navigator.share({ title: video.title, text: 'Check out this video!', url: url });
            } else {
                navigator.clipboard.writeText(url);
                showAlert('Link copied to clipboard!');
            }
        };

        // ============================================
        // DOWNLOAD VIDEO
        // ============================================
        downloadBtn.addEventListener('click', () => {
            if (!currentVideo) return;
            const link = document.createElement('a');
            link.href = currentVideo.video_url;
            link.download = `${currentVideo.title}.mp4`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showAlert('Download started!');
        });

        // ============================================
        // LOAD COMMENTS - Supports Infinite Nesting
        // ============================================
        async function loadComments(videoId) {
            try {
                const { data: comments, error } = await supabase
                    .from('video_comments')
                    .select(`
                        *,
                        profiles:user_id (name)
                    `)
                    .eq('video_id', videoId)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                // Build comment tree (supports infinite nesting)
                const commentMap = new Map();
                const rootComments = [];

                comments?.forEach(comment => {
                    commentMap.set(comment.id, { ...comment, children: [] });
                });

                comments?.forEach(comment => {
                    const node = commentMap.get(comment.id);
                    if (comment.parent_id && commentMap.has(comment.parent_id)) {
                        commentMap.get(comment.parent_id).children.push(node);
                    } else {
                        rootComments.push(node);
                    }
                });

                renderCommentTree(rootComments, videoId);
                commentCountSpan.textContent = comments?.length || 0;

            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        // ============================================
        // RENDER COMMENT TREE - Recursive for infinite nesting
        // ============================================
        function renderCommentTree(comments, videoId, level = 0) {
            const container = document.getElementById('commentsList');
            if (!container) return;

            if (level === 0) {
                if (comments.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">No comments yet. Be the first!</p>';
                    return;
                }
                container.innerHTML = '';
            }

            comments.forEach(comment => {
                const commentDate = new Date(comment.created_at).toLocaleString();
                const authorName = comment.profiles?.name || 'User';
                const authorInitial = authorName.charAt(0).toUpperCase();
                const marginLeft = level * 20;

                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment-thread';
                commentDiv.innerHTML = `
                    <div class="comment" data-comment-id="${comment.id}" style="${marginLeft ? `margin-left: ${marginLeft}px;` : ''}">
                        <div class="comment-header">
                            <div class="comment-avatar">${authorInitial}</div>
                            <span class="comment-author">${escapeHtml(authorName)}</span>
                            <span class="comment-date">${commentDate}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                        <div class="comment-actions">
                            ${currentUser ? `<button class="reply-btn" onclick="showReplyForm('${comment.id}')">💬 Reply</button>` : ''}
                        </div>
                        <div id="replyForm-${comment.id}" class="reply-form hidden">
                            <input type="text" id="replyInput-${comment.id}" placeholder="Write a reply...">
                            <button onclick="submitReply('${comment.id}', '${videoId}')">Reply</button>
                        </div>
                    </div>
                `;
                container.appendChild(commentDiv);

                if (comment.children && comment.children.length > 0) {
                    const repliesContainer = document.createElement('div');
                    repliesContainer.className = 'replies';
                    container.appendChild(repliesContainer);
                    const originalContainer = document.getElementById('commentsList');
                    document.getElementById('commentsList').appendChild(repliesContainer);
                    renderCommentTreeInContainer(comment.children, repliesContainer, videoId, level + 1);
                }
            });
        }

        function renderCommentTreeInContainer(comments, container, videoId, level) {
            comments.forEach(comment => {
                const commentDate = new Date(comment.created_at).toLocaleString();
                const authorName = comment.profiles?.name || 'User';
                const authorInitial = authorName.charAt(0).toUpperCase();

                const replyDiv = document.createElement('div');
                replyDiv.className = 'reply';
                replyDiv.innerHTML = `
                    <div class="comment" data-comment-id="${comment.id}">
                        <div class="comment-header">
                            <div class="comment-avatar">${authorInitial}</div>
                            <span class="comment-author">${escapeHtml(authorName)}</span>
                            <span class="comment-date">${commentDate}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                        <div class="comment-actions">
                            ${currentUser ? `<button class="reply-btn" onclick="showReplyForm('${comment.id}')">💬 Reply</button>` : ''}
                        </div>
                        <div id="replyForm-${comment.id}" class="reply-form hidden">
                            <input type="text" id="replyInput-${comment.id}" placeholder="Write a reply...">
                            <button onclick="submitReply('${comment.id}', '${videoId}')">Reply</button>
                        </div>
                    </div>
                `;
                container.appendChild(replyDiv);

                if (comment.children && comment.children.length > 0) {
                    const subContainer = document.createElement('div');
                    subContainer.className = 'replies';
                    container.appendChild(subContainer);
                    renderCommentTreeInContainer(comment.children, subContainer, videoId, level + 1);
                }
            });
        }

        // ============================================
        // ADD COMMENT
        // ============================================
        window.addComment = async () => {
            if (!currentUser) {
                showAlert('Please login to comment');
                return;
            }
            if (!currentVideo) return;

            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) { showAlert('Please enter a comment'); return; }

            try {
                await supabase.from('video_comments').insert([{
                    video_id: currentVideo.id,
                    user_id: currentUser.id,
                    content: content
                }]);
                input.value = '';
                await loadComments(currentVideo.id);
                currentVideo.comments_count = (currentVideo.comments_count || 0) + 1;
                filterAndRenderVideos();
                showAlert('Comment posted!');
            } catch (error) {
                showAlert('Error posting comment', 'error');
            }
        };

        // ============================================
        // SHOW REPLY FORM
        // ============================================
        window.showReplyForm = (commentId) => {
            const form = document.getElementById(`replyForm-${commentId}`);
            if (form) {
                form.classList.toggle('hidden');
                if (!form.classList.contains('hidden')) {
                    document.getElementById(`replyInput-${commentId}`).focus();
                }
            }
        };

        // ============================================
        // SUBMIT REPLY - Supports infinite nesting
        // ============================================
        window.submitReply = async (commentId, videoId) => {
            if (!currentUser) { showAlert('Please login to reply'); return; }
            const input = document.getElementById(`replyInput-${commentId}`);
            const content = input.value.trim();
            if (!content) { showAlert('Please enter a reply'); return; }

            try {
                await supabase.from('video_comments').insert([{
                    video_id: videoId,
                    user_id: currentUser.id,
                    content: content,
                    parent_id: commentId
                }]);
                input.value = '';
                document.getElementById(`replyForm-${commentId}`).classList.add('hidden');
                await loadComments(videoId);
                currentVideo.comments_count = (currentVideo.comments_count || 0) + 1;
                filterAndRenderVideos();
                showAlert('Reply posted!');
            } catch (error) {
                showAlert('Error posting reply', 'error');
            }
        };

        // ============================================
        // MODAL CONTROLS
        // ============================================
        likeBtn.addEventListener('click', () => {
            if (currentVideo) toggleLike(currentVideo.id);
        });
        shareBtn.addEventListener('click', () => {
            if (currentVideo) shareVideo(currentVideo.id);
        });
        closeModalBtn.addEventListener('click', () => {
            videoModal.classList.remove('show');
            videoPlayer.pause();
        });
        window.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                videoModal.classList.remove('show');
                videoPlayer.pause();
            }
        });

        // ============================================
        // FILTERS
        // ============================================
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                filterAndRenderVideos();
            });
        });
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            filterAndRenderVideos();
        });
        sortSelect.addEventListener('change', (e) => {
            sortBy = e.target.value;
            filterAndRenderVideos();
        });

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            initTheme();
            await checkAuth();
            await loadVideos();
        }
        init();
    </script>
</body>
</html>
