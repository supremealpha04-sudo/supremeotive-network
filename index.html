<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Quotes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        /* Main Content */
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        /* Quote Card - Exactly like the image */
        .quote-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .quote-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        /* Quote Text */
        .quote-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        /* Category/Tag */
        .quote-tag {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quote-tag span {
            color: var(--gold);
        }

        /* Action Buttons - Exactly like the image */
        .quote-actions {
            display: flex;
            gap: 2rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0;
            transition: color 0.3s ease;
        }

        .action-btn:hover {
            color: var(--gold);
        }

        .action-btn.liked {
            color: var(--gold);
        }

        .action-btn.saved {
            color: var(--electric-blue);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .quote-actions {
                gap: 1rem;
                justify-content: space-between;
            }

            .action-btn span:last-child {
                display: none;
            }

            .action-btn {
                font-size: 1.2rem;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="logo">SupremeMotive</div>
        
        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="support.html">Support</a>
            <a href="#" id="adminLink" style="display: none;">Admin</a>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </nav>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="header">
            <h1>Daily Motivation</h1>
            <p>Quotes to inspire your day</p>
        </div>

        <!-- Categories -->
        <div class="categories" id="categories">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="life">Life</button>
            <button class="category-btn" data-category="success">Success</button>
            <button class="category-btn" data-category="love">Love</button>
            <button class="category-btn" data-category="wisdom">Wisdom</button>
            <button class="category-btn" data-category="motivation">Motivation</button>
        </div>

        <div id="alertContainer"></div>

        <!-- Quotes Container -->
        <div id="quotesContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading quotes...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        const supabase = createClient(
            'https://dzcykpbfykajhoutzhpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg'
        )

        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        // Sample quotes data
        const quotes = [
            {
                id: '1',
                text: 'Actions lie just like words so if you don\'t mean it stop doing it.',
                author: 'Unknown',
                category: 'life',
                tag: 'Tr',
                likes: 1243,
                saves: 567
            },
            {
                id: '2',
                text: 'The only way to do great work is to love what you do.',
                author: 'Steve Jobs',
                category: 'success',
                tag: 'St',
                likes: 2341,
                saves: 1234
            },
            {
                id: '3',
                text: 'Life is what happens when you\'re busy making other plans.',
                author: 'John Lennon',
                category: 'life',
                tag: 'Lf',
                likes: 1892,
                saves: 892
            },
            {
                id: '4',
                text: 'The future belongs to those who believe in the beauty of their dreams.',
                author: 'Eleanor Roosevelt',
                category: 'motivation',
                tag: 'Mv',
                likes: 2156,
                saves: 1456
            },
            {
                id: '5',
                text: 'Success is not final, failure is not fatal: it is the courage to continue that counts.',
                author: 'Winston Churchill',
                category: 'success',
                tag: 'Sc',
                likes: 3124,
                saves: 2134
            },
            {
                id: '6',
                text: 'The best way to predict the future is to create it.',
                author: 'Peter Drucker',
                category: 'wisdom',
                tag: 'Wd',
                likes: 1678,
                saves: 978
            },
            {
                id: '7',
                text: 'Happiness is not something ready made. It comes from your own actions.',
                author: 'Dalai Lama',
                category: 'wisdom',
                tag: 'Hp',
                likes: 1987,
                saves: 1087
            },
            {
                id: '8',
                text: 'The greatest glory in living lies not in never falling, but in rising every time we fall.',
                author: 'Nelson Mandela',
                category: 'motivation',
                tag: 'Mv',
                likes: 2876,
                saves: 1876
            }
        ]

        let currentUser = null
        let userLikes = new Set()
        let userSaves = new Set()
        let currentCategory = 'all'

        // DOM Elements
        const quotesContainer = document.getElementById('quotesContainer')
        const alertContainer = document.getElementById('alertContainer')
        const menuToggle = document.getElementById('menuToggle')
        const navLinks = document.getElementById('navLinks')
        const themeToggle = document.getElementById('themeToggle')
        const adminLink = document.getElementById('adminLink')
        const categoryBtns = document.querySelectorAll('.category-btn')

        // Theme handling
        function initTheme() {
            const savedTheme = localStorage.getItem('theme')
            if (savedTheme === 'light') {
                document.body.style.setProperty('--bg-color', '#F5F5F5')
                document.body.style.setProperty('--card-bg', '#FFFFFF')
                document.body.style.setProperty('--text-color', '#333333')
                document.body.style.setProperty('--text-secondary', '#666666')
                document.body.style.setProperty('--border-color', '#DDDDDD')
                themeToggle.textContent = '☀️'
            } else {
                document.body.style.setProperty('--bg-color', '#0A0A0A')
                document.body.style.setProperty('--card-bg', '#1A1A1A')
                document.body.style.setProperty('--text-color', '#FFFFFF')
                document.body.style.setProperty('--text-secondary', '#B0B0B0')
                document.body.style.setProperty('--border-color', '#333333')
                themeToggle.textContent = '🌙'
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = document.body.style.getPropertyValue('--bg-color') === '#F5F5F5'
            if (isLight) {
                document.body.style.setProperty('--bg-color', '#0A0A0A')
                document.body.style.setProperty('--card-bg', '#1A1A1A')
                document.body.style.setProperty('--text-color', '#FFFFFF')
                document.body.style.setProperty('--text-secondary', '#B0B0B0')
                document.body.style.setProperty('--border-color', '#333333')
                themeToggle.textContent = '🌙'
                localStorage.setItem('theme', 'dark')
            } else {
                document.body.style.setProperty('--bg-color', '#F5F5F5')
                document.body.style.setProperty('--card-bg', '#FFFFFF')
                document.body.style.setProperty('--text-color', '#333333')
                document.body.style.setProperty('--text-secondary', '#666666')
                document.body.style.setProperty('--border-color', '#DDDDDD')
                themeToggle.textContent = '☀️'
                localStorage.setItem('theme', 'light')
            }
        })

        // Mobile menu
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active')
        })

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active')
            })
        })

        // Check auth
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user
            
            if (user && ADMIN_EMAILS.includes(user.email)) {
                adminLink.style.display = 'block'
                adminLink.href = 'admin/admin-dashboard.html'
            }
        }

        // Show alert
        function showAlert(message) {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 2000)
        }

        // Render quotes
        function renderQuotes() {
            const filteredQuotes = currentCategory === 'all' 
                ? quotes 
                : quotes.filter(q => q.category === currentCategory)

            if (filteredQuotes.length === 0) {
                quotesContainer.innerHTML = `
                    <div class="loading">
                        <p>No quotes in this category</p>
                    </div>
                `
                return
            }

            quotesContainer.innerHTML = filteredQuotes.map(quote => `
                <div class="quote-card" data-id="${quote.id}">
                    <div class="quote-text">
                        ${quote.text}
                    </div>
                    
                    <div class="quote-tag">
                        <span>${quote.tag}</span> ${quote.category.charAt(0).toUpperCase() + quote.category.slice(1)} Quotes
                    </div>

                    <div class="quote-actions">
                        <button class="action-btn like-btn ${userLikes.has(quote.id) ? 'liked' : ''}" onclick="handleLike('${quote.id}')">
                            <span>❤️</span>
                            <span>${quote.likes + (userLikes.has(quote.id) ? 1 : 0)}</span>
                        </button>
                        <button class="action-btn save-btn ${userSaves.has(quote.id) ? 'saved' : ''}" onclick="handleSave('${quote.id}')">
                            <span>🔖</span>
                            <span>Save</span>
                        </button>
                        <button class="action-btn" onclick="copyQuote('${quote.id}')">
                            <span>📋</span>
                            <span>Copy</span>
                        </button>
                        <button class="action-btn" onclick="shareQuote('${quote.id}')">
                            <span>📤</span>
                            <span>Share</span>
                        </button>
                    </div>
                </div>
            `).join('')
        }

        // Handle like
        window.handleLike = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to like quotes')) {
                    window.location.href = 'login.html'
                }
                return
            }

            if (userLikes.has(quoteId)) {
                userLikes.delete(quoteId)
            } else {
                userLikes.add(quoteId)
            }
            renderQuotes()
        }

        // Handle save
        window.handleSave = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to save quotes')) {
                    window.location.href = 'login.html'
                }
                return
            }

            if (userSaves.has(quoteId)) {
                userSaves.delete(quoteId)
                showAlert('Quote removed from saved')
            } else {
                userSaves.add(quoteId)
                showAlert('Quote saved!')
            }
            renderQuotes()
        }

        // Copy quote
        window.copyQuote = (quoteId) => {
            const quote = quotes.find(q => q.id === quoteId)
            const text = `"${quote.text}" — ${quote.author}`
            navigator.clipboard.writeText(text)
            showAlert('Quote copied to clipboard!')
        }

        // Share quote
        window.shareQuote = (quoteId) => {
            const quote = quotes.find(q => q.id === quoteId)
            const text = `"${quote.text}" — ${quote.author}`
            
            if (navigator.share) {
                navigator.share({
                    title: 'SupremeMotive Quote',
                    text: text,
                })
            } else {
                copyQuote(quoteId)
            }
        }

        // Category filtering
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'))
                btn.classList.add('active')
                currentCategory = btn.dataset.category
                renderQuotes()
            })
        })

        // Initialize
        async function init() {
            initTheme()
            await checkAuth()
            renderQuotes()
        }

        init()
    </script>
</body>
</html>
