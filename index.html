<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Motivation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/feed.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" id="profile-link">Profile</a>
            <a href="login.html" id="auth-link">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="feed-container" id="feed-container">
            <!-- Posts will be loaded here -->
        </div>
    </main>

    <!-- Scripts -->
    <script type="module">
        import { fetchPosts, renderFeed, toggleLike } from './js/feed.js';
        import { getCurrentUser } from './js/auth.js';
        import { addComment } from './js/comments.js';

        // Global functions for inline handlers
        window.handleLike = async (postId) => {
            const result = await toggleLike(postId);
            if (result.success) {
                loadFeed();
            }
        };

        window.toggleComments = async (postId) => {
            const commentsSection = document.getElementById(`comments-${postId}`);
            if (commentsSection.classList.contains('hidden')) {
                const { comments } = await fetchComments(postId);
                renderComments(comments, `comments-${postId}`, postId);
            } else {
                commentsSection.classList.add('hidden');
            }
        };

        window.handleAddComment = async (postId) => {
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();
            
            if (content) {
                const result = await addComment(postId, content);
                if (result.success) {
                    input.value = '';
                    toggleComments(postId);
                }
            }
        };

        window.sharePost = (postId) => {
            const url = `${window.location.origin}/post.html?id=${postId}`;
            navigator.clipboard.writeText(url);
            alert('Link copied to clipboard!');
        };

        // Load feed
        async function loadFeed() {
            const result = await fetchPosts();
            if (result.success) {
                renderFeed(result.posts, 'feed-container');
            }
        }

        // Check authentication
        async function checkAuth() {
            const { user } = await getCurrentUser();
            const authLink = document.getElementById('auth-link');
            const profileLink = document.getElementById('profile-link');
            
            if (user) {
                authLink.textContent = 'Logout';
                authLink.href = '#';
                authLink.onclick = async (e) => {
                    e.preventDefault();
                    const { logoutUser } = await import('./js/auth.js');
                    await logoutUser();
                    window.location.reload();
                };
            } else {
                authLink.textContent = 'Login';
                authLink.href = 'login.html';
                authLink.onclick = null;
            }
        }

        // Initialize
        loadFeed();
        checkAuth();
    </script>
</body>
</html>
