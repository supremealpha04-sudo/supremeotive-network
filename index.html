<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Quotes</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SupremeMotive">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .categories {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .quote-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            position: relative;
        }

        .quote-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .quote-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            color: var(--text-color);
            font-style: italic;
        }

        .quote-tag {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quote-tag span {
            color: var(--gold);
            font-weight: bold;
        }

        .quote-actions {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 70px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.saved {
            background: var(--electric-blue);
            color: var(--bg-color);
            border-color: var(--electric-blue);
        }

        .like-count {
            font-weight: bold;
            color: inherit;
            min-width: 25px;
            display: inline-block;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        .offline-badge {
            background: #F44336;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .auth-buttons {
                flex-direction: column;
                width: 100%;
            }

            .login-btn, .logout-btn {
                width: 100%;
                text-align: center;
            }

            .quote-actions {
                gap: 0.3rem;
            }

            .action-btn {
                min-width: calc(50% - 0.3rem);
                font-size: 0.85rem;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <img src="logo.png" alt="SupremeMotive" onerror="this.style.display='none'">
            <span>SupremeMotive</span>
            <span id="offlineIndicator" class="offline-badge hidden">Offline</span>
        </div>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>

                <span id="userGreeting" class="user-greeting hidden"></span>

    </nav>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="ebooks.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Ebooks</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
        <a href="post.html" class="nav-item">
            <span class="nav-icon">📰</span>

    <main class="container">
        <div class="header">
            <h1>Daily Motivation</h1>
            <p>Inspire your day with powerful quotes</p>
        </div>

        <div class="categories" id="categories">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="life">Life</button>
            <button class="category-btn" data-category="success">Success</button>
            <button class="category-btn" data-category="love">Love</button>
            <button class="category-btn" data-category="wisdom">Wisdom</button>
            <button class="category-btn" data-category="motivation">Motivation</button>
            <button class="category-btn" data-category="happiness">Happiness</button>
        </div>

        <div id="alertContainer"></div>

        <div id="quotesContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading quotes...</p>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // PWA & OFFLINE DETECTION
        // ============================================
        const offlineIndicator = document.getElementById('offlineIndicator');
        
        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineIndicator.classList.add('hidden');
                console.log('Application is online');
            } else {
                offlineIndicator.classList.remove('hidden');
                showAlert('You are offline. Some features may be limited.', 'warning');
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }

        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Y3lrcGJmeWthamhvdXR6aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDcxNjQsImV4cCI6MjA4ODE4MzE2NH0.IcuAZj89hwpeRGokawx-V-6BAQtwsiOTBIS_E5-TSMg';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ];

        // Sample quotes (fallback for offline)
        const sampleQuotes = [
            {
                id: '1',
                text: 'Actions lie just like words so if you don\'t mean it stop doing it.',
                author: 'Unknown',
                category: 'life',
                tag: 'Tr'
            },
            {
                id: '2',
                text: 'The only way to do great work is to love what you do.',
                author: 'Steve Jobs',
                category: 'success',
                tag: 'St'
            },
            {
                id: '3',
                text: 'Life is what happens when you\'re busy making other plans.',
                author: 'John Lennon',
                category: 'life',
                tag: 'Lf'
            },
            {
                id: '4',
                text: 'The future belongs to those who believe in the beauty of their dreams.',
                author: 'Eleanor Roosevelt',
                category: 'motivation',
                tag: 'Mv'
            }
        ];

        // State
        let currentUser = null;
        let currentCategory = 'all';
        let quotes = [];
        let userLikes = new Set();
        let userSaves = new Set();

        // DOM Elements
        const quotesContainer = document.getElementById('quotesContainer');
        const alertContainer = document.getElementById('alertContainer');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const themeToggle = document.getElementById('themeToggle');
        const adminLink = document.getElementById('adminLink');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');
        const categoryBtns = document.querySelectorAll('.category-btn');

        // ============================================
        // THEME TOGGLE
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() === '#F5F5F5';
            if (isLight) {
                document.documentElement.style.setProperty('--bg-color', '#0A0A0A');
                document.documentElement.style.setProperty('--card-bg', '#1A1A1A');
                document.documentElement.style.setProperty('--text-color', '#FFFFFF');
                document.documentElement.style.setProperty('--text-secondary', '#B0B0B0');
                document.documentElement.style.setProperty('--border-color', '#333333');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#F5F5F5');
                document.documentElement.style.setProperty('--card-bg', '#FFFFFF');
                document.documentElement.style.setProperty('--text-color', '#333333');
                document.documentElement.style.setProperty('--text-secondary', '#666666');
                document.documentElement.style.setProperty('--border-color', '#DDDDDD');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });

        // ============================================
        // MOBILE MENU
        // ============================================
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message, type = 'success') {
            alertContainer.innerHTML = `<div class="alert">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 2000);
        }

        // ============================================
        // UPDATE AUTH UI
        // ============================================
        function updateAuthUI(user) {
            if (user) {
                // User is logged in
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userGreeting.classList.remove('hidden');
                userGreeting.textContent = `Hi, ${user.email.split('@')[0]}!`;
                
                // Check if admin
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block';
                    adminLink.href = 'admin/admin-dashboard.html';
                } else {
                    adminLink.style.display = 'none';
                }
            } else {
                // User is logged out
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userGreeting.classList.add('hidden');
                adminLink.style.display = 'none';
            }
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                currentUser = user;
                
                // Update UI based on auth state
                updateAuthUI(user);

                if (user) {
                    await loadUserInteractions();
                }
            } catch (error) {
                console.error('Auth error:', error);
                updateAuthUI(null);
            }
        }

        // ============================================
        // LOGOUT FUNCTION
        // ============================================
        async function handleLogout() {
            try {
                await supabaseClient.auth.signOut();
                currentUser = null;
                userLikes.clear();
                userSaves.clear();
                updateAuthUI(null);
                renderQuotes();
                showAlert('Logged out successfully');
            } catch (error) {
                console.error('Logout error:', error);
                showAlert('Error logging out');
            }
        }

        logoutBtn.addEventListener('click', handleLogout);

        // ============================================
        // LOAD USER INTERACTIONS
        // ============================================
        async function loadUserInteractions() {
            if (!currentUser) return;

            try {
                // Load REAL likes from database
                const { data: likes } = await supabaseClient
                    .from('quote_likes')
                    .select('quote_id')
                    .eq('user_id', currentUser.id);

                if (likes) {
                    userLikes = new Set(likes.map(l => l.quote_id));
                }

                // Load saves
                const { data: saves } = await supabaseClient
                    .from('quote_saves')
                    .select('quote_id')
                    .eq('user_id', currentUser.id);

                if (saves) {
                    userSaves = new Set(saves.map(s => s.quote_id));
                }
            } catch (error) {
                console.error('Error loading interactions:', error);
            }
        }

        // ============================================
        // LOAD QUOTES WITH OFFLINE SUPPORT
        // ============================================
        async function loadQuotes() {
            try {
                // Try to load from network first
                const { data, error } = await supabaseClient
                    .from('quotes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    quotes = data;
                    // Cache quotes for offline use
                    localStorage.setItem('cachedQuotes', JSON.stringify(data));
                } else {
                    // If no data from network, try cache
                    const cached = localStorage.getItem('cachedQuotes');
                    if (cached) {
                        quotes = JSON.parse(cached);
                    } else {
                        quotes = sampleQuotes;
                    }
                }

                renderQuotes();

            } catch (error) {
                console.error('Error loading quotes:', error);
                // On error, load from cache or samples
                const cached = localStorage.getItem('cachedQuotes');
                if (cached) {
                    quotes = JSON.parse(cached);
                } else {
                    quotes = sampleQuotes;
                }
                renderQuotes();
                
                if (!navigator.onLine) {
                    showAlert('You are offline. Showing cached quotes.', 'warning');
                }
            }
        }

        // ============================================
        // GET REAL LIKE COUNT
        // ============================================
        async function getLikeCount(quoteId) {
            try {
                const { count, error } = await supabaseClient
                    .from('quote_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('quote_id', quoteId);
                
                if (error) throw error;
                return count || 0;
            } catch (error) {
                console.error('Error getting like count:', error);
                return 0;
            }
        }

        // ============================================
        // SHARE QUOTE - WORKING PERFECTLY
        // ============================================
        window.shareQuote = (quoteId) => {
            const quote = quotes.find(q => q.id === quoteId);
            
            // Create share text with quote, author, and site link
            const shareText = `"${quote.text}" — ${quote.author}`;
            const shareUrl = window.location.href;
            const fullMessage = `${shareText}\n\nShared from SupremeMotive\n${shareUrl}`;
            
            if (navigator.share) {
                // Mobile share with Web Share API
                navigator.share({
                    title: 'SupremeMotive Quote',
                    text: shareText,
                    url: shareUrl
                }).then(() => {
                    showAlert('Shared successfully!');
                }).catch((error) => {
                    console.log('Share cancelled or failed:', error);
                    // Fallback to copy
                    copyToClipboard(fullMessage);
                });
            } else {
                // Desktop fallback - copy to clipboard
                copyToClipboard(fullMessage);
            }
        };

        // ============================================
        // COPY TO CLIPBOARD
        // ============================================
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert('Quote copied to clipboard! Share it anywhere.');
            }).catch(() => {
                showAlert('Could not copy quote. Please try again.');
            });
        }

        // ============================================
        // RENDER QUOTES
        // ============================================
        async function renderQuotes() {
            let filteredQuotes = [...quotes];

            if (currentCategory !== 'all') {
                filteredQuotes = filteredQuotes.filter(q => q.category === currentCategory);
            }

            if (filteredQuotes.length === 0) {
                quotesContainer.innerHTML = `
                    <div class="loading">
                        <p>No quotes in this category</p>
                    </div>
                `;
                return;
            }

            // Get real like counts for all quotes (if online)
            let quotesWithLikes = filteredQuotes;
            if (navigator.onLine) {
                quotesWithLikes = await Promise.all(filteredQuotes.map(async (quote) => {
                    const likeCount = await getLikeCount(quote.id);
                    return { ...quote, likeCount };
                }));
            } else {
                // Use cached like counts or 0 when offline
                quotesWithLikes = filteredQuotes.map(quote => ({
                    ...quote,
                    likeCount: 0
                }));
            }

            quotesContainer.innerHTML = quotesWithLikes.map(quote => {
                const isLiked = userLikes.has(quote.id);
                const isSaved = userSaves.has(quote.id);
                const displayLikeCount = quote.likeCount + (isLiked ? 1 : 0);

                return `
                    <div class="quote-card">
                        <div class="quote-text">${quote.text}</div>
                        <div class="quote-tag"><span>${quote.tag}</span> ${quote.category.charAt(0).toUpperCase() + quote.category.slice(1)} Quotes</div>
                        <div class="quote-actions">
                            <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" onclick="handleLike('${quote.id}')" ${!navigator.onLine ? 'disabled' : ''}>
                                <span>❤️</span>
                                <span class="like-count">${displayLikeCount}</span>
                            </button>
                            <button class="action-btn save-btn ${isSaved ? 'saved' : ''}" onclick="handleSave('${quote.id}')" ${!navigator.onLine ? 'disabled' : ''}>
                                <span>🔖</span>
                                <span>Save</span>
                            </button>
                            <button class="action-btn" onclick="downloadQuote('${quote.id}')">
                                <span>📥</span>
                                <span>Download</span>
                            </button>
                            <button class="action-btn" onclick="shareQuote('${quote.id}')">
                                <span>📤</span>
                                <span>Share</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // HANDLE LIKE - REAL LIKE
        // ============================================
        window.handleLike = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to like quotes')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            if (!navigator.onLine) {
                showAlert('You need to be online to like quotes', 'warning');
                return;
            }

            try {
                if (userLikes.has(quoteId)) {
                    // Unlike - remove from database
                    await supabaseClient
                        .from('quote_likes')
                        .delete()
                        .eq('quote_id', quoteId)
                        .eq('user_id', currentUser.id);

                    userLikes.delete(quoteId);
                } else {
                    // Like - add to database
                    await supabaseClient
                        .from('quote_likes')
                        .insert([{ 
                            quote_id: quoteId, 
                            user_id: currentUser.id 
                        }]);

                    userLikes.add(quoteId);
                }

                // Re-render to show updated count
                renderQuotes();

            } catch (error) {
                console.error('Error liking quote:', error);
                showAlert('Error updating like');
            }
        };

        // ============================================
        // HANDLE SAVE
        // ============================================
        window.handleSave = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to save quotes')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            if (!navigator.onLine) {
                showAlert('You need to be online to save quotes', 'warning');
                return;
            }

            try {
                if (userSaves.has(quoteId)) {
                    await supabaseClient
                        .from('quote_saves')
                        .delete()
                        .eq('quote_id', quoteId)
                        .eq('user_id', currentUser.id);

                    userSaves.delete(quoteId);
                    showAlert('Quote removed from saved');
                } else {
                    await supabaseClient
                        .from('quote_saves')
                        .insert([{ 
                            quote_id: quoteId, 
                            user_id: currentUser.id 
                        }]);

                    userSaves.add(quoteId);
                    showAlert('Quote saved!');
                }

                renderQuotes();

            } catch (error) {
                console.error('Error saving quote:', error);
                showAlert('Error saving quote');
            }
        };

        // ============================================
        // DOWNLOAD QUOTE - EXACTLY LIKE YOUR DESIGN
        // ============================================
        window.downloadQuote = (quoteId) => {
            const quote = quotes.find(q => q.id === quoteId);
            
            // Create canvas with exact dimensions from your design
            const canvas = document.createElement('canvas');
            canvas.width = 380;
            canvas.height = 380;
            const ctx = canvas.getContext('2d');

            // Black background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Opening quote mark - top left
            ctx.font = 'bold 50px Georgia, serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('“', 25, 20);

            // Quote text - centered, 28px bold
            ctx.font = 'bold 28px Arial, Helvetica, sans-serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            
            // Word wrap for long quotes
            const words = quote.text.split(' ');
            let line = '';
            let lines = [];
            let y = 100;

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > 300 && n > 0) {
                    lines.push(line);
                    line = words[n] + ' ';
                } else {
                    line = testLine;
                }
            }
            lines.push(line);

            // Draw quote lines
            lines.forEach((line, index) => {
                ctx.fillText(line, 190, y + (index * 40));
            });

            // Closing quote mark - bottom right
            ctx.font = 'bold 50px Georgia, serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('”', 355, 300);

            // Tag at bottom right - dashed border with "supreme motive"
            const tagText = 'supreme motive';
            
            // Draw dashed rectangle
            ctx.strokeStyle = '#FFFFFF';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            
            // Measure text for rectangle size
            ctx.font = '14px Arial, Helvetica, sans-serif';
            const textWidth = ctx.measureText(tagText).width;
            const rectX = 380 - textWidth - 30; // 380 width - text width - padding
            const rectY = 340;
            const rectWidth = textWidth + 24;
            const rectHeight = 30;
            
            ctx.strokeRect(rectX, rectY, rectWidth, rectHeight);
            
            // Draw tag text
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(tagText, rectX + 12, rectY + 15);

            // Reset line dash
            ctx.setLineDash([]);

            // Download
            const link = document.createElement('a');
            link.download = `suprememotive-${quote.category}-quote.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
            
            showAlert('Quote downloaded!');
        };

        // ============================================
        // CATEGORY FILTERING
        // ============================================
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderQuotes();
            });
        });

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            initTheme();
            await checkAuth();
            await loadQuotes();
        }

        init();
    </script>
</body>
</html>
