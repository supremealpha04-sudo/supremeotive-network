<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Motivation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a.active {
            color: var(--gold);
        }

        #admin-link {
            color: var(--electric-blue);
            font-weight: bold;
        }

        #logout-btn {
            background: none;
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        #logout-btn:hover {
            background: var(--error);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Welcome Message */
        .welcome-card {
            background: var(--dark-gray);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--gold);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .welcome-card h2 {
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .welcome-card p {
            color: var(--text-secondary);
        }

        /* Posts */
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .post-card {
            background: var(--dark-gray);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--light-gray);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.1);
            border-color: var(--gold);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--light-gray);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .post-author {
            font-weight: 600;
            color: var(--gold);
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .post-title {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--light-gray);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .action-btn:hover {
            color: var(--gold);
        }

        .action-btn.liked {
            color: var(--electric-blue);
        }

        .like-count {
            font-weight: 600;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        /* Hidden Class */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .post-actions {
                justify-content: space-around;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SupremeMotive</div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" id="profile-link">Profile</a>
            <a href="#" id="admin-link" class="hidden">Admin</a>
            <a href="login.html" id="login-link">Login</a>
            <button id="logout-btn" class="hidden">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div id="welcome-card" class="welcome-card hidden">
            <h2>Welcome back, <span id="user-name"></span>! 🔥</h2>
            <p>Stay motivated and keep pushing forward.</p>
        </div>

        <div id="guest-welcome" class="welcome-card">
            <h2>Welcome to SupremeMotive! 💪</h2>
            <p>Join our community to like, comment, and save your favorite motivational posts.</p>
        </div>

        <div id="posts-container" class="posts-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading motivational posts...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0'

        // Initialize Supabase
        const supabase = createClient(
            'YOUR_SUPABASE_URL',
            'YOUR_SUPABASE_ANON_KEY'
        )

        // Admin emails
        const ADMIN_EMAILS = [
            'supremealpha04@gmail.com',
            'suprememotive43@gmail.com',
            'sandrakukk055@gmail.com',
            'emmanuelamer6@gmail.com'
        ]

        // State
        let currentUser = null
        let currentProfile = null

        // DOM Elements
        const loginLink = document.getElementById('login-link')
        const logoutBtn = document.getElementById('logout-btn')
        const adminLink = document.getElementById('admin-link')
        const profileLink = document.getElementById('profile-link')
        const welcomeCard = document.getElementById('welcome-card')
        const guestWelcome = document.getElementById('guest-welcome')
        const userNameSpan = document.getElementById('user-name')
        const postsContainer = document.getElementById('posts-container')

        // Check authentication on load
        async function checkAuth() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser()
                
                if (error) throw error

                if (user) {
                    currentUser = user
                    
                    // Get user profile
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', user.id)
                        .single()

                    currentProfile = profile

                    // Update UI for logged in user
                    loginLink.classList.add('hidden')
                    logoutBtn.classList.remove('hidden')
                    profileLink.style.display = 'inline'
                    
                    // Show welcome card with user name
                    userNameSpan.textContent = profile?.name || user.email.split('@')[0]
                    welcomeCard.classList.remove('hidden')
                    guestWelcome.classList.add('hidden')

                    // Check if admin
                    if (ADMIN_EMAILS.includes(user.email)) {
                        adminLink.classList.remove('hidden')
                        adminLink.href = 'admin/admin-dashboard.html'
                    }

                    return true
                } else {
                    // Update UI for guest
                    loginLink.classList.remove('hidden')
                    logoutBtn.classList.add('hidden')
                    profileLink.style.display = 'inline'
                    adminLink.classList.add('hidden')
                    welcomeCard.classList.add('hidden')
                    guestWelcome.classList.remove('hidden')
                    
                    return false
                }
            } catch (error) {
                console.error('Auth check error:', error)
                return false
            }
        }

        // Load posts
        async function loadPosts() {
            try {
                postsContainer.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading motivational posts...</p>
                    </div>
                `

                const { data: posts, error } = await supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false })

                if (error) throw error

                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = '<div class="error-message">No posts yet. Check back soon!</div>'
                    return
                }

                // Get like counts for each post
                const postsWithDetails = await Promise.all(posts.map(async (post) => {
                    const { count: likes } = await supabase
                        .from('post_likes')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id)

                    const { count: comments } = await supabase
                        .from('comments')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id)

                    // Check if current user liked this post
                    let userLiked = false
                    if (currentUser) {
                        const { data: like } = await supabase
                            .from('post_likes')
                            .select('*')
                            .eq('post_id', post.id)
                            .eq('user_id', currentUser.id)
                            .maybeSingle()
                        userLiked = !!like
                    }

                    return {
                        ...post,
                        likes_count: likes || 0,
                        comments_count: comments || 0,
                        user_liked: userLiked
                    }
                }))

                renderPosts(postsWithDetails)
            } catch (error) {
                console.error('Load posts error:', error)
                postsContainer.innerHTML = `<div class="error-message">Error loading posts: ${error.message}</div>`
            }
        }

        // Render posts
        function renderPosts(posts) {
            postsContainer.innerHTML = posts.map(post => `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=FFD700&color=000&size=50" 
                             alt="Admin" class="post-avatar">
                        <div>
                            <div class="post-author">SupremeMotive Admin</div>
                            <div class="post-date">${new Date(post.created_at).toLocaleDateString()}</div>
                        </div>
                    </div>
                    
                    <h3 class="post-title">${escapeHtml(post.title)}</h3>
                    <div class="post-content">${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
                    
                    ${post.image_url ? `
                        <img src="${post.image_url}" alt="Post image" class="post-image" 
                             onerror="this.style.display='none'">
                    ` : ''}
                    
                    <div class="post-actions">
                        <button class="action-btn like-btn ${post.user_liked ? 'liked' : ''}" 
                                onclick="handleLike('${post.id}')">
                            <span>❤️</span>
                            <span class="like-count">${post.likes_count}</span>
                        </button>
                        
                        <button class="action-btn" onclick="handleComment('${post.id}')">
                            <span>💬</span>
                            <span>${post.comments_count}</span>
                        </button>
                        
                        <button class="action-btn" onclick="handleShare('${post.id}', '${escapeHtml(post.title)}')">
                            <span>📤</span>
                            <span>Share</span>
                        </button>
                    </div>
                </div>
            `).join('')
        }

        // Escape HTML to prevent XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Handle like button click
        window.handleLike = async (postId) => {
            if (!currentUser) {
                if (confirm('Please login to like posts. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            try {
                // Check if already liked
                const { data: existingLike } = await supabase
                    .from('post_likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle()

                if (existingLike) {
                    // Unlike
                    await supabase
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                } else {
                    // Like
                    await supabase
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: currentUser.id }])
                }

                // Reload posts to update like count
                await loadPosts()
            } catch (error) {
                console.error('Like error:', error)
                alert('Error updating like. Please try again.')
            }
        }

        // Handle comment button click
        window.handleComment = (postId) => {
            if (!currentUser) {
                if (confirm('Please login to comment. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }
            window.location.href = `post.html?id=${postId}`
        }

        // Handle share button click
        window.handleShare = async (postId, title) => {
            const url = `${window.location.origin}/post.html?id=${postId}`
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'SupremeMotive',
                        text: title,
                        url: url
                    })
                } catch (err) {
                    console.log('Share cancelled')
                }
            } else {
                // Fallback to copy to clipboard
                try {
                    await navigator.clipboard.writeText(url)
                    alert('Link copied to clipboard!')
                } catch (err) {
                    alert('Could not copy link. Please copy manually.')
                }
            }
        }

        // Handle logout
        logoutBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signOut()
                if (error) throw error
                
                // Clear user data
                currentUser = null
                currentProfile = null
                
                // Reload page to update UI
                window.location.reload()
            } catch (error) {
                console.error('Logout error:', error)
                alert('Error logging out. Please try again.')
            }
        })

        // Initialize
        async function init() {
            await checkAuth()
            await loadPosts()
        }

        init()
    </script>
</body>
</html>
