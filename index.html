<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Motivation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/feed.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <img src="assets/images/logo.svg" alt="SupremeMotive" onerror="this.style.display='none'">
            <span class="logo-text">SupremeMotive</span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" id="profile-link">Profile</a>
            <a href="#" id="admin-link" style="display: none;">Admin</a>
            <a href="#" id="auth-link">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div id="welcome-message" class="welcome-message"></div>
        
        <div class="feed-container" id="feed-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading motivational posts...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './config/supabase.js';
        import { getCurrentUser, logoutUser, isAdmin } from './js/auth.js';
        import { shareContent, showShareNotification, formatDate, handleImageError } from './js/utils.js';

        // Global functions for inline event handlers
        window.toggleLike = async (postId) => {
            const { user } = await getCurrentUser();
            
            if (!user) {
                if (confirm('Please login to like posts. Go to login page?')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                // Check if already liked
                const { data: existingLike, error: checkError } = await supabase
                    .from('post_likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', user.id)
                    .maybeSingle();

                if (checkError) throw checkError;

                if (existingLike) {
                    // Unlike
                    const { error } = await supabase
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', user.id);

                    if (error) throw error;
                } else {
                    // Like
                    const { error } = await supabase
                        .from('post_likes')
                        .insert([
                            {
                                post_id: postId,
                                user_id: user.id
                            }
                        ]);

                    if (error) throw error;
                }
                
                // Refresh feed
                loadFeed();
            } catch (error) {
                console.error('Toggle like error:', error);
                alert('Error updating like. Please try again.');
            }
        };

        window.toggleComments = async (postId) => {
            const commentsSection = document.getElementById(`comments-${postId}`);
            if (commentsSection) {
                if (commentsSection.classList.contains('hidden')) {
                    await loadComments(postId);
                    commentsSection.classList.remove('hidden');
                } else {
                    commentsSection.classList.add('hidden');
                }
            }
        };

        window.addComment = async (postId) => {
            const { user } = await getCurrentUser();
            
            if (!user) {
                alert('Please login to comment');
                return;
            }

            const input = document.getElementById(`comment-input-${postId}`);
            if (!input) return;
            
            const content = input.value.trim();
            
            if (!content) return;

            try {
                const { error } = await supabase
                    .from('comments')
                    .insert([
                        {
                            post_id: postId,
                            user_id: user.id,
                            content: content
                        }
                    ]);

                if (error) throw error;

                input.value = '';
                await loadComments(postId);
            } catch (error) {
                console.error('Add comment error:', error);
                alert('Error adding comment. Please try again.');
            }
        };

        window.showReplyForm = (commentId) => {
            const form = document.getElementById(`reply-form-${commentId}`);
            if (form) {
                form.classList.toggle('hidden');
            }
        };

        window.addReply = async (commentId, postId) => {
            const { user } = await getCurrentUser();
            
            if (!user) {
                alert('Please login to reply');
                return;
            }

            const input = document.getElementById(`reply-input-${commentId}`);
            if (!input) return;
            
            const content = input.value.trim();
            
            if (!content) return;

            try {
                const { error } = await supabase
                    .from('comments')
                    .insert([
                        {
                            post_id: postId,
                            user_id: user.id,
                            content: content,
                            parent_comment_id: commentId
                        }
                    ]);

                if (error) throw error;

                input.value = '';
                document.getElementById(`reply-form-${commentId}`)?.classList.add('hidden');
                await loadComments(postId);
            } catch (error) {
                console.error('Add reply error:', error);
                alert('Error adding reply. Please try again.');
            }
        };

        window.sharePost = async (postId, postTitle) => {
            const url = `${window.location.origin}/post.html?id=${postId}`;
            const title = 'SupremeMotive - Daily Motivation';
            const text = postTitle || 'Check out this motivational post!';
            
            const result = await shareContent(title, text, url);
            showShareNotification(result.method);
        };

        // Fetch all posts
        async function fetchPosts() {
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (id, name, profile_image_url)
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Get like counts and check if user liked
                const { user } = await getCurrentUser();
                
                const postsWithDetails = await Promise.all(data.map(async (post) => {
                    // Get likes count
                    const { count: likesCount } = await supabase
                        .from('post_likes')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    // Get comments count
                    const { count: commentsCount } = await supabase
                        .from('comments')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    // Check if user liked this post
                    let userLiked = false;
                    if (user) {
                        const { data: like } = await supabase
                            .from('post_likes')
                            .select('*')
                            .eq('post_id', post.id)
                            .eq('user_id', user.id)
                            .maybeSingle();
                        userLiked = !!like;
                    }

                    return {
                        ...post,
                        likes_count: likesCount || 0,
                        comments_count: commentsCount || 0,
                        user_liked: userLiked
                    };
                }));

                return { success: true, posts: postsWithDetails };
            } catch (error) {
                console.error('Fetch posts error:', error);
                return { success: false, error: error.message };
            }
        }

        // Load comments for a post
        async function loadComments(postId) {
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (id, name, profile_image_url)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                // Get replies for each comment
                const commentsWithReplies = await Promise.all(data.map(async (comment) => {
                    const { data: replies } = await supabase
                        .from('comments')
                        .select(`
                            *,
                            profiles:user_id (id, name, profile_image_url)
                        `)
                        .eq('parent_comment_id', comment.id)
                        .order('created_at', { ascending: true });

                    return {
                        ...comment,
                        replies: replies || []
                    };
                }));

                renderComments(commentsWithReplies, postId);
            } catch (error) {
                console.error('Load comments error:', error);
            }
        }

        // Render comments
        function renderComments(comments, postId) {
            const container = document.getElementById(`comments-${postId}`);
            if (!container) return;
            
            container.innerHTML = `
                <div class="add-comment">
                    <input type="text" id="comment-input-${postId}" 
                           placeholder="Add a comment..." 
                           class="comment-input">
                    <button class="btn btn-primary btn-small" 
                            onclick="addComment('${postId}')">
                        Post
                    </button>
                </div>
                
                <div class="comments-list">
                    ${comments.length === 0 ? '<p class="no-comments">No comments yet. Be the first to comment!</p>' : ''}
                    
                    ${comments.map(comment => `
                        <div class="comment" data-comment-id="${comment.id}">
                            <div class="comment-header">
                                <img src="${comment.profiles?.profile_image_url || 'assets/images/default-avatar.png'}" 
                                     alt="${comment.profiles?.name || 'User'}" 
                                     class="comment-avatar"
                                     onerror="handleImageError(this)">
                                <div class="comment-info">
                                    <span class="comment-author">${comment.profiles?.name || 'Anonymous'}</span>
                                    <span class="comment-date">${formatDate(comment.created_at)}</span>
                                </div>
                            </div>
                            
                            <div class="comment-content">${escapeHtml(comment.content)}</div>
                            
                            <button class="btn btn-secondary btn-small reply-btn" 
                                    onclick="showReplyForm('${comment.id}')">
                                Reply
                            </button>
                            
                            <div id="reply-form-${comment.id}" class="reply-form hidden">
                                <input type="text" id="reply-input-${comment.id}" 
                                       placeholder="Write a reply...">
                                <button class="btn btn-primary btn-small" 
                                        onclick="addReply('${comment.id}', '${postId}')">
                                    Reply
                                </button>
                            </div>
                            
                            ${comment.replies?.map(reply => `
                                <div class="comment-reply">
                                    <div class="comment-header">
                                        <img src="${reply.profiles?.profile_image_url || 'assets/images/default-avatar.png'}" 
                                             alt="${reply.profiles?.name || 'User'}" 
                                             class="comment-avatar"
                                             onerror="handleImageError(this)">
                                        <div class="comment-info">
                                            <span class="comment-author">${reply.profiles?.name || 'Anonymous'}</span>
                                            <span class="comment-date">${formatDate(reply.created_at)}</span>
                                        </div>
                                    </div>
                                    <div class="comment-content">${escapeHtml(reply.content)}</div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Escape HTML helper
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Render feed
        function renderFeed(posts) {
            const container = document.getElementById('feed-container');
            
            if (!container) return;
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No posts yet. Check back soon for motivation!</p></div>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <img src="${post.profiles?.profile_image_url || 'assets/images/default-avatar.png'}" 
                             alt="${post.profiles?.name || 'Admin'}" 
                             class="post-author-avatar"
                             onerror="this.src='assets/images/default-avatar.png'">
                        <div class="post-author-info">
                            <h3>${post.profiles?.name || 'SupremeMotive Admin'}</h3>
                            <span class="post-date">${formatDate(post.created_at)}</span>
                        </div>
                    </div>
                    
                    <h2 class="post-title">${escapeHtml(post.title)}</h2>
                    <div class="post-content">${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
                    
                    ${post.image_url ? `
                        <img src="${post.image_url}" alt="Post image" class="post-image"
                             onerror="this.style.display='none'">
                    ` : ''}
                    
                    <div class="post-actions">
                        <button class="action-btn like-btn ${post.user_liked ? 'liked' : ''}" 
                                onclick="toggleLike('${post.id}')">
                            <span>❤️</span>
                            <span class="like-count">${post.likes_count}</span>
                        </button>
                        
                        <button class="action-btn comment-btn" 
                                onclick="toggleComments('${post.id}')">
                            <span>💬</span>
                            <span>${post.comments_count}</span>
                        </button>
                        
                        <button class="action-btn share-btn" 
                                onclick="sharePost('${post.id}', '${escapeHtml(post.title).replace(/'/g, "\\'")}')">
                            <span>📤</span>
                            <span>Share</span>
                        </button>
                    </div>
                    
                    <div id="comments-${post.id}" class="comments-section hidden"></div>
                </div>
            `).join('');
        }

        // Load feed
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            if (container) {
                container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading motivational posts...</p></div>';
            }
            
            const result = await fetchPosts();
            if (result.success) {
                renderFeed(result.posts);
            } else {
                if (container) {
                    container.innerHTML = '<div class="error-state"><p>Error loading posts. Please refresh the page.</p></div>';
                }
            }
        }

        // Update navigation based on auth
        async function updateNavigation() {
            const { user } = await getCurrentUser();
            const authLink = document.getElementById('auth-link');
            const profileLink = document.getElementById('profile-link');
            const adminLink = document.getElementById('admin-link');
            const welcomeDiv = document.getElementById('welcome-message');
            
            if (user) {
                // Update auth link to logout
                if (authLink) {
                    authLink.textContent = 'Logout';
                    authLink.href = '#';
                    authLink.onclick = async (e) => {
                        e.preventDefault();
                        const result = await logoutUser();
                        if (result.success) {
                            window.location.reload();
                        } else {
                            alert('Error logging out: ' + result.error);
                        }
                    };
                }
                
                // Update profile link
                if (profileLink) {
                    profileLink.style.display = 'inline';
                    profileLink.href = 'profile.html';
                }
                
                // Show welcome message
                if (welcomeDiv) {
                    welcomeDiv.innerHTML = `Welcome back, <strong>${escapeHtml(user.name)}</strong>! 🔥`;
                }
                
                // Check if user is admin
                const admin = await isAdmin();
                if (admin && adminLink) {
                    adminLink.style.display = 'inline';
                    adminLink.href = 'admin/admin-dashboard.html';
                } else if (adminLink) {
                    adminLink.style.display = 'none';
                }
            } else {
                if (authLink) {
                    authLink.textContent = 'Login';
                    authLink.href = 'login.html';
                    authLink.onclick = null;
                }
                if (profileLink) {
                    profileLink.style.display = 'inline';
                    profileLink.href = 'profile.html';
                }
                if (adminLink) {
                    adminLink.style.display = 'none';
                }
                if (welcomeDiv) {
                    welcomeDiv.innerHTML = 'Welcome to SupremeMotive! Start your journey today. 💪';
                }
            }
        }

        // Initialize
        async function init() {
            await updateNavigation();
            await loadFeed();
            
            // Add global error handler for images
            window.handleImageError = handleImageError;
        }

        // Start the app
        init();
    </script>
</body>
</html>
