<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Motivation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/feed.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <img src="assets/images/logo.svg" alt="SupremeMotive" onerror="this.style.display='none'">
            <span class="logo-text">SupremeMotive</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="ebooks.html">Ebooks</a>
            <a href="profile.html" id="profile-link">Profile</a>
            <a href="#" id="admin-link" style="display: none;">Admin</a>
            <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle dark mode">🌙</button>
            <a href="#" id="auth-link">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div id="welcome-message" class="welcome-message"></div>
        
        <div class="feed-container" id="feed-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading motivational posts...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './config/supabase.js';
        import { getCurrentUser, logoutUser, isAdmin } from './js/auth.js';
        import { shareContent, showShareNotification, formatDate, toggleSavePost, DARK_MODE_KEY } from './js/utils.js';

        // Dark mode functionality
        function initDarkMode() {
            const toggle = document.getElementById('dark-mode-toggle');
            const savedMode = localStorage.getItem(DARK_MODE_KEY);
            
            if (savedMode === 'light') {
                document.body.classList.remove('dark-mode');
                toggle.textContent = '☀️';
            } else {
                document.body.classList.add('dark-mode');
                toggle.textContent = '🌙';
            }

            toggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem(DARK_MODE_KEY, isDark ? 'dark' : 'light');
                toggle.textContent = isDark ? '🌙' : '☀️';
            });
        }

        // Global functions
        window.toggleLike = async (postId) => {
            const { user } = await getCurrentUser();
            if (!user) {
                if (confirm('Please login to like posts. Go to login page?')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            try {
                const { data: existingLike } = await supabase
                    .from('post_likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', user.id)
                    .maybeSingle();

                if (existingLike) {
                    await supabase
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', user.id);
                } else {
                    await supabase
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: user.id }]);
                }
                
                loadFeed();
            } catch (error) {
                console.error('Toggle like error:', error);
                alert('Error updating like');
            }
        };

        window.toggleSave = async (postId) => {
            const { user } = await getCurrentUser();
            if (!user) {
                if (confirm('Please login to save posts. Go to login page?')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            const result = await toggleSavePost(postId, user.id);
            if (result.success) {
                showShareNotification('clipboard', result.action === 'saved' ? 'Post saved!' : 'Post removed');
                loadFeed();
            }
        };

        window.toggleComments = async (postId) => {
            const section = document.getElementById(`comments-${postId}`);
            if (section) {
                if (section.classList.contains('hidden')) {
                    await loadComments(postId);
                    section.classList.remove('hidden');
                } else {
                    section.classList.add('hidden');
                }
            }
        };

        window.addComment = async (postId) => {
            const { user } = await getCurrentUser();
            if (!user) {
                alert('Please login to comment');
                return;
            }

            const input = document.getElementById(`comment-input-${postId}`);
            if (!input) return;
            
            const content = input.value.trim();
            if (!content) return;

            try {
                await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: user.id,
                        content: content
                    }]);

                input.value = '';
                await loadComments(postId);
            } catch (error) {
                console.error('Add comment error:', error);
                alert('Error adding comment');
            }
        };

        window.addReply = async (commentId, postId) => {
            const { user } = await getCurrentUser();
            if (!user) {
                alert('Please login to reply');
                return;
            }

            const input = document.getElementById(`reply-input-${commentId}`);
            if (!input) return;
            
            const content = input.value.trim();
            if (!content) return;

            try {
                await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: user.id,
                        content: content,
                        parent_comment_id: commentId
                    }]);

                input.value = '';
                document.getElementById(`reply-form-${commentId}`)?.classList.add('hidden');
                await loadComments(postId);
            } catch (error) {
                console.error('Add reply error:', error);
                alert('Error adding reply');
            }
        };

        window.showReplyForm = (commentId) => {
            const form = document.getElementById(`reply-form-${commentId}`);
            if (form) form.classList.toggle('hidden');
        };

        window.sharePost = async (postId, postTitle) => {
            const url = `${window.location.origin}/post.html?id=${postId}`;
            const result = await shareContent('SupremeMotive', postTitle, url);
            showShareNotification(result.method);
        };

        // Fetch posts
        async function fetchPosts() {
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (id, name, profile_image_url)
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const { user } = await getCurrentUser();
                
                const postsWithDetails = await Promise.all(data.map(async (post) => {
                    const { count: likesCount } = await supabase
                        .from('post_likes')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    const { count: commentsCount } = await supabase
                        .from('comments')
                        .select('*', { count: 'exact', head: true })
                        .eq('post_id', post.id);

                    let userLiked = false;
                    let userSaved = false;
                    
                    if (user) {
                        const { data: like } = await supabase
                            .from('post_likes')
                            .select('*')
                            .eq('post_id', post.id)
                            .eq('user_id', user.id)
                            .maybeSingle();
                        userLiked = !!like;

                        const { data: save } = await supabase
                            .from('saved_posts')
                            .select('*')
                            .eq('post_id', post.id)
                            .eq('user_id', user.id)
                            .maybeSingle();
                        userSaved = !!save;
                    }

                    return {
                        ...post,
                        likes_count: likesCount || 0,
                        comments_count: commentsCount || 0,
                        user_liked: userLiked,
                        user_saved: userSaved
                    };
                }));

                return { success: true, posts: postsWithDetails };
            } catch (error) {
                console.error('Fetch posts error:', error);
                return { success: false, error: error.message };
            }
        }

        // Load comments
        async function loadComments(postId) {
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (id, name, profile_image_url)
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const commentsWithReplies = await Promise.all(data.map(async (comment) => {
                    const { data: replies } = await supabase
                        .from('comments')
                        .select(`
                            *,
                            profiles:user_id (id, name, profile_image_url)
                        `)
                        .eq('parent_comment_id', comment.id)
                        .order('created_at', { ascending: true });

                    return { ...comment, replies: replies || [] };
                }));

                renderComments(commentsWithReplies, postId);
            } catch (error) {
                console.error('Load comments error:', error);
            }
        }

        // Render comments
        function renderComments(comments, postId) {
            const container = document.getElementById(`comments-${postId}`);
            if (!container) return;
            
            container.innerHTML = `
                <div class="add-comment">
                    <input type="text" id="comment-input-${postId}" placeholder="Add a comment..." class="comment-input">
                    <button class="btn btn-primary btn-small" onclick="addComment('${postId}')">Post</button>
                </div>
                <div class="comments-list">
                    ${comments.length === 0 ? '<p class="no-comments">No comments yet. Be the first!</p>' : ''}
                    ${comments.map(comment => `
                        <div class="comment">
                            <div class="comment-header">
                                <img src="${comment.profiles?.profile_image_url || 'assets/images/default-avatar.png'}" 
                                     alt="${comment.profiles?.name}" class="comment-avatar"
                                     onerror="this.src='assets/images/default-avatar.png'">
                                <div class="comment-info">
                                    <span class="comment-author">${comment.profiles?.name || 'User'}</span>
                                    <span class="comment-date">${formatDate(comment.created_at)}</span>
                                </div>
                            </div>
                            <div class="comment-content">${escapeHtml(comment.content)}</div>
                            <button class="btn btn-secondary btn-small reply-btn" onclick="showReplyForm('${comment.id}')">Reply</button>
                            <div id="reply-form-${comment.id}" class="reply-form hidden">
                                <input type="text" id="reply-input-${comment.id}" placeholder="Write a reply...">
                                <button class="btn btn-primary btn-small" onclick="addReply('${comment.id}', '${postId}')">Reply</button>
                            </div>
                            ${comment.replies?.map(reply => `
                                <div class="comment-reply">
                                    <div class="comment-header">
                                        <img src="${reply.profiles?.profile_image_url || 'assets/images/default-avatar.png'}" 
                                             alt="${reply.profiles?.name}" class="comment-avatar"
                                             onerror="this.src='assets/images/default-avatar.png'">
                                        <div class="comment-info">
                                            <span class="comment-author">${reply.profiles?.name || 'User'}</span>
                                            <span class="comment-date">${formatDate(reply.created_at)}</span>
                                        </div>
                                    </div>
                                    <div class="comment-content">${escapeHtml(reply.content)}</div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Render feed
        function renderFeed(posts) {
            const container = document.getElementById('feed-container');
            if (!container) return;
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No posts yet. Check back soon!</p></div>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${post.profiles?.profile_image_url || 'assets/images/default-avatar.png'}" 
                             alt="${post.profiles?.name || 'Admin'}" class="post-author-avatar"
                             onerror="this.src='assets/images/default-avatar.png'">
                        <div class="post-author-info">
                            <h3>${post.profiles?.name || 'SupremeMotive Admin'}</h3>
                            <span class="post-date">${formatDate(post.created_at)}</span>
                        </div>
                    </div>
                    <h2 class="post-title">${escapeHtml(post.title)}</h2>
                    <div class="post-content">${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
                    ${post.image_url ? `<img src="${post.image_url}" alt="Post image" class="post-image" onerror="this.style.display='none'">` : ''}
                    <div class="post-actions">
                        <button class="action-btn like-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            <span>❤️</span><span class="like-count">${post.likes_count}</span>
                        </button>
                        <button class="action-btn comment-btn" onclick="toggleComments('${post.id}')">
                            <span>💬</span><span>${post.comments_count}</span>
                        </button>
                        <button class="action-btn save-btn ${post.user_saved ? 'saved' : ''}" onclick="toggleSave('${post.id}')">
                            <span>🔖</span><span>Save</span>
                        </button>
                        <button class="action-btn share-btn" onclick="sharePost('${post.id}', '${escapeHtml(post.title).replace(/'/g, "\\'")}')">
                            <span>📤</span><span>Share</span>
                        </button>
                    </div>
                    <div id="comments-${post.id}" class="comments-section hidden"></div>
                </div>
            `).join('');
        }

        // Load feed
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading posts...</p></div>';
            
            const result = await fetchPosts();
            if (result.success) {
                renderFeed(result.posts);
            } else {
                container.innerHTML = '<div class="error-state"><p>Error loading posts. Please refresh.</p></div>';
            }
        }

        // Update navigation
        async function updateNavigation() {
            const { user } = await getCurrentUser();
            const authLink = document.getElementById('auth-link');
            const profileLink = document.getElementById('profile-link');
            const adminLink = document.getElementById('admin-link');
            const welcomeDiv = document.getElementById('welcome-message');
            
            if (user) {
                authLink.textContent = 'Logout';
                authLink.href = '#';
                authLink.onclick = async (e) => {
                    e.preventDefault();
                    await logoutUser();
                    window.location.reload();
                };
                
                welcomeDiv.innerHTML = `Welcome back, <strong>${escapeHtml(user.name)}</strong>! 🔥`;
                
                const admin = await isAdmin();
                if (admin) {
                    adminLink.style.display = 'inline';
                    adminLink.href = 'admin/admin-dashboard.html';
                } else {
                    adminLink.style.display = 'none';
                }
            } else {
                authLink.textContent = 'Login';
                authLink.href = 'login.html';
                authLink.onclick = null;
                welcomeDiv.innerHTML = 'Welcome to SupremeMotive! Start your journey today. 💪';
                adminLink.style.display = 'none';
            }
        }

        // Initialize
        async function init() {
            initDarkMode();
            await updateNavigation();
            await loadFeed();
        }

        init();
    </script>
</body>
</html>
