        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
            --card-bg: rgba(26, 26, 26, 0.95);
            --card-border: rgba(255, 215, 0, 0.3);
            --overlay: rgba(0, 0, 0, 0.7);
        }

        /* Light mode variables */
        body.light-mode {
            --primary-black: #FFFFFF;
            --deep-navy: #F0F5FF;
            --gold: #D4AF37;
            --electric-blue: #0066CC;
            --dark-gray: #F5F5F5;
            --medium-gray: #E0E0E0;
            --light-gray: #CCCCCC;
            --text-primary: #333333;
            --text-secondary: #666666;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(212, 175, 55, 0.3);
            --overlay: rgba(255, 255, 255, 0.7);
            background: #F5F5F5;
            color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-black) 0%, var(--deep-navy) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 80px;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(26, 26, 26, 0.95);
        }

        body.light-mode .top-nav {
            background: rgba(255, 255, 255, 0.95);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(360deg);
            background: var(--medium-gray);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--dark-gray);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 1rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(26, 26, 26, 0.95);
        }

        body.light-mode .bottom-nav {
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            gap: 0.3rem;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
            transform: translateY(-3px);
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Header Section */
        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .category-btn {
            padding: 0.8rem 1.5rem;
            background: var(--dark-gray);
            border: 2px solid var(--light-gray);
            border-radius: 50px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .category-btn:hover,
        .category-btn.active {
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* Quotes Grid */
        .quotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        /* Quote Card - Exactly like the sample */
        .quote-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .quote-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.15);
        }

        /* Quote Background Pattern */
        .quote-card::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 8rem;
            color: var(--gold);
            opacity: 0.1;
            font-family: serif;
            line-height: 1;
        }

        .quote-card::after {
            content: '"';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 8rem;
            color: var(--gold);
            opacity: 0.1;
            font-family: serif;
            line-height: 1;
        }

        /* Watermark (visible on card) */
        .quote-card .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255, 215, 0, 0.1);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* Quote Content */
        .quote-content {
            position: relative;
            z-index: 1;
            margin-bottom: 1.5rem;
        }

        .quote-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-primary);
            font-style: italic;
            margin-bottom: 1rem;
            position: relative;
            padding: 0 0.5rem;
        }

        .quote-text::before {
            content: '"';
            font-size: 2rem;
            color: var(--gold);
            opacity: 0.5;
            position: absolute;
            left: -10px;
            top: -10px;
        }

        .quote-text::after {
            content: '"';
            font-size: 2rem;
            color: var(--gold);
            opacity: 0.5;
            position: absolute;
            right: -10px;
            bottom: -20px;
        }

        .quote-author {
            color: var(--gold);
            font-weight: 600;
            text-align: right;
            font-size: 1rem;
            margin-top: 0.5rem;
            padding-right: 1rem;
        }

        .quote-author::before {
            content: '— ';
            color: var(--electric-blue);
        }

        .quote-category {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--gold);
            border-radius: 30px;
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem;
            align-self: flex-start;
        }

        /* Quote Actions - Exactly like the sample */
        .quote-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--light-gray);
            position: relative;
            z-index: 1;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--medium-gray);
            color: var(--text-primary);
        }

        .action-btn.like-btn {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
        }

        .action-btn.like-btn.liked {
            background: var(--gold);
            color: var(--primary-black);
        }

        .action-btn.save-btn {
            background: rgba(0, 240, 255, 0.1);
            color: var(--electric-blue);
        }

        .action-btn.save-btn.saved {
            background: var(--electric-blue);
            color: var(--primary-black);
        }

        .action-btn.copy-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
        }

        .action-btn.share-btn {
            background: var(--medium-gray);
            color: var(--text-primary);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .alert-info {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--electric-blue);
            color: var(--electric-blue);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--light-gray);
            margin-top: 3rem;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: var(--dark-gray);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                z-index: 999;
                border-bottom: 2px solid var(--gold);
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .header-title {
                font-size: 2rem;
            }

            .quotes-grid {
                grid-template-columns: 1fr;
            }

            .quote-actions {
                flex-wrap: wrap;
            }

            .action-btn {
                min-width: calc(50% - 0.5rem);
            }
        }

        /* Print styles for downloaded quotes */
        @media print {
            body {
                background: white;
                color: black;
            }

            .top-nav,
            .bottom-nav,
            .categories,
            .footer {
                display: none !important;
            }

            .quote-card {
                break-inside: avoid;
                page-break-inside: avoid;
                background: white;
                border: 1px solid #000;
                box-shadow: none;
                position: relative;
            }

            .quote-card .watermark {
                color: rgba(0, 0, 0, 0.1);
                font-size: 1.5rem;
            }

            .action-btn {
                display: none;
            }
        }
    </style>

                            <span>${quote.likes + (userLikes.has(quote.id) ? 1 : 0)}</span>
                        </button>
                        
                        <button class="action-btn save-btn ${userSaves.has(quote.id) ? 'saved' : ''}" 
                                onclick="handleSave('${quote.id}')">
                            <span>🔖</span>
                            <span>Save</span>
                        </button>
                        
                        <button class="action-btn copy-btn" onclick="copyQuote('${quote.id}')">
                            <span>📋</span>
                            <span>Copy</span>
                        </button>
                        
                        <button class="action-btn share-btn" onclick="shareQuote('${quote.id}')">
                            <span>📤</span>
                            <span>Share</span>
                        </button>
                    </div>
                </div>
            `).join('')
        }

        // Handle like
        window.handleLike = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to like quotes. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            if (userLikes.has(quoteId)) {
                userLikes.delete(quoteId)
            } else {
                userLikes.add(quoteId)
            }

            // In a real app, you would update the database
            // await supabase.from('quote_likes').upsert(...)
            
            renderQuotes()
        }

        // Handle save
        window.handleSave = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to save quotes. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            if (userSaves.has(quoteId)) {
                userSaves.delete(quoteId)
                showAlert('Quote removed from saved', 'success')
            } else {
                userSaves.add(quoteId)
                showAlert('Quote saved!', 'success')
            }

            renderQuotes()
        }

        // Copy quote
        window.copyQuote = (quoteId) => {
            const quote = allQuotes.find(q => q.id === quoteId)
            if (!quote) return

            const text = `"${quote.text}" — ${quote.author}\n\nShared from SupremeMotive`
            
            navigator.clipboard.writeText(text).then(() => {
                showAlert('Quote copied to clipboard!', 'success')
            }).catch(() => {
                showAlert('Failed to copy quote', 'error')
            })
        }

        // Share quote
        window.shareQuote = (quoteId) => {
            const quote = allQuotes.find(q => q.id === quoteId)
            if (!quote) return

            const text = `"${quote.text}" — ${quote.author}`
            const url = window.location.href

            if (navigator.share) {
                navigator.share({
                    title: 'SupremeMotive Quote',
                    text: text,
                    url: url
                }).catch(() => {
                    copyQuote(quoteId)
                })
            } else {
                copyQuote(quoteId)
            }
        }

        // Download quote as image
        window.downloadQuote = (quoteId) => {
            const quote = allQuotes.find(q => q.id === quoteId)
            if (!quote) return

            // Create a canvas to generate the quote image
            const canvas = document.createElement('canvas')
            canvas.width = 800
            canvas.height = 600
            const ctx = canvas.getContext('2d')

            // Background
            ctx.fillStyle = document.body.classList.contains('light-mode') ? '#F5F5F5' : '#1A1A1A'
            ctx.fillRect(0, 0, canvas.width, canvas.height)

            // Add watermark
            ctx.save()
            ctx.translate(400, 300)
            ctx.rotate(-15 * Math.PI / 180)
            ctx.font = 'bold 60px Arial'
            ctx.fillStyle = document.body.classList.contains('light-mode') ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)'
            ctx.textAlign = 'center'
            ctx.fillText('SUPREME MOTIVE', 0, 0)
            ctx.restore()

            // Add quote marks
            ctx.font = '200px serif'
            ctx.fillStyle = 'rgba(255,215,0,0.1)'
            ctx.fillText('"', 50, 150)
            ctx.fillText('"', canvas.width - 100, canvas.height - 100)

            // Quote text
            ctx.font = 'bold 32px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto'
            ctx.fillStyle = document.body.classList.contains('light-mode') ? '#333' : '#FFF'
            ctx.textAlign = 'center'
            wrapText(ctx, `"${quote.text}"`, 400, 250, 600, 40)

            // Author
            ctx.font = '24px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto'
            ctx.fillStyle = '#FFD700'
            ctx.fillText(`— ${quote.author}`, 400, 450)

            // Convert to image and download
            const link = document.createElement('a')
            link.download = `suprememotive-${quote.category}-quote.jpg`
            link.href = canvas.toDataURL('image/jpeg', 0.9)
            link.click()

            showAlert('Quote downloaded with watermark!', 'success')
        }

        // Helper function to wrap text
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ')
            let line = ''
            let lines = []

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' '
                let metrics = ctx.measureText(testLine)
                let testWidth = metrics.width
                if (testWidth > maxWidth && n > 0) {
                    lines.push(line)
                    line = words[n] + ' '
                } else {
                    line = testLine
                }
            }
            lines.push(line)

            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], x, y + (i * lineHeight))
            }
        }

        // Category filtering
        categories.forEach(btn => {
            btn.addEventListener('click', () => {
                categories.forEach(b => b.classList.remove('active'))
                btn.classList.add('active')
                currentCategory = btn.dataset.category
                renderQuotes()
            })
        })

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Initialize
        async function init() {
            initTheme()
            await checkAuth()
            await loadQuotes()
        }

        init()
    </script>
</body>
</html>
