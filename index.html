<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Quotes</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SupremeMotive">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-bg: #1A1A1A;
            --text-color: #FFFFFF;
            --text-secondary: #B0B0B0;
            --gold: #FFD700;
            --border-color: #333333;
            --electric-blue: #00F0FF;
            --success: #4CAF50;
            --error: #F44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        /* PWA Install Prompt */
        .install-prompt {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--bg-color);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .install-prompt-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .install-prompt-icon {
            font-size: 2rem;
        }

        .install-prompt-text {
            flex: 1;
        }

        .install-prompt-title {
            font-weight: bold;
            margin-bottom: 0.2rem;
        }

        .install-prompt-subtitle {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .install-prompt-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .install-btn {
            background: var(--bg-color);
            color: var(--gold);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .install-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .close-install-btn {
            background: rgba(0, 0, 0, 0.2);
            color: var(--bg-color);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-install-btn:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        /* Notification Bell */
        .notification-container {
            position: relative;
            cursor: pointer;
        }

        .notification-bell {
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.3rem;
        }

        .notification-bell:hover {
            color: var(--gold);
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--error);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 18px;
            text-align: center;
        }

        /* Notification Dropdown */
        .notification-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            width: 380px;
            max-height: 500px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            z-index: 1000;
            overflow: hidden;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .notification-header h3 {
            color: var(--gold);
            font-size: 1rem;
        }

        .notification-actions {
            display: flex;
            gap: 0.5rem;
        }

        .mark-read-btn, .settings-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .mark-read-btn:hover, .settings-btn:hover {
            color: var(--gold);
        }

        .notification-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .notification-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s ease;
            cursor: pointer;
        }

        .notification-item:hover {
            background: var(--border-color);
        }

        .notification-item.unread {
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid var(--gold);
        }

        .notification-title {
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        .notification-message {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }

        .notification-time {
            color: var(--text-secondary);
            font-size: 0.7rem;
        }

        .loading-notifications {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #F44336;
            color: #F44336;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #F44336;
            color: white;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .categories {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .quote-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            position: relative;
        }

        .quote-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .quote-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            color: var(--text-color);
            font-style: italic;
        }

        .quote-tag {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quote-tag span {
            color: var(--gold);
            font-weight: bold;
        }

        .quote-actions {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 70px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.liked {
            background: var(--gold);
            color: var(--bg-color);
            border-color: var(--gold);
        }

        .action-btn.saved {
            background: var(--electric-blue);
            color: var(--bg-color);
            border-color: var(--electric-blue);
        }

        .like-count {
            font-weight: bold;
            color: inherit;
            min-width: 25px;
            display: inline-block;
        }

        .user-greeting {
            color: var(--gold);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-color);
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .hidden {
            display: none !important;
        }

        .offline-badge {
            background: #F44336;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                border-bottom: 2px solid var(--gold);
                z-index: 99;
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .auth-buttons {
                flex-direction: column;
                width: 100%;
            }

            .login-btn, .logout-btn {
                width: 100%;
                text-align: center;
            }

            .quote-actions {
                gap: 0.3rem;
            }

            .action-btn {
                min-width: calc(50% - 0.3rem);
                font-size: 0.85rem;
            }

            .notification-dropdown {
                width: calc(100% - 40px);
                right: 20px;
                left: 20px;
            }

            .install-prompt {
                left: 10px;
                right: 10px;
                bottom: 70px;
                flex-direction: column;
                text-align: center;
            }

            .install-prompt-buttons {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

    <!-- PWA Install Prompt -->
    <div id="installPrompt" class="install-prompt hidden">
        <div class="install-prompt-content">

            <div class="install-prompt-text">
                <div class="install-prompt-title">Install SupremeMotive</div>
                <div class="install-prompt-subtitle">Get quick access and offline support</div>
            </div>
        </div>
        <div class="install-prompt-buttons">
            <button id="installBtn" class="install-btn">Install</button>
            <button id="closeInstallBtn" class="close-install-btn">Not now</button>
        </div>

    <script>
        // ============================================
        // PWA INSTALL PROMPT
        // ============================================
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const closeInstallBtn = document.getElementById('closeInstallBtn');

        // Check if app is already installed
        function isAppInstalled() {
            // Check if app is running in standalone mode (installed)
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                                 window.navigator.standalone === true;
            
            // Check localStorage for dismiss
            const dismissed = localStorage.getItem('installPromptDismissed');
            
            if (isStandalone) {
                installPrompt.classList.add('hidden');
                return true;
            }
            
            if (dismissed === 'true') {
                installPrompt.classList.add('hidden');
                return false;
            }
            
            return false;
        }

        // Show install prompt
        function showInstallPrompt() {
            // Don't show if already installed or dismissed
            if (isAppInstalled()) return;
            
            // Don't show on mobile browsers that don't support PWA
            if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
            
            installPrompt.classList.remove('hidden');
        }

        // Hide install prompt
        function hideInstallPrompt() {
            installPrompt.classList.add('hidden');
        }

        // Handle install button click
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) {
                // If no deferred prompt, provide download instructions
                const userAgent = navigator.userAgent.toLowerCase();
                
                if (userAgent.includes('android')) {
                    alert('To install: Tap the menu (⋮) → "Install app" or "Add to Home screen"');
                } else if (userAgent.includes('iphone') || userAgent.includes('ipad')) {
                    alert('To install: Tap Share (□↑) → "Add to Home Screen"');
                } else {
                    alert('To install: Look for the install icon in the address bar');
                }
                hideInstallPrompt();
                return;
            }
            
            // Show the install prompt
            deferredPrompt.prompt();
            
            // Wait for the user to respond to the prompt
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('User accepted the install prompt');
                hideInstallPrompt();
            } else {
                console.log('User dismissed the install prompt');
                // Store that user dismissed the prompt
                localStorage.setItem('installPromptDismissed', 'true');
                hideInstallPrompt();
            }
            
            // Clear the deferredPrompt
            deferredPrompt = null;
        });

        // Handle close button click
        closeInstallBtn.addEventListener('click', () => {
            localStorage.setItem('installPromptDismissed', 'true');
            hideInstallPrompt();
        });

        // Listen for beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later
            deferredPrompt = e;
            // Show custom install prompt
            showInstallPrompt();
        });

        // Listen for app installed event
        window.addEventListener('appinstalled', () => {
            console.log('SupremeMotive was installed');
            deferredPrompt = null;
            hideInstallPrompt();
            
            // Show success message
            showAlert('Thank you for installing SupremeMotive! 🎉', 'success');
        });

        // ============================================
        // PWA & OFFLINE DETECTION
        // ============================================
        const offlineIndicator = document.getElementById('offlineIndicator');
        
        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineIndicator.classList.add('hidden');
                console.log('Application is online');
            } else {
                offlineIndicator.classList.remove('hidden');
                showAlert('You are offline. Some features may be limited.', 'warning');
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }

        // ============================================
        // SUPABASE CONFIGURATION

        const SUPABASE_URL = 'https://dzcykpbfykajhoutzhpf.supabase.co';

                .channel('notifications')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'notifications',
                    filter: `user_id=eq.${currentUser.id}`
                }, (payload) => {
                    notifications.unshift(payload.new);
                    updateNotificationUI();
                    
                    // Show browser notification

                        new Notification(payload.new.title, {
                            body: payload.new.message,
                            icon: '/logo.png'
                        });

                })
                .subscribe();
                
            return subscription;
        }

        // Format time ago
        function formatTimeAgo(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            return date.toLocaleDateString();
        }

        async function loadQuotes() {
            try {
                const { data, error } = await supabaseClient
                    .from('quotes')

                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    quotes = data;

                    } else {

                renderQuotes();

            } catch (error) {
                console.error('Error loading quotes:', error);
                const cached = localStorage.getItem('cachedQuotes');
                if (cached) {
                    quotes = JSON.parse(cached);
                } else {
                    quotes = sampleQuotes;
                }
                renderQuotes();
                
                if (!navigator.onLine) {
                    showAlert('You are offline. Showing cached quotes.', 'warning');

        }

        async function getLikeCount(quoteId) {
            try {
                const { count } = await supabaseClient
                    .from('quote_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('quote_id', quoteId);

        window.shareQuote = (quoteId) => {

            if (navigator.share) {

        function copyToClipboard(text) {

        async function renderQuotes() {
            let filteredQuotes = [...quotes];

            if (currentCategory !== 'all') {
                filteredQuotes = filteredQuotes.filter(q => q.category === currentCategory);
            }

            if (filteredQuotes.length === 0) {
                quotesContainer.innerHTML = `<div class="loading"><p>No quotes in this category</p></div>`;
                return;
            }

            let quotesWithLikes = filteredQuotes;
            if (navigator.onLine) {
                quotesWithLikes = await Promise.all(filteredQuotes.map(async (quote) => {
                    const likeCount = await getLikeCount(quote.id);
                    return { ...quote, likeCount };
                }));
            } else {
                quotesWithLikes = filteredQuotes.map(quote => ({ ...quote, likeCount: 0 }));
            }

            quotesContainer.innerHTML = quotesWithLikes.map(quote => {
                const isLiked = userLikes.has(quote.id);
                const isSaved = userSaves.has(quote.id);
                const displayLikeCount = quote.likeCount + (isLiked ? 1 : 0);

                return `
                    <div class="quote-card">
                        <div class="quote-text">${quote.text}</div>
                        <div class="quote-tag"><span>${quote.tag}</span> ${quote.category.charAt(0).toUpperCase() + quote.category.slice(1)} Quotes</div>
                        <div class="quote-actions">
                            <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" onclick="handleLike('${quote.id}')" ${!navigator.onLine ? 'disabled' : ''}>
                                <span>❤️</span>
                                <span class="like-count">${displayLikeCount}</span>
                            </button>
                            <button class="action-btn save-btn ${isSaved ? 'saved' : ''}" onclick="handleSave('${quote.id}')" ${!navigator.onLine ? 'disabled' : ''}>
                                <span>🔖</span>
                                <span>Save</span>
                            </button>
                            <button class="action-btn" onclick="downloadQuote('${quote.id}')">
                                <span>📥</span>
                                <span>Download</span>
                            </button>
                            <button class="action-btn" onclick="shareQuote('${quote.id}')">
                                <span>📤</span>
                                <span>Share</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.handleLike = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to like quotes')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            if (!navigator.onLine) {
                showAlert('You need to be online to like quotes', 'warning');
                return;
            }

            try {
                if (userLikes.has(quoteId)) {
                    await supabaseClient
                        .from('quote_likes')
                        .delete()
                        .eq('quote_id', quoteId)
                        .eq('user_id', currentUser.id);
                    userLikes.delete(quoteId);
                } else {
                    await supabaseClient
                        .from('quote_likes')
                        .insert([{ quote_id: quoteId, user_id: currentUser.id }]);
                    userLikes.add(quoteId);

        window.handleSave = async (quoteId) => {
            if (!currentUser) {
                if (confirm('Please login to save quotes')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            if (!navigator.onLine) {
                showAlert('You need to be online to save quotes', 'warning');

            try {
                if (userSaves.has(quoteId)) {
                    await supabaseClient
                        .from('quote_saves')
                        .delete()
                        .eq('quote_id', quoteId)
                        .eq('user_id', currentUser.id);
                    userSaves.delete(quoteId);
                    showAlert('Quote removed from saved');

                        .from('quote_saves')

                    showAlert('Quote saved!');

                renderQuotes();
            } catch (error) {
                showAlert('Error saving quote');

        window.downloadQuote = (quoteId) => {
            const quote = quotes.find(q => q.id === quoteId);
            const canvas = document.createElement('canvas');
            canvas.width = 380;
            canvas.height = 380;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = 'bold 50px Georgia, serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText('“', 25, 20);

            ctx.font = 'bold 28px Arial, Helvetica, sans-serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            
            const words = quote.text.split(' ');
            let line = '';
            let lines = [];
            let y = 100;

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > 300 && n > 0) {
                    lines.push(line);
                    line = words[n] + ' ';
                } else {
                    line = testLine;
                }
            }
            lines.push(line);

            lines.forEach((line, index) => {
                ctx.fillText(line, 190, y + (index * 40));
            });

            ctx.font = 'bold 50px Georgia, serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'right';
            ctx.fillText('”', 355, 300);

            const tagText = 'supreme motive';
            ctx.font = '14px Arial, Helvetica, sans-serif';
            const textWidth = ctx.measureText(tagText).width;
            const rectX = 380 - textWidth - 30;
            const rectY = 340;
            const rectWidth = textWidth + 24;
            const rectHeight = 30;
            
            ctx.strokeStyle = '#FFFFFF';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(rectX, rectY, rectWidth, rectHeight);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(tagText, rectX + 12, rectY + 15);

            const link = document.createElement('a');
            link.download = `suprememotive-${quote.category}-quote.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
            showAlert('Quote downloaded!');
        };

        // ============================================

        // ============================================

        if (markAllReadBtn) {

        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================
        // INITIALIZE
        // ============================================
        async function init() {
            initTheme();
            await checkAuth();
            await loadQuotes();
            requestNotificationPermission();
            
            // Check if app is installed on page load
            isAppInstalled();
        }

        init();
    </script>
