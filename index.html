<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeMotive - Daily Motivation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0A0A0A;
            --deep-navy: #0B1A33;
            --gold: #FFD700;
            --electric-blue: #00F0FF;
            --dark-gray: #1A1A1A;
            --medium-gray: #2A2A2A;
            --light-gray: #3A3A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
            --warning: #FFC107;
            --card-bg: rgba(26, 26, 26, 0.8);
            --card-border: rgba(255, 215, 0, 0.2);
        }

        /* Light mode variables */
        body.light-mode {
            --primary-black: #FFFFFF;
            --deep-navy: #F0F5FF;
            --gold: #D4AF37;
            --electric-blue: #0066CC;
            --dark-gray: #F5F5F5;
            --medium-gray: #E0E0E0;
            --light-gray: #CCCCCC;
            --text-primary: #333333;
            --text-secondary: #666666;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(212, 175, 55, 0.3);
            background: #F5F5F5;
            color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--primary-black);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 80px; /* Space for bottom navigation */
        }

        /* Top Navigation */
        .top-nav {
            background: var(--dark-gray);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(26, 26, 26, 0.95);
        }

        body.light-mode .top-nav {
            background: rgba(255, 255, 255, 0.95);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--gold);
            transition: all 0.3s ease;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 0.5rem 0;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* Theme Toggle */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: rotate(360deg);
            background: var(--medium-gray);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--dark-gray);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 1rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(26, 26, 26, 0.95);
        }

        body.light-mode .bottom-nav {
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            gap: 0.3rem;
        }

        .nav-item:hover {
            color: var(--gold);
            transform: translateY(-3px);
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }

        .nav-icon {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Welcome Card */
        .welcome-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--card-border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .welcome-card h2 {
            color: var(--gold);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .welcome-card p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Posts Grid */
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Post Card */
        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.15);
        }

        /* Post Background */
        .post-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at top right, rgba(255, 215, 0, 0.05), transparent 70%);
            border-radius: 20px;
            pointer-events: none;
            z-index: 0;
        }

        .post-content-wrapper {
            position: relative;
            z-index: 1;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .post-author-info {
            flex: 1;
        }

        .post-author {
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            margin: 1rem 0;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .post-image:hover {
            opacity: 0.9;
        }

        .post-title {
            font-size: 1.5rem;
            color: var(--gold);
            margin: 1rem 0;
            line-height: 1.3;
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 12px;
            border-left: 3px solid var(--gold);
            font-size: 1rem;
            position: relative;
        }

        body.light-mode .post-content {
            background: rgba(0, 0, 0, 0.02);
        }

        .post-content.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--electric-blue);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0.5rem 0 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .read-more-btn:hover {
            background: var(--medium-gray);
            color: var(--gold);
        }

        /* Post Stats */
        .post-stats {
            display: flex;
            gap: 2rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--card-border);
            border-bottom: 1px solid var(--card-border);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item i {
            color: var(--gold);
        }

        .stat-value {
            color: var(--gold);
            font-weight: 600;
        }

        /* Post Actions */
        .post-actions {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 100px;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            background: var(--medium-gray);
            color: var(--text-primary);
            border: 1px solid var(--light-gray);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .like-btn.liked {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            border-color: var(--gold);
        }

        .save-btn.saved {
            background: rgba(0, 240, 255, 0.1);
            color: var(--electric-blue);
            border-color: var(--electric-blue);
        }

        .share-btn {
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            color: var(--primary-black);
            border: none;
        }

        .download-btn {
            background: var(--success);
            color: white;
            border: none;
        }

        /* Comments Section */
        .comments-section {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
        }

        .comment-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .comment-form input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .comment-form input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .comment-submit {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--gold), var(--electric-blue));
            border: none;
            border-radius: 10px;
            color: var(--primary-black);
            font-weight: 600;
            cursor: pointer;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .comment {
            background: var(--medium-gray);
            padding: 1rem;
            border-radius: 12px;
            border-left: 3px solid var(--gold);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .comment-author {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-left: auto;
        }

        .comment-content {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-left: 2.8rem;
        }

        .reply-form {
            margin-top: 0.5rem;
            margin-left: 2.8rem;
            display: flex;
            gap: 0.5rem;
        }

        .reply-form input {
            flex: 1;
            padding: 0.5rem;
            background: var(--dark-gray);
            border: 1px solid var(--light-gray);
            border-radius: 6px;
            color: var(--text-primary);
        }

        .reply-btn {
            padding: 0.5rem 1rem;
            background: var(--electric-blue);
            border: none;
            border-radius: 6px;
            color: var(--primary-black);
            font-weight: 600;
            cursor: pointer;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Share Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--dark-gray);
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--gold);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            color: var(--gold);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .share-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .share-option {
            padding: 1rem;
            border: 1px solid var(--light-gray);
            border-radius: 12px;
            background: var(--medium-gray);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .share-option:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
        }

        .share-option .icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .share-option .name {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .copy-link {
            display: flex;
            gap: 0.5rem;
        }

        .copy-link input {
            flex: 1;
            padding: 0.8rem;
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            color: var(--text-primary);
        }

        .copy-link button {
            padding: 0.8rem 1.5rem;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: var(--primary-black);
            font-weight: 600;
            cursor: pointer;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: var(--dark-gray);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                z-index: 999;
                border-bottom: 2px solid var(--gold);
                backdrop-filter: blur(10px);
            }

            .nav-links.active {
                transform: translateY(0);
            }

            .post-actions {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }

            .post-stats {
                justify-content: space-around;
            }

            .comment-form {
                flex-direction: column;
            }

            .share-options {
                grid-template-columns: 1fr;
            }
        }
    </style>

        {

        // Theme handling
        function initTheme() {
            const savedTheme = localStorage.getItem('theme')
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode')
                themeToggle.textContent = '☀️'
            } else {
                document.body.classList.remove('light-mode')
                themeToggle.textContent = '🌙'
            }
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode')
            const isLight = document.body.classList.contains('light-mode')
            localStorage.setItem('theme', isLight ? 'light' : 'dark')
            themeToggle.textContent = isLight ? '☀️' : '🌙'
        })

        // Mobile menu toggle
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active')
        })

        // Close mobile menu when clicking a link
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active')
            })
        })

        // Show alert
        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <span>${type === 'success' ? '✅' : '❌'}</span>
                    <span>${message}</span>
                </div>
            `
            setTimeout(() => {
                alertContainer.innerHTML = ''
            }, 3000)
        }

        // Check auth status
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user

            // Update welcome message
            if (user) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('name')
                    .eq('id', user.id)
                    .single()

                welcomeTitle.textContent = `Welcome back, ${profile?.name || 'Motivated One'}! 🔥`
                welcomeText.textContent = 'Ready for today\'s dose of inspiration?'
                
                if (ADMIN_EMAILS.includes(user.email)) {
                    adminLink.style.display = 'block'
                    adminLink.href = 'admin/admin-dashboard.html'
                }
            } else {
                welcomeTitle.textContent = 'Welcome to SupremeMotive! 💪'
                welcomeText.textContent = 'Start your journey with daily motivation and inspiration.'
                adminLink.style.display = 'none'
            }
        }

        // Load posts
        async function loadPosts() {
            try {
                const { data: posts, error } = await supabase
                    .from('posts')
                    .select(`
                        *,
                        profiles:created_by (id, name, profile_image_url),
                        post_likes(count),
                        comments(count)
                    `)
                    .order('created_at', { ascending: false })

                if (error) throw error

                allPosts = posts || []
                
                // Get user interactions if logged in
                let userLikes = new Set()
                let userSaves = new Set()
                
                if (currentUser) {
                    const { data: likes } = await supabase
                        .from('post_likes')
                        .select('post_id')
                        .eq('user_id', currentUser.id)
                    
                    const { data: saves } = await supabase
                        .from('saved_posts')
                        .select('post_id')
                        .eq('user_id', currentUser.id)

                    userLikes = new Set(likes?.map(l => l.post_id) || [])
                    userSaves = new Set(saves?.map(s => s.post_id) || [])
                }

                renderPosts(allPosts, userLikes, userSaves)

            } catch (error) {
                console.error('Error loading posts:', error)
                postsContainer.innerHTML = `
                    <div class="alert alert-error">
                        <span>❌</span>
                        <span>Error loading posts: ${error.message}</span>
                    </div>
                `
            }
        }

        // Render posts
        function renderPosts(posts, userLikes, userSaves) {
            if (posts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="welcome-card">
                        <p style="color: var(--text-secondary);">No posts yet. Check back soon for motivation!</p>
                    </div>
                `
                return
            }

            postsContainer.innerHTML = posts.map(post => {
                const likesCount = post.post_likes?.[0]?.count || 0
                const commentsCount = post.comments?.[0]?.count || 0
                const userLiked = userLikes.has(post.id)
                const userSaved = userSaves.has(post.id)

                return `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-background"></div>
                        
                        <div class="post-content-wrapper">
                            <div class="post-header">
                                <img src="${post.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.profiles?.name || 'Admin')}&background=FFD700&color=000&size=50`}" 
                                     alt="${post.profiles?.name || 'Admin'}" 
                                     class="post-avatar">
                                <div class="post-author-info">
                                    <div class="post-author">${post.profiles?.name || 'SupremeMotive Admin'}</div>
                                    <div class="post-date">${formatDate(post.created_at)}</div>
                                </div>
                            </div>

                            ${post.image_url ? `
                                <img src="${post.image_url}" alt="Post image" class="post-image" 
                                     onclick="viewImage('${post.image_url}')">
                            ` : ''}

                            <h3 class="post-title">${escapeHtml(post.title)}</h3>
                            
                            <div class="post-content collapsed" id="content-${post.id}">
                                ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                            </div>
                            
                            <button class="read-more-btn" onclick="toggleReadMore('${post.id}')">
                                <span>Read More</span>
                                <span>▼</span>
                            </button>

                            <div class="post-stats">
                                <div class="stat-item">
                                    <i>❤️</i>
                                    <span class="stat-value">${likesCount}</span>
                                </div>
                                <div class="stat-item">
                                    <i>💬</i>
                                    <span class="stat-value">${commentsCount}</span>
                                </div>
                            </div>

                            <div class="post-actions">
                                <button class="action-btn like-btn ${userLiked ? 'liked' : ''}" 
                                        onclick="handleLike('${post.id}')">
                                    <i>${userLiked ? '❤️' : '🤍'}</i>
                                    <span>${userLiked ? 'Liked' : 'Like'}</span>
                                </button>
                                
                                <button class="action-btn save-btn ${userSaved ? 'saved' : ''}" 
                                        onclick="handleSave('${post.id}')">
                                    <i>${userSaved ? '🔖' : '📑'}</i>
                                    <span>${userSaved ? 'Saved' : 'Save'}</span>
                                </button>
                                
                                <button class="action-btn share-btn" 
                                        onclick="openShareModal('${post.id}')">
                                    <i>📤</i>
                                    <span>Share</span>
                                </button>
                                
                                <button class="action-btn download-btn" 
                                        onclick="downloadPost('${post.id}')">
                                    <i>📥</i>
                                    <span>Download</span>
                                </button>
                            </div>

                            <!-- Comments Section -->
                            <div class="comments-section" id="comments-${post.id}" style="display: none;">
                                ${currentUser ? `
                                    <div class="comment-form">
                                        <input type="text" id="comment-${post.id}" placeholder="Write a comment...">
                                        <button class="comment-submit" onclick="addComment('${post.id}')">Post</button>
                                    </div>
                                ` : `
                                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 1rem;">
                                        <a href="login.html" style="color: var(--gold);">Login</a> to comment
                                    </p>
                                `}
                                <div class="comments-list" id="comments-list-${post.id}"></div>
                            </div>
                        </div>
                    </div>
                `
            }).join('')

            // Load comments for each post
            posts.forEach(post => loadComments(post.id))
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString)
            const now = new Date()
            const diffTime = Math.abs(now - date)
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24))
            
            if (diffDays === 0) return 'Today'
            if (diffDays === 1) return 'Yesterday'
            if (diffDays < 7) return `${diffDays} days ago`
            return date.toLocaleDateString()
        }

        // Toggle read more
        window.toggleReadMore = (postId) => {
            const content = document.getElementById(`content-${postId}`)
            const btn = document.querySelector(`[onclick="toggleReadMore('${postId}')"]`)
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed')
                btn.innerHTML = '<span>Show Less</span> <span>▲</span>'
            } else {
                content.classList.add('collapsed')
                btn.innerHTML = '<span>Read More</span> <span>▼</span>'
            }
        }

        // Handle like
        window.handleLike = async (postId) => {
            if (!currentUser) {
                if (confirm('Please login to like posts. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            try {
                const { data: existingLike } = await supabase
                    .from('post_likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle()

                if (existingLike) {
                    await supabase
                        .from('post_likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                } else {
                    await supabase
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: currentUser.id }])
                }

                await loadPosts()

            } catch (error) {
                showAlert('Error updating like', 'error')
            }
        }

        // Handle save
        window.handleSave = async (postId) => {
            if (!currentUser) {
                if (confirm('Please login to save posts. Go to login page?')) {
                    window.location.href = 'login.html'
                }
                return
            }

            try {
                const { data: existingSave } = await supabase
                    .from('saved_posts')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle()

                if (existingSave) {
                    await supabase
                        .from('saved_posts')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                    showAlert('Post removed from saved', 'success')
                } else {
                    await supabase
                        .from('saved_posts')
                        .insert([{ post_id: postId, user_id: currentUser.id }])
                    showAlert('Post saved!', 'success')
                }

                await loadPosts()

            } catch (error) {
                showAlert('Error saving post', 'error')
            }
        }

        // Download post
        window.downloadPost = async (postId) => {
            const post = allPosts.find(p => p.id === postId)
            if (!post) return

            const content = `
                ${post.title}
                
                ${post.content}
                
                Shared from SupremeMotive - Daily Motivation
                Download Date: ${new Date().toLocaleString()}
            `

            const blob = new Blob([content], { type: 'text/plain' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `suprememotive-${post.title.toLowerCase().replace(/\s+/g, '-')}.txt`
            document.body.appendChild(a)
            a.click()
            document.body.removeChild(a)
            URL.revokeObjectURL(url)

            showAlert('Post downloaded successfully!', 'success')
        }

        // View image
        window.viewImage = (imageUrl) => {
            window.open(imageUrl, '_blank')
        }

        // Share modal
        window.openShareModal = (postId) => {
            currentPostId = postId
            const postUrl = `${window.location.origin}/post.html?id=${postId}`
            shareLink.value = postUrl
            shareModal.classList.add('show')
        }

        closeShareModal.addEventListener('click', () => {
            shareModal.classList.remove('show')
        })

        window.addEventListener('click', (e) => {
            if (e.target === shareModal) {
                shareModal.classList.remove('show')
            }
        })

        // Share via social media
        window.shareVia = (platform) => {
            const post = allPosts.find(p => p.id === currentPostId)
            if (!post) return

            const url = encodeURIComponent(`${window.location.origin}/post.html?id=${currentPostId}`)
            const text = encodeURIComponent(post.title)
            
            let shareUrl = ''
            
            switch(platform) {
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`
                    break
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`
                    break
                case 'linkedin':
                    shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`
                    break
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${text}%20${url}`
                    break
            }
            
            window.open(shareUrl, '_blank', 'width=600,height=400')
        }

        // Copy share link
        window.copyShareLink = () => {
            shareLink.select()
            document.execCommand('copy')
            showAlert('Link copied to clipboard!', 'success')
        }

        // Load comments
        async function loadComments(postId) {
            try {
                const { data: comments, error } = await supabase
                    .from('comments')
                    .select(`
                        *,
                        profiles:user_id (id, name, profile_image_url),
                        replies:comments!parent_comment_id (
                            *,
                            profiles:user_id (id, name, profile_image_url)
                        )
                    `)
                    .eq('post_id', postId)
                    .is('parent_comment_id', null)
                    .order('created_at', { ascending: true })

                if (error) throw error

                renderComments(comments, postId)

            } catch (error) {
                console.error('Error loading comments:', error)
            }
        }

        // Render comments
        function renderComments(comments, postId) {
            const container = document.getElementById(`comments-list-${postId}`)
            if (!container) return

            if (comments.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No comments yet. Be the first to comment!</p>'
                return
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment">
                    <div class="comment-header">
                        <img src="${comment.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(comment.profiles?.name || 'User')}&background=FFD700&color=000&size=30`}" 
                             alt="${comment.profiles?.name}" class="comment-avatar">
                        <span class="comment-author">${comment.profiles?.name || 'User'}</span>
                        <span class="comment-date">${formatDate(comment.created_at)}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    
                    ${currentUser ? `
                        <div class="reply-form">
                            <input type="text" id="reply-${comment.id}" placeholder="Write a reply...">
                            <button class="reply-btn" onclick="addReply('${comment.id}', '${postId}')">Reply</button>
                        </div>
                    ` : ''}

                    ${comment.replies?.map(reply => `
                        <div style="margin-left: 2rem; margin-top: 0.5rem; padding-left: 1rem; border-left: 2px solid var(--gold);">
                            <div class="comment-header">
                                <img src="${reply.profiles?.profile_image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(reply.profiles?.name || 'User')}&background=00F0FF&color=000&size=25`}" 
                                     alt="${reply.profiles?.name}" class="comment-avatar" style="width: 25px; height: 25px;">
                                <span class="comment-author" style="font-size: 0.85rem;">${reply.profiles?.name || 'User'}</span>
                                <span class="comment-date">${formatDate(reply.created_at)}</span>
                            </div>
                            <div class="comment-content" style="font-size: 0.9rem;">${escapeHtml(reply.content)}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('')
        }

        // Add comment
        window.addComment = async (postId) => {
            if (!currentUser) {
                showAlert('Please login to comment', 'error')
                return
            }

            const input = document.getElementById(`comment-${postId}`)
            const content = input.value.trim()

            if (!content) {
                showAlert('Please enter a comment', 'error')
                return
            }

            try {
                const { error } = await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content
                    }])

                if (error) throw error

                input.value = ''
                await loadComments(postId)
                showAlert('Comment posted!', 'success')

            } catch (error) {
                showAlert('Error posting comment: ' + error.message, 'error')
            }
        }

        // Add reply
        window.addReply = async (commentId, postId) => {
            if (!currentUser) {
                showAlert('Please login to reply', 'error')
                return
            }

            const input = document.getElementById(`reply-${commentId}`)
            const content = input.value.trim()

            if (!content) {
                showAlert('Please enter a reply', 'error')
                return
            }

            try {
                const { error } = await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        content: content,
                        parent_comment_id: commentId
                    }])

                if (error) throw error

                input.value = ''
                await loadComments(postId)
                showAlert('Reply posted!', 'success')

            } catch (error) {
                showAlert('Error posting reply: ' + error.message, 'error')
            }
        }

        // Toggle comments section
        window.toggleComments = (postId) => {
            const section = document.getElementById(`comments-${postId}`)
            if (section.style.display === 'none') {
                section.style.display = 'block'
            } else {
                section.style.display = 'none'
            }
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
        }

        // Initialize
        async function init() {
            initTheme()
            await checkAuth()
            await loadPosts()
        }

        init()
    </script>
</body>
</html>
