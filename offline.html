<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - SupremeMotive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .offline-container {
            max-width: 400px;
            padding: 2rem;
        }

        h1 {
            color: #FFD700;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: #B0B0B0;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .retry-btn {
            background: #FFD700;
            color: #0A0A0A;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still access previously viewed quotes. Connect to the internet to see new content and interact with the community.</p>
        <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
